// roundRect polyfill for older iPads (iOS < 16)
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(Math.abs(r)||0, w/2, h/2);
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r);
    this.closePath();
    return this;
  };
}
let W=0, H=0, DPR=1, safeT=0, safeB=0, PADX=12;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  const cs = getComputedStyle(document.documentElement);
  safeT = parseFloat(cs.getPropertyValue("--sat"))||0;
  safeB = parseFloat(cs.getPropertyValue("--sab"))||0;
  // phone notch / Dynamic Island in landscape: inset edge-hugging UI symmetrically
  const safeL = parseFloat(cs.getPropertyValue("--sal"))||0;
  const safeR = parseFloat(cs.getPropertyValue("--sar"))||0;
  PADX = 12 + Math.max(safeL, safeR);
}

/* ---------------- audio (all synth, no files) ---------------- */
const AU = {
  ctx:null, master:null, engine:null, engineGain:null, driftGain:null, started:false,
  init(){
    if(this.started) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = store.muted ? 0 : 0.5;
      this.master.connect(this.ctx.destination);
      // engine hum
      const osc = this.ctx.createOscillator(); osc.type="sawtooth"; osc.frequency.value=60;
      const osc2 = this.ctx.createOscillator(); osc2.type="square"; osc2.frequency.value=61;
      const lp = this.ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=280;
      this.engineGain = this.ctx.createGain(); this.engineGain.gain.value=0;
      osc.connect(lp); osc2.connect(lp); lp.connect(this.engineGain); this.engineGain.connect(this.master);
      osc.start(); osc2.start(); this.engine = [osc, osc2];
      // drift hiss
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate, this.ctx.sampleRate);
      const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const noise = this.ctx.createBufferSource(); noise.buffer=buf; noise.loop=true;
      const bp = this.ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=900; bp.Q.value=0.6;
      this.driftGain = this.ctx.createGain(); this.driftGain.gain.value=0;
      noise.connect(bp); bp.connect(this.driftGain); this.driftGain.connect(this.master);
      noise.start();
      this.started = true;
      this.resume();
    }catch(e){}
  },
  resume(){ // iOS suspends audio contexts aggressively — poke it on every gesture
    if(this.ctx && this.ctx.state === "suspended") this.ctx.resume().catch(()=>{});
  },
  setEngine(speed, boosting){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const f = 55 + speed*0.16 + (boosting?40:0);
    this.engine[0].frequency.setTargetAtTime(f, t, 0.05);
    this.engine[1].frequency.setTargetAtTime(f*1.007, t, 0.05);
    this.engineGain.gain.setTargetAtTime(speed>5 ? 0.05 : 0.015, t, 0.1);
  },
  setDrift(on){ if(this.started) this.driftGain.gain.setTargetAtTime(on?0.06:0, this.ctx.currentTime, 0.05); },
  beep(freq, dur, type, vol, slideTo){
    if(!this.started || store.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type = type||"square"; o.frequency.value = freq;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
    const g = this.ctx.createGain(); g.gain.setValueAtTime(vol||0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.02);
  },
  coin(){ this.beep(880,0.09,"square",0.1); setTimeout(()=>this.beep(1318,0.12,"square",0.1), 60); },
  key(){ [660,880,1108].forEach((f,i)=> setTimeout(()=>this.beep(f,0.15,"triangle",0.14), i*90)); },
  door(){ this.beep(160,0.25,"triangle",0.2,80); },
  bonk(){ this.beep(140,0.18,"triangle",0.25,50); },
  goober(){ this.beep(300,0.3,"sawtooth",0.14,90); },
  nitro(){ this.beep(200,0.4,"sawtooth",0.1,700); },
  star(i){ this.beep(660+i*220, 0.25, "triangle", 0.16); },
  ui(){ this.beep(520,0.06,"square",0.07); },
  win(){ [523,659,784,1046,784,1046,1318,1568].forEach((f,i)=> setTimeout(()=>this.beep(f, i>5?0.4:0.14, "triangle", 0.14), i*110)); },
  toggleMute(){ store.muted=!store.muted; save(); if(this.master) this.master.gain.value = store.muted?0:0.5; },
};

  AU.init();
  if(!keys[e.key]) {
    if(e.key==="Enter"||e.key===" ") input.taps.push({screen:true});
    if(e.key==="m"||e.key==="M") AU.toggleMute();
    if(e.key==="p"||e.key==="P") togglePause();
  }
  keys[e.key]=true;
});
window.addEventListener("keyup", e=> keys[e.key]=false);
function normVec(x,y){
  const m = Math.hypot(x,y)||1;
  return {x:x/m*Math.min(1,Math.hypot(x,y)), y:y/m*Math.min(1,Math.hypot(x,y))};
}
function keyVec(){   // merged (single player)
  let x=0,y=0;
  if(keys.ArrowLeft||keys.a||keys.A) x-=1;
  if(keys.ArrowRight||keys.d||keys.D) x+=1;
  if(keys.ArrowUp||keys.w||keys.W) y-=1;
  if(keys.ArrowDown||keys.s||keys.S) y+=1;
  return normVec(x,y);
}
function keyVecArrows(){
  let x=0,y=0;
  if(keys.ArrowLeft) x-=1; if(keys.ArrowRight) x+=1;
  if(keys.ArrowUp) y-=1;  if(keys.ArrowDown) y+=1;
  return normVec(x,y);
}
function keyVecWASD(){
  let x=0,y=0;
  if(keys.a||keys.A) x-=1; if(keys.d||keys.D) x+=1;
  if(keys.w||keys.W) y-=1; if(keys.s||keys.S) y+=1;
  return normVec(x,y);
}
function joyVec(j){
  if(!j) return {x:0,y:0};
  const dx=j.x-j.ox, dy=j.y-j.oy, m=Math.hypot(dx,dy);
  if(m<=8) return {x:0,y:0};
  const c=Math.min(1,m/48);
  return {x:dx/m*c, y:dy/m*c};
}

cv.addEventListener("touchstart", e=>{

  for(const t of e.changedTouches){
    const x=t.clientX, y=t.clientY;
    input.taps.push({x, y});
    if(game.state==="play" && game.vs){
      if(x < W/2){ if(!input.joy) input.joy = {id:t.identifier, ox:x, oy:y, x, y}; }
      else if(!input.joy2) input.joy2 = {id:t.identifier, ox:x, oy:y, x, y};
    }
    else if(game.state==="play"){
      if(x < W*0.55 && !input.joy) { input.joy = {id:t.identifier, ox:x, oy:y, x, y}; }
      else { touches[t.identifier]="nitro"; input.nitro=true; }
    }
    else if(game.state==="build" && !bl.ptr){ bl.ptr = {id:t.identifier, x, y, stroke:false}; }
  }
},{passive:false});

  e.preventDefault();
  for(const t of e.changedTouches){
    if(input.joy && t.identifier===input.joy.id){ input.joy.x=t.clientX; input.joy.y=t.clientY; }
    if(input.joy2 && t.identifier===input.joy2.id){ input.joy2.x=t.clientX; input.joy2.y=t.clientY; }
    if(bl.ptr && t.identifier===bl.ptr.id){ bl.ptr.x=t.clientX; bl.ptr.y=t.clientY; }
  }
},{passive:false});
function endTouch(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(input.joy && t.identifier===input.joy.id) input.joy=null;
    if(input.joy2 && t.identifier===input.joy2.id) input.joy2=null;
    if(bl.ptr && t.identifier===bl.ptr.id){ bl.ptr=null; bl.lastCell=null; }
    if(touches[t.identifier]==="nitro"){ delete touches[t.identifier]; if(!Object.keys(touches).length) input.nitro=false; }
  }
}
cv.addEventListener("touchend", endTouch, {passive:false});
cv.addEventListener("touchcancel", endTouch, {passive:false});
cv.addEventListener("mousedown", e=>{
  AU.init(); input.taps.push({x:e.clientX, y:e.clientY});
  if(game.state==="build") bl.ptr = {id:"m", x:e.clientX, y:e.clientY, stroke:false};
});
window.addEventListener("mousemove", e=>{ if(bl.ptr && bl.ptr.id==="m"){ bl.ptr.x=e.clientX; bl.ptr.y=e.clientY; } });
window.addEventListener("mouseup", ()=>{ if(bl.ptr && bl.ptr.id==="m"){ bl.ptr=null; bl.lastCell=null; } });
window.addEventListener("contextmenu", e=> e.preventDefault());
function readInput(){
  if(game.vs){
    const a = keyVecArrows(), w = keyVecWASD();
    const j1 = joyVec(input.joy), j2 = joyVec(input.joy2);
    input.vec  = (Math.hypot(j1.x,j1.y) > Math.hypot(a.x,a.y)) ? j1 : a;
    input.vec2 = (Math.hypot(j2.x,j2.y) > Math.hypot(w.x,w.y)) ? j2 : w;
    input.nitro = false;
    return;
  }
  const k = keyVec();
  const j = joyVec(input.joy);
  input.vec.x = Math.abs(j.x)>Math.abs(k.x)?j.x:k.x;
  input.vec.y = Math.abs(j.y)>Math.abs(k.y)?j.y:k.y;
  if(keys[" "]) input.nitro = true;
  else if(!Object.keys(touches).length) input.nitro = false;
}

/* ---------------- game state ---------------- */
const game = {
  state:"title",       // title | map | play | clear | pause
  levelIx:0, lv:null,
  t:0, playT:0,
  car:null, coins:[], pads:[], gates:[], goobers:[], key:null, doors:[],
  finish:null, startCell:null,
  cols:0, rows:0, solid:null, road:[],
  groundCv:null, skidCv:null, skidCtx:null,
  flow:null, objective:null,
  cam:{x:0,y:0}, shake:0,
  parts:[], floats:[], stickers:[], confetti:[],
  coinsAll:0, hasKey:false, bonks:0,
  clearData:null, hintT:0,
  attract:{a:0},
};

function newCar(x,y,heading){
  return { x, y, vx:0, vy:0, heading, speed:0, nitroMeter:70,
    drifting:false, spinT:0, invuln:0, sq:1, sqv:0, trail:[], boost:0,
    aura:0, coins:0, portalCool:0, driftT:0 };
}

/* ---------------- level loading ---------------- */
function loadLevel(ix){ startLevel(LEVELS[ix], {ix}); }
function loadCustom(cl, from){
  game.sourceCustom = cl;
  startLevel(customToLevel(cl), {customId: from==="builder"? null : cl.id, from});
}
function startLevel(L, meta){
  game.levelIx = (meta.ix!==undefined)? meta.ix : -1;
  game.customId = meta.customId || null;
  game.fromBuilder = meta.from === "builder";
  game.lv = L;
  const g = L.grid;
  game.rows = g.length; game.cols = g[0].length;
  game.solid = []; game.road = []; game.coins=[]; game.pads=[]; game.gates=[]; game.doors=[]; game.goobers=[]; game.key=null;
  game.slick = []; game.portals = []; game.crates = [];
  game.hasKey=false; game.playT=0; game.bonks=0;
  game.vs = !!(meta && meta.vs);
  game.count = game.vs? 3.999 : 0;
  game.parts=[]; game.floats=[]; game.stickers=[]; game.confetti=[]; game.hintT=0;
  let sx=1, sy=1, fx=1, fy=1, p2x=0, p2y=0, p2c=1, p2r=1;
  for(let r=0;r<game.rows;r++){
    game.solid[r]=[]; game.slick[r]=[];
    for(let c=0;c<game.cols;c++){
      const ch = g[r][c]||"#";
      const wall = ch==="#";
      game.solid[r][c] = wall?1:0;
      game.slick[r][c] = ch==="~"?1:0;
      if(!wall) game.road.push([c,r]);
      const wx=(c+0.5)*CELL, wy=(r+0.5)*CELL;
      if(ch==="S"){ sx=wx; sy=wy; game.startCell=[c,r]; }
      if(ch==="2" && !p2x){ p2x=wx; p2y=wy; p2c=c; p2r=r; }
      if(ch==="F"){ fx=wx; fy=wy; game.finish={c,r,x:wx,y:wy}; }
      if(ch==="c") game.coins.push({x:wx,y:wy,got:false,ph:Math.random()*TAU});
      if(ch==="n") game.coins.push({x:wx,y:wy,got:false,ph:Math.random()*TAU,nitro:true});
      if(ch==="*") game.pads.push({c,r,x:wx,y:wy});
      if(ch==="G") game.gates.push({c,r,x:wx,y:wy,ph:(c+r)%2?0:Math.PI,open:1});
      if(ch==="D") game.doors.push({c,r,x:wx,y:wy,anim:0});
      if(ch==="k") game.key={x:wx,y:wy,got:false};
      if(ch==="T") game.portals.push({c,r,x:wx,y:wy,cool:0});
      if(ch==="x") game.crates.push({c,r,x:wx,y:wy,broken:false});
    }
  }
  game.portals.length = Math.min(2, game.portals.length);   // exactly one pair
  // doors + closed gates are solid until opened (handled in isSolid)
  game.coinsAll = game.coins.filter(c=>!c.nitro).length;
  // face the car toward open road
  let head = 0;
  const [sc,sr] = game.startCell;
  if(!isWallCell(sc+1,sr) || !isWallCell(sc+2,sr)) head = 0;
  else if(!isWallCell(sc,sr+1)) head = Math.PI/2;
  game.car = newCar(sx, sy, head);
  game.car2 = null;
  if(game.vs){
    const p2head = !isWallCell(p2c-1,p2r) ? Math.PI : -Math.PI/2;
    game.car2 = newCar(p2x||sx, p2y||sy, p2x? p2head : head);
    game.car2.p2 = true;
  }
  game.cars = game.car2 ? [game.car, game.car2] : [game.car];
  game.pet = { x:sx, y:sy };
  game.cam.x = sx; game.cam.y = sy;
  (L.hazards||[]).forEach(h=>{
    game.goobers.push({ path:h.path.map(p=>[(p[0]+0.5)*CELL,(p[1]+0.5)*CELL]),
      seg:0, x:(h.path[0][0]+0.5)*CELL, y:(h.path[0][1]+0.5)*CELL,
      speed:(CONFIG.easyMode? h.speed*0.7 : h.speed), ph:Math.random()*TAU });
  });
  // boss race: the goober drives his own car, start to finish
  game.rival = null;
  if(L.rival){
    const path = bfsPathCells(game.startCell, [game.finish.c, game.finish.r]);
    game.rival = { wp: path.map(([c,r])=>[(c+0.5)*CELL,(r+0.5)*CELL]),
      i:0, x:(game.startCell[0]+0.5)*CELL, y:(game.startCell[1]+0.5)*CELL,
      a:head, speed:(CONFIG.bossSpeed||95)*((L.rival&&L.rival.mult)||1), delay:1.5, done:false };
    setTimeout(()=>{ if(game.rival && game.state==="play") sticker("BEAT HIM TO THE FLAG!", "#ff8fe0"); }, 1900);
  }
  prerenderGround(L);
  const sk = document.createElement("canvas");
  sk.width = game.cols*CELL; sk.height = game.rows*CELL;
  game.skidCv = sk; game.skidCtx = sk.getContext("2d");
  updateObjective(true);
  game.raceTotal = game.flow ? Math.max(1, game.flow[game.startCell[1]][game.startCell[0]]) : 1;
  game.state = "play";
  sticker(L.emoji+" "+L.name, L.hue);
  setTimeout(()=> game.state==="play" && sticker("GO GO GO!", "#ffffff"), 900);
}

function isWallCell(c,r){
  if(c<0||r<0||c>=game.cols||r>=game.rows) return true;
  return !!game.solid[r][c];
}
function isSolid(c,r){
  if(isWallCell(c,r)) return true;
  for(const d of game.doors) if(d.c===c && d.r===r && d.anim<1) return true;
  for(const g of game.gates) if(g.c===c && g.r===r && g.open<0.5) return true;
  for(const cr of game.crates) if(cr.c===c && cr.r===r && !cr.broken) return true;
  return false;
}
function crateAt(c,r){
  for(const cr of game.crates) if(!cr.broken && cr.c===c && cr.r===r) return cr;
  return null;
}

/* BFS shortest path between two cells (walls only) — the boss's racing line */
function bfsPathCells(start, goal){
  const R = game.rows, C = game.cols;
  const prev = Array.from({length:R},()=>new Array(C).fill(null));
  prev[start[1]][start[0]] = start;
  const q = [start];
  while(q.length){
    const [c,r] = q.shift();
    if(c===goal[0] && r===goal[1]) break;
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=C||nr>=R||game.solid[nr][nc]||prev[nr][nc]) continue;
      prev[nr][nc] = [c,r]; q.push([nc,nr]);
    }
  }
  if(!prev[goal[1]][goal[0]]) return [start];
  const path = []; let cur = goal;
  while(!(cur[0]===start[0] && cur[1]===start[1])){ path.unshift(cur); cur = prev[cur[1]][cur[0]]; }
  path.unshift(start);
  return path;
}

/* BFS flow field toward current objective (for the helper arrow) */
function updateObjective(force){
  let target;
  if(game.key && !game.key.got) target = game.key;
  else if(game.doors.length && game.doors.some(d=>d.anim<1) && game.hasKey) target = game.doors.find(d=>d.anim<1);
  else target = game.finish;
  if(!force && game.objective===target) return;
  game.objective = target;
  const tc = clamp(Math.floor(target.x/CELL),0,game.cols-1), tr = clamp(Math.floor(target.y/CELL),0,game.rows-1);
  const dst = Array.from({length:game.rows},()=>new Array(game.cols).fill(-1));
  const q=[[tc,tr]]; dst[tr][tc]=0;
  while(q.length){
    const [c,r]=q.shift();
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
      if(game.solid[nr][nc]) continue;             // hint path ignores doors/gates
      if(dst[nr][nc]!==-1) continue;
      dst[nr][nc]=dst[r][c]+1; q.push([nc,nr]);
    }
  }
  game.flow = dst;
}

/* ---------------- pre-rendered ground + walls ---------------- */
function prerenderGround(L){
  const w = game.cols*CELL, h = game.rows*CELL;
  const g = document.createElement("canvas"); g.width=w; g.height=h;
  const x = g.getContext("2d");
  // asphalt (road is the LIGHT surface — walls go near-black so the maze pops)
  x.fillStyle = "#232a3d"; x.fillRect(0,0,w,h);
  for(let i=0;i<w*h/900;i++){
    x.fillStyle = Math.random()<0.5 ? "rgba(255,255,255,0.035)" : "rgba(0,0,0,0.3)";
    x.fillRect(Math.random()*w, Math.random()*h, rand(1,3), rand(1,3));
  }
  // warm lamp pools on road
  for(const [c,r] of game.road){
    if((c*7+r*13)%9===0){
      const gr = x.createRadialGradient((c+0.5)*CELL,(r+0.5)*CELL,8,(c+0.5)*CELL,(r+0.5)*CELL,CELL*0.9);
      gr.addColorStop(0,"rgba(255,180,92,0.10)"); gr.addColorStop(1,"rgba(255,180,92,0)");
      x.fillStyle = gr; x.fillRect((c-1)*CELL,(r-1)*CELL,CELL*3,CELL*3);
    }
  }
  // ice sheen
  for(const [c,r] of game.road){
    if(!(game.slick[r] && game.slick[r][c])) continue;
    x.fillStyle = "rgba(150,210,255,0.14)";
    x.fillRect(c*CELL, r*CELL, CELL, CELL);
    x.strokeStyle = "rgba(225,245,255,0.22)"; x.lineWidth = 2;
    for(let i=0;i<3;i++){
      const yy = r*CELL + 22 + i*30 + ((c*13)%12);
      x.beginPath(); x.moveTo(c*CELL+12, yy); x.lineTo(c*CELL+CELL-12, yy-9); x.stroke();
    }
  }
  // center dashes on straights
  x.strokeStyle = "rgba(255,255,255,0.07)"; x.lineWidth=4; x.setLineDash([16,20]);
  for(const [c,r] of game.road){
    if(!isWallCell(c+1,r) && !isWallCell(c-1,r) && isWallCell(c,r-1) && isWallCell(c,r+1)){
      x.beginPath(); x.moveTo(c*CELL,(r+0.5)*CELL); x.lineTo((c+1)*CELL,(r+0.5)*CELL); x.stroke();
    }
    if(!isWallCell(c,r+1) && !isWallCell(c,r-1) && isWallCell(c-1,r) && isWallCell(c+1,r)){
      x.beginPath(); x.moveTo((c+0.5)*CELL,r*CELL); x.lineTo((c+0.5)*CELL,(r+1)*CELL); x.stroke();
    }
  }
  x.setLineDash([]);
  // start + finish checkers
  const checker = (cc,rr,col)=>{
    for(let i=0;i<8;i++) for(let j=0;j<8;j++){
      if((i+j)%2) continue;
      x.fillStyle = col;
      x.fillRect(cc*CELL+i*CELL/8, rr*CELL+j*CELL/8, CELL/8, CELL/8);
    }
  };
  for(let r=0;r<game.rows;r++) for(let c=0;c<game.cols;c++){
    const ch = L.grid[r][c];
    if(ch==="S") checker(c,r,"rgba(255,255,255,0.06)");
    if(ch==="2") checker(c,r,"rgba(176,110,232,0.14)");
    if(ch==="F") checker(c,r,"rgba(255,255,255,0.16)");
  }
  // boost pads (chevrons)
  for(const p of game.pads){
    x.save(); x.translate(p.x,p.y);
    const horiz = !isWallCell(p.c+1,p.r) || !isWallCell(p.c-1,p.r);
    if(!horiz) x.rotate(Math.PI/2);
    x.strokeStyle = L.hue; x.lineWidth = 7; x.lineCap="round"; x.globalAlpha=0.75;
    for(let i=-1;i<=1;i++){
      x.beginPath(); x.moveTo(i*22-9, -18); x.lineTo(i*22+9, 0); x.lineTo(i*22-9, 18); x.stroke();
    }
    x.restore();
  }
  // walls: dark blocks + hue edge light + night windows
  for(let r=0;r<game.rows;r++) for(let c=0;c<game.cols;c++){
    if(!game.solid[r][c]) continue;
    const px=c*CELL, py=r*CELL;
    x.fillStyle = "#0b0d15"; x.fillRect(px,py,CELL,CELL);
    x.fillStyle = "#161b2b"; x.fillRect(px,py,CELL,10);
    // neon curb light on edges facing road
    x.fillStyle = L.hue; x.globalAlpha = 0.5;
    if(!isWallCell(c,r+1)) x.fillRect(px, py+CELL-4, CELL, 4);
    if(!isWallCell(c,r-1)) x.fillRect(px, py, CELL, 4);
    if(!isWallCell(c+1,r)) x.fillRect(px+CELL-4, py, 4, CELL);
    if(!isWallCell(c-1,r)) x.fillRect(px, py, 4, CELL);
    x.globalAlpha = 1;
    // lit windows
    const seed = (c*31+r*17)%10;
    if(seed<3){
      x.fillStyle = seed===0 ? "rgba(255,190,110,0.5)" : "rgba(170,210,255,0.28)";
      const n = 2+seed;
      for(let i=0;i<n;i++) x.fillRect(px+18+((i*37+r*11)%(CELL-44)), py+22+((i*53+c*7)%(CELL-50)), 9, 12);
    }
  }
  game.groundCv = g;
}

/* ---------------- car physics ---------------- */
function updateCar(car, ctrl, dt){
  const iv = ctrl.vec;
  const hasInput = Math.hypot(iv.x,iv.y) > 0.15;
  const boosting = !!ctrl.nitro && car.nitroMeter>0 && hasInput;

  const SPD = CONFIG.speed || 1;
  const cellC = clamp(Math.floor(car.x/CELL),0,game.cols-1), cellR = clamp(Math.floor(car.y/CELL),0,game.rows-1);
  const onIce = !!(game.slick[cellR] && game.slick[cellR][cellC]);
  if(car.spinT>0){ car.spinT-=dt; car.heading += dt*12; }
  else if(hasInput){
    const want = Math.atan2(iv.y, iv.x);
    const sp = Math.hypot(car.vx, car.vy);
    const tRate = lerp(9, 3.1, clamp(sp/(460*SPD),0,1));   // nimble slow, wide fast
    const d = angDiff(car.heading, want);
    car.heading += clamp(d, -tRate*dt, tRate*dt);
  }
  const maxSp = (boosting? 660 : 400)*SPD;
  const accel = (boosting? 1300 : 750)*SPD*(onIce?0.55:1);
  if(hasInput && car.spinT<=0){
    car.vx += Math.cos(car.heading)*accel*dt * Math.hypot(iv.x,iv.y);
    car.vy += Math.sin(car.heading)*accel*dt * Math.hypot(iv.x,iv.y);
  }
  // split velocity into forward + lateral, grip eats lateral (drift = less grip)
  const fx=Math.cos(car.heading), fy=Math.sin(car.heading);
  let fwd = car.vx*fx + car.vy*fy;
  let latX = car.vx - fwd*fx, latY = car.vy - fwd*fy;
  const sp = Math.hypot(car.vx,car.vy);
  const turningHard = hasInput && Math.abs(angDiff(car.heading, Math.atan2(iv.y,iv.x))) > 0.55;
  const grip = onIce ? 1.1 : (turningHard && sp>230*SPD) ? 2.4 : 8.5;
  const latK = Math.exp(-grip*dt);
  latX*=latK; latY*=latK;
  fwd *= hasInput ? Math.exp(-0.35*dt) : Math.exp(-(onIce?0.7:2.2)*dt);
  car.vx = fwd*fx + latX; car.vy = fwd*fy + latY;
  const spd2 = Math.hypot(car.vx,car.vy);
  if(spd2 > maxSp){ car.vx *= maxSp/spd2; car.vy *= maxSp/spd2; }

  // drift state
  const slip = spd2>200*SPD ? Math.abs(angDiff(car.heading, Math.atan2(car.vy,car.vx))) : 0;
  const wasDrift = car.drifting;
  car.drifting = (slip>0.32 && spd2>210*SPD) || (onIce && spd2>140 && slip>0.2);
  if(car.drifting){
    car.driftT += dt;
    if(((car.driftT*10)|0) % 4 === 0) spark(car);
    skid(car);
    if(!wasDrift && Math.random()<0.6) float(pick(YELLS.drift), car.x, car.y-34, game.lv.hue);
    car.aura += dt*6;
  }
  if(ctrl.main) AU.setDrift(car.drifting);

  // nitro
  if(boosting){
    car.nitroMeter = Math.max(0, car.nitroMeter - dt*30);
    if(car.boost<=0){ AU.nitro(); if(Math.random()<0.5) float(pick(YELLS.nitro), car.x, car.y-40, "#7ef7ff"); }
    car.boost = 0.12;
    flame(car);
  } else {
    car.nitroMeter = Math.min(100, car.nitroMeter + dt*(CONFIG.easyMode?14:9));
    car.boost = Math.max(0, car.boost-dt);
  }
  if(ctrl.main) AU.setEngine(spd2, boosting);

  // move with wall collisions (sub-stepped)
  const steps = Math.max(1, Math.ceil(spd2*dt/9));
  for(let i=0;i<steps;i++){
    car.x += car.vx*dt/steps; car.y += car.vy*dt/steps;
    collideWalls(car);
  }

  // squash spring
  car.sqv += (1-car.sq)*260*dt; car.sqv *= Math.exp(-14*dt); car.sq += car.sqv*dt;
  car.invuln = Math.max(0, car.invuln-dt);

  // trail
  car.trail.unshift({x:car.x, y:car.y, a:car.heading});
  if(car.trail.length>13) car.trail.pop();

  // pet chases the car (lags a few trail frames behind)
  if(ctrl.main && store.pet && game.pet){
    const tgt = car.trail[Math.min(9, car.trail.length-1)];
    const k = 1-Math.exp(-7*dt);
    game.pet.x += (tgt.x-game.pet.x)*k;
    game.pet.y += (tgt.y-game.pet.y)*k;
  }

  // exhaust puffs
  if(spd2>40 && Math.random()<0.3)
    puff(car.x-Math.cos(car.heading)*20, car.y-Math.sin(car.heading)*20, "rgba(160,170,200,0.2)");
}

function collideWalls(car){
  const R = 13;
  const c0 = Math.floor((car.x-R)/CELL), c1 = Math.floor((car.x+R)/CELL);
  const r0 = Math.floor((car.y-R)/CELL), r1 = Math.floor((car.y+R)/CELL);
  for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
    if(!isSolid(c,r)) continue;
    // crates smash open if you hit them fast enough
    const crate = crateAt(c,r);
    if(crate && Math.hypot(car.vx,car.vy) > 240*(CONFIG.speed||1)){
      crate.broken = true;
      for(let i=0;i<14;i++) debris(crate.x+rand(-22,22), crate.y+rand(-22,22));
      game.shake = Math.min(8, game.shake+4);
      car.vx*=0.72; car.vy*=0.72; car.sq = 0.8;
      AU.bonk(); AU.beep(700,0.1,"square",0.12,200);
      float("SMASH!", crate.x, crate.y-20, "#ff9f45");
      continue;
    }
    const bx=c*CELL, by=r*CELL;
    const px = clamp(car.x, bx, bx+CELL), py = clamp(car.y, by, by+CELL);
    const dx = car.x-px, dy = car.y-py;
    const d2 = dx*dx+dy*dy;
    if(d2 >= R*R) continue;
    let nx, ny, pen;
    if(d2>0.0001){ const d=Math.sqrt(d2); nx=dx/d; ny=dy/d; pen=R-d; }
    else { // center inside block — push along smallest axis
      const l=car.x-bx, rr=bx+CELL-car.x, t=car.y-by, b=by+CELL-car.y;
      const m=Math.min(l,rr,t,b);
      nx = m===l?-1 : m===rr?1 : 0; ny = m===t?-1 : m===b?1 : 0; pen = m+R;
    }
    car.x += nx*pen; car.y += ny*pen;
    const vn = car.vx*nx + car.vy*ny;
    if(vn<0){
      const impact = -vn;
      car.vx -= (1.35)*vn*nx; car.vy -= (1.35)*vn*ny;   // soft bounce
      if(impact>230){
        game.shake = Math.min(10, game.shake+impact/60);
        car.sq = 0.68; AU.bonk();
        for(let i=0;i<8;i++) debris(px,py);
        if(Math.random()<0.5) float(pick(YELLS.bonk), car.x, car.y-36, "#ffd0d0");
        scuff(car);
      }
    }
  }
}

/* ---------------- entities ---------------- */
function updateEntities(dt){
  // gates cycle (shared)
  for(const g of game.gates){
    g.ph += dt;
    const cyc = (g.ph % 3.2) / 3.2;         // 3.2s cycle
    const target = cyc < 0.55 ? 1 : 0;      // open 55% of the time
    g.open = lerp(g.open, target, dt*8);
  }
  for(const p of game.portals) if(p.cool>0) p.cool -= dt;
  for(const p of game.pads) if(p.cool) p.cool = Math.max(0, p.cool-dt);

  for(const car of game.cars){
  // coins (with a little magnet)
  for(const cn of game.coins){
    if(cn.got) continue;
    if(cn.cool){ cn.cool = Math.max(0, cn.cool-dt); if(cn.cool>0) continue; }
    const d = dist(car.x,car.y,cn.x,cn.y);
    if(d<95){ cn.x = lerp(cn.x, car.x, dt*6); cn.y = lerp(cn.y, car.y, dt*6); }
    if(d<34){
      cn.got = true;
      if(cn.nitro){
        car.nitroMeter = 100; AU.nitro();
        float("NITRO FULL!", cn.x, cn.y-20, "#7ef7ff");
        for(let i=0;i<10;i++) puff(cn.x,cn.y,"rgba(126,247,255,0.5)");
      } else {
        car.coins++; car.aura += 10; store.coinsBank++;
        AU.coin();
        float(Math.random()<0.3 ? pick(YELLS.coin) : "+10", cn.x, cn.y-20, "#ffd76a");
        for(let i=0;i<8;i++) sparkle(cn.x,cn.y);
      }
    }
  }
  // portals: hop to the other end
  if(game.portals.length===2 && car.portalCool<=0){
    for(let i=0;i<2;i++){
      const p = game.portals[i];
      if(p.cool<=0 && dist(car.x,car.y,p.x,p.y)<34){
        const o = game.portals[1-i];
        for(let k=0;k<10;k++) puff(car.x,car.y,"rgba(185,140,255,0.55)");
        car.x = o.x; car.y = o.y; car.portalCool = 1.1; o.cool = 0.6;
        for(let k=0;k<10;k++) puff(car.x,car.y,"rgba(185,140,255,0.55)");
        AU.nitro(); float("WOOSH!", car.x, car.y-30, "#b98cff");
        break;
      }
    }
  }
  car.portalCool = Math.max(0, car.portalCool-dt);
  // key
  if(game.key && !game.key.got && dist(car.x,car.y,game.key.x,game.key.y)<40){
    game.key.got = true; game.hasKey = true; AU.key();
    sticker("🗝️ "+pick(YELLS.key), "#ffd76a");
    updateObjective(true);
  }
  // doors
  for(const d of game.doors){
    if(d.anim>=1 || !game.hasKey) continue;
    if(dist(car.x,car.y,d.x,d.y) < CELL*1.1){
      d.opening = true;
    }
    if(d.opening){ d.anim = Math.min(1, d.anim + dt*1.6);
      if(d.anim>=1){ AU.door(); sticker(pick(YELLS.door), game.lv.hue); updateObjective(true);
        for(let i=0;i<12;i++) sparkle(d.x,d.y); }
    }
  }
  // boost pads
  for(const p of game.pads){
    if(Math.floor(car.x/CELL)===p.c && Math.floor(car.y/CELL)===p.r){
      if(!p.cool){
        p.cool = 0.9;
        const sp = Math.hypot(car.vx,car.vy)||1;
        const kick = 330*(CONFIG.speed||1);
        car.vx += car.vx/sp*kick; car.vy += car.vy/sp*kick;
        car.nitroMeter = Math.min(100, car.nitroMeter+25);
        car.sq = 1.25; AU.nitro(); game.shake = Math.min(6, game.shake+3);
        float("BOOST!", car.x, car.y-40, game.lv.hue);
      }
    }
  }
  // goobers
  for(const gb of game.goobers){
    if(car.invuln<=0 && dist(car.x,car.y,gb.x,gb.y)<38){
      car.invuln = 1.6; car.spinT = 0.55; car.sq = 0.6;
      game.bonks++; game.shake = 9; AU.goober();
      sticker("👾 "+pick(YELLS.goober), "#ff8fe0");
      // he yoinks coins — they scatter onto nearby road for re-grabbing (gentle mischief)
      const steal = Math.min(3, car.coins);
      car.coins -= steal; store.coinsBank = Math.max(0, store.coinsBank-steal);
      const near = game.road.filter(([c,r])=>{
        const wx=(c+0.5)*CELL, wy=(r+0.5)*CELL, dd=dist(wx,wy,car.x,car.y);
        return dd>CELL*0.9 && dd<CELL*2.8;
      });
      for(let i=0;i<steal;i++){
        const [cc,rr] = near.length? pick(near) : [Math.floor(car.x/CELL), Math.floor(car.y/CELL)];
        game.coins.push({x:(cc+0.5)*CELL+rand(-18,18), y:(rr+0.5)*CELL+rand(-18,18), got:false, ph:Math.random()*TAU, cool:1.0});
      }
      const kb = 260; const ka = Math.atan2(car.y-gb.y, car.x-gb.x);
      car.vx += Math.cos(ka)*kb; car.vy += Math.sin(ka)*kb;
    }
  }
  // finish
  if(dist(car.x,car.y,game.finish.x,game.finish.y) < CELL*0.75){
    if(game.vs){ vsEnd(car); return; }
    levelClear();
  }
  } // end per-car loop

  // goober patrol movement (shared)
  for(const gb of game.goobers){
    const [tx,ty] = gb.path[(gb.seg+1)%gb.path.length];
    const d = dist(gb.x,gb.y,tx,ty);
    if(d<6) gb.seg = (gb.seg+1)%gb.path.length;
    else { gb.x += (tx-gb.x)/d*gb.speed*dt; gb.y += (ty-gb.y)/d*gb.speed*dt; }
    gb.ph += dt*7;
  }
  const car = game.car;
  // the boss car races the solution path (with rubber-banding so it stays close)
  const rv = game.rival;
  if(rv && !rv.done && game.state==="play"){
    if(rv.delay>0) rv.delay -= dt;
    else if(rv.i < rv.wp.length-1){
      const t = rv.wp[rv.i+1];
      const d = dist(rv.x,rv.y,t[0],t[1]) || 0.001;
      const pc = clamp(Math.floor(car.x/CELL),0,game.cols-1), pr = clamp(Math.floor(car.y/CELL),0,game.rows-1);
      const pLeft = (game.flow && game.flow[pr][pc]>=0) ? game.flow[pr][pc] : 99;
      const rLeft = rv.wp.length-1-rv.i;
      const band = clamp(1 + (rLeft-pLeft)*0.03, 0.75, 1.3);
      const spd = rv.speed*band;
      if(d < spd*dt+2){ rv.x=t[0]; rv.y=t[1]; rv.i++; }
      else { rv.x += (t[0]-rv.x)/d*spd*dt; rv.y += (t[1]-rv.y)/d*spd*dt; }
      rv.a += angDiff(rv.a, Math.atan2(t[1]-rv.y, t[0]-rv.x))*Math.min(1,dt*8);
      if(Math.random()<0.15) puff(rv.x-Math.cos(rv.a)*18, rv.y-Math.sin(rv.a)*18, "rgba(176,110,232,0.25)");
      const rc = crateAt(Math.floor(rv.x/CELL), Math.floor(rv.y/CELL));
      if(rc){ rc.broken=true; for(let i=0;i<10;i++) debris(rc.x+rand(-20,20), rc.y+rand(-20,20)); AU.bonk(); }
    }
    if(rv.i >= rv.wp.length-1){ rv.done = true; rivalWins(); }
  }
  // helper arrow timer
  const spd = Math.hypot(car.vx,car.vy);
  game.hintT = spd<60 ? game.hintT+dt : Math.max(0, game.hintT-dt*2);
}
function rivalWins(){
  game.state = "cooked"; game.cookedT = 0;
  game.shake = 8;
  AU.goober();
}
function carBump(a, b){
  const d = dist(a.x,a.y,b.x,b.y);
  if(d>26 || d===0) return;
  const nx=(b.x-a.x)/d, ny=(b.y-a.y)/d, pen=(26-d)/2;
  a.x-=nx*pen; a.y-=ny*pen; b.x+=nx*pen; b.y+=ny*pen;
  const rvx=b.vx-a.vx, rvy=b.vy-a.vy, vn=rvx*nx+rvy*ny;
  if(vn<0){
    const j=-vn*0.9;
    a.vx-=j*nx*0.5; a.vy-=j*ny*0.5; b.vx+=j*nx*0.5; b.vy+=j*ny*0.5;
    if(-vn>200){ AU.bonk(); game.shake=Math.min(6,game.shake+2); a.sq=0.8; b.sq=0.8;
      if(Math.random()<0.5) float(pick(YELLS.bonk), (a.x+b.x)/2, (a.y+b.y)/2-24, "#ffd0d0"); }
  }
}
function levelClear(){
  const L = game.lv;
  const timeOk = game.playT <= L.par;
  const allCoins = game.car.coins >= game.coinsAll;
  const stars = 1 + (timeOk?1:0) + (allCoins?1:0);
  const bonus = 50 + stars*25 + (game.rival? 100 : 0);   // +100 for smoking the boss
  game.car.aura += bonus;
  store.aura += Math.round(game.car.aura);
  const key = game.customId ? "c:"+game.customId : (game.levelIx>=0 ? game.levelIx : null);
  if(key!==null){
    const prev = store.stars[key]||0;
    store.stars[key] = Math.max(prev, stars);
  }
  if(!game.customId && game.levelIx>=0)
    store.unlocked = Math.max(store.unlocked, Math.min(LEVELS.length, game.levelIx+2));
  let unlock;
  if(game.levelIx===LEVELS.length-1 && !store.ownedCars.includes("goat")){
    store.ownedCars.push("goat");
    unlock = "🐐 GOLDEN GOAT UNLOCKED!";
  }
  save();
  game.clearData = { stars, t:0, time:game.playT, timeOk, allCoins, aura:Math.round(game.car.aura), shown:0,
    msg: game.rival? "SMOKED HIM! 🏆" : undefined, unlock };
  game.state = "clear";
  AU.win();
  confettiBurst(W/2, H*0.35, 130, L.hue);
}
function confettiBurst(x, y, n, hue){
  for(let i=0;i<n;i++) game.confetti.push({
    x:x+rand(-60,60), y, vx:rand(-260,260), vy:rand(-460,-90),
    rot:rand(0,TAU), vr:rand(-8,8), w:rand(6,13), h:rand(8,16),
    col:pick([hue||"#ffb742","#ffd76a","#ff8fe0","#7ef7ff","#f4f6ff"]), t:0
  });
}
function drawConfettiScreen(){
  for(const c of game.confetti){
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle = c.col; ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    ctx.restore();
  }
}

/* ---------------- fx ---------------- */
function puff(x,y,col){ game.parts.push({x,y,vx:rand(-24,24),vy:rand(-24,24),t:0,life:rand(0.4,0.8),size:rand(4,10),col,fade:true}); }
function spark(car){
  const a = car.heading+Math.PI+rand(-0.6,0.6);
  game.parts.push({x:car.x+Math.cos(a)*16, y:car.y+Math.sin(a)*16, vx:Math.cos(a)*rand(60,190), vy:Math.sin(a)*rand(60,190), t:0, life:rand(0.2,0.45), size:rand(2,4), col:pick(["#ffd76a","#ffb742","#fff2c0"]) });
}
function sparkle(x,y){ game.parts.push({x,y,vx:rand(-130,130),vy:rand(-170,40),t:0,life:rand(0.3,0.6),size:rand(2,5),col:pick(["#ffd76a","#fff4cc","#ffffff"]),grav:true}); }
function debris(x,y){ game.parts.push({x,y,vx:rand(-160,160),vy:rand(-160,160),t:0,life:rand(0.2,0.5),size:rand(2,4),col:"#8b93ad"}); }
function flame(car){
  const a = car.heading+Math.PI;
  game.parts.push({x:car.x+Math.cos(a)*20+rand(-3,3), y:car.y+Math.sin(a)*20+rand(-3,3), vx:Math.cos(a)*rand(120,240), vy:Math.sin(a)*rand(120,240), t:0, life:rand(0.12,0.3), size:rand(4,9), col:pick(["#7ef7ff","#4ac6ff","#e0fbff"]) });
}
function skid(car){
  const k = game.skidCtx; if(!k) return;
  const px = Math.cos(car.heading+Math.PI/2), py = Math.sin(car.heading+Math.PI/2);
  const bx = car.x-Math.cos(car.heading)*10, by = car.y-Math.sin(car.heading)*10;
  k.fillStyle = "rgba(10,10,14,0.24)";
  for(const s of [-1,1]){ k.beginPath(); k.arc(bx+px*7*s, by+py*7*s, 2.6, 0, TAU); k.fill(); }
}
function scuff(car){
  const k = game.skidCtx; if(!k) return;
  k.fillStyle = "rgba(10,10,14,0.3)";
  for(let i=0;i<4;i++){ k.beginPath(); k.arc(car.x+rand(-9,9), car.y+rand(-9,9), rand(1.5,3), 0, TAU); k.fill(); }
}
function float(txt,x,y,col){ game.floats.push({txt,x,y,t:0,col:col||"#fff"}); }
function sticker(txt,col){ game.stickers.push({txt,col:col||"#fff",t:0}); }
function updateStickers(dt){
  if(game.stickers.length){ game.stickers[0].t+=dt; if(game.stickers[0].t>1.1) game.stickers.shift(); }
}
function updateFx(dt){
  game.parts = game.parts.filter(p=>{ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; if(p.grav)p.vy+=500*dt; return p.t<p.life; });
  game.floats = game.floats.filter(f=>{ f.t+=dt; f.y-=34*dt; return f.t<0.95; });
  updateStickers(dt);
  game.confetti = game.confetti.filter(c=>{ c.t+=dt; c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=560*dt; c.rot+=c.vr*dt; return c.y<H+40 && c.t<4; });
  game.shake = Math.max(0, game.shake - dt*22);
}

/* ---------------- drawing ---------------- */
function drawWorld(dt){
  const car = game.car;
  const wW = game.cols*CELL, wH = game.rows*CELL;
  const sx = (Math.random()*2-1)*game.shake, sy = (Math.random()*2-1)*game.shake;
  let cx, cy, z = 1;
  if(game.vs){
    // whole maze on screen — no scrolling in VS
    z = Math.min(W/(wW+30), H/(wH+30));
    cx = wW/2; cy = wH/2;
    ctx.save();
    ctx.translate(W/2+sx, H/2+sy);
    ctx.scale(z,z);
    ctx.translate(-cx, -cy);
  } else {
    z = clamp(CONFIG.zoom||1, 1, 2);
    const vw = W/z, vh = H/z;
    const lead = 0.22;
    game.cam.x = lerp(game.cam.x, car.x+car.vx*lead, 1-Math.exp(-5*dt));
    game.cam.y = lerp(game.cam.y, car.y+car.vy*lead, 1-Math.exp(-5*dt));
    cx = game.cam.x; cy = game.cam.y;
    if(wW>vw) cx = clamp(cx, vw/2-40, wW-vw/2+40); else cx = wW/2;
    if(wH>vh) cy = clamp(cy, vh/2-40, wH-vh/2+40); else cy = wH/2;
    ctx.save();
    ctx.translate(W/2+sx, H/2+sy);
    ctx.scale(z,z);
    ctx.translate(-Math.round(cx), -Math.round(cy));
  }
  game._cam = {cx, cy, z};
  ctx.drawImage(game.groundCv, 0, 0);
  ctx.drawImage(game.skidCv, 0, 0);

  drawFinish();
  for(const d of game.doors) drawDoor(d);
  for(const g of game.gates) drawGate(g);
  for(const cr of game.crates) drawCrate(cr);
  game.portals.forEach((p,i)=>drawPortal(p,i));
  for(const cn of game.coins) if(!cn.got) drawCoin(cn);
  if(game.key && !game.key.got) drawKey(game.key);
  for(const gb of game.goobers) drawGoober(gb);
  if(!game.vs) drawHintArrow();
  if(game.rival){
    const rv = game.rival;
    ctx.save();
    ctx.translate(rv.x, rv.y);
    ctx.fillStyle = "#b06ee8"; ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.ellipse(0, 0, 24, 17, 0, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.rotate(rv.a);
    stdWheels();
    ctx.fillStyle = "#b06ee8"; ctx.beginPath(); ctx.roundRect(-17,-9.5,34,19,7); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.beginPath(); ctx.roundRect(-17,-9.5,34,8,7); ctx.fill();
    ctx.fillStyle = "#20283c"; ctx.fillRect(-19,-8,4,16);
    ctx.fillStyle = "#1b2233"; ctx.beginPath(); ctx.roundRect(-7,-7,14,14,4); ctx.fill();
    ctx.font = "12px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("👾", 0, 0);
    ctx.fillStyle = "#fff2c0"; ctx.fillRect(15,-7,3,4); ctx.fillRect(15,3,3,4);
    ctx.restore();
  }
  if(store.pet && game.pet){
    const p = PETS.find(p=>p.id===store.pet);
    if(p){
      const bob = Math.abs(Math.sin(game.t*7))*4;
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.beginPath(); ctx.ellipse(game.pet.x, game.pet.y+10, 9, 3.5, 0, 0, TAU); ctx.fill();
      ctx.font = "22px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(p.emoji, game.pet.x, game.pet.y-4-bob);
    }
  }
  if(game.car2) drawCar(game.car2);
  drawCar(car);
  if(game.vs){
    // name tags over both cars
    ctx.font = "800 15px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    game.cars.forEach((c2,i)=>{
      const nm = pName(i);
      ctx.lineWidth = 4; ctx.strokeStyle = "rgba(10,12,20,0.85)";
      ctx.strokeText(nm, c2.x, c2.y-28);
      ctx.fillStyle = i? "#b06ee8" : vehicleById(store.car).trail();
      ctx.fillText(nm, c2.x, c2.y-28);
    });
  }
  // particles
  for(const p of game.parts){
    ctx.globalAlpha = 1-p.t/p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(p.fade?1+p.t*2:1), 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // floaters
  for(const f of game.floats){
    ctx.globalAlpha = 1-f.t;
    ctx.font = "800 20px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.textAlign="center";
    ctx.lineWidth=4; ctx.strokeStyle="rgba(10,12,20,0.85)"; ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillStyle = f.col; ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  drawDarkness();
}

function drawVehicleBody(vid){

function drawCar(car){
  const vid = car.p2 ? "p2" : (store.car || "rocket");
  const v = car.p2 ? {trail:()=>"#b06ee8"} : vehicleById(vid);
  // motion trail
  for(let i=car.trail.length-1;i>=2;i--){
    const t = car.trail[i], a = (1-i/car.trail.length)*0.14;
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.a);
    ctx.globalAlpha = a; ctx.fillStyle = v.trail();
    ctx.beginPath(); ctx.roundRect(-16,-9,32,18,6); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(car.x, car.y);
  // underglow
  ctx.fillStyle = game.lv.hue; ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.ellipse(0, 0, 24, 17, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.rotate(car.heading);
  if(vid==="ufo"){ const hov = 1+Math.sin(game.t*4)*0.04; ctx.scale(hov,hov); }
  const sq = clamp(car.sq, 0.55, 1.35);
  ctx.scale(sq, 2-sq>1.3?1.3:2-sq);
  if(car.invuln>0 && (car.invuln*10|0)%2) ctx.globalAlpha = 0.4;
  // headlight cones (the saucer gets one wide beam)
  ctx.fillStyle = "rgba(255,240,190,0.13)";
  if(v.noLights){
    ctx.fillStyle = "rgba(154,230,140,0.10)";
    ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(85,26); ctx.lineTo(85,-26); ctx.closePath(); ctx.fill();
  } else {
    for(const s of [-1,1]){
      ctx.beginPath(); ctx.moveTo(16, 5*s); ctx.lineTo(85, 22*s); ctx.lineTo(85, 2*s); ctx.closePath(); ctx.fill();
    }
  }
  if(car.p2){
    stdWheels();
    drawRocketBody("#b06ee8", "#e6d9ff");
  } else {
    if(!v.ownWheels) stdWheels();
    drawVehicleBody(vid);
    drawNumDecal(vid);
  }
  if(!v.noLights){
    ctx.fillStyle = "#fff2c0";
    ctx.fillRect(15,-7,3,4); ctx.fillRect(15,3,3,4);
    ctx.fillStyle = car.boost>0 ? "#ff8f8f" : "#c23a4a";
    ctx.fillRect(-18,-7,2.6,4); ctx.fillRect(-18,3,2.6,4);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawGate(g){
  const px = g.c*CELL, py = g.r*CELL;
  const closed = 1-g.open;
  if(closed<0.03) { // little base markers so pads are visible when open
    ctx.fillStyle = "rgba(255,90,90,0.5)";
    ctx.fillRect(px+2, py+2, 8, 8); ctx.fillRect(px+CELL-10, py+CELL-10, 8, 8);
    return;
  }
  const h = CELL*closed;
  ctx.save();
  ctx.translate(px, py+CELL/2-h/2);
  ctx.fillStyle = "#d8dbe6";
  ctx.fillRect(0, 0, CELL, h);
  ctx.fillStyle = "#ff5a5a";
  const stripes = 5;
  for(let i=0;i<stripes;i++){
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,CELL,h); ctx.clip();
    ctx.translate(i*CELL/stripes*1.4 - 20, 0); ctx.rotate(0.5);
    ctx.fillRect(0,-30,16,h+80);
    ctx.restore();
  }
  ctx.strokeStyle = "#20242f"; ctx.lineWidth=3; ctx.strokeRect(1.5,1.5,CELL-3,h-3);
  ctx.restore();
}

function drawDarkness(){
  if(!game.lv || !game.lv.dark || !game._cam) return;
  const cam = game._cam;
  if(!game._darkCv || game._darkCv.width!==W || game._darkCv.height!==H){
    game._darkCv = document.createElement("canvas");
    game._darkCv.width=W; game._darkCv.height=H;
  }
  const d = game._darkCv.getContext("2d");
  d.globalCompositeOperation = "source-over";
  d.clearRect(0,0,W,H);
  d.fillStyle = "rgba(3,6,13,0.93)"; d.fillRect(0,0,W,H);
  d.globalCompositeOperation = "destination-out";
  const toS = (wx,wy)=>[(wx-cam.cx)*cam.z+W/2, (wy-cam.cy)*cam.z+H/2];
  const hole = (wx,wy,r)=>{
    const [hx,hy] = toS(wx,wy);
    const g2 = d.createRadialGradient(hx,hy,r*0.25,hx,hy,r);
    g2.addColorStop(0,"rgba(0,0,0,1)"); g2.addColorStop(1,"rgba(0,0,0,0)");
    d.fillStyle=g2; d.beginPath(); d.arc(hx,hy,r,0,TAU); d.fill();
  };
  const car = game.car;
  const zz = cam.z || 1;
  hole(car.x, car.y, 215*zz);
  const [hx,hy] = toS(car.x, car.y);
  d.save(); d.translate(hx,hy); d.rotate(car.heading);
  const cg = d.createLinearGradient(0,0,340*zz,0);
  cg.addColorStop(0,"rgba(0,0,0,0.95)"); cg.addColorStop(1,"rgba(0,0,0,0)");
  d.fillStyle = cg;
  d.beginPath(); d.moveTo(10*zz,0); d.lineTo(340*zz,125*zz); d.lineTo(340*zz,-125*zz); d.closePath(); d.fill();
  d.restore();
  for(const cn of game.coins) if(!cn.got) hole(cn.x, cn.y, 44*zz);
  hole(game.finish.x, game.finish.y, 85*zz);
  ctx.drawImage(game._darkCv, 0, 0);
}
function drawFinish(){
  const f = game.finish;
  const pr = CELL*0.55 + Math.sin(game.t*3.5)*6;
  ctx.strokeStyle = game.lv.hue; ctx.globalAlpha = 0.8; ctx.lineWidth = 5;

  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.arc(f.x, f.y, pr*0.7, 0, TAU); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.font = "34px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("🏁", f.x, f.y-Math.abs(Math.sin(game.t*2.8))*6);
}
function drawHintArrow(){
  if(game.hintT < 1.6 && game.playT > 4) return;   // show at level start + when stuck
  if(!game.flow) return;
  const car = game.car;
  const c = clamp(Math.floor(car.x/CELL),0,game.cols-1), r = clamp(Math.floor(car.y/CELL),0,game.rows-1);
  let best=null, bd=game.flow[r]?game.flow[r][c]:-1;
  if(bd<0) return;
  for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
    const nc=c+dc, nr=r+dr;
    if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
    const v = game.flow[nr][nc];
    if(v>=0 && v<bd){ bd=v; best=[dc,dr]; }
  }
  const ang = best ? Math.atan2(best[1],best[0]) : Math.atan2(game.objective.y-car.y, game.objective.x-car.x);
  const pulse = 1+Math.sin(game.t*5)*0.15;
  ctx.save();
  ctx.translate(car.x + Math.cos(ang)*62, car.y + Math.sin(ang)*62);
  ctx.rotate(ang); ctx.scale(pulse,pulse);
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#f4f6ff";
  ctx.strokeStyle = "rgba(12,14,22,0.8)"; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(12,0); ctx.lineTo(-7,-9); ctx.lineTo(-3,0); ctx.lineTo(-7,9); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawHUD(){
  const car = game.car;
  const pad = PADX, top = 10 + safeT;
  ctx.textBaseline = "middle";
  if(game.vs){ drawVsHUD(pad, top); return; }
  // aura counter (left)
  roundedPanel(pad, top, 168, 44, 12);
  ctx.font = "900 21px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign = "left";
  ctx.fillStyle = "#ffd76a";
  ctx.fillText("✦", pad+14, top+23);
  ctx.fillStyle = "#f4f6ff";
  ctx.fillText("AURA  " + Math.round(store.aura + game.car.aura), pad+34, top+23);
  // coins (left 2)
  roundedPanel(pad, top+52, 116, 40, 12);
  ctx.fillStyle = "#ffd76a"; ctx.beginPath(); ctx.arc(pad+22, top+72, 9, 0, TAU); ctx.fill();
  ctx.fillStyle = "#e8a930"; ctx.font="900 10px sans-serif"; ctx.textAlign="center"; ctx.fillText("A", pad+22, top+72);
  ctx.fillStyle = "#f4f6ff"; ctx.font = "800 19px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.textAlign="left";
  ctx.fillText(game.car.coins + "/" + game.coinsAll, pad+40, top+72);
  // key badge
  if(game.hasKey){
    roundedPanel(pad+124, top+52, 44, 40, 12);
    ctx.font = "20px sans-serif"; ctx.textAlign="center";
    ctx.fillText("🗝️", pad+146, top+73);
  }
  // stopwatch (center-top, small + friendly)
  const tStr = game.playT.toFixed(1)+"s";
  ctx.font = "800 19px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  const late = game.playT > game.lv.par;
  roundedPanel(W/2-56, top, 112, 38, 12);
  ctx.textAlign="center";
  ctx.fillStyle = late ? "#8b93ad" : "#f4f6ff";
  ctx.fillText("⏱ " + tStr, W/2, top+20);

      ctx.fillText(""+(i+1), x, y-R*0.18);
      ctx.font = Math.round(R*0.42)+"px sans-serif";
      ctx.fillText(LEVELS[i].emoji, x, y+R*0.42);
    } else {
      ctx.font = Math.round(R*0.62)+"px sans-serif";
      ctx.fillText("🔒", x, y+1);
    }
    // stars under node
    ctx.font = "11px sans-serif";
    for(let sIx=0;sIx<3;sIx++){
      ctx.globalAlpha = sIx<stars? 1 : 0.22;
      ctx.fillText("⭐", x+(sIx-1)*13, y+R+11);

  if(store.pet){

      ctx.font="20px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(p.emoji, cx2-42, cy2-56-Math.abs(Math.sin(game.t*4))*4);

    ctx.fillStyle="#12151f"; ctx.font="900 14px 'Avenir Next Condensed',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(CONFIG.playerName.toUpperCase(), cx2, cy2-96);
  }
  // garage: build + shop buttons, custom track chips
  const gy = H-104-safeB;
  drawBigBtn(PADX, gy, 118, 48, "🔨 BUILD", "build", "#ffb742", "#12151f");
  drawBigBtn(PADX+126, gy, 110, 48, "🛒 SHOP", "shop", "#7ef7ff", "#12151f");
  drawBigBtn(PADX+244, gy, 96, 48, "⚔️ VS", "vs", "#ff8fe0", "#12151f");
  let gcx = PADX+354;
  for(const cl of store.customLevels){
    const st = store.stars["c:"+cl.id]||0;
    roundedPanel(gcx, gy+2, 48, 46, 12, "rgba(20,24,36,0.92)");
    ctx.font = "17px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillStyle="#f4f6ff";
    ctx.fillText(EMOJIS[cl.emojiIx||0], gcx+24, gy+17);
    ctx.font = "800 11px 'Avenir Next Condensed',sans-serif";
    ctx.fillStyle = st? "#ffd76a" : "#8b93ad";
    ctx.fillText(st? "⭐".repeat(st) : cl.name.replace("TRACK","T"), gcx+24, gy+37);
    if(game.importedTrack===cl){
      ctx.strokeStyle="#ffd76a"; ctx.lineWidth=3+Math.sin(game.t*5)*1.5;
      ctx.beginPath(); ctx.roundRect(gcx-3, gy-1, 54, 52, 14); ctx.stroke();
    }
    hudBtns.push({x:gcx,y:gy+2,w:48,h:46,act:"pc:"+cl.id});
    gcx += 54;
    if(gcx > W-60) break;
  }
  ctx.font = "600 16px 'Avenir Next',sans-serif"; ctx.fillStyle="#8b93ad"; ctx.textAlign="center";
  ctx.fillText(input.hasTouch? "tap a level!" : "tap or press ENTER for level "+store.unlocked, W/2, H-30-safeB);
  // input
  for(const tp of input.taps.splice(0)){
    if(tp.screen){ AU.ui(); loadLevel(cur); return; }
    for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
      AU.ui(); game.importedTrack = null;
      if(b.act==="mute") AU.toggleMute();
      else if(b.act==="build") enterBuilder(null);
      else if(b.act==="shop") game.state="shop";
      else if(b.act==="vs") game.state="vspick";
      else if(b.act.startsWith("pc:")){ const cl = store.customLevels.find(c=>c.id===+b.act.slice(3)); if(cl) loadCustom(cl, "map"); }
      return;
    }
    for(const nd of mapNodes){
      if(dist(tp.x,tp.y,nd.x,nd.y)<nd.r){ AU.ui(); loadLevel(nd.ix); return; }
    }
  }
}

/* ---------------- LEVEL BUILDER (v2) ---------------- */
const EMOJIS = ["🦖","🌋","👻","🍕","🌈","🐙","🚀","💎","🐸","⚡"];
const HUES = ["#ffb742","#9ae64a","#ff6a5e","#b98cff","#53e0ff"];
const SIZES = [[12,8],[16,10],[20,13]];   // [cols, rows]
const TOOL_LIST = ["wall","road","c","n","k","D","G","*","h","S","F"];
const TOOL_ICON = { wall:"🧱", road:"🧽", n:"⚡", k:"🗝️", D:"🔒", G:"🚧", "*":"🔼", h:"👾", S:"🚗", F:"🏁" };
const bl = { grid:null, cols:0, rows:0, tool:"wall", hueIx:0, emojiIx:0, sizeIx:1,
  editingId:null, undo:[], ptr:null, lastCell:null, trashT:0, _geo:null };

function freshGrid(cols, rows){
  const g = [];
  for(let r=0;r<rows;r++)
    g.push(Array.from({length:cols}, (_,c)=> (r===0||c===0||r===rows-1||c===cols-1) ? "#" : "."));
  g[1][1] = "S"; g[rows-2][cols-2] = "F";
  return g;
}
function enterBuilder(cl){
  if(cl){
    bl.grid = cl.grid.map(row=>row.split(""));
    bl.rows = bl.grid.length; bl.cols = bl.grid[0].length;
    bl.hueIx = cl.hueIx||0; bl.emojiIx = cl.emojiIx||0; bl.editingId = cl.id;
    bl.sizeIx = Math.max(0, SIZES.findIndex(s=>s[0]===bl.cols && s[1]===bl.rows));
  } else {
    bl.sizeIx = 1;
    const [c,r] = SIZES[1];
    bl.cols=c; bl.rows=r; bl.grid = freshGrid(c,r);
    bl.hueIx = (Math.random()*HUES.length)|0;
    bl.emojiIx = (Math.random()*EMOJIS.length)|0;
    bl.editingId = null;
  }
  bl.undo.length = 0; bl.trashT = 0; bl.tool = "wall"; bl.ptr = null; bl.lastCell = null;
  game.state = "build";
}
function pushUndo(){
  bl.undo.push(bl.grid.map(r=>r.join("")).join("\n"));
  if(bl.undo.length>40) bl.undo.shift();
}
function popUndo(){
  const s = bl.undo.pop(); if(!s) return;
  bl.grid = s.split("\n").map(r=>r.split(""));
  bl.rows = bl.grid.length; bl.cols = bl.grid[0].length;
}
function countCh(ch){ let n=0; for(const row of bl.grid) for(const c of row) if(c===ch) n++; return n; }
function clearCh(ch){ for(const row of bl.grid) for(let i=0;i<row.length;i++) if(row[i]===ch) row[i]="."; }
function paintCell(c,r){
  if(c<=0||r<=0||c>=bl.cols-1||r>=bl.rows-1) return;
  let ch;
  if(bl.tool==="wall") ch="#";
  else if(bl.tool==="road") ch=".";
  else if(bl.tool==="S"||bl.tool==="F"||bl.tool==="k"){ if(bl.grid[r][c]===bl.tool) return; clearCh(bl.tool); ch=bl.tool; }
  else if(bl.tool==="h"){
    if(bl.grid[r][c]!=="h" && countCh("h")>=3){ sticker("MAX 3 GOOBERS! 👾","#ff8f8f"); return; }
    ch="h";
  }
  else ch = bl.tool;
  if(bl.grid[r][c]===ch) return;
  bl.grid[r][c] = ch;
  AU.beep(ch==="#"?280:640, 0.04, "square", 0.05);
}
function resizeGridTo(cols, rows){
  const old = bl.grid, oc = bl.cols, or_ = bl.rows;
  bl.grid = freshGrid(cols, rows);
  clearCh("S"); clearCh("F");   // fresh puts defaults in; clear then copy
  for(let r=1;r<Math.min(rows-1, or_-1);r++)
    for(let c=1;c<Math.min(cols-1, oc-1);c++)
      bl.grid[r][c] = old[r][c];
  if(!countCh("S")){ bl.grid[1][1]="S"; }
  if(!countCh("F")){ bl.grid[rows-2][cols-2]==="S" ? bl.grid[rows-2][cols-3]="F" : bl.grid[rows-2][cols-2]="F"; }
  bl.cols = cols; bl.rows = rows;
}
/* validation + conversion work on array-of-strings grids */
function findIn(rows, ch){
  for(let r=0;r<rows.length;r++){ const c = rows[r].indexOf(ch); if(c>=0) return [c,r]; }
  return null;
}
function bfsGrid(rows, sc, sr, passable){
  const R=rows.length, C=rows[0].length;
  const d = Array.from({length:R},()=>new Array(C).fill(-1));
  const q=[[sc,sr]]; d[sr][sc]=0;
  while(q.length){
    const [c,r]=q.shift();
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=C||nr>=R||d[nr][nc]!==-1) continue;
      if(!passable(rows[nr][nc])) continue;
      d[nr][nc]=d[r][c]+1; q.push([nc,nr]);
    }
  }
  return d;
}
function validateRows(rows){
  const S=findIn(rows,"S"), F=findIn(rows,"F");
  if(!S) return {ok:false, msg:"NEEDS A START 🚗"};
  if(!F) return {ok:false, msg:"NEEDS A FINISH 🏁"};
  const hasDoor = rows.some(r=>r.includes("D")), key = findIn(rows,"k");
  if(hasDoor && !key) return {ok:false, msg:"DOOR NEEDS A KEY 🗝️"};
  const d1 = bfsGrid(rows, S[0], S[1], ch=>ch!=="#");
  if(d1[F[1]][F[0]]<0) return {ok:false, msg:"CAN'T REACH THE FLAG!"};
  if(key){
    const d2 = bfsGrid(rows, S[0], S[1], ch=>ch!=="#"&&ch!=="D");
    if(d2[key[1]][key[0]]<0) return {ok:false, msg:"KEY IS LOCKED AWAY! 🗝️"};
  }
  return {ok:true};
}
function customToLevel(cl){
  const hz = [];
  const rows = cl.grid.map((row,r)=> row.split("").map((ch,c)=>{
    if(ch==="h"){ hz.push([c,r]); return "."; } return ch;
  }).join(""));
  const S=findIn(rows,"S"), F=findIn(rows,"F");
  const d = bfsGrid(rows, S[0], S[1], ch=>ch!=="#");
  const par = Math.max(15, Math.round(d[F[1]][F[0]]*1.35+8));
  const hazards = hz.map(([c,r])=>{
    const open=(cc,rr)=> rr>=0&&rr<rows.length&&cc>=0&&cc<rows[0].length&&rows[rr][cc]!=="#"&&rows[rr][cc]!=="D";
    let l=c; while(open(l-1,r)) l--;
    let ri=c; while(open(ri+1,r)) ri++;
    let u=r; while(open(c,u-1)) u--;
    let dn=r; while(open(c,dn+1)) dn++;
    if(ri-l<1 && dn-u<1) return null;
    return { path: (ri-l >= dn-u)? [[l,r],[ri,r]] : [[c,u],[c,dn]], speed:100 };
  }).filter(Boolean);
  return { name:cl.name, emoji:EMOJIS[cl.emojiIx||0], hue:HUES[cl.hueIx||0], par, grid:rows, hazards };
}
function saveBuild(){
  const rows = bl.grid.map(r=>r.join(""));
  const v = validateRows(rows);
  if(!v.ok){ sticker(v.msg, "#ff8f8f"); AU.bonk(); return null; }
  let cl = bl.editingId ? store.customLevels.find(c=>c.id===bl.editingId) : null;
  if(!cl){
    if(store.customLevels.length>=10){ sticker("GARAGE FULL! 🔧", "#ff8f8f"); return null; }
    store.nextTrackId = (store.nextTrackId||0)+1;
    cl = { id: store.nextTrackId, name: "TRACK "+store.nextTrackId };
    store.customLevels.push(cl);
    bl.editingId = cl.id;
  }
  cl.grid = rows; cl.hueIx = bl.hueIx; cl.emojiIx = bl.emojiIx;
  save();
  sticker("SAVED! 💾", "#9ae64a"); AU.key();
  return cl;
}
function testBuild(){
  const rows = bl.grid.map(r=>r.join(""));
  const v = validateRows(rows);
  if(!v.ok){ sticker(v.msg, "#ff8f8f"); AU.bonk(); return; }

}
function encodeTrack(cl){
  const payload = ["1", cl.name, cl.emojiIx||0, cl.hueIx||0, cl.grid.join("!")].join("~");
  return btoa(payload).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function decodeTrack(s){
  try{
    const p = atob(s.replace(/-/g,"+").replace(/_/g,"/")).split("~");
    if(p[0]!=="1" || p.length<5) return null;
    const rows = p[4].split("!");
    const cols = rows[0].length;
    if(rows.length<5||rows.length>16||cols<6||cols>24) return null;
    if(!rows.every(r=>r.length===cols && /^[#.SFcnkDG*h]+$/.test(r))) return null;
    if(!validateRows(rows).ok) return null;
    return { name:String(p[1]||"TRACK").slice(0,14), emojiIx:Math.min(EMOJIS.length-1, Math.max(0,+p[2]||0)),
             hueIx:Math.min(HUES.length-1, Math.max(0,+p[3]||0)), grid:rows };
  }catch(e){ return null; }
}
function shareTrack(){
  const cl = saveBuild(); if(!cl) return;
  const url = location.origin + location.pathname + "#T=" + encodeTrack(cl);
  if(navigator.share){ navigator.share({title:cl.name+" — "+CONFIG.title, url}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>sticker("LINK COPIED! 📋","#9ae64a")).catch(()=>{}); }
}
function builderAction(a){
  AU.ui();
  if(a==="back"){ game.state="map"; return; }
  if(a==="undo"){ popUndo(); return; }
  if(a==="hue"){ bl.hueIx=(bl.hueIx+1)%HUES.length; return; }
  if(a==="emoji"){ bl.emojiIx=(bl.emojiIx+1)%EMOJIS.length; return; }
  if(a==="size"){ pushUndo(); bl.sizeIx=(bl.sizeIx+1)%SIZES.length; resizeGridTo(SIZES[bl.sizeIx][0], SIZES[bl.sizeIx][1]); return; }
  if(a==="test"){ testBuild(); return; }
  if(a==="saveB"){ saveBuild(); return; }
  if(a==="share"){ shareTrack(); return; }
  if(a==="trash"){
    if(bl.trashT>0){
      if(bl.editingId){
        store.customLevels = store.customLevels.filter(c=>c.id!==bl.editingId);
        delete store.stars["c:"+bl.editingId]; save();
      }
      const [c,r]=SIZES[bl.sizeIx];
      bl.grid = freshGrid(c,r); bl.cols=c; bl.rows=r;
      bl.editingId=null; bl.undo.length=0; bl.trashT=0;

    } else { bl.trashT=2; sticker("TAP 🗑 AGAIN TO DELETE","#ff8f8f"); }
    return;
  }
  if(a.startsWith("tool:")){ bl.tool=a.slice(5); return; }
  if(a.startsWith("edit:")){ const cl=store.customLevels.find(c=>c.id===+a.slice(5)); if(cl) enterBuilder(cl); return; }
}

    if(kind==="v"){ store.car = id; sticker("LET'S RIDE!", "#9ae64a"); }
    else if(store.pet===id){ store.pet = null; sticker("BYE "+item.name+" 👋", "#8b93ad"); }
    else { store.pet = id; sticker(item.emoji+" "+item.name+" JOINS!", "#9ae64a"); }
    save(); return;
  }
  if(store.coinsBank < item.price){
    AU.bonk(); shopPending = null;
    sticker("NEED "+(item.price-store.coinsBank)+" MORE COINS!", "#ff8f8f");
    return;
  }
  if(shopPending && shopPending.act===a){
    shopPending = null;
    store.coinsBank -= item.price;
    if(kind==="v"){ store.ownedCars.push(id); store.car = id; }
    else { store.ownedPets.push(id); store.pet = id; }
    save();
    AU.win();
    confettiBurst(W/2, H*0.3, 80, "#ffd76a");
    sticker("UNLOCKED! "+(item.emoji||"")+" "+item.name, "#ffd76a");
  } else {
    AU.ui();
    shopPending = {act:a, t:2.5};
  }
}
function shopCard(x, y, w, h, act, preview, name, price, owned, active){
  const pending = shopPending && shopPending.act===act;
  roundedPanel(x, y, w, h, 14, active? "rgba(255,183,66,0.2)" : "rgba(14,17,26,0.85)");
  if(active || pending){
    ctx.strokeStyle = pending? "#9ae64a" : "#ffb742";
    ctx.lineWidth = pending? 3+Math.sin(game.t*8)*1.5 : 2.5;
    ctx.beginPath(); ctx.roundRect(x+1.5, y+1.5, w-3, h-3, 13); ctx.stroke();
  }
  preview(x+w/2, y+h*0.4, owned? 1 : 0.32);
  ctx.font = "800 13px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = owned? "#f4f6ff" : "#8b93ad";
  ctx.fillText(name, x+w/2, y+h-26);
  if(pending){ ctx.fillStyle="#9ae64a"; ctx.fillText("TAP TO BUY!", x+w/2, y+h-11); }
  else if(active){ ctx.fillStyle="#ffb742"; ctx.fillText(act.startsWith("p:")? "✓ WITH YOU" : "✓ RIDING", x+w/2, y+h-11); }
  else if(owned){ ctx.fillStyle="#8b93ad"; ctx.fillText("TAP TO USE", x+w/2, y+h-11); }
  else {
    ctx.fillStyle="#e8a930"; ctx.beginPath(); ctx.arc(x+w/2-13, y+h-11, 5, 0, TAU); ctx.fill();
    ctx.fillStyle="#ffd76a"; ctx.beginPath(); ctx.arc(x+w/2-13, y+h-11.8, 4.4, 0, TAU); ctx.fill();
    ctx.fillStyle="#f4f6ff"; ctx.fillText(price, x+w/2+7, y+h-11);
  }
  hudBtns.push({x, y, w, h, act});
}
function drawShop(dt){
  nightSky();
  hudBtns.length = 0;
  const top = 8+safeT;
  if(!store.shopGift){
    store.shopGift = true; store.coinsBank += 20; save();
    sticker("🎁 GRAND OPENING! +20 COINS", "#ffd76a");
    confettiBurst(W/2, H*0.3, 90, "#ffd76a");
    AU.win();
  }
  drawIconBtn(PADX, top, 44, "↩️", "back");
  ctx.font = "italic 900 28px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillStyle="#ffb742";
  ctx.fillText("🛒 GARAGE", PADX+56, top+23);
  const bw2 = 130;
  roundedPanel(W-PADX-bw2, top, bw2, 44, 12);
  ctx.fillStyle="#e8a930"; ctx.beginPath(); ctx.arc(W-PADX-bw2+22, top+22, 9, 0, TAU); ctx.fill();
  ctx.fillStyle="#ffd76a"; ctx.beginPath(); ctx.arc(W-PADX-bw2+22, top+21, 8, 0, TAU); ctx.fill();
  ctx.font="900 21px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle="#f4f6ff"; ctx.textAlign="left";
  ctx.fillText(store.coinsBank, W-PADX-bw2+40, top+23);
  // layout: car rows, pet row, number panel (compresses on short phone screens)
  let y = top+54;
  const gap = 8;
  const cw = Math.min(170, (W-PADX*2-gap*3)/4);
  const gridW = cw*4+gap*3;
  const x0 = Math.round((W-gridW)/2);
  const vRows = Math.ceil(VEHICLES.length/4);
  const numH = H<460? 46 : 58;
  const availY = H - y - safeB - 10;
  const ch2 = Math.max(46, Math.min(96, Math.floor((availY - numH - gap*(vRows+1))/(vRows+1))));
  VEHICLES.forEach((v,i)=>{
    const cx3 = x0 + (i%4)*(cw+gap), cy3 = y + ((i/4)|0)*(ch2+gap);
    const owned = store.ownedCars.includes(v.id);
    if(v.secret && !owned){
      roundedPanel(cx3, cy3, cw, ch2, 14, "rgba(14,17,26,0.85)");
      ctx.font = Math.round(ch2*0.3)+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.globalAlpha = 0.5; ctx.fillStyle="#f4f6ff";
      ctx.fillText("👑", cx3+cw/2, cy3+ch2*0.36); ctx.globalAlpha = 1;
      ctx.font = "800 12px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.fillStyle = "#8b93ad";
      ctx.fillText("??? — BEAT LEVEL "+LEVELS.length, cx3+cw/2, cy3+ch2-13);
      return;
    }
    shopCard(cx3, cy3, cw, ch2, "v:"+v.id,
      (px,py,al)=>drawVehiclePreview(v.id, px, py, Math.min(1.4, ch2/72), al),
      v.name, v.price, owned, store.car===v.id);
  });
  y += vRows*(ch2+gap);
  PETS.forEach((p,i)=>{
    const cx3 = x0 + i*(cw+gap);
    shopCard(cx3, y, cw, ch2, "p:"+p.id,
      (px,py,al)=>{ ctx.globalAlpha=al; ctx.font=Math.round(ch2*0.42)+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.emoji, px, py); ctx.globalAlpha=1; },
      p.name, p.price, store.ownedPets.includes(p.id), store.pet===p.id);
  });
  y += ch2+gap;
  const nh = numH;
  roundedPanel(x0, y, gridW, nh, 14);
  ctx.font="900 16px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle="#8b93ad"; ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText("CAR NUMBER", x0+16, y+nh/2);
  const ncx = x0+gridW/2;
  drawBigBtn(ncx-98, y+7, 46, nh-14, "−", "num-", "rgba(60,66,86,0.95)", "#f4f6ff");
  ctx.font="900 "+(nh>50?32:24)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle="#ffd76a"; ctx.textAlign="center";
  ctx.fillText(String(store.carNum==null?67:store.carNum), ncx, y+nh/2+1);
  drawBigBtn(ncx+52, y+7, 46, nh-14, "+", "num+", "rgba(60,66,86,0.95)", "#f4f6ff");
  drawVehiclePreview(store.car, x0+gridW-54, y+nh/2, nh>50?1.4:1.1);
  if(shopPending){ shopPending.t -= dt; if(shopPending.t<=0) shopPending = null; }
  for(const tp of input.taps.splice(0)){
    if(tp.screen) continue;
    let hit = false;
    for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ shopAction(b.act); hit=true; break; }
    if(!hit) shopPending = null;
  }
}

function drawClear(dt){
  // frozen world behind
  drawWorld(0.0001);
  ctx.fillStyle = "rgba(8,10,16,0.68)"; ctx.fillRect(0,0,W,H);
  const cd = game.clearData; cd.t += dt;
  drawConfettiScreen();
  const panW = Math.min(430, W-40);
  const px = W/2, py = H*0.46;
  const inT = easeOut(clamp(cd.t/0.3,0,1));
  ctx.save();
  ctx.translate(px, py + (1-inT)*60);
  ctx.globalAlpha = inT;
  // GG sticker
  ctx.rotate(-0.03);
  ctx.font = "900 italic 74px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const msg = cd.msg || (cd.msg = pick(YELLS.win));
  ctx.fillStyle = "rgba(12,14,22,0.9)"; ctx.fillText(msg, 5, -120+5);
  ctx.fillStyle = "#ffd76a"; ctx.fillText(msg, 0, -120);
  ctx.rotate(0.03);
  // stars pop one by one
  for(let i=0;i<3;i++){
    const on = i < cd.stars && cd.t > 0.5+i*0.4;
    if(on && cd.shown<=i){ cd.shown=i+1; AU.star(i); game.shake=4; }
    const pop = on? easeOut(clamp((cd.t-(0.5+i*0.4))/0.25,0,1)) : 1;
    ctx.font = (on? 62*pop : 54)+"px sans-serif";
    ctx.globalAlpha = (on?1:0.18)*inT;
    ctx.fillText("⭐", (i-1)*78, -38);
  }
  ctx.globalAlpha = inT;
  // stats chips
  ctx.font = "800 21px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  const chips = [
    ["● "+game.car.coins+"/"+game.coinsAll+" COINS", cd.allCoins?"#9ae64a":"#ffd76a"],
    ["⏱ "+cd.time.toFixed(1)+"s"+(cd.timeOk?"  ⚡FAST":""), cd.timeOk?"#9ae64a":"#f4f6ff"],
    ["✦ +"+cd.aura+" AURA", "#ffd76a"],
  ];
  if(cd.unlock) chips.push([cd.unlock, "#ffd76a"]);
  chips.forEach((ch,i)=>{
    const y = 26+i*44;
    roundedPanel(-panW*0.32, y-17, panW*0.64, 36, 12, "rgba(20,24,36,0.92)");
    ctx.fillStyle = ch[1]; ctx.textAlign="center";
    ctx.fillText(ch[0], 0, y+1);
  });
  ctx.restore();
  // buttons
  if(cd.t>1.2){
    const last = game.levelIx >= 0 && game.levelIx >= LEVELS.length-1;
    const bw = 168, bh = 62, gap = 18;
    const bx1 = W/2-bw-gap/2, bx2 = W/2+gap/2, by = py+170+(cd.unlock?46:0);
    hudBtns.length = 0;
    if(game.fromBuilder){
      drawBigBtn(bx1, by, bw, bh, "🔨 GARAGE", "garage", "rgba(60,66,86,0.95)", "#f4f6ff");
      drawBigBtn(bx2, by, bw, bh, "↻ AGAIN", "retry", game.lv.hue, "#12151f");
    } else if(game.customId){
      drawBigBtn(bx1, by, bw, bh, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
      drawBigBtn(bx2, by, bw, bh, "↻ AGAIN", "retry", game.lv.hue, "#12151f");
    } else {
      drawBigBtn(bx1, by, bw, bh, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
      if(!last) drawBigBtn(bx2, by, bw, bh, "NEXT ▶", "next", game.lv.hue, "#12151f");
      else drawBigBtn(bx2, by, bw, bh, "🏆 DONE!", "map", "#ffd76a", "#12151f");
    }
    const doAct = act => {
      AU.ui();
      if(act==="next") loadLevel(game.levelIx+1);
      else if(act==="garage") game.state="build";
      else if(act==="retry") loadCustom(game.sourceCustom, game.fromBuilder? "builder":"map");
      else game.state="map";
    };
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ doAct(game.fromBuilder? "garage" : game.customId? "map" : (!last? "next":"map")); return; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ doAct(b.act); return; }
    }
  } else input.taps.length = 0;
}
function drawBigBtn(x,y,w,h,label,act,bg,fg){
  ctx.fillStyle = "rgba(12,14,22,0.9)";
  ctx.beginPath(); ctx.roundRect(x+4,y+4,w,h,16); ctx.fill();
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,16); ctx.fill();
  ctx.fillStyle = fg;
  ctx.font = "900 25px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(label, x+w/2, y+h/2+1);
  hudBtns.push({x,y,w,h,act});
}

function drawCooked(dt){
  drawWorld(0.0001);
  ctx.fillStyle = "rgba(8,10,16,0.72)"; ctx.fillRect(0,0,W,H);
  game.cookedT += dt;
  const inT = easeOut(clamp(game.cookedT/0.3,0,1));
  ctx.save();
  ctx.translate(W/2, H*0.34 + (1-inT)*50);
  ctx.globalAlpha = inT;
  ctx.rotate(-0.03);
  ctx.font = "italic 900 60px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = "rgba(12,14,22,0.9)"; ctx.fillText("HE BEAT YOU! 💀", 5, 5);
  ctx.fillStyle = "#ff8fe0"; ctx.fillText("HE BEAT YOU! 💀", 0, 0);
  ctx.font = "800 20px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle = "#8b93ad";
  ctx.fillText("the goober is doing donuts on the finish line", 0, 54);
  ctx.restore();
  ctx.globalAlpha = 1;
  if(game.cookedT > 0.8){
    hudBtns.length = 0;
    drawBigBtn(W/2-178, H*0.58, 170, 62, "REMATCH ▶", "retry", "#9ae64a", "#12151f");
    drawBigBtn(W/2+8,   H*0.58, 170, 62, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ AU.ui(); loadLevel(game.levelIx); return; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="retry") loadLevel(game.levelIx); else game.state="map";
        return;
      }
    }
  } else input.taps.length = 0;
}

let paused = false;
function togglePause(){ if(game.state==="play"){ paused=!paused; AU.ui(); } }
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden && game.state==="play") paused = true;
  if(!document.hidden) AU.resume();
});

/* ---------------- main loop ---------------- */
let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  tick(now);
}
function tick(now){
  const dt = Math.max(0, Math.min(0.05, (now-last)/1000)); last = now;
  game.t += dt;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  // tablet held upright → ask for landscape (menus only, never mid-game)
  const portraitHint = input.hasTouch && H > W*1.15 && (game.state==="title" || game.state==="map");
  if(portraitHint) input.taps.length = 0;

  if(game.state==="title"){ drawTitle(dt); }
  else if(game.state==="map"){ drawMap(); updateStickers(dt); drawStickers(); }
  else if(game.state==="build"){ drawBuild(dt); updateStickers(dt); drawStickers(); }
  else if(game.state==="shop"){ updateFx(dt); drawShop(dt); drawConfettiScreen(); drawStickers(); }
  else if(game.state==="vspick"){ drawVsPick(); updateStickers(dt); drawStickers(); }
  else if(game.state==="vsend"){ updateFx(dt); drawVsEnd(dt); }
  else if(game.state==="clear"){ updateFx(dt); drawClear(dt); drawStickers(); }
  else if(game.state==="cooked"){ updateFx(dt); drawCooked(dt); }
  else if(game.state==="play"){
    hudBtns.length = 0;
    if(!paused){
      readInput();
      if(game.count>0){
        const prev = Math.ceil(game.count);
        game.count = Math.max(0, game.count-dt);
        const cur2 = Math.ceil(game.count);
        if(cur2!==prev){
          AU.beep(cur2>0? 440 : 880, 0.2, "square", 0.15);
          if(cur2===0) sticker("GO!!", "#9ae64a");
        }
      } else {
        game.playT += dt;
        updateCar(game.car, {vec:input.vec, nitro:input.nitro, main:true}, dt);
        if(game.car2){
          updateCar(game.car2, {vec:input.vec2, nitro:false}, dt);
          carBump(game.car, game.car2);
        }
        updateEntities(dt);
      }
      updateFx(dt);
    }
    if(game.state==="play" || game.state==="clear"){  // levelClear may fire mid-update
      drawWorld(paused?0.0001:dt);
      if(game.state==="play"){ drawHUD(); drawStickers(); }
    }
    if(paused && game.state==="play"){
      ctx.fillStyle = "rgba(8,10,16,0.6)"; ctx.fillRect(0,0,W,H);
      ctx.font = "900 italic 54px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.fillStyle="#f4f6ff"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("PAUSED", W/2, H*0.42);
      hudBtns.length = 0;
      drawBigBtn(W/2-170, H*0.55, 160, 58, "▶ GO", "resume", "#9ae64a", "#12151f");
      drawBigBtn(W/2+10, H*0.55, 160, 58, game.fromBuilder? "🔨 GARAGE":"🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
    }
    // HUD button taps
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ if(paused){ paused=false; AU.ui(); } continue; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="mute") AU.toggleMute();
        if(b.act==="pause") togglePause();
        if(b.act==="resume") paused=false;
        if(b.act==="map"){ paused=false; game.state = game.fromBuilder? "build" : "map"; }
      }
    }
  }
  // soft vignette
  if(!game._vig || game._vigW!==W || game._vigH!==H){
    game._vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.45, W/2,H/2, Math.max(W,H)*0.75);
    game._vig.addColorStop(0,"rgba(8,10,16,0)");
    game._vig.addColorStop(1,"rgba(8,10,16,0.42)");
    game._vigW=W; game._vigH=H;
  }
  ctx.fillStyle = game._vig; ctx.fillRect(0,0,W,H);
  if(portraitHint){
    ctx.fillStyle = "rgba(8,10,16,0.88)"; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(W/2, H*0.42); ctx.rotate(-Math.PI/2 + Math.sin(game.t*2.2)*0.25);
    ctx.font = "72px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("📱", 0, 0); ctx.restore();
    ctx.font = "900 30px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.fillStyle = "#f4f6ff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("TURN IT SIDEWAYS!", W/2, H*0.42+86);
  }
}
// a shared track arrived by link? add it to the garage
(function importFromHash(){
  const m = location.hash.match(/^#T=(.+)$/);
  if(!m) return;
  const t = decodeTrack(m[1]);
  history.replaceState(null, "", location.pathname + location.search);
  if(!t) return;
  const gs = t.grid.join("!");
  let cl = store.customLevels.find(c=>c.grid.join("!")===gs);
  if(!cl){
    if(store.customLevels.length>=10) return;
    store.nextTrackId = (store.nextTrackId||0)+1;
    cl = { id:store.nextTrackId, name:t.name, emojiIx:t.emojiIx, hueIx:t.hueIx, grid:t.grid };
    store.customLevels.push(cl); save();
  }
  game.importedTrack = cl;
  game.state = "map";
  sticker("NEW TRACK ARRIVED! 📦", "#ffd76a");
})();

requestAnimationFrame(frame);

// debug handle (safe to ignore)
window.__tm = { game, loadLevel, loadCustom, store, CONFIG, bl, enterBuilder, encodeTrack, decodeTrack,
  shopAction, VEHICLES, PETS, LEVELS, VS_ARENAS, startVs, customToLevel,
  step(sec){ paused = false; let n = last; for(let i=0;i<sec*60;i++){ n += 1000/60; tick(n); } last = performance.now(); } };
</script>
