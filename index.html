function drawDarkness(){
  if(!game.lv || !game.lv.dark || !game._cam) return;
  const cam = game._cam;
  if(!game._darkCv || game._darkCv.width!==W || game._darkCv.height!==H){
    game._darkCv = document.createElement("canvas");
    game._darkCv.width=W; game._darkCv.height=H;
  }
  const d = game._darkCv.getContext("2d");
  d.globalCompositeOperation = "source-over";
  d.clearRect(0,0,W,H);
  d.fillStyle = "rgba(3,6,13,0.93)"; d.fillRect(0,0,W,H);
  d.globalCompositeOperation = "destination-out";
  const toS = (wx,wy)=>[(wx-cam.cx)*cam.z+W/2, (wy-cam.cy)*cam.z+H/2];
  const hole = (wx,wy,r)=>{
    const [hx,hy] = toS(wx,wy);
    const g2 = d.createRadialGradient(hx,hy,r*0.25,hx,hy,r);
    g2.addColorStop(0,"rgba(0,0,0,1)"); g2.addColorStop(1,"rgba(0,0,0,0)");
    d.fillStyle=g2; d.beginPath(); d.arc(hx,hy,r,0,TAU); d.fill();
  };
  const car = game.car;
  const zz = cam.z || 1;
  hole(car.x, car.y, 215*zz);
  const [hx,hy] = toS(car.x, car.y);
  d.save(); d.translate(hx,hy); d.rotate(car.heading);
  const cg = d.createLinearGradient(0,0,340*zz,0);
  cg.addColorStop(0,"rgba(0,0,0,0.95)"); cg.addColorStop(1,"rgba(0,0,0,0)");
  d.fillStyle = cg;
  d.beginPath(); d.moveTo(10*zz,0); d.lineTo(340*zz,125*zz); d.lineTo(340*zz,-125*zz); d.closePath(); d.fill();
  d.restore();
  for(const cn of game.coins) if(!cn.got) hole(cn.x, cn.y, 44*zz);
  hole(game.finish.x, game.finish.y, 85*zz);
  ctx.drawImage(game._darkCv, 0, 0);
}

function drawHintArrow(){
  if(game.hintT < 1.6 && game.playT > 4) return;   // show at level start + when stuck
  if(!game.flow) return;
  const car = game.car;
  const c = clamp(Math.floor(car.x/CELL),0,game.cols-1), r = clamp(Math.floor(car.y/CELL),0,game.rows-1);
  let best=null, bd=game.flow[r]?game.flow[r][c]:-1;
  if(bd<0) return;
  for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
    const nc=c+dc, nr=r+dr;
    if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
    const v = game.flow[nr][nc];
    if(v>=0 && v<bd){ bd=v; best=[dc,dr]; }
  }
  const ang = best ? Math.atan2(best[1],best[0]) : Math.atan2(game.objective.y-car.y, game.objective.x-car.x);
  const pulse = 1+Math.sin(game.t*5)*0.15;
  ctx.save();
  ctx.translate(car.x + Math.cos(ang)*62, car.y + Math.sin(ang)*62);
  ctx.rotate(ang); ctx.scale(pulse,pulse);
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#f4f6ff";
  ctx.strokeStyle = "rgba(12,14,22,0.8)"; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(12,0); ctx.lineTo(-7,-9); ctx.lineTo(-3,0); ctx.lineTo(-7,9); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

const hudBtns = [];
// ✍️ center-safe text: iOS WebKit mis-positions CENTER-aligned canvas strings that
// contain emoji (the glyph run splits between the text font and Apple Color Emoji and
// the centering math breaks → glyphs paint right of the bubble). Measure once, paint
// LEFT-anchored from the true center — left-anchored runs can't shift, only overflow.
function emojiPad(txt){ let n=0; for(const ch of String(txt)) if(ch.codePointAt(0)>0x2100) n++; return n*10; }  // iOS paints emoji wider than metric
function fillTextC(txt, x, y, stroked){
  const w = ctx.measureText(txt).width;
  const pa = ctx.textAlign; ctx.textAlign = "left";
  if(stroked) ctx.strokeText(txt, x-w/2, y);
  ctx.fillText(txt, x-w/2, y);
  ctx.textAlign = pa;
}
// 📏 navigation buttons scale with the screen (iPad ≈ 53px, phones floor at 44px — Apple's minimum touch target)
function navS(){ return clamp(Math.round(Math.min(W,H)*0.085), 54, 80); }   // nav/HUD icon buttons — bigger + finger-friendly, scales with screen
function drawIconBtn(x,y,s,icon,act){
  roundedPanel(x,y,s,s,12);
  ctx.font = (s*0.5)+"px sans-serif"; ctx.textBaseline="middle";
  ctx.fillStyle = "#f4f6ff";
  fillTextC(icon, x+s/2, y+s/2+1);
  hudBtns.push({x,y,w:s,h:s,act});
}

  ctx.font = "900 46px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  const tw = ctx.measureText(s.txt).width + emojiPad(s.txt);   // pill covers iOS's wider emoji paint
  // sticker card: white with hard offset shadow (toy energy)
  ctx.fillStyle = "rgba(12,14,22,0.9)";
  ctx.beginPath(); ctx.roundRect(-tw/2-22+6, -34+6, tw+44, 68, 16); ctx.fill();

  ctx.beginPath(); ctx.roundRect(-tw/2-22, -34, tw+44, 68, 16); ctx.fill();

}

  font(px,w){ return (w||800)+" "+px+"px 'Avenir Next Condensed','Arial Narrow',sans-serif"; },

    ctx.fillStyle="rgba(0,0,0,0.30)"; ctx.beginPath(); ctx.roundRect(x+2,y+5,w,h,r); ctx.fill();            // soft drop shadow (depth)
    const g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,this.bg1); g.addColorStop(1,this.bg0);    // top-lit body
    ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill();

/* ---------------- LEVEL BUILDER (v2) ---------------- */
const EMOJIS = ["🦖","🌋","👻","🍕","🌈","🐙","🚀","💎","🐸","⚡"];
const HUES = ["#ffb742","#9ae64a","#ff6a5e","#b98cff","#53e0ff"];
const SIZES = [[12,8],[16,10],[20,13]];   // [cols, rows]
const TOOL_LIST = ["wall","road","~","c","n","k","D","G","*","h","<",">","^","v","O","J","&","%","S","F"];
const TOOL_ICON = { wall:"🧱", road:"🧽", "~":"🧊", n:"⚡", k:"🗝️", D:"🔒", G:"🚧", "*":"🔼", h:"👾", S:"🚗", F:"🏁",
  "<":"⬅️", ">":"➡️", "^":"⬆️", "v":"⬇️", O:"🕳️", J:"🟠", "&":"🟣", "%":"🧱" };   // < > ^ v conveyors · O trap door · J splash pad · & sticky · % foam float
const bl = { grid:null, cols:0, rows:0, tool:"wall", hueIx:0, emojiIx:0, sizeIx:1,
  editingId:null, undo:[], ptr:null, lastCell:null, trashT:0, _geo:null };

function freshGrid(cols, rows){
  const g = [];
  for(let r=0;r<rows;r++)
    g.push(Array.from({length:cols}, (_,c)=> (r===0||c===0||r===rows-1||c===cols-1) ? "#" : "."));
  g[1][1] = "S"; g[rows-2][cols-2] = "F";
  return g;
}
function enterBuilder(cl){
  if(cl){
    bl.grid = cl.grid.map(row=>row.split(""));
    bl.rows = bl.grid.length; bl.cols = bl.grid[0].length;
    bl.hueIx = cl.hueIx||0; bl.emojiIx = cl.emojiIx||0; bl.editingId = cl.id;
    bl.sizeIx = Math.max(0, SIZES.findIndex(s=>s[0]===bl.cols && s[1]===bl.rows));
  } else {
    bl.sizeIx = 1;
    const [c,r] = SIZES[1];
    bl.cols=c; bl.rows=r; bl.grid = freshGrid(c,r);
    bl.hueIx = (Math.random()*HUES.length)|0;
    bl.emojiIx = (Math.random()*EMOJIS.length)|0;
    bl.editingId = null;
  }
  bl.undo.length = 0; bl.trashT = 0; bl.tool = "wall"; bl.ptr = null; bl.lastCell = null;
  game.state = "build";
}
function pushUndo(){
  bl.undo.push(bl.grid.map(r=>r.join("")).join("\n"));
  if(bl.undo.length>40) bl.undo.shift();
}
function popUndo(){
  const s = bl.undo.pop(); if(!s) return;
  bl.grid = s.split("\n").map(r=>r.split(""));
  bl.rows = bl.grid.length; bl.cols = bl.grid[0].length;
}
function countCh(ch){ let n=0; for(const row of bl.grid) for(const c of row) if(c===ch) n++; return n; }
function clearCh(ch){ for(const row of bl.grid) for(let i=0;i<row.length;i++) if(row[i]===ch) row[i]="."; }
function paintCell(c,r){
  if(c<=0||r<=0||c>=bl.cols-1||r>=bl.rows-1) return;
  let ch;
  if(bl.tool==="wall") ch="#";
  else if(bl.tool==="road") ch=".";
  else if(bl.tool==="S"||bl.tool==="F"||bl.tool==="k"){ if(bl.grid[r][c]===bl.tool) return; clearCh(bl.tool); ch=bl.tool; }
  else if(bl.tool==="h"){
    if(bl.grid[r][c]!=="h" && countCh("h")>=3){ sticker("MAX 3 GOOBERS! 👾","#ff8f8f"); return; }
    ch="h";
  }
  else ch = bl.tool;
  if(bl.grid[r][c]===ch) return;
  bl.grid[r][c] = ch;
  AU.beep(ch==="#"?280:640, 0.04, "square", 0.05);
}
function resizeGridTo(cols, rows){
  const old = bl.grid, oc = bl.cols, or_ = bl.rows;
  bl.grid = freshGrid(cols, rows);
  clearCh("S"); clearCh("F");   // fresh puts defaults in; clear then copy
  for(let r=1;r<Math.min(rows-1, or_-1);r++)
    for(let c=1;c<Math.min(cols-1, oc-1);c++)
      bl.grid[r][c] = old[r][c];
  if(!countCh("S")){ bl.grid[1][1]="S"; }
  if(!countCh("F")){ bl.grid[rows-2][cols-2]==="S" ? bl.grid[rows-2][cols-3]="F" : bl.grid[rows-2][cols-2]="F"; }
  bl.cols = cols; bl.rows = rows;
}
/* validation + conversion work on array-of-strings grids */
function findIn(rows, ch){
  for(let r=0;r<rows.length;r++){ const c = rows[r].indexOf(ch); if(c>=0) return [c,r]; }
  return null;
}
function bfsGrid(rows, sc, sr, passable){
  const R=rows.length, C=rows[0].length;
  const d = Array.from({length:R},()=>new Array(C).fill(-1));
  const q=[[sc,sr]]; d[sr][sc]=0;
  while(q.length){
    const [c,r]=q.shift();
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=C||nr>=R||d[nr][nc]!==-1) continue;
      if(!passable(rows[nr][nc])) continue;
      d[nr][nc]=d[r][c]+1; q.push([nc,nr]);
    }
  }
  return d;
}
function validateRows(rows){
  const S=findIn(rows,"S"), F=findIn(rows,"F");
  if(!S) return {ok:false, msg:"NEEDS A START 🚗"};
  if(!F) return {ok:false, msg:"NEEDS A FINISH 🏁"};
  const hasDoor = rows.some(r=>r.includes("D")), key = findIn(rows,"k");
  if(hasDoor && !key) return {ok:false, msg:"DOOR NEEDS A KEY 🗝️"};
  const d1 = bfsGrid(rows, S[0], S[1], ch=>ch!=="#");
  if(d1[F[1]][F[0]]<0) return {ok:false, msg:"CAN'T REACH THE FLAG!"};
  if(key){
    const d2 = bfsGrid(rows, S[0], S[1], ch=>ch!=="#"&&ch!=="D");
    if(d2[key[1]][key[0]]<0) return {ok:false, msg:"KEY IS LOCKED AWAY! 🗝️"};
  }
  return {ok:true};
}
function customToLevel(cl){
  const hz = [];
  const rows = cl.grid.map((row,r)=> row.split("").map((ch,c)=>{
    if(ch==="h"){ hz.push([c,r]); return "."; } return ch;
  }).join(""));
  const S=findIn(rows,"S"), F=findIn(rows,"F");
  const d = bfsGrid(rows, S[0], S[1], ch=>ch!=="#");
  const par = Math.max(15, Math.round(d[F[1]][F[0]]*1.35+8));
  const hazards = hz.map(([c,r])=>{
    const open=(cc,rr)=> rr>=0&&rr<rows.length&&cc>=0&&cc<rows[0].length&&rows[rr][cc]!=="#"&&rows[rr][cc]!=="D";
    let l=c; while(open(l-1,r)) l--;
    let ri=c; while(open(ri+1,r)) ri++;
    let u=r; while(open(c,u-1)) u--;
    let dn=r; while(open(c,dn+1)) dn++;
    if(ri-l<1 && dn-u<1) return null;
    return { path: (ri-l >= dn-u)? [[l,r],[ri,r]] : [[c,u],[c,dn]], speed:100 };
  }).filter(Boolean);
  return { name:cl.name, emoji:EMOJIS[cl.emojiIx||0], hue:HUES[cl.hueIx||0], par, grid:rows, hazards };
}
function saveBuild(){
  const rows = bl.grid.map(r=>r.join(""));
  const v = validateRows(rows);
  if(!v.ok){ sticker(v.msg, "#ff8f8f"); AU.bonk(); return null; }
  let cl = bl.editingId ? store.customLevels.find(c=>c.id===bl.editingId) : null;
  if(!cl){
    if(store.customLevels.length>=10){ sticker("GARAGE FULL! 🔧", "#ff8f8f"); return null; }
    store.nextTrackId = (store.nextTrackId||0)+1;
    cl = { id: store.nextTrackId, name: "TRACK "+store.nextTrackId };
    store.customLevels.push(cl);
    bl.editingId = cl.id;
  }
  cl.grid = rows; cl.hueIx = bl.hueIx; cl.emojiIx = bl.emojiIx;
  save();
  sticker("SAVED! 💾", "#9ae64a"); AU.key();
  return cl;
}
function testBuild(){

  const v = validateRows(rows);

  loadCustom({ id:0, name:"TEST DRIVE", emojiIx:bl.emojiIx, hueIx:bl.hueIx, grid:rows }, "builder");
}
function encodeTrack(cl){
  // "|" separator — "~" is ice now, so it can appear inside grids
  const payload = ["1", cl.name, cl.emojiIx||0, cl.hueIx||0, cl.grid.join("!")].join("|");
  return btoa(payload).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function decodeTrack(s){
  try{
    const raw = atob(s.replace(/-/g,"+").replace(/_/g,"/"));
    let p = raw.split("|");
    if(p.length<5) p = raw.split("~");   // links shared before the ice update
    if(p[0]!=="1" || p.length<5) return null;
    const rows = p[4].split("!");
    const cols = rows[0].length;
    if(rows.length<5||rows.length>16||cols<6||cols>24) return null;
    if(!rows.every(r=>r.length===cols && /^[#.SFcnkDG*h~<>^vOJ&%]+$/.test(r))) return null;   // incl. World-5 J/&/% so water-park tracks share
    if(!validateRows(rows).ok) return null;
    return { name:String(p[1]||"TRACK").slice(0,14), emojiIx:Math.min(EMOJIS.length-1, Math.max(0,+p[2]||0)),
             hueIx:Math.min(HUES.length-1, Math.max(0,+p[3]||0)), grid:rows };
  }catch(e){ return null; }
}
function shareTrack(){
  const cl = saveBuild(); if(!cl) return;
  const url = location.origin + location.pathname + "#T=" + encodeTrack(cl);
  if(navigator.share){ navigator.share({title:cl.name+" — "+CONFIG.title, url}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>sticker("LINK COPIED! 📋","#9ae64a")).catch(()=>{}); }
}
function builderAction(a){
  AU.ui();
  if(a==="back"){ game.state="home"; return; }
  if(a==="undo"){ popUndo(); return; }
  if(a==="hue"){ bl.hueIx=(bl.hueIx+1)%HUES.length; return; }
  if(a==="emoji"){ bl.emojiIx=(bl.emojiIx+1)%EMOJIS.length; return; }
  if(a==="size"){ pushUndo(); bl.sizeIx=(bl.sizeIx+1)%SIZES.length; resizeGridTo(SIZES[bl.sizeIx][0], SIZES[bl.sizeIx][1]); return; }
  if(a==="test"){ testBuild(); return; }
  if(a==="saveB"){ saveBuild(); return; }
  if(a==="share"){ shareTrack(); return; }
  if(a==="trash"){
    if(bl.trashT>0){
      if(bl.editingId){
        store.customLevels = store.customLevels.filter(c=>c.id!==bl.editingId);
        delete store.stars["c:"+bl.editingId]; save();
      }
      const [c,r]=SIZES[bl.sizeIx];
      bl.grid = freshGrid(c,r); bl.cols=c; bl.rows=r;
      bl.editingId=null; bl.undo.length=0; bl.trashT=0;
      sticker("GONE! 💨","#ff8f8f");
    } else { bl.trashT=2; sticker("TAP 🗑 AGAIN TO DELETE","#ff8f8f"); }
    return;
  }
  if(a.startsWith("tool:")){ bl.tool=a.slice(5); return; }
  if(a.startsWith("edit:")){ const cl=store.customLevels.find(c=>c.id===+a.slice(5)); if(cl) enterBuilder(cl); return; }
}

/* ==================================================================
   🎁 MYSTERY CRATES (v1) — crates, loot, upgrades & power-ups
   ------------------------------------------------------------------
   Buy a crate in the garage → it rolls a RARITY, then a reward from
   that tier. Rewards fall in 4 buckets:
     • UPGRADES  — permanent tiny bumps, kept best-of-each-type
     • POWER-UPS — one-use, arm ONE per race (store.armed), auto-fire
     • COSMETICS — pure looks (trail / shine / topper)
     • CURRENCY  — coin/aura filler so no pull feels empty
   All state lives in `store` (see the store literal near the top).
   Upgrades/power-ups only buff the human's CAMPAIGN car — VS/KO/co-op
   stay fair unless CONFIG.powerUpsInVs is turned on.
   Full write-up: docs/MYSTERY-CRATES.md
   ================================================================== */
const RARITY = [
  { key:"common",    name:"COMMON",    col:"#9aa4bd" },
  { key:"rare",      name:"RARE",      col:"#5bc0ff" },
  { key:"epic",      name:"EPIC",      col:"#b06ee8" },
  { key:"legendary", name:"LEGENDARY", col:"#ffb742" },
  { key:"secret",    name:"SECRET",    col:"#ff5db1" },
];
// 🥇 v3 PRESTIGE: a 6th GOLD tier for UPGRADES ONLY — deliberately NOT a RARITY entry
// (no odds arrays, no index coupling per §13.6). A LEGENDARY+ upgrade roll on an
// already-SECRET stat ascends it to GOLD — turns a maxed kid's dupe-coins moment
// into the long-haul chase. Canonical gold colour for chips/reveal/collection book:
const PRESTIGE = { name:"GOLD", col:"#ffe14d" };
// crate types — odds are % weights for [common, rare, epic, legendary, secret]
const CRATES = {
  mystery: { name:"MYSTERY CRATE",    emoji:"🎁", price:100, odds:[54,27,12,6,1] },
  mega:    { name:"MEGA MYSTERY BOX", emoji:"🎉", price:200, odds:[ 0,50,30,15,5] },
  golden:  { name:"GOLDEN CRATE",     emoji:"🎁", price:0,   odds:[ 0,50,32,14,4] },   // 🎁 v2: free in-level find (never sold; smashed mid-race — see spawnGolden)
};
// permanent car upgrades — kept best-of-each. mult[tier]: 0 = none, 1..5 = common..secret, 6 = 🥇 GOLD prestige (v3).
// stats that touch difficulty (engine/grip) bump TINY, feel-good/forgiveness ones bump BIG.
const CRATE_UPG = {
  engine: { name:"ENGINE",       emoji:"🔧", mult:[1,1.02,1.04,1.06,1.09,1.12,1.14] }, // top speed
  grip:   { name:"GRIP TIRES",   emoji:"🛞", mult:[1,1.03,1.06,1.10,1.15,1.22,1.26] }, // turning / ice
  nitro:  { name:"NITRO TANK",   emoji:"⚡", mult:[1,1.10,1.20,1.35,1.55,1.80,2.00] }, // nitro recharge
  magnet: { name:"MAGNET",       emoji:"🧲", mult:[1,1.12,1.25,1.40,1.60,1.90,2.10] }, // coin pull radius
  lucky:  { name:"LUCKY",        emoji:"💰", mult:[1,1.03,1.06,1.10,1.16,1.25,1.30] }, // coins earned
  pads:   { name:"PAD POWER",    emoji:"🔋", mult:[1,1.10,1.20,1.35,1.55,1.80,2.00] }, // 🆕 v3: boost/splash pads kick harder + refill more nitro
  clock:  { name:"STAR CLOCK",   emoji:"⏰", mult:[1,1.04,1.07,1.10,1.14,1.18,1.22] }, // 🆕 v3: extra par grace for the ⏱ star (never harder)
  boom:   { name:"CRATE BOOM",   emoji:"🧨", mult:[1,1.25,1.50,1.75,2.00,2.50,3.00] }, // 🆕 v3: smashed crates drop bonus coins ((mult-1) expected)
  bumper: { name:"GOOBER GUARD", emoji:"🦺", mult:[1,1.25,1.45,1.75,2.20,2.90,3.50] }, // 🆕 v3: goobers steal fewer coins (floor(3/mult): 2,2,1,1,1 · GOLD 0)
};
const UPG_KEYS = Object.keys(CRATE_UPG);
// one-use power-ups — arm ONE before a race (store.armed). rarity = the tier they drop in.
const POWERUPS = {
  rocket: { name:"ROCKET START", emoji:"🚀", rarity:0, desc:"Full nitro off the line" },
  double: { name:"DOUBLE COINS", emoji:"✌️", rarity:1, desc:"2× coins this run" },
  shield: { name:"SHIELD",       emoji:"🛡️", rarity:1, desc:"Block one hit" },

  slowmo: { name:"SLOW-MO",      emoji:"⏱️", rarity:3, desc:"Slow-mo near a crusher" },
  party:  { name:"COIN PARTY",   emoji:"🎊", rarity:0, desc:"Bonus coins at GO!" },            // 🆕 v3 start-fire
  megamag:{ name:"MEGA MAGNET",  emoji:"🧲", rarity:1, desc:"Slurps every coin nearby ~4s" },  // 🆕 v3 reactive
  saver:  { name:"SPLASH SAVER", emoji:"🛟", rarity:2, desc:"Auto-hop over one fall" },        // 🆕 v3 reactive
  warp:   { name:"WARP START",   emoji:"🌟", rarity:2, desc:"Zip 3 squares at GO!" },          // 🆕 v3 start-fire
};
// pure-looks collectibles (no gameplay effect). kind: trail | shine | topper | glow | confetti.
const COSMETICS = {
  trail_flame:   { name:"FLAME TRAIL",   emoji:"🔥", rarity:1, kind:"trail",  col:"#ff7a1a" },
  trail_rainbow: { name:"RAINBOW TRAIL", emoji:"🌈", rarity:2, kind:"trail",  col:"rainbow" },
  shine_gold:    { name:"GOLD SHINE",    emoji:"✨", rarity:3, kind:"shine",   col:"#ffd76a" },
  topper_goat:   { name:"GOAT TOPPER",   emoji:"🐐", rarity:4, kind:"topper" },
  topper_crown:  { name:"CROWN TOPPER",  emoji:"👑", rarity:4, kind:"topper" },
  trail_bubble:  { name:"BUBBLE TRAIL",   emoji:"🫧", rarity:1, kind:"trail",   col:"#8fd8ff" },  // 🆕 v3: zero-code
  glow_lava:     { name:"LAVA GLOW",      emoji:"🌋", rarity:1, kind:"glow",    col:"#ff6a3a" },  // 🆕 v3: new slot
  glow_galaxy:   { name:"GALAXY GLOW",    emoji:"🌌", rarity:2, kind:"glow",    col:"rainbow" },  // 🆕 v3: hue-cycling
  confetti_party:{ name:"PARTY FINISH",   emoji:"🎆", rarity:2, kind:"confetti" },                // 🆕 v3: new slot
  topper_dino:   { name:"DINO TOPPER",    emoji:"🦖", rarity:3, kind:"topper" },                  // 🆕 v3: zero-code
  topper_unicorn:{ name:"UNICORN TOPPER", emoji:"🦄", rarity:4, kind:"topper" },                  // 🆕 v3: restocks SECRET
};
// coin / aura filler so a common pull still feels like progress
const CURRENCY = {
  pouch: { name:"COIN POUCH", emoji:"🪙", rarity:0, coins:25 },
  sack:  { name:"COIN SACK",  emoji:"💰", rarity:1, coins:100 },
  auraB: { name:"AURA BONUS", emoji:"💫", rarity:0, aura:15 },
  chest: { name:"TREASURE CHEST", emoji:"🧰", rarity:2, coins:250 },   // 🆕 v3: epic filler — late-game epic pulls never feel empty
};
// 🎁 reconcile a loaded save: drop references to any crate item removed from the data tables above (makes deleting an asset safe)
if(store.armed && !POWERUPS[store.armed]) store.armed = null;
if(store.cosmetic && !COSMETICS[store.cosmetic]) store.cosmetic = null;
// 📖 v3: seed the collection ledger from an existing save — already-owned items count as
// found AND seen (no undiscovered-silhouette / NEW!-badge spam on upgrade day)
(function(){ const seed = k=>{ if(!store.found[k]){ store.found[k]=1; store.seenItems[k]=1; } };
  for(const k of UPG_KEYS) if((store.upg[k]||0)>0) seed("upg:"+k);
  for(const id in store.powerups) if(POWERUPS[id]) seed("pu:"+id);
  for(const id of store.cosmetics) if(COSMETICS[id]) seed("cos:"+id);
})();

// current multiplier for an upgrade stat (1 = nothing owned yet)
// 🎁 bucket toggles (CONFIG flags) — each folds in the master. See docs/MYSTERY-CRATES.md "Reverting".
function upgOn(){ return CONFIG.cratesEnabled && CONFIG.cratesUpgrades; }
function puOn(){  return CONFIG.cratesEnabled && CONFIG.cratesPowerups; }
function cosOn(){ return CONFIG.cratesEnabled && CONFIG.cratesCosmetics; }
// 📖 v3 collection-book ledger helpers. liveKey guards stale keys of DELETED assets so a
// removed data line can never leave a phantom NEW! badge (docs §13.7 pattern).
function liveKey(k){ const i=k.indexOf(":"), b=k.slice(0,i), id=k.slice(i+1);
  return b==="upg"? !!CRATE_UPG[id] : b==="pu"? !!POWERUPS[id] : b==="cos"? !!COSMETICS[id] : !!CURRENCY[id]; }
function isNewItem(k){ return !!(store.found[k] && !store.seenItems[k]); }
function unseenCount(){ let n=0; for(const k in store.found) if(!store.seenItems[k] && liveKey(k)) n++; return n; }
function bookSeen(){ let d=false; for(const k in store.found) if(!store.seenItems[k]){ store.seenItems[k]=1; d=true; } if(d) save(); }
// current multiplier for an upgrade stat (1 = off / nothing owned / stat deleted)
function upgMul(kind){ const u = CRATE_UPG[kind]; return (upgOn() && u) ? (u.mult[Math.min(store.upg[kind]||0, u.mult.length-1)] || 1) : 1; }
// should the human's upgrades/power-ups apply to this car right now?
// campaign only — VS/KO/co-op stay fair unless CONFIG.powerUpsInVs is on.
function boosted(car){
  if(!upgOn()) return false;          // 🎁 upgrades toggle (also folds in the master cratesEnabled)
  if(car!==game.car) return false;
  if((game.vs||game.ko||game.coop) && !CONFIG.powerUpsInVs) return false;
  return true;
}
// 🚗 per-vehicle stat perks: the human's CAMPAIGN car only. Same multiplayer-fairness
// envelope as boosted(), but independent of the crate toggle — a car's identity is core
// progression, so its handling character applies even with crates switched off.
function carPerk(car){
  if(car!==game.car) return false;
  if((game.vs||game.ko||game.coop) && !CONFIG.powerUpsInVs) return false;
  return true;
}
// ⏰ STAR CLOCK (v3): par seconds for the ⏱ star, stretched by the clock upgrade.
// boosted() gates it to the human CAMPAIGN car — co-op par math (coopClear/drawCoopHUD) never moves.
function parFor(L){ return L.par * (boosted(game.car)? upgMul("clock") : 1); }
// weighted 0..4 rarity roll from a crate's odds array
function rollTier(odds){
  let tot=0; for(const o of odds) tot+=o;
  let r=Math.random()*tot;
  for(let i=0;i<odds.length;i++){ r-=odds[i]; if(r<0) return i; }
  return 0;
}
// everything that can drop at rarity tier t (0..4). upgrades appear at every tier (weighted x2).
function poolForTier(t){
  const pool = [];
  if(puOn())  for(const id in POWERUPS)  if(POWERUPS[id].rarity===t) pool.push({type:"pu",  id});
  if(cosOn()) for(const id in COSMETICS) if(COSMETICS[id].rarity===t && !store.cosmetics.includes(id)) pool.push({type:"cos", id});
  for(const id in CURRENCY)  if(CURRENCY[id].rarity===t) pool.push({type:"cur", id});
  if(upgOn()) pool.push({type:"upg"}, {type:"upg"});   // an upgrade at this tier — the core chase
  if(!pool.length) pool.push({type:"cur", coins:20*(t+1)});   // floor: a disabled/empty tier still pays coins
  return pool;
}
// hand out one drop, mutate store, and return a card description for the reveal
// v3: also marks the 📖 found ledger and tags the result with badge:"new"|"dupe"|null (+ gold:true for prestige)
function grantDrop(drop, t){
  if(drop.type==="pu"){
    const p = POWERUPS[drop.id];
    const k = "pu:"+drop.id, isNew = !store.found[k]; store.found[k] = 1;          // 📖 v3
    store.powerups[drop.id] = (store.powerups[drop.id]||0)+1;
    return { icon:p.emoji, name:p.name, sub:p.desc, badge: isNew? "new" : null };
  }
  if(drop.type==="cos"){
    const c = COSMETICS[drop.id];
    store.found["cos:"+drop.id] = 1;                                               // 📖 v3 (always new — pool excludes owned)
    store.cosmetics.push(drop.id);
    return { icon:c.emoji, name:c.name, sub:"New look!", badge:"new" };
  }
  if(drop.type==="cur"){
    const c = CURRENCY[drop.id] || drop;   // (|| drop handles the empty-pool floor coins, which have no id)
    let isNew = false;                                                             // 📖 v3: floor coins (no id) never mark/badge
    if(drop.id){ const k = "cur:"+drop.id; isNew = !store.found[k]; store.found[k] = 1; }
    if(c.coins){ store.coinsBank += c.coins; return { icon:c.emoji||"🪙", name:"+"+c.coins+" COINS", sub:c.name||"Lucky find!", badge: isNew? "new" : null }; }
    store.aura += c.aura; return { icon:c.emoji||"💫", name:"+"+c.aura+" AURA", sub:c.name||"Aura!", badge: isNew? "new" : null };
  }
  // upgrade: random stat at tier t+1; if you already own that tier or better → coins instead
  if(!UPG_KEYS.length){ const c=20*(t+1); store.coinsBank+=c; return { icon:"🪙", name:"+"+c+" COINS", sub:"Lucky find!" }; }
  const stat = UPG_KEYS[(Math.random()*UPG_KEYS.length)|0], newTier = t+1;
  if(!CRATE_UPG[stat]){ const c=20*newTier; store.coinsBank+=c; return { icon:"🪙", name:"+"+c+" COINS", sub:"Lucky find!" }; }
  if((store.upg[stat]||0) >= newTier){
    // 🥇 PRESTIGE (v3): a LEGENDARY+ roll on a maxed (SECRET) stat promotes it to GOLD (tier 6).
    // mult.length guard: trimming a mult array back to 6 entries switches prestige off safely (§13.7).
    if(t>=3 && (store.upg[stat]||0)===RARITY.length && CRATE_UPG[stat].mult.length>RARITY.length+1){
      store.upg[stat] = RARITY.length+1;
      const gp = Math.round((CRATE_UPG[stat].mult[RARITY.length+1]-1)*100);
      return { icon:"🥇", name:CRATE_UPG[stat].name+" GOLD +"+gp+"%", sub:"PRESTIGE! Beyond max!", gold:true };
    }
    const c = 20*newTier; store.coinsBank += c;
    return { icon:"🪙", name:"+"+c+" COINS", sub:"(already have "+CRATE_UPG[stat].name+")", badge:"dupe" };  // 📖 v3
  }
  const k = "upg:"+stat, isNew = !store.found[k]; store.found[k] = 1;              // 📖 v3
  store.upg[stat] = newTier;
  const pct = Math.round((CRATE_UPG[stat].mult[newTier]-1)*100);
  return { icon:CRATE_UPG[stat].emoji, name:CRATE_UPG[stat].name+" +"+pct+"%", sub:"Upgrade!", badge: isNew? "new" : null };
}
// buy + open a crate → kicks off the reveal animation
function openCrate(key){
  const c = CRATES[key];
  if(store.coinsBank < c.price){
    AU.bonk(); sticker("NEED "+(c.price-store.coinsBank)+" MORE COINS!", "#ff8f8f"); return;
  }
  store.coinsBank -= c.price; store.cratesOpened++;
  const t = rollTier(c.odds);
  const pool = poolForTier(t);
  const res = grantDrop(pool[(Math.random()*pool.length)|0], t);
  save();
  game.reveal = { res, tier:t, t:0, from:key, popped:false };
  AU.ui();
}

/* ==================================================================
   🎁 GOLDEN CRATES (v2) — free in-level crate finds
   ------------------------------------------------------------------
   ONE rare glowing golden crate can spawn per CAMPAIGN level as a
   standalone NON-SOLID drive-over pickup (game.gold — it is NEVER
   added to game.crates, so the wooden 'x' crates, isSolid, crateAt,
   the collideWalls smash branch, drawCrate and the boss rival are all
   left untouched). Drive over it -> a FREE pull through the V1 grant
   pipeline, banked instantly, with a NON-BLOCKING reveal banner (no
   modal, no pause, no tap). Toggle: CONFIG.goldenCrateChance (0 = off).
   Full write-up: docs/MYSTERY-CRATES.md
   ================================================================== */
// deterministic pseudo-random in [0,1) per level — decides WHICH levels carry a golden crate (stable per level, not farmable)
function goldenHash(ix){ return ((ix*73 + 17) % 101) / 101; }
function spawnGolden(){
  game.gold = null;
  // campaign single-player only — VS/Knockout/Co-op/builder/custom are all excluded
  if(game.levelIx<0 || game.vs || game.ko || game.coop || game.customId || game.fromBuilder) return;
  if(!CONFIG.cratesEnabled || !CRATES.golden) return;          // 🎁 master toggle, or the golden entry was removed
  if(store.goldTaken && store.goldTaken[game.levelIx]) return; // already collected on THIS level — never respawns (no re-race farming)
  if(goldenHash(game.levelIx) >= (CONFIG.goldenCrateChance||0)) return;   // deterministic: does this level carry a golden crate?
  if(!game.finish || !game.startCell || !game.flow) return;
  const F = game.finish, K = (c,r)=> c+","+r, blocked = new Set(), add = (c,r)=> blocked.add(K(c,r));
  add(game.startCell[0], game.startCell[1]); add(F.c, F.r);
  if(game.key) add(Math.floor(game.key.x/CELL), Math.floor(game.key.y/CELL));
  for(const cr of game.crates)    add(cr.c, cr.r);
  for(const cn of game.coins)     add(Math.floor(cn.x/CELL), Math.floor(cn.y/CELL));   // coins + nitro cans
  for(const p of game.pads)       add(p.c, p.r);
  for(const g of game.gates)      add(g.c, g.r);
  for(const d of game.doors)      add(d.c, d.r);
  for(const p of game.portals)    add(p.c, p.r);
  for(const cv of game.conveyors) add(cv.c, cv.r);
  for(const t of game.trapDoors)  add(t.c, t.r);
  for(const bp of game.bounces)   add(bp.c, bp.r);   // 🟠 can't stop on a trampoline to grab it
  for(const cm of game.crumbles)  add(cm.c, cm.r);   // 🧱 vanishing floor — never place gold on foam
  for(const l of game.lavas)      add(l.c, l.r);     // 🌋 never place gold in a molten pool
  for(const g2 of game.geysers)   add(g2.c, g2.r);   // ⛲ …or on a geyser vent
  for(const k of game.crushers) for(let s=0;s<=k.range;s++) add(k.c+k.dx*s, k.r+k.dy*s);   // whole swept lane
  for(const gb of game.goobers) for(const [wx,wy] of gb.path){                            // patrol path + padding
    const gc=Math.floor(wx/CELL), gr=Math.floor(wy/CELL);
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) add(gc+dc, gr+dr);
  }
  const path = bfsPathCells(game.startCell, [F.c, F.r]);   // walls-only start->finish racing line (every cell reachable)
  const ok = ([c,r])=> game.flow[r] && game.flow[r][c]>=0 && !blocked.has(K(c,r));
  const band = (lo,hi)=> path.slice(Math.floor(path.length*lo), Math.ceil(path.length*hi)).filter(ok);
  let cands = band(0.30, 0.70);                    // mid-race (never the start line or the flag)
  if(!cands.length) cands = band(0.15, 0.85);      // fallback: widen the band
  if(!cands.length){                               // fallback: any reachable road cell nearest mid-race
    const mid = game.raceTotal*0.5;
    cands = game.road.filter(ok)
      .sort((a,b)=> Math.abs(game.flow[a[1]][a[0]]-mid) - Math.abs(game.flow[b[1]][b[0]]-mid))
      .slice(0, 8);
  }
  if(!cands.length) return;                        // no safe cell -> no crate (a valid outcome)
  const [c,r] = cands[(Math.random()*cands.length)|0];
  game.gold = { c, r, x:(c+0.5)*CELL, y:(r+0.5)*CELL, got:false, ph:Math.random()*TAU, bob:Math.random()*TAU };
}
// smash a golden crate -> free V1 pull, banked instantly, non-blocking celebration
function grabGolden(g){
  g.got = true;
  const t = rollTier(CRATES.golden.odds), pool = poolForTier(t);
  const res = grantDrop(pool[(Math.random()*pool.length)|0], t);
  store.goldenFound = (store.goldenFound||0) + 1;
  if(store.goldTaken) store.goldTaken[game.levelIx] = 1;        // 🎁 this level's crate is collected — gone for good here
  save();                                                        // reward banked BEFORE any FX
  game.shake = Math.min(9, game.shake+5);
  for(let i=0;i<16;i++) debris(g.x+rand(-24,24), g.y+rand(-24,24));
  for(let i=0;i<14;i++) sparkle(g.x, g.y);
  float("FREE CRATE!", g.x, g.y-24, "#ffd76a");
  float(res.icon+" "+res.name, g.x, g.y-52, RARITY[t].col);
  confettiBurst(W/2, H*0.30, t>=3?120:70, RARITY[t].col);       // needs drawConfettiScreen in the play branch
  sticker("🎁 "+RARITY[t].name+"! "+res.name, RARITY[t].col);
  game.goldReveal = { res, tier:t, t:0 };
  AU.win();
  if(t>=3) AU.beep(1200,0.3,"sawtooth",0.2,600); else AU.beep(880,0.12,"square",0.14,300);
}
// world-space render of the golden crate — pulsing glow, bob, 🎁 face, orbiting sparkles
function drawGold(g){
  if(!g || g.got) return;
  const px=g.c*CELL, py=g.r*CELL, pulse=0.5+0.5*Math.sin(game.t*4+g.ph), oy=Math.sin(game.t*2.2+g.bob)*3;
  ctx.save(); ctx.globalCompositeOperation="lighter";
  const gr = ctx.createRadialGradient(g.x, g.y+oy, 6, g.x, g.y+oy, 50+pulse*14);
  gr.addColorStop(0, "rgba(255,215,106,"+(0.34+pulse*0.28)+")"); gr.addColorStop(1, "rgba(255,215,106,0)");
  ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(g.x, g.y+oy, 50+pulse*14, 0, TAU); ctx.fill(); ctx.restore();
  ctx.fillStyle = "#e8a930"; ctx.beginPath(); ctx.roundRect(px+8, py+8+oy, CELL-16, CELL-16, 6); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.22)"; ctx.fillRect(px+8, py+8+oy, CELL-16, 9);
  ctx.strokeStyle = "#ffd76a"; ctx.lineWidth = 5; ctx.strokeRect(px+15, py+15+oy, CELL-30, CELL-30);
  ctx.font = "34px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; fillTextC("🎁", g.x, g.y+oy);
  for(let i=0;i<3;i++){ const a=game.t*2.4+i*TAU/3;
    ctx.fillStyle="#fff4cc"; ctx.beginPath();
    ctx.arc(g.x+Math.cos(a)*(30+pulse*6), g.y+oy+Math.sin(a)*(30+pulse*6), 2.4, 0, TAU); ctx.fill();
  }
}
// non-blocking, auto-expiring reward banner (captures no taps, pauses nothing)
function drawGoldReveal(dt){
  const rv = game.goldReveal; if(!rv) return;
  if(!paused) rv.t += dt;
  const LIFE=2.8, inA=Math.min(1, rv.t/0.3), outA=Math.min(1, Math.max(0,(LIFE-rv.t)/0.6)), a=Math.min(inA,outA);
  if(rv.t>=LIFE){ game.goldReveal=null; return; }
  const col=RARITY[rv.tier].col, w=Math.min(W-40,340), x=W/2-w/2, y=safeT+70-(1-inA)*16, h=64;
  ctx.save(); ctx.globalAlpha=a;
  roundedPanel(x, y, w, h, 14, "rgba(12,15,24,0.92)");
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.beginPath(); ctx.roundRect(x+1.5, y+1.5, w-3, h-3, 13); ctx.stroke();
  ctx.font="34px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; fillTextC(rv.res.icon, x+34, y+h/2);
  ctx.textAlign="left";
  ctx.font="900 15px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.fillStyle=col; ctx.fillText(RARITY[rv.tier].name+"!", x+64, y+22);
  ctx.font="800 18px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.fillStyle="#f4f6ff"; ctx.fillText(rv.res.name, x+64, y+44);
  if(rv.res.badge==="new"){ const nw2 = ctx.measureText(rv.res.name).width;
    ctx.fillStyle="#ffd76a"; ctx.font="900 11px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.fillText("NEW!", x+64+nw2+10, y+44); }
  ctx.restore();
}

/* ---- power-up run lifecycle & auto-triggers (see docs/MYSTERY-CRATES.md) ----
   One power-up is armed at a time (store.armed). rocket/double fire at the
   start of every run (party/warp too); shield/freeze/ghost/slowmo/saver/megamag fire reactively and are only
   spent when they actually trigger — so an unused one carries to the next race. */
function consumeArmed(){
  const id = store.armed; if(!id) return;
  store.powerups[id] = (store.powerups[id]||0) - 1;
  if(store.powerups[id] <= 0){ delete store.powerups[id]; store.armed = null; }
  save();
}
function puFloat(msg, x, y){ float(msg, x==null?game.car.x:x, (y==null?game.car.y:y)-46, "#7ef7ff"); }
function firePU(kind, x, y){          // a reactive power-up went off: spend it + FX
  consumeArmed(); game.car.pu = null;
  const p = POWERUPS[kind]; if(p) puFloat(p.emoji+" "+p.name+"!", x, y);
  AU.nitro(); game.shake = Math.min(8, game.shake+3);
  for(let i=0;i<10;i++) puff(x==null?game.car.x:x, y==null?game.car.y:y, "rgba(126,247,255,0.5)");
}
// eat the next hit (trap door / goober) with an armed 🛡️ shield, 👻 ghost or 🛟 saver
function blockHit(car, x, y){
  if(car!==game.car || !car.pu) return false;
  if(car.pu==="shield"){ car.invuln = Math.max(car.invuln, 1.0); firePU("shield", x, y); return true; }
  if(car.pu==="ghost"){ car.ghostT = 2.0; car.invuln = Math.max(car.invuln, 2.0); firePU("ghost", x, y); return true; }
  if(car.pu==="saver"){                          // 🛟 SPLASH SAVER (v3): auto-hop clean over the hole/goober — splash-pad contract
    const SPD = CONFIG.speed||1, sp = Math.hypot(car.vx, car.vy);
    const launch = clamp(sp + 260*SPD, 420*SPD, 600*SPD);
    car.vx = Math.cos(car.heading)*launch; car.vy = Math.sin(car.heading)*launch;
    car.airT = car.airMax = 0.55; car.invuln = Math.max(car.invuln, 1.2); car.sq = 1.35;
    firePU("saver", x, y); AU.beep(520,0.12,"sine",0.14,260);
    return true;
  }
  return false;
}
// arm the run's power-up (campaign only unless CONFIG.powerUpsInVs) — call once per run start
function armRun(){
  const c = game.car; if(!c) return;
  c.dbl=false; c.shield=false; c.ghostT=0; c.pu=null; c.luckyAcc=0; c.magT=0; game.slowmo=0;
  for(const gb of game.goobers) gb.frozen = 0;
  const allow = puOn() && ((!game.vs && !game.ko && !game.coop) || CONFIG.powerUpsInVs);   // 🎁 power-ups toggle
  const id = store.armed;
  if(!allow || !id || !POWERUPS[id] || !(store.powerups[id]>0)) return;   // !POWERUPS[id] → safe if the id was deleted
  if(id==="rocket"){ c.nitroMeter=100; c.boost=0.3; consumeArmed(); puFloat("🚀 ROCKET START!"); }
  else if(id==="double"){ c.dbl=true; consumeArmed(); puFloat("✌️ DOUBLE COINS!"); }
  else if(id==="party"){                                            // 🎊 v3: scatter 6 bonus coins around the start straight
    scatterCoins(c.x, c.y, 6); consumeArmed(); puFloat("🎊 COIN PARTY!");
    for(let i=0;i<10;i++) sparkle(c.x+rand(-20,20), c.y+rand(-20,20));
  }
  else if(id==="warp"){                                             // 🌟 v3: hop up to 3 cells along the racing line at GO
    const F = game.finish;
    const path = (F && game.startCell)? bfsPathCells(game.startCell, [F.c, F.r]) : [];
    const bad = (cc,rr)=> isSolid(cc,rr) || game.doors.some(d=>d.c===cc&&d.r===rr) || game.gates.some(g=>g.c===cc&&g.r===rr)
             || game.trapDoors.some(t=>t.c===cc&&t.r===rr) || game.crumbles.some(m=>m.c===cc&&m.r===rr)
             || game.crushers.some(k=>{ for(let s=0;s<=k.range;s++) if(k.c+k.dx*s===cc && k.r+k.dy*s===rr) return true; return false; });
    let stop = 0;
    for(let i=1; i<path.length-1 && i<=3; i++){ if(bad(path[i][0], path[i][1])) break; stop = i; }   // never skips a door/gate or lands in danger
    if(stop>0){
      for(let i=0;i<10;i++) puff(c.x, c.y, "rgba(255,215,106,0.5)");
      const [wc,wr] = path[stop];
      c.x=(wc+0.5)*CELL; c.y=(wr+0.5)*CELL; c.vx=c.vy=0; c.invuln=Math.max(c.invuln,0.8);
      if(path[stop+1]) c.heading = Math.atan2(path[stop+1][1]-wr, path[stop+1][0]-wc);   // face down the track
      c.trail.length=0; game.cam.x=c.x; game.cam.y=c.y;                                  // no ghost trail / camera lurch
      consumeArmed(); puFloat("🌟 WARP START!"); AU.nitro();
      for(let i=0;i<14;i++) sparkle(c.x+rand(-20,20), c.y+rand(-20,20));
    }                                                               // no safe hop → NOT consumed, carries to the next race (kind)
  }
  else { c.pu=id; if(id==="shield") c.shield=true; }   // shield/freeze/ghost/slowmo/saver/megamag fire during the run
}
// equipped 🎨 trail cosmetic overrides the car's motion-trail colour (flame = orange, rainbow = cycling hue)
function cosTrail(car, v){
  if(!car.p2 && cosOn() && store.cosmetic){          // 🎁 cosmetics toggle
    const c = COSMETICS[store.cosmetic];
    if(c && c.kind==="trail") return c.col==="rainbow" ? "hsl("+Math.floor((game.t*120)%360)+",90%,62%)" : c.col;
  }
  return v.trail();
}

function cratesAction(a){
  if(a==="back"){ AU.ui(); if(bk.open){ bk.open=false; bookSeen(); return; } game.reveal=null; game.state="home"; return; }
  if(a==="book"){ AU.ui(); bk.open=true; bk.t=0; return; }
  if(a==="book:close"){ AU.ui(); bk.open=false; bookSeen(); return; }
  if(a.startsWith("info:")){ AU.key();
    if(a==="info:?"){ sticker("??? OPEN CRATES TO FIND IT!", "#8b93ad"); return; }
    const key = a.slice(5);
    for(const s of bookSections()) for(const it of s.items)
      if(it.key===key){ sticker(it.info, it.gold? PRESTIGE.col : RARITY[it.rarity].col); return; }
    return;
  }
  if(a.startsWith("buy:")){ openCrate(a.slice(4)); return; }   // works for any CRATES key
  if(a.startsWith("arm:")){
    const id = a.slice(4);
    store.seenItems["pu:"+id]=1;
    store.armed = (store.armed===id)? null : id; save(); AU.key();
    sticker(store.armed && POWERUPS[id]? POWERUPS[id].emoji+" "+POWERUPS[id].name+" ARMED" : "UNARMED", "#7ef7ff");

  }

    const id = a.slice(5);
    store.seenItems["cos:"+id]=1;
    store.cosmetic = (store.cosmetic===id)? null : id; save(); AU.key();
    return;
  }
}

    sectionLabel("POWER-UPS  ·  tap to arm one", xr, y); y += 20;

    if(!owned.length){

      ctx.fillText("Open crates to find power-ups!", xr, y+22);

    }

  const looks = store.cosmetics.filter(id=> COSMETICS[id]);

  if(game.reveal) drawReveal(dt);

  for(const tp of input.taps.splice(0)){
    if(tp.screen) continue;
    if(game.reveal){ game.reveal = null; continue; }   // any tap dismisses the reveal
    for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ cratesAction(b.act); break; }
  }
}

// dark silhouette of an emoji, cached per (emoji,size). No ctx.filter (Safari-unsafe);
// offscreen source-in tint works everywhere iOS runs this game.
const _silC = new Map();
function silhouette(emoji, px){
  const key = emoji+"@"+px; let c = _silC.get(key);
  if(!c){
    c = document.createElement("canvas"); c.width = c.height = Math.ceil(px*2*DPR);
    const g = c.getContext("2d"); g.scale(DPR,DPR);
    g.font = px+"px sans-serif"; g.textAlign="center"; g.textBaseline="middle";
    g.fillText(emoji, px, px);
    g.globalCompositeOperation = "source-in";
    g.fillStyle = "#20263a"; g.fillRect(0,0,px*2,px*2);
    _silC.set(key, c);
  }
  return c;
}
// book contents — built from the LIVE data tables (never the save), so deleted assets vanish
// for free (§13.7). Honors the bucket toggles like the main rows; TREASURE always shows.
// 🥇 gold-hardened (v3 R3): upgrade tier clamps to mult.length-1, rarity index clamps to RARITY range.
function bookSections(){
  const S = [];
  if(upgOn()) S.push({ label:"UPGRADES", items: UPG_KEYS.map(k=>{ const u=CRATE_UPG[k];
    const t=Math.min(store.upg[k]||0, u.mult.length-1), gold=t>RARITY.length; return {
    key:"upg:"+k, emoji:u.emoji, name:u.name, rarity:Math.min(RARITY.length-1, Math.max(0,t-1)), tier:t, gold,
    found: t>0 || !!store.found["upg:"+k],
    info: t>0 ? u.name+(gold?" 🥇GOLD":"")+" +"+Math.round((u.mult[t]-1)*100)+"%" : u.name }; }) });
  if(puOn()) S.push({ label:"POWER-UPS", items: Object.keys(POWERUPS).map(id=>{ const p=POWERUPS[id]; return {
    key:"pu:"+id, emoji:p.emoji, name:p.name, rarity:p.rarity,
    found: !!store.found["pu:"+id] || (store.powerups[id]||0)>0,
    stock: store.powerups[id]||0, info: p.emoji+" "+p.name+" — "+p.desc }; }) });
  if(cosOn()) S.push({ label:"LOOKS", items: Object.keys(COSMETICS).map(id=>{ const c=COSMETICS[id]; return {
    key:"cos:"+id, emoji:c.emoji, name:c.name, rarity:c.rarity,
    found: !!store.found["cos:"+id] || store.cosmetics.includes(id),
    worn: store.cosmetic===id, info: c.emoji+" "+c.name }; }) });
  S.push({ label:"TREASURE", items: Object.keys(CURRENCY).map(id=>{ const c=CURRENCY[id]; return {
    key:"cur:"+id, emoji:c.emoji, name:c.name, rarity:c.rarity, found: !!store.found["cur:"+id],
    info: c.emoji+" "+c.name+(c.coins? " +"+c.coins+" COINS" : " +"+c.aura+" AURA") }; }) });
  return S;
}
function drawBook(dt){

  // bucket panels: 4-across when wide (iPad), 2x2 on notch-inset phones

function bookPanel(x, y, w, h, s){
  roundedPanel(x, y, w, h, 14, "rgba(10,12,19,0.85)");
  const n = s.items.filter(i=>i.found).length, done = n>=s.items.length;
  ctx.font="800 13px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.textBaseline="middle";
  ctx.fillStyle="#8b93ad"; ctx.textAlign="left"; ctx.fillText(s.label, x+10, y+16);
  ctx.font="900 13px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle = done? "#ffd76a" : "#9ae64a"; ctx.textAlign="right";
  ctx.fillText(n+" / "+s.items.length, x+w-10, y+16);
  if(done){  // completion shimmer — gold underline (drawn mark, no ✓ glyph: iOS-safe)
    ctx.globalAlpha = 0.55+0.45*Math.sin(game.t*3);
    ctx.fillStyle="#ffd76a"; ctx.fillRect(x+10, y+26, w-20, 2); ctx.globalAlpha=1;
  }
  // tile grid autosizes so ANY v3 item count fits with no scroll (54px down to 36px)
  const cnt=s.items.length, gy=y+32, gh=h-40;
  let sz=56, per, rowsN;
  do { sz-=2; per=Math.max(1, Math.floor((w-16)/(sz+6))); rowsN=Math.ceil(cnt/per); }
  while(rowsN*(sz+8)-2 > gh && sz>36);
  const gridW2=per*(sz+6)-6, ox=x+(w-gridW2)/2;
  s.items.forEach((it,i)=> bookTile(ox+(i%per)*(sz+6), gy+((i/per)|0)*(sz+8), sz, it));
}
function bookTile(x, y, s, it){
  const col = it.gold? PRESTIGE.col : RARITY[it.rarity].col;   // 🥇 gold tile frame (v3)
  roundedPanel(x, y, s, s, 9, it.found? (it.gold? "rgba(255,225,77,0.10)" : "rgba(22,26,40,0.95)") : "rgba(8,10,16,0.9)");
  ctx.strokeStyle = it.found? col : "rgba(90,97,120,0.35)"; ctx.lineWidth = it.found? 2 : 1.5;
  ctx.beginPath(); ctx.roundRect(x+1, y+1, s-2, s-2, 8); ctx.stroke();   // rarity-colored frame (the hunt hint)
  ctx.textAlign="center"; ctx.textBaseline="middle";
  if(it.found){
    ctx.font = Math.round(s*0.5)+"px sans-serif";
    fillTextC(it.emoji, x+s/2, y+s/2 - (it.tier!=null? 3 : 0));
    if(it.tier!=null)   // upgrade depth: 5 tier pips (all lit + gold ring at 🥇 tier 6)
      for(let i=0;i<5;i++){ ctx.fillStyle = i<it.tier? (it.gold? PRESTIGE.col : RARITY[i].col) : "rgba(90,97,120,0.4)";
        ctx.beginPath(); ctx.arc(x+s/2+(i-2)*7, y+s-8, 2.4, 0, TAU); ctx.fill(); }
    if(it.stock>0){ ctx.font="800 9px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.fillStyle="#f4f6ff"; ctx.textAlign="right"; ctx.fillText("x"+it.stock, x+s-4, y+s-7); }
    if(it.worn){ ctx.fillStyle="#ffb742"; ctx.beginPath(); ctx.arc(x+6, y+6, 3, 0, TAU); ctx.fill(); }
    if(isNewItem(it.key)){  // gold NEW! corner tag, gentle bob
      const tw=27, th=12, tx=x+s-tw+4, ty=y-4+Math.sin(game.t*6);
      ctx.fillStyle="#ffd76a"; ctx.beginPath(); ctx.roundRect(tx, ty, tw, th, 6); ctx.fill();
      ctx.fillStyle="#12151f"; ctx.font="900 8px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.textAlign="center"; ctx.fillText("NEW!", tx+tw/2, ty+th/2+0.5);
    }
  } else {
    // mystery silhouette ("I can guess it!") — but top-tier items stay a pure "?" (secrets stay secret)
    if(it.rarity < RARITY.length-1){
      const px = Math.round(s*0.42), sc = silhouette(it.emoji, px);
      ctx.drawImage(sc, x+s/2-px, y+s/2-px, px*2, px*2);
    }
    ctx.font="900 "+Math.round(s*0.34)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.fillStyle=col; ctx.globalAlpha=0.5; ctx.fillText("?", x+s/2, y+s/2+1); ctx.globalAlpha=1;
  }
  hudBtns.push({x, y, w:s, h:s, act: it.found? "info:"+it.key : "info:?"});
}

/* ---------------- GARAGE SHOWROOM (v4) ----------------
   A Forza/NFS-style showroom: one hero car on a lit turntable with an animated
   Performance-Index badge + segmented stat bars, and a swipeable filmstrip below.
   The flat grid is gone. See docs/GARAGE-SHOWROOM.md. */
let shopPending = null;
const sh = { tab:"cars", sel:0, scroll:0, target:0, ptr:null, garageMode:false,
             bars:{spd:0,acc:0,hnd:0,bst:0}, pi:0, max:0,
             strip:{cx:0,y:0,h:0,step:64} };
function shopRoster(){ if(sh.garageMode) return VEHICLES.filter(v=>store.ownedCars.includes(v.id)); return sh.tab==="cars" ? VEHICLES : PETS; }
// centre the carousel on whatever's currently equipped (called on entry + tab switch)
function shopSyncSel(){
  const r = shopRoster();
  sh.max = r.length-1;                                  // keep max in step with the roster (before drawShop next frame)
  const cur = sh.tab==="cars" ? store.car : store.pet;
  let i = r.findIndex(o=>o.id===cur); if(i<0) i = 0;
  sh.sel = i; sh.scroll = i; sh.target = i;
  const cs = sh.tab==="cars" ? carStat(r[i].id) : {spd:0,acc:0,hnd:0,bst:0};
  sh.bars = {spd:cs.spd,acc:cs.acc,hnd:cs.hnd,bst:cs.bst};
  sh.pi = sh.tab==="cars" ? carPI(cs) : 0;
  shopPending = null;
}
function shopAction(a){
  if(a==="back"){ AU.ui(); sh.ptr = null; shopPending = null; sh.garageMode = false; game.state="home"; return; }
  if(a==="noop"){ AU.bonk(); return; }
  if(a==="tab:cars"||a==="tab:pets"){ AU.ui(); sh.tab = a.slice(4); shopSyncSel(); return; }
  if(a==="prev"||a==="next"){ AU.ui(); sh.sel = clamp(sh.sel + (a==="next"?1:-1), 0, sh.max); sh.target = sh.sel; shopPending = null; return; }
  if(a.startsWith("sel:")){ AU.ui(); sh.sel = clamp(+a.slice(4), 0, sh.max); sh.target = sh.sel; shopPending = null; return; }
  if(a==="num-"||a==="num+"){
    AU.ui();
    store.carNum = ((store.carNum==null?67:store.carNum) + (a==="num+"?1:99)) % 100;
    save(); return;
  }
  const kind = a.slice(0,1), id = a.slice(2);
  const item = kind==="v" ? VEHICLES.find(v=>v.id===id) : PETS.find(p=>p.id===id);
  if(!item) return;
  // can never buy an unearned reward/secret car — belt-and-suspenders with the "noop" button
  if(kind==="v" && (item.reward||item.secret) && !store.ownedCars.includes(id)){ AU.bonk(); return; }
  const owned = kind==="v" ? store.ownedCars.includes(id) : store.ownedPets.includes(id);
  if(owned){
    AU.key();
    if(kind==="v"){ store.car = id; sticker("LET'S RIDE!", "#9ae64a"); }
    else if(store.pet===id){ store.pet = null; sticker("BYE "+item.name+" 👋", "#8b93ad"); }
    else { store.pet = id; sticker(item.emoji+" "+item.name+" JOINS!", "#9ae64a"); }
    save(); return;
  }
  if(store.coinsBank < item.price){
    AU.bonk(); shopPending = null;
    sticker("NEED "+(item.price-store.coinsBank)+" MORE COINS!", "#ff8f8f");
    return;
  }
  if(shopPending && shopPending.act===a){
    shopPending = null;
    store.coinsBank -= item.price;
    if(kind==="v"){ store.ownedCars.push(id); store.car = id; }
    else { store.ownedPets.push(id); store.pet = id; }
    save();
    AU.win();
    confettiBurst(W/2, H*0.3, 80, "#ffd76a");
    sticker("UNLOCKED! "+(item.emoji||"")+" "+item.name, "#ffd76a");
  } else {
    AU.ui();
    shopPending = {act:a, t:2.5};
  }
}
// --- resolve the primary BUY/EQUIP button for the current selection ---
function shopBtnState(sel, isCars, owned, locked){
  const id = sel.id, act = locked ? "noop" : (isCars?"v:":"p:")+id;
  const equipped = isCars ? store.car===id : store.pet===id;
  let label, bg, fg = "#12151f";
  if(locked){
    const si = SERIES.findIndex(s=>s.reward===id);
    label = si>=0 ? "🔒 BEAT "+SERIES[si].name : "🔒 BEAT LEVEL "+LEVELS.length;
    bg = "rgba(60,66,86,0.92)"; fg = "#8b93ad";

// big swipeable carousel — the primary browse control. Center car is largest,
// neighbours shrink & fade with distance so it's obvious which way to swipe.
function shopStrip(r, roster, isCars){
  const step = clamp(r.w/4.2, 92, 150);
  sh.strip.step = step; sh.strip.cx = r.x + r.w/2; sh.strip.y = r.y; sh.strip.h = r.h;
  const cx0 = r.x + r.w/2, iconCy = r.y + r.h/2;
  ctx.save(); ctx.beginPath(); ctx.rect(r.x, r.y-8, r.w, r.h+16); ctx.clip();
  // draw far→near so the centred tile lands on top
  const order = roster.map((o,i)=>i).sort((a,b)=>Math.abs(b-sh.scroll)-Math.abs(a-sh.scroll));
  for(const i of order){
    const o = roster[i], off = i - sh.scroll, cx = cx0 + off*step;
    if(Math.abs(cx-cx0) > r.w/2 + step) continue;           // cull off-strip
    const prox = clamp(1 - Math.abs(off)*0.42, 0, 1);        // 1 at centre → 0 for far tiles
    const ts = 0.78 + prox*0.22;                             // centre tile biggest
    const tileW = (step-12)*ts, tileH = r.h*0.96*ts;
    const seld = i===sh.sel;
    const owned = isCars ? store.ownedCars.includes(o.id) : store.ownedPets.includes(o.id);
    const lk = isCars && (o.reward||o.secret) && !owned;
    const equipped = isCars ? store.car===o.id : store.pet===o.id;
    ctx.globalAlpha = 0.4 + prox*0.6;
    roundedPanel(cx-tileW/2, iconCy-tileH/2, tileW, tileH, 12, seld? "rgba(255,183,66,0.16)" : "rgba(16,19,30,0.85)");
    if(seld){ ctx.strokeStyle="#ffb742"; ctx.lineWidth=3; ctx.beginPath(); ctx.roundRect(cx-tileW/2+2, iconCy-tileH/2+2, tileW-4, tileH-4, 10); ctx.stroke(); }
    ctx.globalAlpha = 1;
    if(isCars){
      if(lk){ ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.globalAlpha=(0.5+prox*0.5)*0.9;
        ctx.font=(tileH*0.3)+"px sans-serif"; const si=SERIES.findIndex(s=>s.reward===o.id);
        fillTextC(si>=0? SERIES[si].emoji : "👑", cx, iconCy-tileH*0.08);
        ctx.font=(tileH*0.22)+"px sans-serif"; fillTextC("🔒", cx, iconCy+tileH*0.26); ctx.globalAlpha=1; }
      else drawVehiclePreview(o.id, cx, iconCy, clamp(tileH*0.52/42, 0.8, 3.0), 0.55+prox*0.45);
    } else {
      ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.globalAlpha=0.5+prox*0.5;
      ctx.font=(tileH*0.46)+"px sans-serif"; fillTextC(o.emoji, cx, iconCy); ctx.globalAlpha=1;
    }
    if(equipped){ ctx.fillStyle="#9ae64a"; ctx.beginPath(); ctx.arc(cx+tileW/2-9, iconCy-tileH/2+9, 4, 0, TAU); ctx.fill(); }
    hudBtns.push({x:cx-step/2, y:r.y, w:step, h:r.h, act:"sel:"+i});
  }
  ctx.restore();
}

function drawShop(dt){
  nightSky();
  hudBtns.length = 0;
  const top = 8+safeT;
  if(!store.shopGift){
    store.shopGift = true; store.coinsBank += 20; save();
    sticker("🎁 GRAND OPENING! +20 COINS", "#ffd76a");
    confettiBurst(W/2, H*0.3, 90, "#ffd76a");
    AU.win();
  }
  const roster = shopRoster();
  sh.max = roster.length-1;
  sh.sel = clamp(sh.sel, 0, sh.max);
  const isCars = sh.tab==="cars";
  const sel = roster[sh.sel];
  const owned = isCars ? store.ownedCars.includes(sel.id) : store.ownedPets.includes(sel.id);
  const locked = isCars && (sel.reward||sel.secret) && !owned;

  // ---- header: back · title · coins ----
  drawIconBtn(PADX, top, navS(), "↩️", "back");
  ctx.font = "italic 900 26px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillStyle="#ffb742";
  ctx.fillText(sh.garageMode ? "🚗 GARAGE" : "🛒 GARAGE", PADX+56, top+23);
  const bw2 = 128;
  roundedPanel(W-PADX-bw2, top, bw2, 44, 12);
  ctx.fillStyle="#e8a930"; ctx.beginPath(); ctx.arc(W-PADX-bw2+22, top+22, 9, 0, TAU); ctx.fill();
  ctx.fillStyle="#ffd76a"; ctx.beginPath(); ctx.arc(W-PADX-bw2+22, top+21, 8, 0, TAU); ctx.fill();
  ctx.font="900 21px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.fillStyle="#f4f6ff"; ctx.textAlign="left";
  ctx.fillText(store.coinsBank, W-PADX-bw2+40, top+23);
  // ---- tabs (garage mode is cars-only → hide the CARS|PETS row + reclaim its space) ----
  const land = W > H*1.2;
  const tabH = land?32:36, tabW = Math.min(land?240:300, W-2*PADX), tabX = (W-tabW)/2, tabY = top+50;
  if(!sh.garageMode){
    shopTab(tabX, tabY, tabW/2, tabH, "🏎 CARS", "tab:cars", isCars);
    shopTab(tabX+tabW/2, tabY, tabW/2, tabH, "🐾 PETS", "tab:pets", !isCars);
  }

  // ---- responsive region math: big STAGE up top, big CAROUSEL below ----
  const botSafe = safeB + 10, contentTop = tabY + (sh.garageMode?0:tabH) + 10, colBot = H - botSafe;
  const availH = colBot - contentTop;
  let stage, stripR, numR, buyR;
  if(land){
    // wide: full-width stage over a full-width carousel; number + buy share the bottom row
    const rowH = clamp(availH*0.16, 46, 58), rowY = colBot - rowH;
    let stripH = clamp(availH*0.34, 96, 156);
    // protect a minimum stage height on very short landscape (e.g. H≤320) by shrinking the carousel
    const overflow = (rowY - 20 - contentTop) - stripH - 110;
    if(overflow < 0) stripH = Math.max(56, stripH + overflow);
    const stripY = rowY - 10 - stripH;
    stage  = {x:PADX, y:contentTop, w:W-2*PADX, h:Math.max(90, stripY-10-contentTop)};
    stripR = {x:PADX, y:stripY, w:W-2*PADX, h:stripH};
    if(isCars){ const nw = clamp((W-2*PADX)*0.34, 168, 240);
      numR = {x:PADX, y:rowY, w:nw, h:rowH}; buyR = {x:PADX+nw+10, y:rowY, w:W-PADX-(PADX+nw+10), h:rowH}; }
    else { numR = {x:0,y:0,w:0,h:0}; buyR = {x:PADX, y:rowY, w:W-2*PADX, h:rowH}; }
  } else {
    // tall: stage, carousel, number, buy stacked; only the stage absorbs slack
    const CW = Math.min(W-2*PADX, 560), cx0 = (W-CW)/2, G = 10;
    const buyH = clamp(availH*0.10, 46, 60);
    const numH = isCars ? clamp(availH*0.065, 34, 44) : 0;
    const stripH = clamp(availH*0.26, 116, 176);
    const buyY = colBot - buyH, numY = numH? buyY-G-numH : buyY;
    const stripY = (numH?numY:buyY) - G - stripH;
    stage  = {x:cx0, y:contentTop, w:CW, h:Math.max(150, stripY - G - contentTop)};
    stripR = {x:cx0, y:stripY, w:CW, h:stripH};
    numR   = {x:cx0, y:numY, w:CW, h:numH};
    buyR   = {x:cx0, y:buyY, w:CW, h:buyH};
  }

  // ---- animation easing (game.t/dt already advanced before dispatch) ----
  const tb = isCars ? carStat(sel.id) : {spd:0,acc:0,hnd:0,bst:0};
  for(const k of STAT_KEYS) sh.bars[k] += (tb[k]-sh.bars[k])*Math.min(1,dt*8);
  sh.pi += ((isCars? carPI(carStat(sel.id)) : 0) - sh.pi)*Math.min(1,dt*6);
  if(!(sh.ptr && sh.ptr.moved)) sh.scroll += (sh.target - sh.scroll)*Math.min(1,dt*12);
  sh.scroll = clamp(sh.scroll, 0, sh.max);

  // ---- draw: car first, spec card overlaid on the stage, then the carousel ----
  shopHero(stage, sel, locked, isCars);
  shopSpec(stage, sel, isCars);
  shopStrip(stripR, roster, isCars);
  const ay = stripR.y + (stripR.h-44)/2;
  drawIconBtn(stripR.x-4, ay, 44, "◀", "prev");
  drawIconBtn(stripR.x+stripR.w-40, ay, 44, "▶", "next");
  if(isCars && numR.h>0) shopNumber(numR);
  const btn = shopBtnState(sel, isCars, owned, locked);
  shopBuy(buyR, btn);

  // ---- input ----
  if(shopPending){ shopPending.t -= dt; if(shopPending.t<=0) shopPending = null; }
  for(const tp of input.taps.splice(0)){
    if(tp.screen){ shopAction(btn.act); continue; }
    let hit = false;
    // walk hudBtns back-to-front so a later-drawn control (◀/▶ arrows) wins over the
    // carousel tile hit-boxes it overlaps — topmost wins, matching what the eye sees.
    for(let bi=hudBtns.length-1; bi>=0; bi--){ const b=hudBtns[bi];
      if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ shopAction(b.act); hit=true; break; } }
    if(!hit) shopPending = null;
  }
}

  // GG sticker
  ctx.rotate(-0.03);
  ctx.font = "900 italic "+(compact?54:74)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const msg = cd.msg || (cd.msg = pick(YELLS.win));
  const ggy = compact? -94 : -120;
  ctx.fillStyle = "rgba(12,14,22,0.9)"; ctx.fillText(msg, 5, ggy+5);
  ctx.fillStyle = "#ffd76a"; ctx.fillText(msg, 0, ggy);
  ctx.rotate(0.03);
  // stars pop one by one
  const ssz = compact? 0.75 : 1;
  for(let i=0;i<3;i++){
    const on = i < cd.stars && cd.t > 0.5+i*0.4;
    if(on && cd.shown<=i){ cd.shown=i+1; AU.star(i); game.shake=4; }
    const pop = on? easeOut(clamp((cd.t-(0.5+i*0.4))/0.25,0,1)) : 1;
    ctx.font = Math.round((on? 62*pop : 54)*ssz)+"px sans-serif";
    ctx.globalAlpha = (on?1:0.18)*inT;
    fillTextC("⭐", (i-1)*78*ssz, compact? -30 : -38);
  }
  ctx.globalAlpha = inT;
  // stats chips
  ctx.font = "800 "+(compact?18:21)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  const chips = [
    ["● "+(cd.coop? cd.coins : game.car.coins)+"/"+game.coinsAll+" COINS", cd.allCoins?"#9ae64a":"#ffd76a"],
    ["⏱ "+cd.time.toFixed(1)+"s"+(cd.timeOk?"  ⚡FAST":""), cd.timeOk?"#9ae64a":"#f4f6ff"],
    ["✦ +"+cd.aura+" AURA", "#ffd76a"],
  ];
  if(cd.unlock) chips.push([cd.unlock, "#ffd76a"]);
  chips.forEach((ch,i)=>{
    const y = chipStart+i*chipStep;
    roundedPanel(-panW*0.32, y-16, panW*0.64, compact?32:36, 12, "rgba(20,24,36,0.92)");
    ctx.fillStyle = ch[1]; ctx.textAlign="center";
    fillTextC(ch[0], 0, y+1);
  });
  ctx.restore();
  // buttons — always below the chips, always on screen
  if(cd.t>1.2){
    const bw = 168, bh = compact? 54 : 62, gap = 18;
    const bx1 = W/2-bw-gap/2, bx2 = W/2+gap/2;
    const by = Math.min(py + chipStart + chips.length*chipStep + 12, H - bh - 12 - safeB);
    hudBtns.length = 0;
    if(game.fromBuilder){
      drawBigBtn(bx1, by, bw, bh, "🔨 GARAGE", "garage", "rgba(60,66,86,0.95)", "#f4f6ff");
      drawBigBtn(bx2, by, bw, bh, "↻ AGAIN", "retry", game.lv.hue, "#12151f");
    } else if(game.customId){
      drawBigBtn(bx1, by, bw, bh, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
      drawBigBtn(bx2, by, bw, bh, "↻ AGAIN", "retry", game.lv.hue, "#12151f");
    } else if(cd.coop){
      drawBigBtn(bx1, by, bw, bh, "🤝 CO-OP", "coopmap", "rgba(60,66,86,0.95)", "#f4f6ff");
      if(game._coopLast) drawBigBtn(bx2, by, bw, bh, "🏆 DONE!", "coopmap", "#ffd76a", "#12151f");
      else drawBigBtn(bx2, by, bw, bh, "NEXT ▶", "coopnext", game.lv.hue, "#12151f");
    } else {
      drawBigBtn(bx1, by, bw, bh, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
      if(game._seriesEnd) drawBigBtn(bx2, by, bw, bh, "🏆 WORLD", "world", "#ffd76a", "#12151f");
      else drawBigBtn(bx2, by, bw, bh, "NEXT ▶", "next", game.lv.hue, "#12151f");
    }
    const doAct = act => {
      AU.ui();
      if(act==="next") loadLevel(game.levelIx+1);
      else if(act==="coopnext") startCoop(game.coopIx+1);
      else if(act==="coopmap") game.state="cooppick";
      else if(act==="world") game.state="series";
      else if(act==="garage") game.state="build";
      else if(act==="retry") loadCustom(game.sourceCustom, game.fromBuilder? "builder":"map");
      else game.state="map";
    };
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ doAct(game.fromBuilder? "garage" : game.customId? "map" : cd.coop? (game._coopLast?"coopmap":"coopnext") : (game._seriesEnd? "world":"next")); return; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ doAct(b.act); return; }
    }
  } else input.taps.length = 0;
}
function drawBigBtn(x,y,w,h,label,act,bg,fg,fontPx){
  ctx.fillStyle = "rgba(12,14,22,0.9)";
  ctx.beginPath(); ctx.roundRect(x+4,y+4,w,h,16); ctx.fill();
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,16); ctx.fill();
  ctx.fillStyle = fg;
  ctx.font = "900 "+(fontPx||25)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textBaseline="middle";
  fillTextC(label, x+w/2, y+h/2+1);          // center-safe (emoji labels shift on iOS with textAlign=center)
  hudBtns.push({x,y,w,h,act});
}
// smooth winding "racetrack" path through the level nodes (rounded corners)
function traceTrack(pts){
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for(let i=0;i<pts.length-1;i++){
    const [x0,y0]=pts[i], [x1,y1]=pts[i+1];
    ctx.quadraticCurveTo(x0, y0, (x0+x1)/2, (y0+y1)/2);   // node = control point, midpoints on-curve
  }
  const L=pts[pts.length-1]; ctx.lineTo(L[0], L[1]);
}

function drawCooked(dt){
  drawWorld(0.0001);
  ctx.fillStyle = "rgba(8,10,16,0.72)"; ctx.fillRect(0,0,W,H);
  game.cookedT += dt;
  const inT = easeOut(clamp(game.cookedT/0.3,0,1));
  ctx.save();
  ctx.translate(W/2, H*0.34 + (1-inT)*50);
  ctx.globalAlpha = inT;
  ctx.rotate(-0.03);
  ctx.font = "italic 900 60px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = "rgba(12,14,22,0.9)"; fillTextC("HE BEAT YOU! 💀", 5, 5);
  ctx.fillStyle = "#ff8fe0"; fillTextC("HE BEAT YOU! 💀", 0, 0);
  ctx.font = "800 20px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle = "#8b93ad";
  ctx.fillText("the goober is doing donuts on the finish line", 0, 54);
  ctx.restore();
  ctx.globalAlpha = 1;
  if(game.cookedT > 0.8){
    hudBtns.length = 0;
    drawBigBtn(W/2-178, H*0.58, 170, 62, "REMATCH ▶", "retry", "#9ae64a", "#12151f");
    drawBigBtn(W/2+8,   H*0.58, 170, 62, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ AU.ui(); loadLevel(game.levelIx); return; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="retry") loadLevel(game.levelIx); else game.state="map";
        return;
      }
    }
  } else input.taps.length = 0;
}

let paused = false;
function togglePause(){ if(game.state==="play"){ paused=!paused; AU.ui(); } }
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden && game.state==="play") paused = true;
  if(!document.hidden){ AU.resume(); if(syncEnabled()) syncNow("resume"); }   // ☁️ pull latest when the kid comes back / hops devices
});

/* ---------------- 📲 Add-to-Home-Screen coach (PWA install nudge — roadmap item 10) ---------------- */
// A dismissible tutorial banner that nudges players to install the game to their
// home screen (so it opens full-screen like a real app). Platform-aware:
//   • iOS/iPadOS Safari has NO install API → show manual "tap Share → Add to Home Screen"
//   • Android/desktop Chromium → capture beforeinstallprompt, offer a real ADD button
// Rules: NEVER shown once already launched from the home screen (standalone); an ✕
// dismisses it for good (remembered); auto-hidden during an active race so it can't
// cover the controls. a2hsMenu() is called each frame from the render loop.
let _a2hsEl = null, _a2hsActive = false, _a2hsMenuLast = null;
function a2hsMenu(onMenu){                       // show on menus, hide during play — DOM touched only on change
  if(!_a2hsActive || !_a2hsEl) return;
  if(_a2hsMenuLast === onMenu) return;
  _a2hsMenuLast = onMenu;
  _a2hsEl.style.display = onMenu ? "flex" : "none";
}
(function a2hsCoach(){
  const standalone = window.navigator.standalone === true
      || matchMedia("(display-mode: standalone)").matches
      || matchMedia("(display-mode: fullscreen)").matches;
  if(standalone) return;                                                   // already installed → never nag
  try { if(localStorage.getItem("tmA2HS") === "off") return; } catch(e){}  // dismissed before → stay gone

  const ua = navigator.userAgent || "";
  const isIOS = /iphone|ipad|ipod/i.test(ua) || (/macintosh/i.test(ua) && navigator.maxTouchPoints > 1);  // iPadOS reports as "Macintosh"
  const touch = navigator.maxTouchPoints > 0 || matchMedia("(pointer: coarse)").matches;
  let deferred = null;
  const SHARE = '<svg width="15" height="17" viewBox="0 0 24 26" fill="none" stroke="#7ec9ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M12 2v14"/><path d="M8 6l4-4 4 4"/><path d="M6 11H4v13a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V11h-2"/></svg>';

  function show(mode){
    if(_a2hsEl) return;
    const el = document.createElement("div"); el.id = "a2hs";
    const x = '<button class="a2-x" aria-label="Not now">×</button>';
    if(mode === "prompt")
      el.innerHTML = '<span class="a2-ico">📲</span><span class="a2-txt">Add <b>TURBO MAZE</b> to your home screen — play full-screen, like an app!</span><button class="a2-add">ADD</button>' + x;
    else if(mode === "ios")
      el.innerHTML = '<span class="a2-ico">📲</span><span class="a2-txt">Play full-screen! Tap ' + SHARE + ' below, then <b>Add to Home Screen</b>.</span>' + x;
    else
      el.innerHTML = '<span class="a2-ico">📲</span><span class="a2-txt">Add <b>TURBO MAZE</b> to your home screen from your browser menu to play like an app.</span>' + x;
    document.body.appendChild(el);
    _a2hsEl = el; _a2hsActive = true; _a2hsMenuLast = null;
    el.addEventListener("pointerdown", e => e.stopPropagation());          // don't leak taps to the canvas
    el.querySelector(".a2-x").addEventListener("click", () => dismiss(true));
    const add = el.querySelector(".a2-add");
    if(add) add.addEventListener("click", async () => {
      if(deferred){ deferred.prompt(); try { await deferred.userChoice; } catch(e){} deferred = null; }
      dismiss(true);
    });
  }
  function dismiss(remember){
    _a2hsActive = false;
    if(remember){ try { localStorage.setItem("tmA2HS", "off"); } catch(e){} }
    if(_a2hsEl){ _a2hsEl.remove(); _a2hsEl = null; }
  }

  window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferred = e; });  // Chromium: a real install offer
  window.addEventListener("appinstalled", () => dismiss(true));

  setTimeout(() => {                                     // let the game paint first, then nudge
    if(_a2hsEl) return;
    if(deferred) show("prompt");
    else if(touch && isIOS) show("ios");
    else if(touch) show("generic");
    // desktop with no install support: skip — "add to home screen" doesn't apply
  }, 2800);

  window.__a2hs = show;   // 🔧 QA: __a2hs("ios"|"prompt"|"generic") to preview a variant on any device
})();

/* ---------------- main loop ---------------- */
let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  tick(now);
}
function tick(now){
  const dt = Math.max(0, Math.min(0.05, (now-last)/1000)); last = now;
  game.t += dt;
  if(!CONFIG.cratesEnabled && game.state==="crates") game.state="home";   // 🎁 master off → never strand on the dead crates screen
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  a2hsMenu(!(game.state==="play" && !paused));   // 📲 hide the install nudge during an active race
  // tablet held upright → ask for landscape (menus only, never mid-game)
  const portraitHint = input.hasTouch && H > W*1.15 && (game.state==="title" || game.state==="map" || game.state==="series" || game.state==="home" || game.state==="cooppick");
  if(portraitHint) input.taps.length = 0;

  if(game.state==="title"){ drawTitle(dt); }
  else if(game.state==="series"){ drawSeries(); updateStickers(dt); drawStickers(); }
  else if(game.state==="home"){ drawHome(); updateStickers(dt); drawStickers(); }
  else if(game.state==="sync"){ drawSync(); updateStickers(dt); drawStickers(); }
  else if(game.state==="map"){ drawMap(); updateStickers(dt); drawStickers(); }
  else if(game.state==="build"){ drawBuild(dt); updateStickers(dt); drawStickers(); }
  else if(game.state==="shop"){ updateFx(dt); drawShop(dt); drawConfettiScreen(); drawStickers(); }
  else if(game.state==="crates"){ updateFx(dt); drawCrates(dt); drawConfettiScreen(); drawStickers(); }
  else if(game.state==="vspick"){ drawVsPick(); updateStickers(dt); drawStickers(); }
  else if(game.state==="cooppick"){ drawCoopMap(); updateStickers(dt); drawStickers(); }
  else if(game.state==="vsend"){ updateFx(dt); drawVsEnd(dt); }
  else if(game.state==="koend"){ updateFx(dt); drawKoEnd(dt); }
  else if(game.state==="clear"){ updateFx(dt); drawClear(dt); drawStickers(); }
  else if(game.state==="cooked"){ updateFx(dt); drawCooked(dt); }
  else if(game.state==="play"){
    hudBtns.length = 0;
    if(!paused){
      readInput();
      if(game.count>0){
        const prev = Math.ceil(game.count);
        game.count = Math.max(0, game.count-dt);
        const cur2 = Math.ceil(game.count);
        if(cur2!==prev){
          AU.beep(cur2>0? 440 : 880, 0.2, "square", 0.15);
          if(cur2===0) sticker("GO!!", "#9ae64a");
        }
      } else {
        const gdt = game.slowmo>0 ? dt*0.45 : dt;   // ⏱️ slow-mo scales gameplay time (crushers use game.gt)
        if(game.slowmo>0) game.slowmo -= dt;
        game.gt = (game.gt||0) + gdt;
        game.playT += gdt;
        updateCar(game.car, {vec:input.vec, nitro:input.nitro, main:true}, gdt);
        if(game.car2){
          updateCar(game.car2, {vec:input.vec2, nitro:false}, gdt);
          carBump(game.car, game.car2);
        }
        updateEntities(gdt);
      }
      updateFx(dt);
    }
    if(game.state==="play" || game.state==="clear"){  // levelClear may fire mid-update
      drawWorld(paused?0.0001:dt);
      if(game.state==="play"){ drawHUD(); drawConfettiScreen(); if(game.goldReveal) drawGoldReveal(dt); drawStickers(); }
    }
    if(paused && game.state==="play"){
      ctx.fillStyle = "rgba(8,10,16,0.6)"; ctx.fillRect(0,0,W,H);
      ctx.font = "900 italic 54px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.fillStyle="#f4f6ff"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("PAUSED", W/2, H*0.28);
      hudBtns.length = 0;
      // 🧭 a real pause MENU — big stacked buttons, incl. the way home (was just GO + MAP)
      const pw = Math.min(400, W*0.72), ph2 = clamp(Math.round(H*0.105), 54, 68), pgap = 14;
      let py2 = H*0.38;
      drawBigBtn(W/2-pw/2, py2, pw, ph2, "▶ KEEP RACING", "resume", "#9ae64a", "#12151f"); py2 += ph2+pgap;
      drawBigBtn(W/2-pw/2, py2, pw, ph2, game.fromBuilder? "🔨 BACK TO GARAGE" : game.coop? "🤝 CO-OP MAP" : (game.vs||game.ko)? "⚔️ ARENA PICK" : "🗺 LEVEL MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff"); py2 += ph2+pgap;
      drawBigBtn(W/2-pw/2, py2, pw, ph2, "🏠 MAIN MENU", "home", "#ffd76a", "#12151f"); py2 += ph2+pgap;
      if(syncEnabled()){   // ☁️ your code, findable right here — little text, tap to manage
        const cy = py2+12;
        ctx.textAlign="center"; ctx.textBaseline="alphabetic";
        ctx.font="800 12px system-ui,sans-serif"; ctx.fillStyle="#7f8aa8";
        ctx.fillText("☁️ CLOUD CODE — TAP TO MANAGE", W/2, cy);
        ctx.font="900 15px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.fillStyle="#9ae6ff";
        ctx.fillText((store.syncCode||"").toUpperCase().replace(/-/g," · "), W/2, cy+20);
        hudBtns.push({x:W/2-150, y:cy-16, w:300, h:44, act:"sync"});
      }
    }
    // HUD button taps
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ if(paused){ paused=false; AU.ui(); } continue; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="mute") AU.toggleMute();
        if(b.act==="pause") togglePause();
        if(b.act==="resume") paused=false;
        if(b.act==="map"){ paused=false; game.state = game.fromBuilder? "build" : game.coop? "cooppick" : (game.vs||game.ko)? "vspick" : "map"; }
        if(b.act==="home"){ paused=false; game.state = "home"; }   // 🏠 straight to the main dashboard
        if(b.act==="sync"){ paused=false; game.state = "sync"; }    // ☁️ manage your cloud code
      }
    }
  }
  // soft vignette
  if(!game._vig || game._vigW!==W || game._vigH!==H){
    game._vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.45, W/2,H/2, Math.max(W,H)*0.75);
    game._vig.addColorStop(0,"rgba(8,10,16,0)");
    game._vig.addColorStop(1,"rgba(8,10,16,0.42)");
    game._vigW=W; game._vigH=H;
  }
  ctx.fillStyle = game._vig; ctx.fillRect(0,0,W,H);
  if(portraitHint){
    ctx.fillStyle = "rgba(8,10,16,0.88)"; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(W/2, H*0.42); ctx.rotate(-Math.PI/2 + Math.sin(game.t*2.2)*0.25);
    ctx.font = "72px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    fillTextC("📱", 0, 0); ctx.restore();
    ctx.font = "900 30px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.fillStyle = "#f4f6ff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("TURN IT SIDEWAYS!", W/2, H*0.42+86);
  }
  AU.musicEnsure(musicMode());   // 🎵 keep the right procedural loop running for the current screen (self-guards + no-ops)
}
// a shared track arrived by link? add it to the garage
(function importFromHash(){
  const m = location.hash.match(/^#T=(.+)$/);
  if(!m) return;
  const t = decodeTrack(m[1]);
  history.replaceState(null, "", location.pathname + location.search);
  if(!t) return;
  const gs = t.grid.join("!");
  let cl = store.customLevels.find(c=>c.grid.join("!")===gs);
  if(!cl){
    if(store.customLevels.length>=10) return;
    store.nextTrackId = (store.nextTrackId||0)+1;
    cl = { id:store.nextTrackId, name:t.name, emojiIx:t.emojiIx, hueIx:t.hueIx, grid:t.grid };
    store.customLevels.push(cl); save();
  }
  game.importedTrack = cl;
  game.state = "home";   // chips live on the landing page
  sticker("NEW TRACK ARRIVED! 📦", "#ffd76a");
})();

requestAnimationFrame(frame);

// ☁️ pull cloud progress on boot (no-op until a Worker URL is wired in)
if(syncEnabled()){ syncNow("open"); }   // syncNow() calls ensureSyncCode() itself

// debug handle (safe to ignore)
window.__tm = { game, loadLevel, loadCustom, store, CONFIG, CRATES, spawnGolden, grabGolden, bl, enterBuilder, encodeTrack, decodeTrack,
  shopAction, VEHICLES, PETS, LEVELS, VS_ARENAS, startVs, customToLevel,
  SERIES, seriesUnlocked, seriesBeaten, seriesOf, save,
  COOP_LEVELS, startCoop, KO_ARENAS, startKo,
  AU, ghostEnc, ghostDec, ghostAt, ghostEligible, musicMode,   // 🎵/👻 test hooks
  sh, shopRoster, hudBtns, input,                              // 🚗 garage/showroom test hooks
  sync, syncNow, syncMerge, syncEnabled, syncUrl, ensureSyncCode, genCode, applyRemote,   // ☁️ cloud-sync test hooks
  step(sec){ paused = false; let n = last; for(let i=0;i<sec*60;i++){ n += 1000/60; tick(n); } last = performance.now(); } };
</script>
