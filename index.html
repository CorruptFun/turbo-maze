/* ==================================================================
   🔀 MAZE VARIETY — mirror/rotate later-world & co-op mazes at load so
   the start & finish land in fresh corners (not always top-left →
   bottom-right). Deterministic per level (stable on replay). World 1 and
   co-op Season 1 stay the standard diagonal on-ramp. Toggle: CONFIG.mazeVariety.
   A mirror/rotate is an isometry — PATH LENGTH is preserved, so every
   level stays solvable and its par/star balance is unchanged.
   ================================================================== */
function varietyKey(seed){ return (seed*3) % 4; }   // 0 = none · 1 = H-flip · 2 = V-flip · 3 = 180° (deterministic spread)
function swapDirs(str, h, v){                        // flip conveyor arrows so they still push the mirrored way
  let out = "";
  for(const ch of str){
    let c = ch;
    if(h){ if(c==="<") c=">"; else if(c===">") c="<"; }
    if(v){ if(c==="^") c="v"; else if(c==="v") c="^"; }
    out += c;
  }
  return out;
}
function transformLevel(L, key){
  const h = (key===1||key===3), v = (key===2||key===3);
  const R = L.grid.length, C = L.grid[0].length;
  let grid = L.grid.map(row => swapDirs(row, h, v));
  if(h) grid = grid.map(row => [...row].reverse().join(""));
  if(v) grid = grid.reverse();
  const mapC = c => h ? C-1-c : c, mapR = r => v ? R-1-r : r;
  const out = Object.assign({}, L, {grid});
  if(L.crushers) out.crushers = L.crushers.map(k => Object.assign({}, k,     // origin + slide direction reflect
    { c:mapC(k.c), r:mapR(k.r), dx: h? -(k.dx||0) : (k.dx||0), dy: v? -(k.dy||0) : (k.dy||0) }));
  if(L.asteroids) out.asteroids = L.asteroids.map(a => Object.assign({}, a,  // ☄️ drift origin + direction reflect
    { c:mapC(a.c), r:mapR(a.r), dx: h? -(a.dx||0):(a.dx||0), dy: v? -(a.dy||0):(a.dy||0) }));
  if(L.hazards)  out.hazards  = L.hazards.map(hz => Object.assign({}, hz,    // sliding-bar patrol waypoints reflect
    { path: hz.path.map(([c,r]) => [mapC(c), mapR(r)]) }));
  if(L.seq)      out.seq      = L.seq.map(([c,r]) => [mapC(c), mapR(r)]);    // co-op sequence-pad order reflects
  return out;
}
function varyMaze(L, meta){
  if(!CONFIG.mazeVariety || !L || !L.grid) return L;
  let key = 0;
  if(meta.ix!==undefined && seriesOf(meta.ix) >= 1)  key = varietyKey(meta.ix);              // campaign World 2+
  else if(meta.coop && (meta.coopIx||0) >= 15)       key = varietyKey(1000 + meta.coopIx);   // co-op Season 2+
  return key ? transformLevel(L, key) : L;
}
/* 🔒 gateFinish — on a key+door level, make the finish reachable ONLY through a door,
   so the key can't be skipped (some levels were authored with an open bypass around
   the lock). Verified per level: key reachable BEFORE any door, finish reachable with
   doors OPEN, finish UNREACHABLE with doors closed. If it can't seal safely it leaves
   the level as-is (the finish-needs-key check in updateEntities is the backstop). */
function gateFinish(L){
  if(!L || !L.grid) return L;
  const rows = L.grid.map(r=>r.split("")), R=rows.length, C=rows[0].length, key=(c,r)=>c+","+r;
  let K=null,S=null; const Fs=[],doors=[];
  for(let r=0;r<R;r++) for(let c=0;c<C;c++){ const ch=rows[r][c];
    if(ch==="F")Fs.push([c,r]); else if(ch==="k")K=[c,r]; else if(ch==="S")S=[c,r]; else if(ch==="D")doors.push([c,r]); }
  if(!Fs.length || !doors.length || !K || !S) return L;                 // only real key+door levels
  const Fset=new Set(Fs.map(f=>key(f[0],f[1]))), dset0=new Set(doors.map(d=>key(d[0],d[1])));
  const reach=(from,to,sim,blocked)=>{ const seen=new Set([key(from[0],from[1])]), q=[[from[0],from[1]]];
    while(q.length){ const [c,r]=q.shift(); if(c===to[0]&&r===to[1]) return true;
      for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nr<0||nc>=C||nr>=R||sim[nr][nc]==="#") continue;
        if(blocked && blocked(key(nc,nr))) continue; const k=key(nc,nr); if(!seen.has(k)){ seen.add(k); q.push([nc,nr]); } } } return false; };
  if(!reach(S,Fs[0],rows,cr=>dset0.has(cr))) return L;                  // finish already gated → leave it
  const openings=[], seen=new Set();
  for(const [fc,fr] of Fs) for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nc=fc+dc,nr=fr+dr,k=key(nc,nr);
    if(nc<0||nr<0||nc>=C||nr>=R||Fset.has(k)||seen.has(k)) continue; const ch=rows[nr][nc];
    if(ch==="."||ch==="x"){ openings.push([nc,nr]); seen.add(k); } }                    // road/crate cells bordering the finish
  const configs=[{e:null}, ...openings.map(o=>({e:o}))];                // use an existing adjacent door, or turn one opening into a door
  for(const cfg of configs){ const sim=rows.map(row=>row.slice()), dSet=new Set(dset0);
    for(const [c,r] of openings){ if(cfg.e && c===cfg.e[0] && r===cfg.e[1]){ sim[r][c]="D"; dSet.add(key(c,r)); } else sim[r][c]="#"; }
    const closed=cr=>dSet.has(cr);
    if(reach(S,K,sim,closed) && reach(S,Fs[0],sim,null) && !reach(S,Fs[0],sim,closed))
      return Object.assign({}, L, {grid: sim.map(r=>r.join(""))}); }
  return L;                                                             // no safe seal → leave as-is (backstop covers it)
}
function startLevel(L, meta){
  L = varyMaze(L, meta);        // 🔀 mirror/rotate later-world & co-op mazes for start/finish variety
  if(meta.ix!==undefined) L = gateFinish(L);   // 🔒 campaign: seal the finish behind the locked door (no key-skip)
  game.levelIx = (meta.ix!==undefined)? meta.ix : -1;
  game.customId = meta.customId || null;
  game.fromBuilder = meta.from === "builder";
  game.lv = L;
  const g = L.grid;
  game.rows = g.length; game.cols = g[0].length;
  game.solid = []; game.road = []; game.coins=[]; game.pads=[]; game.gates=[]; game.doors=[]; game.goobers=[]; game.key=null;
  game.slick = []; game.portals = []; game.crates = []; game.sticky = [];
  game.gold = null; game.goldReveal = null;   // 🎁 v2: golden crate + its reveal banner (cleared every load, all modes)
  game.plates2 = []; game.coopGates = [];
  game.shiftWalls = []; game.shiftSol = [0,0]; game.shiftT = 0;
  game.zaps = []; game.traps = []; game.trapWalls = []; game.trapT = 0;   // VS battle: pickups + trap walls
  game.koZones = [];                                                      // knockout: hazard cells ("!")
  game.seqPads = []; game.seqNext = 0; game.seqDone = false;              // co-op: button sequence puzzle
  game.conveyors = []; game.trapDoors = []; game.crushers = [];           // environmental hazards
  game.bounces = []; game.crumbles = [];                                  // 🌊 World 5: splash pads + foam floats
  game.wells = []; game.voids = []; game.rings = []; game.asteroids = []; // 🌌 World 6: gravity wells / chasms / launch rings / space rocks
  game.voidCell = [];   // 2D void mask, built per-row alongside game.solid
  game.hasKey=false; game.playT=0; game.bonks=0;
  game.vs = !!(meta && meta.vs);
  game.coop = !!(meta && meta.coop);
  game.ko = !!(meta && meta.ko);
  game.lowG = !!(game.lv && game.lv.lowG) ||
              (game.levelIx>=0 && !game.customId && seriesOf(game.levelIx)===5);   // 🌠 W6 world-wide float
  game.coopIx = (meta && meta.coopIx!==undefined)? meta.coopIx : -1;
  const twoP = game.vs || game.coop || game.ko;
  game.count = twoP? 3.999 : 0;
  game.parts=[]; game.floats=[]; game.stickers=[]; game.confetti=[]; game.hintT=0;
  let sx=1, sy=1, fx=1, fy=1, p2x=0, p2y=0, p2c=1, p2r=1;
  for(let r=0;r<game.rows;r++){
    game.solid[r]=[]; game.slick[r]=[]; game.sticky[r]=[]; game.voidCell[r]=[];
    for(let c=0;c<game.cols;c++){
      const ch = g[r][c]||"#";
      const wall = ch==="#" || ch==="@";   // 🪐 planet core collides like a wall — bump, never die
      game.solid[r][c] = wall?1:0;
      game.slick[r][c] = ch==="~"?1:0;
      game.sticky[r][c] = ch==="&"?1:0;                             // 🟣 sticky shallows (inverse of ice)
      game.voidCell[r][c] = ch==="V" ? 1 : 0;                       // 🕳️ open-space chasm mask
      if(!wall && ch!=="V") game.road.push([c,r]);   // 🕳️ void is not drivable "road" (no coins/overlays in the gap)
      const wx=(c+0.5)*CELL, wy=(r+0.5)*CELL;
      if(ch==="S"){ sx=wx; sy=wy; game.startCell=[c,r]; }
      if(ch==="2" && !p2x){ p2x=wx; p2y=wy; p2c=c; p2r=r; }
      if(ch==="F"){ fx=wx; fy=wy; game.finish={c,r,x:wx,y:wy}; }
      if(ch==="c") game.coins.push({x:wx,y:wy,got:false,ph:Math.random()*TAU});
      if(ch==="n") game.coins.push({x:wx,y:wy,got:false,ph:Math.random()*TAU,nitro:true});
      if(ch==="*") game.pads.push({c,r,x:wx,y:wy});
      if(ch==="G") game.gates.push({c,r,x:wx,y:wy,ph:(c+r)%2?0:Math.PI,open:1});
      if(ch==="D") game.doors.push({c,r,x:wx,y:wy,anim:0});
      if(ch==="k") game.key={x:wx,y:wy,got:false};
      if(ch==="T") game.portals.push({c,r,x:wx,y:wy,cool:0});
      if(ch==="x") game.crates.push({c,r,x:wx,y:wy,broken:false});
      if(ch==="P") game.plates2.push({c,r,x:wx,y:wy,lit:0});         // co-op pressure plate
      if(ch==="Q") game.coopGates.push({c,r,x:wx,y:wy,open:0});      // co-op gate: open while any plate held
      if(ch==="M") game.shiftWalls.push({c,r,grp:0});               // shifting wall — set A
      if(ch==="N") game.shiftWalls.push({c,r,grp:1});               // shifting wall — set B (anti-phase to A)
      if(ch==="z") game.zaps.push({c,r,x:wx,y:wy,active:true,cool:0,ph:Math.random()*TAU}); // VS zap pickup
      if(ch==="B") game.traps.push({c,r,x:wx,y:wy,cool:0});         // VS trap trigger button
      if(ch==="w") game.trapWalls.push({c,r,x:wx,y:wy,closed:0});   // VS trap wall (slams shut when triggered)
      if(ch==="!") game.koZones.push({c,r,x:wx,y:wy,ph:Math.random()*TAU}); // knockout hazard pit
      if(ch==="o") game.seqPads.push({c,r,x:wx,y:wy,num:0,lit:0});   // co-op sequence pad (order set by L.seq)
      if(ch==="<") game.conveyors.push({c,r,x:wx,y:wy,dx:-1,dy:0});  // conveyor floors — shove the car
      if(ch===">") game.conveyors.push({c,r,x:wx,y:wy,dx:1,dy:0});
      if(ch==="^") game.conveyors.push({c,r,x:wx,y:wy,dx:0,dy:-1});
      if(ch==="v") game.conveyors.push({c,r,x:wx,y:wy,dx:0,dy:1});
      if(ch==="O") game.trapDoors.push({c,r,x:wx,y:wy,ph:Math.random()*TAU}); // trap door — fall through & respawn
      if(ch==="J") game.bounces.push({c,r,x:wx,y:wy,ph:Math.random()*TAU,cool:0});          // 🟠 splash / bounce pad
      if(ch==="%") game.crumbles.push({c,r,x:wx,y:wy,state:"intact",t0:0,ph:Math.random()*TAU}); // 🧱 foam float
      if(ch==="@") game.wells.push({c,r,x:wx,y:wy,ph:Math.random()*TAU});                 // 🪐 well (core solidified above)
      if(ch==="0") game.portals.push({c,r,x:wx,y:wy,cool:0,bh:true});                     // 🕳️ black-hole wormhole end
      if(ch==="V") game.voids.push({c,r,x:wx,y:wy,ph:Math.random()*TAU});                 // 🕳️ chasm
      if(ch==="U") game.rings.push({c,r,x:wx,y:wy,cool:0,ph:Math.random()*TAU});          // 🚀 launch ring
    }
  }
  game.portals.length = Math.min(2, game.portals.length);   // exactly one pair
  // doors + closed gates are solid until opened (handled in isSolid)
  game.coinsAll = game.coins.filter(c=>!c.nitro).length;
  // face the car toward open road
  let head = 0;
  const [sc,sr] = game.startCell;
  if(!isWallCell(sc+1,sr) || !isWallCell(sc+2,sr)) head = 0;
  else if(!isWallCell(sc,sr+1)) head = Math.PI/2;
  game.car = newCar(sx, sy, head);
  game.car.spawn = {x:sx, y:sy, h:head};       // trap-door / respawn point
  game.car2 = null;
  if(twoP){
    const p2head = !isWallCell(p2c-1,p2r) ? Math.PI : -Math.PI/2;
    game.car2 = newCar(p2x||sx, p2y||sy, p2x? p2head : head);
    game.car2.p2 = true;
    game.car2.spawn = {x:p2x||sx, y:p2y||sy, h:p2head};
  }
  // sliding crushers (hand-authored via L.crushers:[{c,r,dx,dy,range,period,phase}])
  (L.crushers||[]).forEach(cr=> game.crushers.push({
    c:cr.c, r:cr.r, dx:cr.dx||0, dy:cr.dy||0, range:cr.range||3,
    period:cr.period||2.6, phase:cr.phase||0, cc:cr.c, cr:cr.r }));
  // ☄️ soft drifting asteroids (hand-authored via L.asteroids:[{c,r,dx,dy,range,period,phase,size}])
  (L.asteroids||[]).forEach(a=> game.asteroids.push({
    c:a.c, r:a.r, dx:a.dx||0, dy:a.dy||0, range:a.range||3,
    period:(CONFIG.easyMode? (a.period||3.6)*1.25 : (a.period||3.6)),
    phase:a.phase||0, size:a.size||1, off:0,
    x:(a.c+0.5)*CELL, y:(a.r+0.5)*CELL,
    spin:Math.random()*TAU, spv:(Math.random()<0.5?-1:1)*(0.5+Math.random()*0.6) }));
  if(game.coop){
    game.car.home=false; if(game.car2) game.car2.home=false;
    game.car.spawn = {x:sx, y:sy, h:head};
    if(game.car2) game.car2.spawn = {x:p2x||sx, y:p2y||sy, h:game.car2.heading};
    // number the sequence pads: reading order (top→bottom, left→right) unless the level overrides
    if(L.seq){ (L.seq||[]).forEach(([sc2,sr2],ix)=>{ const pad = game.seqPads.find(p=>p.c===sc2 && p.r===sr2); if(pad) pad.num = ix+1; }); }
    else game.seqPads.forEach((p,ix)=> p.num = ix+1);
    game.seqLen = game.seqPads.length;
  }
  if(game.ko){                                   // knockout: 3 lives each, remember spawn points
    game.car.lives = 3;  game.car.spawn = {x:sx, y:sy, h:head};
    if(game.car2){ game.car2.lives = 3; game.car2.spawn = {x:p2x||sx, y:p2y||sy, h:game.car2.heading}; }
  }
  game.cars = game.car2 ? [game.car, game.car2] : [game.car];
  game.pet = { x:sx, y:sy };
  game.cam.x = sx; game.cam.y = sy;
  (L.hazards||[]).forEach(h=>{
    game.goobers.push({ path:h.path.map(p=>[(p[0]+0.5)*CELL,(p[1]+0.5)*CELL]),
      seg:0, x:(h.path[0][0]+0.5)*CELL, y:(h.path[0][1]+0.5)*CELL,
      speed:(CONFIG.easyMode? h.speed*0.7 : h.speed), ph:Math.random()*TAU });
  });
  // boss race: the goober drives his own car, start to finish
  game.rival = null;
  if(L.rival){
    const trapAvoid = new Set(game.trapDoors.map(t=>t.c+","+t.r));                          // a good driver routes around the hatches
    for(const cm of game.crumbles) trapAvoid.add(cm.c+","+cm.r);                            // 🧱 rival routes around foam floats too
    for(const p of game.portals) if(p.bh) trapAvoid.add(p.c+","+p.r);                       // 🕳️ boss routes around black holes (no pull, no warp)
    let path = bfsPathCells(game.startCell, [game.finish.c, game.finish.r], trapAvoid);
    if(path.length<=1) path = bfsPathCells(game.startCell, [game.finish.c, game.finish.r]);  // trap door unavoidable → take the normal path
    const rivalUfo = !!(L.rival && L.rival.ufo) ||
      (game.levelIx>=0 && !game.customId && seriesOf(game.levelIx)===5);                    // 🛸 W6 boss drives the saucer
    game.rival = { wp: path.map(([c,r])=>[(c+0.5)*CELL,(r+0.5)*CELL]),
      i:0, x:(game.startCell[0]+0.5)*CELL, y:(game.startCell[1]+0.5)*CELL,
      a:head, speed:(CONFIG.bossSpeed||95)*((L.rival&&L.rival.mult)||1), delay:1.5, done:false, ufo:rivalUfo };
    setTimeout(()=>{ if(game.rival && game.state==="play") sticker("BEAT HIM TO THE FLAG!", "#ff8fe0"); }, 1900);
  }
  prerenderGround(L);
  const sk = document.createElement("canvas");
  const skGs = Math.min(1, Math.sqrt(12e6/((game.cols*CELL)*(game.rows*CELL))));   // 📐 same cap as the ground
  sk.width = Math.ceil(game.cols*CELL*skGs); sk.height = Math.ceil(game.rows*CELL*skGs);
  game.skidCv = sk; game.skidCtx = sk.getContext("2d");
  game.skidCtx.setTransform(skGs, 0, 0, skGs, 0, 0);                               // skid draws stay in world coords
  updateObjective(true);
  game.raceTotal = game.flow ? Math.max(1, game.flow[game.startCell[1]][game.startCell[0]]) : 1;
  spawnGolden();                               // 🎁 v2: maybe drop one free golden crate on the racing line
  // 🚩 auto-checkpoint: on LONG campaign mazes (path > 24 cells), crossing the halfway mark
  // quietly moves your respawn point — giant mazes stay challenging, never punishing.
  game.ckptField = null; game.ckptHalf = 0;
  game.tpz = 0; game.tpcx = game.tpcy = undefined;      // 🎥 two-player camera smoothing state
  if(!(game.vs||game.ko) && game.finish){               // campaign AND co-op mazes get checkpoints
    const fd = finishDist();
    if(fd){ const d0 = fd[game.startCell[1]][game.startCell[0]];
      if(d0 > 24){ game.ckptField = fd; game.ckptHalf = d0*0.5; } }
  }
  game.state = "play";
  armRun();                                    // 🎁 set up this run's armed power-up
  sticker(L.emoji+" "+L.name, L.hue);
  setTimeout(()=> game.state==="play" && sticker("GO GO GO!", "#ffffff"), 900);
}

function isWallCell(c,r){
  if(c<0||r<0||c>=game.cols||r>=game.rows) return true;
  return !!game.solid[r][c];
}
function isSolid(c,r){
  if(isWallCell(c,r)) return true;
  for(const d of game.doors) if(d.c===c && d.r===r && d.anim<1) return true;
  for(const g of game.gates) if(g.c===c && g.r===r && g.open<0.5) return true;
  for(const q of game.coopGates) if(q.c===c && q.r===r && q.open<0.5) return true;
  for(const m of game.shiftWalls) if(m.c===c && m.r===r && game.shiftSol[m.grp]>0.5) return true;
  for(const w of game.trapWalls) if(w.c===c && w.r===r && w.closed>0.5) return true;
  for(const cr of game.crushers) if(cr.cc===c && cr.cr===r) return true;
  for(const cr of game.crates) if(cr.c===c && cr.r===r && !cr.broken) return true;
  return false;
}
// TIMING obstacles the boss rival must wait out (shifting walls / crushers / timed gates).
// NOT key-doors (it doesn't collect keys — it barges through) and NOT crates (it smashes them).
function rivalBlocked(c,r){
  for(const m of game.shiftWalls) if(m.c===c && m.r===r && game.shiftSol[m.grp]>0.5) return true;
  for(const cr of game.crushers)  if(cr.cc===c && cr.cr===r) return true;
  for(const a of game.asteroids){ const ac=Math.round(a.c+a.dx*a.off), ar=Math.round(a.r+a.dy*a.off);   // ☄️ boss waits out a drifting rock
    if(ac===c && ar===r) return true; }
  for(const g of game.gates)      if(g.c===c && g.r===r && g.open<0.5) return true;
  return false;
}
function crateAt(c,r){
  for(const cr of game.crates) if(!cr.broken && cr.c===c && cr.r===r) return cr;
  return null;
}

/* BFS shortest path between two cells (walls only) — the boss's racing line */
function bfsPathCells(start, goal, avoid){
  const R = game.rows, C = game.cols;
  const prev = Array.from({length:R},()=>new Array(C).fill(null));
  prev[start[1]][start[0]] = start;
  const q = [start];
  while(q.length){
    const [c,r] = q.shift();
    if(c===goal[0] && r===goal[1]) break;
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=C||nr>=R||game.solid[nr][nc]||(game.voidCell[nr]&&game.voidCell[nr][nc])||prev[nr][nc]||(avoid&&avoid.has(nc+","+nr))) continue;
      prev[nr][nc] = [c,r]; q.push([nc,nr]);
    }
  }
  if(!prev[goal[1]][goal[0]]) return [start];
  const path = []; let cur = goal;
  while(!(cur[0]===start[0] && cur[1]===start[1])){ path.unshift(cur); cur = prev[cur[1]][cur[0]]; }
  path.unshift(start);
  return path;
}

/* BFS flow field toward current objective (for the helper arrow) */
function updateObjective(force){
  let target;
  if(game.key && !game.key.got) target = game.key;
  else if(game.doors.length && game.doors.some(d=>d.anim<1) && game.hasKey) target = game.doors.find(d=>d.anim<1);
  else target = game.finish;
  if(!force && game.objective===target) return;
  game.objective = target;
  const tc = clamp(Math.floor(target.x/CELL),0,game.cols-1), tr = clamp(Math.floor(target.y/CELL),0,game.rows-1);
  const dst = Array.from({length:game.rows},()=>new Array(game.cols).fill(-1));
  const q=[[tc,tr]]; dst[tr][tc]=0;
  while(q.length){
    const [c,r]=q.shift();
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
      if(game.solid[nr][nc] || (game.voidCell[nr]&&game.voidCell[nr][nc])) continue;   // hint path ignores doors/gates, never points into the chasm
      if(dst[nr][nc]!==-1) continue;
      dst[nr][nc]=dst[r][c]+1; q.push([nc,nr]);
    }
  }
  game.flow = dst;
}

// walls-only distance-to-finish field — orients direction hints (boost/splash pads) down the racing line
// (overVoid=true lets the field cross 🕳️ V chasms — used to aim the launch-ring trajectory hint ACROSS the gap)
function finishDist(overVoid){
  if(!game.finish) return null;
  const d = Array.from({length:game.rows},()=>new Array(game.cols).fill(-1));
  const q=[[game.finish.c, game.finish.r]]; d[game.finish.r][game.finish.c]=0;
  for(let qi=0; qi<q.length; qi++){
    const [c,r]=q[qi];
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
      if(d[nr][nc]!==-1) continue;
      if(isWallCell(nc,nr) || (!overVoid && game.voidCell[nr]&&game.voidCell[nr][nc])) continue;   // doors/gates treated as passable → gradient always reaches (voids never, unless overVoid)
      d[nr][nc]=d[r][c]+1; q.push([nc,nr]);
    }
  }
  return d;
}

/* ---------------- pre-rendered ground + walls ---------------- */
// 🎨 per-world ATMOSPHERE — ground palette + backdrop, so each world FEELS like its theme
// (indexed by world = seriesOf(levelIx); falls back to [0] for custom/VS/KO/co-op).
const WORLD_THEME = [
  // 0 TURBO BASICS — night racetrack (amber)
  { ground:"#232a3d", speck:"rgba(255,255,255,0.035)", glow:"255,180,92", wall:"#0b0d15", wallTop:"#161b2b",
    sky:["#0a0e1a","#12141f"], back:"city", accent:"#ffce7a" },
  // 1 BRAIN FREEZE — icy (blue)
  { ground:"#26343f", speck:"rgba(210,240,255,0.05)", glow:"150,205,255", wall:"#0a1119", wallTop:"#152230",
    sky:["#081420","#0e2434"], back:"snow", accent:"#dff2ff" },
  // 2 MAZE MAYHEM — neon void (purple)
  { ground:"#241f36", speck:"rgba(210,180,255,0.05)", glow:"197,108,255", wall:"#0c0918", wallTop:"#1b1430",
    sky:["#0b0818","#160b28"], back:"grid", accent:"#c56cff" },
  // 3 METAL MELTDOWN — foundry (orange/steel)
  { ground:"#2a2620", speck:"rgba(255,220,180,0.045)", glow:"255,140,60", wall:"#100c08", wallTop:"#241a12",
    sky:["#140d08","#1f130a"], back:"factory", accent:"#ff9040" },
  // 4 SPLASH ZONE — deep water (aqua)
  { ground:"#1b3641", speck:"rgba(190,240,255,0.05)", glow:"80,210,224", wall:"#08161a", wallTop:"#10242c",
    sky:["#061e26","#0a2f3c"], back:"water", accent:"#5fe0e0" },
  // 5 COSMIC RUSH — deep space (indigo / violet, star-white accents)
  { ground:"#1a1630", speck:"rgba(200,190,255,0.05)", glow:"140,120,255", wall:"#070512", wallTop:"#140f28",
    sky:["#05030f","#0c0820"], back:"void", accent:"#b9a8ff" },
];
function worldTheme(){
  const s = (game.levelIx>=0 && !game.customId) ? seriesOf(game.levelIx) : -1;
  return WORLD_THEME[s] || WORLD_THEME[0];
}

function prerenderGround(L){
  const w = game.cols*CELL, h = game.rows*CELL;
  // 📐 resolution cap: huge worlds (46x30 ≈ 16.7M px) exceed iOS canvas limits — render the
  // static ground at reduced scale and blit up (imperceptible for flat fills, saves ~half the memory)
  const gs = Math.min(1, Math.sqrt(12e6/(w*h)));
  game.groundScale = gs;
  const g = document.createElement("canvas"); g.width=Math.ceil(w*gs); g.height=Math.ceil(h*gs);
  const x = g.getContext("2d");
  x.scale(gs, gs);                                   // all existing draw code stays in world coords
  // world-themed ground (road is the LIGHT surface — walls go near-black so the maze pops)
  const T = worldTheme();
  x.fillStyle = T.ground; x.fillRect(0,0,w,h);
  for(let i=0;i<w*h/900;i++){
    x.fillStyle = Math.random()<0.5 ? T.speck : "rgba(0,0,0,0.3)";
    x.fillRect(Math.random()*w, Math.random()*h, rand(1,3), rand(1,3));
  }
  // warm lamp pools on road
  for(const [c,r] of game.road){
    if((c*7+r*13)%9===0){
      const gr = x.createRadialGradient((c+0.5)*CELL,(r+0.5)*CELL,8,(c+0.5)*CELL,(r+0.5)*CELL,CELL*0.9);
      gr.addColorStop(0,"rgba("+T.glow+",0.10)"); gr.addColorStop(1,"rgba("+T.glow+",0)");
      x.fillStyle = gr; x.fillRect((c-1)*CELL,(r-1)*CELL,CELL*3,CELL*3);
    }
  }
  // ice sheen
  for(const [c,r] of game.road){
    if(!(game.slick[r] && game.slick[r][c])) continue;
    x.fillStyle = "rgba(150,210,255,0.14)";
    x.fillRect(c*CELL, r*CELL, CELL, CELL);
    x.strokeStyle = "rgba(225,245,255,0.22)"; x.lineWidth = 2;
    for(let i=0;i<3;i++){
      const yy = r*CELL + 22 + i*30 + ((c*13)%12);
      x.beginPath(); x.moveTo(c*CELL+12, yy); x.lineTo(c*CELL+CELL-12, yy-9); x.stroke();
    }
  }
  // 🟣 sticky shallow-water slow zones — murky teal + ripples (reads OPPOSITE to the icy sheen above)
  for(const [c,r] of game.road){
    if(!(game.sticky[r] && game.sticky[r][c])) continue;
    x.fillStyle = "rgba(60,150,140,0.26)";            x.fillRect(c*CELL, r*CELL, CELL, CELL);
    x.fillStyle = "rgba(30,90,80,0.20)";              x.fillRect(c*CELL+6, r*CELL+6, CELL-12, CELL-12);   // darker inset = zone-edge telegraph
    x.strokeStyle = "rgba(180,240,220,0.30)"; x.lineWidth = 2;
    for(let i=0;i<3;i++){ x.beginPath(); x.arc((c+0.5)*CELL, (r+0.5)*CELL, 14+i*13, 0, TAU); x.stroke(); }
  }
  // center dashes on straights
  x.strokeStyle = "rgba(255,255,255,0.07)"; x.lineWidth=4; x.setLineDash([16,20]);
  for(const [c,r] of game.road){
    if(!isWallCell(c+1,r) && !isWallCell(c-1,r) && isWallCell(c,r-1) && isWallCell(c,r+1)){
      x.beginPath(); x.moveTo(c*CELL,(r+0.5)*CELL); x.lineTo((c+1)*CELL,(r+0.5)*CELL); x.stroke();
    }
    if(!isWallCell(c,r+1) && !isWallCell(c,r-1) && isWallCell(c-1,r) && isWallCell(c+1,r)){
      x.beginPath(); x.moveTo((c+0.5)*CELL,r*CELL); x.lineTo((c+0.5)*CELL,(r+1)*CELL); x.stroke();
    }
  }
  x.setLineDash([]);
  // start + finish checkers
  const checker = (cc,rr,col)=>{
    for(let i=0;i<8;i++) for(let j=0;j<8;j++){
      if((i+j)%2) continue;
      x.fillStyle = col;
      x.fillRect(cc*CELL+i*CELL/8, rr*CELL+j*CELL/8, CELL/8, CELL/8);
    }
  };
  for(let r=0;r<game.rows;r++) for(let c=0;c<game.cols;c++){
    const ch = L.grid[r][c];
    if(ch==="S") checker(c,r,"rgba(255,255,255,0.06)");
    if(ch==="2") checker(c,r,"rgba(176,110,232,0.14)");
    if(ch==="F") checker(c,r,"rgba(255,255,255,0.16)");
  }
  // boost pads (chevrons) — point down the racing line toward the finish (fixes mirrored/right-start levels)
  const padDist = finishDist();
  for(const p of game.pads){
    let ang, best = Infinity, found = false;
    for(const [dc,dr,a] of [[1,0,0],[-1,0,Math.PI],[0,1,Math.PI/2],[0,-1,-Math.PI/2]]){
      const nr=p.r+dr, nc=p.c+dc;
      const v = (padDist && padDist[nr]) ? padDist[nr][nc] : -1;
      if(v>=0 && v<best){ best=v; ang=a; found=true; }     // step toward the lower finish-distance neighbor
    }
    if(!found) ang = (!isWallCell(p.c+1,p.r) || !isWallCell(p.c-1,p.r)) ? 0 : Math.PI/2;  // fallback: corridor axis
    x.save(); x.translate(p.x,p.y); x.rotate(ang);
    x.strokeStyle = L.hue; x.lineWidth = 7; x.lineCap="round"; x.globalAlpha=0.75;
    for(let i=-1;i<=1;i++){
      x.beginPath(); x.moveTo(i*22-9, -18); x.lineTo(i*22+9, 0); x.lineTo(i*22-9, 18); x.stroke();
    }
    x.restore();
  }
  // 🚀 launch-ring trajectory hint — same "step toward lower finish-distance" rule as the chevrons,
  // but on a void-crossing field so the hint points ACROSS the chasm the ring is meant to leap
  if(game.rings.length){
    const ringDist = finishDist(true);
    for(const rg of game.rings){
      let ang, best = Infinity, found = false;
      for(const [dc,dr,a] of [[1,0,0],[-1,0,Math.PI],[0,1,Math.PI/2],[0,-1,-Math.PI/2]]){
        const nr=rg.r+dr, nc=rg.c+dc;
        const v = (ringDist && ringDist[nr]) ? ringDist[nr][nc] : -1;
        if(v>=0 && v<best){ best=v; ang=a; found=true; }
      }
      rg.ang = found ? ang : ((!isWallCell(rg.c+1,rg.r) || !isWallCell(rg.c-1,rg.r)) ? 0 : Math.PI/2);
    }
  }
  // walls: dark blocks + hue edge light + night windows
  for(let r=0;r<game.rows;r++) for(let c=0;c<game.cols;c++){
    if(!game.solid[r][c]) continue;
    if(game.wells.some(v=>v.c===c && v.r===r)) continue;   // 🪐 a planet renders as a sprite over floor, not a brick pillar
    const px=c*CELL, py=r*CELL;
    x.fillStyle = T.wall; x.fillRect(px,py,CELL,CELL);
    x.fillStyle = T.wallTop; x.fillRect(px,py,CELL,10);
    // neon curb light on edges facing road
    x.fillStyle = L.hue; x.globalAlpha = 0.5;
    if(!isWallCell(c,r+1)) x.fillRect(px, py+CELL-4, CELL, 4);
    if(!isWallCell(c,r-1)) x.fillRect(px, py, CELL, 4);
    if(!isWallCell(c+1,r)) x.fillRect(px+CELL-4, py, 4, CELL);
    if(!isWallCell(c-1,r)) x.fillRect(px, py, 4, CELL);
    x.globalAlpha = 1;
    // lit windows
    const seed = (c*31+r*17)%10;
    if(seed<3){
      x.fillStyle = seed===0 ? "rgba(255,190,110,0.5)" : "rgba(170,210,255,0.28)";
      const n = 2+seed;
      for(let i=0;i<n;i++) x.fillRect(px+18+((i*37+r*11)%(CELL-44)), py+22+((i*53+c*7)%(CELL-50)), 9, 12);
    }
  }
  // 🕳️ void-edge WARNING RAIL — bright lip on every road edge that drops into space
  for(const [c,r] of game.road){
    const vz=(cc,rr)=> (game.voidCell[rr] && game.voidCell[rr][cc]);
    const px=c*CELL, py=r*CELL; x.fillStyle="#9fe0ff"; x.globalAlpha=0.85;
    if(vz(c,r+1)) x.fillRect(px,py+CELL-5,CELL,5); if(vz(c,r-1)) x.fillRect(px,py,CELL,5);
    if(vz(c+1,r)) x.fillRect(px+CELL-5,py,5,CELL); if(vz(c-1,r)) x.fillRect(px,py,5,CELL);
    x.globalAlpha=1;
  }
  // 🕳️ punch the chasms TRANSPARENT (the parallax starfield backdrop shows through) + a violet rim glow
  for(const v of (game.voids||[])){
    x.clearRect(v.c*CELL, v.r*CELL, CELL, CELL);                 // reveal deep space
    const rim = x.createRadialGradient(v.x,v.y,CELL*0.30, v.x,v.y,CELL*0.52);
    rim.addColorStop(0,"rgba(0,0,0,0)"); rim.addColorStop(0.82,"rgba("+T.glow+",0.22)"); rim.addColorStop(1,"rgba("+T.glow+",0)");
    x.fillStyle=rim; x.fillRect(v.x-CELL*0.6, v.y-CELL*0.6, CELL*1.2, CELL*1.2);
  }
  game.groundCv = g;
}

/* ---------------- car physics ---------------- */
function updateCar(car, ctrl, dt){
  const iv = ctrl.vec;
  const hasInput = Math.hypot(iv.x,iv.y) > 0.15;
  const boosting = !!ctrl.nitro && car.nitroMeter>0 && hasInput;

  const SPD = CONFIG.speed || 1;
  // 🎁 crate upgrades buff the human's campaign car only (boosted() gates VS/KO/co-op)
  const bU = boosted(car);
  const mSpd = bU? upgMul("engine") : 1, mGrip = bU? upgMul("grip") : 1, mNit = bU? upgMul("nitro") : 1;
  // 🚗 per-vehicle stat multipliers — the campaign game.car only (carPerk gates VS/KO/co-op),
  // stacking ON TOP of the crate mults. All k* are exactly 1 for a stat of 5, so ROCKET and
  // every non-player car are a pure no-op. Only BOOST reaches 10; spd/acc/hnd cap the rest at ±12%.
  const cs = carPerk(car) ? carStat(store.car) : null;
  const kSpd  = cs ? 1+(cs.spd-5)*0.020 : 1;   // maxSp
  const kAcc  = cs ? 1+(cs.acc-5)*0.024 : 1;   // accel
  const kGrip = cs ? 1+(cs.hnd-5)*0.030 : 1;   // lateral grip
  const kTurn = cs ? 1+(cs.hnd-5)*0.015 : 1;   // steering rate
  const kNit  = cs ? 1+(cs.bst-5)*0.050 : 1;   // nitro economy
  const cellC = clamp(Math.floor(car.x/CELL),0,game.cols-1), cellR = clamp(Math.floor(car.y/CELL),0,game.rows-1);
  const onIce = !!(game.slick[cellR] && game.slick[cellR][cellC]);
  const onSticky = !((car.airT||0)>0) && !!(game.sticky[cellR] && game.sticky[cellR][cellC]);   // 🟣 goop drag (inert mid-hop)
  const lowG = game.lowG;                                            // 🌠 W6: world-wide float (friction-only scalar)
  const _spS = Math.hypot(car.vx,car.vy);
  if(onSticky && !car.wasSticky && _spS>120){                        // 💦 entering the shallows
    car.sq = 0.82;
    for(let i=0;i<9;i++) puff(car.x, car.y, "rgba(150,225,210,0.55)");
    AU.beep(320,0.18,"sine",0.12,120);
    if(ctrl.main) float("SPLASH!", car.x, car.y-34, "#6fe0d0");
    game.shake = Math.min(4, game.shake+1.5);
  }
  car.wasSticky = onSticky;
  if(car.spinT>0){ car.spinT-=dt; car.heading += dt*12; }
  else if(hasInput){
    const want = Math.atan2(iv.y, iv.x);
    const sp = Math.hypot(car.vx, car.vy);
    const tRate = lerp(9, 3.1, clamp(sp/(460*SPD),0,1)) * kTurn;   // nimble slow, wide fast (·handling)
    const d = angDiff(car.heading, want);
    car.heading += clamp(d, -tRate*dt, tRate*dt);
  }
  const maxSp = (boosting? 660 : 400)*SPD*mSpd*kSpd*(car.airT>0?1.6:1)*(onSticky?(boosting?0.8:0.6):1);   // 🟠 airborne cap ↑ · 🟣 goop cap ↓ (nitro punches through)
  const accel = (boosting? 1300 : 750)*SPD*mSpd*kAcc*(onIce?0.55: onSticky?0.7 : lowG?0.85 :1);   // 🌠 thrusters bite a touch softer in space
  if(hasInput && car.spinT<=0){
    car.vx += Math.cos(car.heading)*accel*dt * Math.hypot(iv.x,iv.y);
    car.vy += Math.sin(car.heading)*accel*dt * Math.hypot(iv.x,iv.y);
  }
  // split velocity into forward + lateral, grip eats lateral (drift = less grip)
  const fx=Math.cos(car.heading), fy=Math.sin(car.heading);
  let fwd = car.vx*fx + car.vy*fy;
  let latX = car.vx - fwd*fx, latY = car.vy - fwd*fy;
  const sp = Math.hypot(car.vx,car.vy);
  const turningHard = hasInput && Math.abs(angDiff(car.heading, Math.atan2(iv.y,iv.x))) > 0.55;
  const grip = (onIce ? 1.1 : onSticky ? 11 : (turningHard && sp>230*SPD) ? 2.4 : lowG ? 3.4 : 8.5) * mGrip * kGrip;   // 🟣 goop = planted, never spins a kid out · 🌠 low-G floats (still 3× more planted than ice)
  const latK = Math.exp(-grip*dt);
  latX*=latK; latY*=latK;
  fwd *= (hasInput || car.airT>0) ? Math.exp(-(onSticky?1.6:0.35)*dt) : Math.exp(-(onIce?0.7: onSticky?5.5 : lowG?1.1 :2.2)*dt);   // 🟠 low drag airborne · 🟣 goop bleeds coast speed fast · 🌠 space coasts long
  car.vx = fwd*fx + latX; car.vy = fwd*fy + latY;
  const spd2 = Math.hypot(car.vx,car.vy);
  if(spd2 > maxSp){ car.vx *= maxSp/spd2; car.vy *= maxSp/spd2; }

  // drift state
  const slip = spd2>200*SPD ? Math.abs(angDiff(car.heading, Math.atan2(car.vy,car.vx))) : 0;
  const wasDrift = car.drifting;
  car.drifting = (slip>0.32 && spd2>210*SPD) || (onIce && spd2>140 && slip>0.2) || (lowG && spd2>180*SPD && slip>0.22);
  if(car.drifting){
    car.driftT += dt;
    if(((car.driftT*10)|0) % 4 === 0) spark(car);
    skid(car);
    if(!wasDrift && Math.random()<0.6) float(pick(YELLS.drift), car.x, car.y-34, game.lv.hue);
    car.aura += dt*6;
  }
  if(ctrl.main) AU.setDrift(car.drifting);

  // nitro
  if(boosting){
    car.nitroMeter = Math.max(0, car.nitroMeter - dt*30/(mNit*kNit));
    if(car.boost<=0){ AU.nitro(); if(Math.random()<0.5) float(pick(YELLS.nitro), car.x, car.y-40, "#7ef7ff"); }
    car.boost = 0.12;
    flame(car);
  } else {
    car.nitroMeter = Math.min(100, car.nitroMeter + dt*(CONFIG.easyMode?14:9)*mNit*kNit);
    car.boost = Math.max(0, car.boost-dt);
  }
  if(ctrl.main) AU.setEngine(spd2, boosting);

  // move with wall collisions (sub-stepped)
  const steps = Math.max(1, Math.ceil(spd2*dt/9));
  for(let i=0;i<steps;i++){
    car.x += car.vx*dt/steps; car.y += car.vy*dt/steps;
    if(!(car===game.car && car.ghostT>0) && !(car.airT>0)) collideWalls(car);   // 👻 ghost / 🟠 airborne fly over walls
  }

  // squash spring
  car.sqv += (1-car.sq)*260*dt; car.sqv *= Math.exp(-14*dt); car.sq += car.sqv*dt;
  car.invuln = Math.max(0, car.invuln-dt);
  car.ghostT = Math.max(0, (car.ghostT||0)-dt);   // 👻 ghost phase timer
  car.magT = Math.max(0, (car.magT||0)-dt);       // 🧲 mega-magnet burst timer (v3)
  const wasAir = car.airT>0;
  car.airT = Math.max(0, (car.airT||0)-dt);
  if(wasAir && car.airT<=0){                                   // 🟠 SPLASHDOWN — hop lands
    car.sq = 0.55;                                             // max flatten (the spring above pops it back)
    game.shake = Math.min(6, game.shake+2);
    for(let i=0;i<14;i++) puff(car.x+rand(-14,14), car.y+rand(-14,14), "rgba(120,200,255,0.5)");
    for(let i=0;i<6;i++) sparkle(car.x, car.y);
    AU.bonk(); AU.beep(320,0.14,"sine",0.14,140);
    if(ctrl.main) float(pick(["SPLASH!","STUCK IT!","WHEEE!"]), car.x, car.y-34, "#7ec9ff");
    let lc=Math.floor(car.x/CELL), lr=Math.floor(car.y/CELL);   // 🟠 never land STUCK in a wall — snap to nearest open cell
    if(isSolid(lc,lr)){
      let best=null, bd=1e9;
      for(let rr=Math.max(0,lr-3); rr<=Math.min(game.rows-1,lr+3); rr++)
        for(let cc=Math.max(0,lc-3); cc<=Math.min(game.cols-1,lc+3); cc++){
          if(isSolid(cc,rr)) continue;
          const dd=(cc-lc)*(cc-lc)+(rr-lr)*(rr-lr); if(dd<bd){ bd=dd; best=[cc,rr]; }
        }
      const sp = best ? {x:(best[0]+0.5)*CELL, y:(best[1]+0.5)*CELL} : (car.spawn||{x:car.x,y:car.y});
      car.x=sp.x; car.y=sp.y; car.vx=car.vy=0;
    }
  }

  // trail
  car.trail.unshift({x:car.x, y:car.y, a:car.heading});
  if(car.trail.length>13) car.trail.pop();

  // pet chases the car (lags a few trail frames behind)
  if(ctrl.main && store.pet && game.pet){
    const tgt = car.trail[Math.min(9, car.trail.length-1)];
    const k = 1-Math.exp(-7*dt);
    game.pet.x += (tgt.x-game.pet.x)*k;
    game.pet.y += (tgt.y-game.pet.y)*k;
  }

  // exhaust puffs
  if(spd2>40 && Math.random()<0.3)
    puff(car.x-Math.cos(car.heading)*20, car.y-Math.sin(car.heading)*20, "rgba(160,170,200,0.2)");
}

function collideWalls(car){
  const R = 13;
  const c0 = Math.floor((car.x-R)/CELL), c1 = Math.floor((car.x+R)/CELL);
  const r0 = Math.floor((car.y-R)/CELL), r1 = Math.floor((car.y+R)/CELL);
  for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
    if(!isSolid(c,r)) continue;
    // crates smash open if you hit them fast enough
    const crate = crateAt(c,r);
    if(crate && Math.hypot(car.vx,car.vy) > 240*(CONFIG.speed||1)){
      crate.broken = true;
      for(let i=0;i<14;i++) debris(crate.x+rand(-22,22), crate.y+rand(-22,22));
      game.shake = Math.min(8, game.shake+4);
      car.vx*=0.72; car.vy*=0.72; car.sq = 0.8;
      AU.bonk(); AU.beep(700,0.1,"square",0.12,200);
      float("SMASH!", crate.x, crate.y-20, "#ff9f45");
      const mBoom = boosted(car)? upgMul("boom")-1 : 0;             // 🧨 CRATE BOOM (v3): smashed crates drop bonus coins
      if(mBoom>0){
        const drops = Math.floor(mBoom) + (Math.random() < mBoom%1 ? 1 : 0);   // (mult-1) expected, GOLD = 2 guaranteed
        if(drops>0) scatterCoins(crate.x, crate.y, drops);
      }
      continue;
    }
    const bx=c*CELL, by=r*CELL;
    const px = clamp(car.x, bx, bx+CELL), py = clamp(car.y, by, by+CELL);
    const dx = car.x-px, dy = car.y-py;
    const d2 = dx*dx+dy*dy;
    if(d2 >= R*R) continue;
    let nx, ny, pen;
    if(d2>0.0001){ const d=Math.sqrt(d2); nx=dx/d; ny=dy/d; pen=R-d; }
    else { // center inside block — push along smallest axis
      const l=car.x-bx, rr=bx+CELL-car.x, t=car.y-by, b=by+CELL-car.y;
      const m=Math.min(l,rr,t,b);
      nx = m===l?-1 : m===rr?1 : 0; ny = m===t?-1 : m===b?1 : 0; pen = m+R;
    }
    car.x += nx*pen; car.y += ny*pen;
    const vn = car.vx*nx + car.vy*ny;
    if(vn<0){
      const impact = -vn;
      car.vx -= (1.35)*vn*nx; car.vy -= (1.35)*vn*ny;   // soft bounce
      if(impact>230){
        game.shake = Math.min(10, game.shake+impact/60);
        car.sq = 0.68; AU.bonk();
        for(let i=0;i<8;i++) debris(px,py);
        if(Math.random()<0.5) float(pick(YELLS.bonk), car.x, car.y-36, "#ffd0d0");
        scuff(car);
      }
    }
  }
}

/* ---------------- entities ---------------- */
function scatterCoins(px, py, n){
  const near = game.road.filter(([c,r])=>{
    const wx=(c+0.5)*CELL, wy=(r+0.5)*CELL, dd=dist(wx,wy,px,py);
    return dd>CELL*0.9 && dd<CELL*2.8;
  });
  for(let i=0;i<n;i++){
    const [cc,rr] = near.length? pick(near) : [Math.floor(px/CELL), Math.floor(py/CELL)];
    game.coins.push({x:(cc+0.5)*CELL+rand(-18,18), y:(rr+0.5)*CELL+rand(-18,18), got:false, ph:Math.random()*TAU, cool:1.0});
  }
}
function updateEntities(dt){
  // gates cycle (shared)
  for(const g of game.gates){
    g.ph += dt;
    const cyc = (g.ph % 3.2) / 3.2;         // 3.2s cycle
    const target = cyc < 0.55 ? 1 : 0;      // open 55% of the time
    g.open = lerp(g.open, target, dt*8);
  }
  // shifting walls: set A and set B take turns being solid — the maze rearranges.
  // safe "both open" gaps between so nobody is ever fully trapped.
  if(game.shiftWalls.length){
    game.shiftT = (game.shiftT + dt) % SHIFT_CYCLE;
    const p = game.shiftT / SHIFT_CYCLE;
    const tgtA = (p < 0.42) ? 1 : 0;                 // A solid first ~42%
    const tgtB = (p >= 0.5 && p < 0.92) ? 1 : 0;     // B solid ~50–92%, gaps at 0.42–0.5 & 0.92–1
    game.shiftSol[0] = lerp(game.shiftSol[0], tgtA, dt*9);
    game.shiftSol[1] = lerp(game.shiftSol[1], tgtB, dt*9);
  }
  // sliding crushers: slide a solid block back & forth along its lane
  for(const cr of game.crushers){
    const off = cr.range * (0.5 - 0.5*Math.cos(((game.gt||0)/cr.period + cr.phase)*TAU));  // 0..range ping-pong (⏱️ slow-mo aware)
    cr.off = off;
    cr.cc = cr.c + cr.dx*Math.round(off);
    cr.cr = cr.r + cr.dy*Math.round(off);
  }
  // ☄️ asteroids: soft rocks drift their lane (crusher math, NO round → smooth; ⏱️ slow-mo aware via game.gt)
  for(const a of game.asteroids){
    const off = a.range * (0.5 - 0.5*Math.cos(((game.gt||0)/a.period + a.phase)*TAU));
    a.off = off;
    a.x = (a.c + a.dx*off + 0.5)*CELL;
    a.y = (a.r + a.dy*off + 0.5)*CELL;
    a.spin += dt * a.spv;
    if(off>0.15 && off<a.range-0.15 && Math.random()<0.22) puff(a.x, a.y, "rgba(201,179,255,0.35)");
  }
  // 🎁 reactive player power-ups: ❄️ freeze when a goober threatens · ⏱️ slow-mo near danger
  if(game.car && game.car.pu){
    const c = game.car;
    if(c.pu==="freeze"){
      for(const gb of game.goobers) if(!gb.dead && gb.frozen<=0 && dist(c.x,c.y,gb.x,gb.y)<150){
        for(const g2 of game.goobers) if(!g2.dead) g2.frozen = 4;
        firePU("freeze", c.x, c.y); break;
      }
    } else if(c.pu==="slowmo" && game.slowmo<=0){
      const cc=c.x/CELL, cr2=c.y/CELL;
      let near = game.crushers.some(k=> Math.abs(k.cc-cc)<1.6 && Math.abs(k.cr-cr2)<1.6);
      if(!near) near = game.goobers.some(gb=> !gb.dead && dist(c.x,c.y,gb.x,gb.y)<115);
      if(near){ game.slowmo = 2.5; firePU("slowmo", c.x, c.y); }
    } else if(c.pu==="megamag"){                                    // 🧲 MEGA MAGNET (v3): pops near a coin cluster
      let n=0;
      for(const cn of game.coins){ if(!cn.got && !cn.nitro && dist(c.x,c.y,cn.x,cn.y)<150 && ++n>=3) break; }
      if(n>=3){ c.magT = 4; firePU("megamag", c.x, c.y); }          // 3+ coins close by → 4s super-pull
    }
  }
  // VS battle: zap pickups respawn; trap walls slam shut for a moment when a trigger is hit
  if(game.vs || game.ko){
    for(const z of game.zaps){ if(!z.active){ z.cool -= dt; if(z.cool<=0) z.active = true; } z.ph += dt*4; }
    for(const t of game.traps) if(t.cool>0) t.cool -= dt;
    game.trapT = Math.max(0, game.trapT - dt);
    const closed = game.trapT>0 ? 1 : 0;
    for(const w of game.trapWalls) w.closed = lerp(w.closed, closed, dt*11);
  }
  // co-op: a plate held (OR the button sequence solved) opens every linked gate
  if(game.coop && game.coopGates.length){
    let held = false;
    for(const p of game.plates2){
      const on = game.cars.some(c=> Math.floor(c.x/CELL)===p.c && Math.floor(c.y/CELL)===p.r);
      p.lit = lerp(p.lit, on?1:0, dt*12);
      if(on) held = true;
    }
    game.coopHeld = held;
    const gateOpen = (held || game.seqDone) ? 1 : 0;
    for(const q of game.coopGates) q.open = lerp(q.open, gateOpen, dt*12);
  }
  for(const p of game.portals) if(p.cool>0) p.cool -= dt;
  for(const p of game.pads) if(p.cool) p.cool = Math.max(0, p.cool-dt);
  for(const bp of game.bounces) if(bp.cool>0) bp.cool = Math.max(0, bp.cool-dt);   // 🟠 splash-pad cooldowns
  for(const rg of game.rings) if(rg.cool>0) rg.cool = Math.max(0, rg.cool-dt);     // 🚀 launch-ring cooldown
  for(const cm of game.crumbles){                                                  // 🧱 foam collapse — once/frame, car-count-independent
    if(cm.state==="cracking" && game.gt - cm.t0 >= CRUMBLE_GRACE){
      cm.state="gone";
      for(let i=0;i<16;i++) puff(cm.x+rand(-24,24), cm.y+rand(-24,24), i%2?"rgba(255,255,255,0.7)":"rgba(120,195,235,0.75)");
      AU.bonk(); AU.beep(360,0.18,"sine",0.14,110); game.shake=Math.min(7, game.shake+3);
    }
  }

  for(const car of game.cars){
  // coins (with a little magnet — 🧲 upgrade widens the pull; 💰 lucky / ✌️ double boost the payout)
  const magBurst = car===game.car && (car.magT||0)>0;               // 🧲 MEGA MAGNET burst window (v3)
  const magR = magBurst? 340 : (boosted(car)? 95*upgMul("magnet") : 95);   // flat 340px cap — no creep with the magnet upgrade
  const pull = magBurst? 10 : 6;                                    // burst pulls harder too
  for(const cn of game.coins){
    if(cn.got) continue;
    if(cn.cool){ cn.cool = Math.max(0, cn.cool-dt); if(cn.cool>0) continue; }
    const d = dist(car.x,car.y,cn.x,cn.y);
    if(d<magR){ cn.x = lerp(cn.x, car.x, dt*pull); cn.y = lerp(cn.y, car.y, dt*pull); }
    if(d<34){
      cn.got = true;
      if(cn.nitro){
        car.nitroMeter = 100; AU.nitro();
        float("NITRO FULL!", cn.x, cn.y-20, "#7ef7ff");
        for(let i=0;i<10;i++) puff(cn.x,cn.y,"rgba(126,247,255,0.5)");
      } else {
        car.coins++; car.aura += 10;
        let gain = car.dbl? 2 : 1;                                   // ✌️ double-coins power-up
        if(boosted(car)){ car.luckyAcc = (car.luckyAcc||0) + (upgMul("lucky")-1);  // 💰 lucky: fractional bonus banks up over time
          const lb = Math.floor(car.luckyAcc); if(lb>0){ gain += lb; car.luckyAcc -= lb; } }
        store.coinsBank += gain;
        AU.coin();
        float(gain>1 ? "+"+gain+" 🪙" : (Math.random()<0.3 ? pick(YELLS.coin) : "+10"), cn.x, cn.y-20, "#ffd76a");
        for(let i=0;i<8;i++) sparkle(cn.x,cn.y);
      }
    }
  }
  // portals: hop to the other end (🌀 bh:true = black-hole wormhole — wider event-horizon capture + dramatic warp)
  if(game.portals.length===2 && car.portalCool<=0){
    for(let i=0;i<2;i++){
      const p = game.portals[i];
      const cap = p.bh ? BH_CAP : 34;
      if(p.cool<=0 && dist(car.x,car.y,p.x,p.y)<cap){
        const o = game.portals[1-i];
        if(p.bh){                                             // 🌀 event-horizon → white-hole warp
          for(let k=0;k<18;k++) sparkle(p.x+rand(-20,20), p.y+rand(-20,20));
          car.x=o.x; car.y=o.y; car.portalCool=1.1; o.cool=0.6;
          car.spinT=0.4; car.sq=0.5;
          for(let k=0;k<20;k++) puff(o.x+rand(-22,22), o.y+rand(-22,22), "rgba(180,150,255,0.6)");
          AU.nitro(); game.shake=Math.min(7,(game.shake||0)+4);
          float("WARP!", o.x, o.y-32, "#c9b6ff");
        } else {                                              // unchanged plain-portal path
          for(let k=0;k<10;k++) puff(car.x,car.y,"rgba(185,140,255,0.55)");
          car.x = o.x; car.y = o.y; car.portalCool = 1.1; o.cool = 0.6;
          for(let k=0;k<10;k++) puff(car.x,car.y,"rgba(185,140,255,0.55)");
          AU.nitro(); float("WOOSH!", car.x, car.y-30, "#b98cff");
        }
        break;
      }
    }
  }
  car.portalCool = Math.max(0, car.portalCool-dt);
  // key
  if(game.key && !game.key.got && dist(car.x,car.y,game.key.x,game.key.y)<40){
    game.key.got = true; game.hasKey = true; AU.key();
    sticker("🗝️ "+pick(YELLS.key), "#ffd76a");
    updateObjective(true);
  }
  // doors
  for(const d of game.doors){
    if(d.anim>=1 || !game.hasKey) continue;
    if(dist(car.x,car.y,d.x,d.y) < CELL*1.1){
      d.opening = true;
    }
    if(d.opening){ d.anim = Math.min(1, d.anim + dt*1.6);
      if(d.anim>=1){ AU.door(); sticker(pick(YELLS.door), game.lv.hue); updateObjective(true);
        for(let i=0;i<12;i++) sparkle(d.x,d.y); }
    }
  }
  // boost pads
  for(const p of game.pads){
    if(Math.floor(car.x/CELL)===p.c && Math.floor(car.y/CELL)===p.r){
      if(!p.cool && car.airT<=0){
        p.cool = 0.9;
        const sp = Math.hypot(car.vx,car.vy)||1;
        const mPad = boosted(car)? upgMul("pads") : 1;              // 🔋 PAD POWER (v3)
        const kick = 330*(CONFIG.speed||1)*(1+(mPad-1)*0.4);        // speed part damped 40% — never flings him into trouble
        car.vx += car.vx/sp*kick; car.vy += car.vy/sp*kick;
        car.nitroMeter = Math.min(100, car.nitroMeter+25*mPad);     // the refill is the feel-good part — full strength
        if(mPad>1.2) for(let i=0;i<6;i++) sparkle(car.x, car.y);
        car.sq = 1.25; AU.nitro(); game.shake = Math.min(6, game.shake+3);
        float("BOOST!", car.x, car.y-40, game.lv.hue);
      }
    }
  }
  // 🟠 splash pads: fling airborne — sails over walls, gaps & hazards, lands with a splash
  if(game.bounces.length){
    const bcx=Math.floor(car.x/CELL), bcy=Math.floor(car.y/CELL);
    for(const bp of game.bounces){
      if(bp.c===bcx && bp.r===bcy && bp.cool<=0 && car.airT<=0){
        bp.cool = 0.5;
        const SPD = CONFIG.speed||1, sp = Math.hypot(car.vx,car.vy);
        const launch = clamp(sp + 300*SPD, 480*SPD, 620*SPD);      // never a dud, never a rocket → ~2.4–3.1 cells
        car.vx = Math.cos(car.heading)*launch;                     // fly the way the car POINTS (readable, kills drift)
        car.vy = Math.sin(car.heading)*launch;
        car.airT = car.airMax = 0.55;                              // airtime knob (Space will reuse/crank this)
        car.nitroMeter = Math.min(100, car.nitroMeter+15*(boosted(car)? upgMul("pads") : 1));   // 🔋 PAD POWER feeds splash hops (v3)
        car.sq = 1.35;                                             // STRETCH tall on take-off
        AU.nitro(); game.shake = Math.min(6, game.shake+3);
        for(let i=0;i<10;i++) puff(bp.x+rand(-16,16), bp.y+rand(-16,16), "rgba(120,200,255,0.55)");
        if(car===game.car) float("BOING!", car.x, car.y-40, "#59d0ff");
        break;
      }
    }
  }
  // 🚀 LAUNCH RING: big floaty space-leap across a chasm — reliable ~3.1–3.5 cells every time
  if(game.rings.length){
    const rcx=Math.floor(car.x/CELL), rcy=Math.floor(car.y/CELL);
    for(const rg of game.rings){
      if(rg.c===rcx && rg.r===rcy && rg.cool<=0 && car.airT<=0){
        rg.cool=0.5;
        const SPD=CONFIG.speed||1, sp=Math.hypot(car.vx,car.vy);
        const launch = clamp(sp + 380*SPD, 560*SPD, 640*SPD);   // upper clamp = airborne maxSp cap → nothing clipped
        car.vx=Math.cos(car.heading)*launch; car.vy=Math.sin(car.heading)*launch;   // fly the way you POINT (flip-safe)
        car.airT=car.airMax=0.82;
        car.nitroMeter=Math.min(100,car.nitroMeter+20); car.sq=1.4;
        AU.nitro(); AU.beep(320,0.10,"sawtooth",0.10,720); game.shake=Math.min(7,game.shake+4);
        for(let i=0;i<14;i++) puff(rg.x+rand(-18,18), rg.y+rand(-18,18), "rgba(159,224,255,0.6)");
        if(car===game.car) float("BLAST OFF!", car.x, car.y-42, "#9fe0ff");
        break;
      }
    }
  }
  // conveyor floors: shove the car the way the belt points (you can still steer against it)
  if(game.conveyors.length && car.airT<=0){                       // 🟠 no mid-air current shove
    const ccx=Math.floor(car.x/CELL), ccy=Math.floor(car.y/CELL);
    for(const cv2 of game.conveyors){
      if(cv2.c===ccx && cv2.r===ccy){ car.vx += cv2.dx*640*dt; car.vy += cv2.dy*640*dt; break; }
    }
  }
  // 🪐 gravity wells: continuous quadratic pull toward each planet — bend the line, whip the corner. Always escapable.
  if(game.wells.length){
    const SPD = CONFIG.speed||1, airK = car.airT>0 ? 0.5 : 1;   // gentle bend on ring-hops, full grip on ground
    let inWell = false;
    for(const w of game.wells){
      const dx=w.x-car.x, dy=w.y-car.y, d=Math.hypot(dx,dy)||1;
      if(d > WELL_R) continue;
      inWell = true;
      const f = 1 - d/WELL_R;
      const G = WELL_PULL*SPD * f*f * airK;        // QUADRATIC: barely tugs mid-range, firm slingshot near core
      car.vx += dx/d*G*dt; car.vy += dy/d*G*dt;
      if(car===game.car && d < WELL_R*0.4 && Math.random()<0.2) sparkle(car.x+rand(-8,8), car.y+rand(-8,8));
    }
    if(car.wellIn && !inWell && Math.hypot(car.vx,car.vy)>300){  // 🌠 slingshot exit celebration
      if(car===game.car) float(pick(["SLINGSHOT!","WHEEE!","ORBIT!"]), car.x, car.y-38, "#b9a8ff");
      for(let i=0;i<6;i++) sparkle(car.x, car.y);
    }
    car.wellIn = inWell;
  }
  // 🕳️ black holes: strong grounded suction toward the horizon. A launch-ring hop (airT>0) sails clean over the top.
  if(car.airT<=0){
    const SPD = CONFIG.speed||1;
    for(const p of game.portals){
      if(!p.bh || p.cool>0) continue;
      const dx=p.x-car.x, dy=p.y-car.y, d=Math.hypot(dx,dy)||1;
      if(d > BH_R || d <= BH_CAP) continue;        // inside BH_CAP the teleport block owns it
      const f = 1 - d/BH_R;
      const G = (BH_PULL_MIN + (BH_PULL_MAX-BH_PULL_MIN)*f) * SPD;
      car.vx += dx/d*G*dt; car.vy += dy/d*G*dt;
    }
  }
  // trap doors: drive on one → drop through → respawn (invuln blocks re-trigger)
  if(game.trapDoors.length && car.invuln<=0 && car.airT<=0){
    const tcx=Math.floor(car.x/CELL), tcy=Math.floor(car.y/CELL);
    if(game.trapDoors.some(t=>t.c===tcx && t.r===tcy) && !blockHit(car, car.x, car.y)){
      const sp = car.spawn || {x:car.x, y:car.y, h:car.heading};
      for(let i=0;i<12;i++) puff(car.x, car.y, "rgba(20,16,28,0.6)");
      car.x=sp.x; car.y=sp.y; car.heading=sp.h; car.vx=car.vy=0; car.invuln=1.4; car.spinT=0.35; car.sq=0.5;
      AU.bonk(); AU.beep(200,0.25,"sine",0.16,60); game.shake=Math.min(8,game.shake+4);
      sticker("🕳️ "+(game.vs||game.coop||game.ko? pName(car.p2?1:0)+" FELL IN!":"WHOOPS — DOWN THE HATCH!"), "#b06ee8");
    }
  }
  // 🧱 foam floats: first touch arms the collapse; standing on a collapsed hole drops you (bounce hop sails over)
  if(game.crumbles.length && !(car.airT>0)){
    const fcx=Math.floor(car.x/CELL), fcy=Math.floor(car.y/CELL);
    for(const cm of game.crumbles){
      if(cm.c!==fcx || cm.r!==fcy) continue;
      if(cm.state==="intact"){                                    // first contact → arm + telegraph (NOT invuln-gated)
        cm.state="cracking"; cm.t0=game.gt;
        AU.beep(520,0.08,"square",0.06,300);
        for(let i=0;i<5;i++) puff(cm.x+rand(-30,30), cm.y+rand(-30,30), "rgba(255,255,255,0.6)");
      } else if(cm.state==="gone" && car.invuln<=0 && !blockHit(car, car.x, car.y)){   // fall (shield/ghost saves you)
        const sp = car.spawn || {x:car.x, y:car.y, h:car.heading};
        for(let i=0;i<14;i++) puff(car.x, car.y, "rgba(90,170,220,0.7)");
        car.x=sp.x; car.y=sp.y; car.heading=sp.h; car.vx=car.vy=0;
        car.invuln=1.4; car.spinT=0.35; car.sq=0.5;               // trap-door respawn contract
        AU.bonk(); AU.beep(240,0.25,"sine",0.16,70); game.shake=Math.min(8,game.shake+4);
        sticker("💦 "+(game.vs||game.coop||game.ko? pName(car.p2?1:0)+" TOOK A DIP!":"SPLASH! — HOP BACK IN!"), "#4fc3e8");
      }
      break;   // one crumble per cell
    }
  }
  // 🕳️ THE VOID: drift into open space → gentle beam-back (a launched hop with airT>0 sails over)
  if(game.voids.length && car.invuln<=0 && car.airT<=0){
    const vcx=Math.floor(car.x/CELL), vcy=Math.floor(car.y/CELL);
    if(game.voidCell[vcy] && game.voidCell[vcy][vcx] && !blockHit(car, car.x, car.y)){
      const sp = car.spawn || {x:car.x, y:car.y, h:car.heading};
      for(let i=0;i<16;i++) puff(car.x+rand(-14,14), car.y+rand(-14,14), "rgba(180,170,255,0.5)");
      car.x=sp.x; car.y=sp.y; car.heading=sp.h; car.vx=car.vy=0; car.invuln=1.4; car.spinT=0.35; car.sq=0.5;  // respawn contract
      AU.beep(300,0.14,"sine",0.10,540); AU.beep(760,0.28,"sine",0.12,220);   // soft rising beam-back warble — NOT AU.bonk
      game.shake=Math.min(5,game.shake+2);
      sticker("🌌 "+(game.vs||game.coop||game.ko? pName(car.p2?1:0)+" DRIFTED OFF!":"DRIFTED INTO SPACE — BEAMED BACK!"), "#7b6cff");
    }
  }
  // 🚩 auto-checkpoint: reached the halfway mark on solid, safe ground → respawn moves here
  if(game.ckptField && !car._ckpt && (car===game.car || game.coop) && car.airT<=0 && car.invuln<=0){
    const kc=Math.floor(car.x/CELL), kr=Math.floor(car.y/CELL);
    const kd=(game.ckptField[kr]||[])[kc];
    if(kd>=0 && kd<=game.ckptHalf && !isSolid(kc,kr)
       && !(game.voidCell[kr]&&game.voidCell[kr][kc])
       && !game.trapDoors.some(t=>t.c===kc&&t.r===kr)
       && !game.crumbles.some(m=>m.c===kc&&m.r===kr)){
      car._ckpt = true;                                  // per-car: in co-op each player earns their own
      car.spawn = { x:(kc+0.5)*CELL, y:(kr+0.5)*CELL, h:car.heading };
      sticker("🚩 CHECKPOINT!", "#9ae64a");
      for(let i=0;i<10;i++) sparkle(car.x, car.y);
      AU.key();
    }
  }
  // goobers: nitro speed takes HIM out — otherwise he yoinks your coins
  for(const gb of game.goobers){
    if(gb.dead || gb.frozen>0 || car.airT>0) continue;          // ❄️ frozen goobers harmless · 🟠 hop sails over
    if(dist(car.x,car.y,gb.x,gb.y)<38){
      const ramming = car.boost>0 || Math.hypot(car.vx,car.vy) > 450*(CONFIG.speed||1);
      if(ramming){
        gb.dead = true;
        game.shake = 7; AU.goober(); AU.beep(220,0.3,"sawtooth",0.18,60);
        sticker("💥 "+pick(YELLS.kill), "#7ef7ff");
        float("+25", gb.x, gb.y-30, "#7ef7ff");
        car.aura += 25;
        for(let i=0;i<16;i++) debris(gb.x+rand(-16,16), gb.y+rand(-16,16));
        for(let i=0;i<10;i++) puff(gb.x, gb.y, "rgba(255,143,224,0.5)");
        scatterCoins(gb.x, gb.y, 2);          // he drops his loot
        car.vx *= 0.85; car.vy *= 0.85; car.sq = 1.2;
      } else if(car.invuln<=0 && !blockHit(car, car.x, car.y)){
        car.invuln = 1.6; car.spinT = 0.55; car.sq = 0.6;
        game.bonks++; game.shake = 9; AU.goober();
        sticker("👾 "+pick(YELLS.goober), "#ff8fe0");
        const guard = boosted(car)? upgMul("bumper") : 1;           // 🦺 GOOBER GUARD (v3): he grabs fewer coins
        const steal = Math.min(Math.floor(3/guard), car.coins);     // tiers: 2,2,1,1,1 · GOLD 0
        if(!steal && guard>1) float("🦺 NO COINS TAKEN!", car.x, car.y-40, "#9ae64a");
        car.coins -= steal; store.coinsBank = Math.max(0, store.coinsBank-steal);
        scatterCoins(car.x, car.y, steal);
        const kb = 260; const ka = Math.atan2(car.y-gb.y, car.x-gb.x);
        car.vx += Math.cos(ka)*kb; car.vy += Math.sin(ka)*kb;
        if(!game.goobHint){
          game.goobHint = true;
          setTimeout(()=>{ if(game.state==="play") sticker("NITRO TAKES HIM OUT! ⚡", "#7ef7ff"); }, 1400);
        }
      }
    }
  }
  // ☄️ asteroids: soft space rocks — bump spins you off with an outward pop, never a dead stop
  for(const a of game.asteroids){
    if(car.airT>0) continue;                              // 🚀 ring hop sails over
    const rr = 30*a.size;
    if(dist(car.x,car.y,a.x,a.y) < rr && car.invuln<=0 && !blockHit(car,car.x,car.y)){
      car.invuln = 1.0*a.size; car.spinT = 0.4; car.sq = 0.6;
      game.shake = Math.min(8, game.shake+6); AU.bonk(); AU.beep(180,0.22,"sawtooth",0.14,70);
      sticker("☄️ "+pick(YELLS.rock), "#c9b3ff");
      const ka = Math.atan2(car.y-a.y, car.x-a.x), kb = 300*a.size;
      car.vx = car.vx*0.4 + Math.cos(ka)*kb;              // keep 40% forward + outward pop = EJECTION, never a dead stop
      car.vy = car.vy*0.4 + Math.sin(ka)*kb;
      a.spin += 0.7;
      for(let i=0;i<10;i++) debris(a.x+rand(-18,18), a.y+rand(-18,18));
      for(let i=0;i<6;i++)  puff(car.x, car.y, "rgba(201,179,255,0.5)");
    }
  }
  // VS battle pickups + traps + knockout hazards
  if(game.vs || game.ko){
    const other = (car===game.car) ? game.car2 : game.car;
    // ⚡ zap: grab it, your rival spins out
    for(const z of game.zaps){
      if(z.active && dist(car.x,car.y,z.x,z.y) < 42){
        z.active = false; z.cool = 6;
        if(other && other.spinT<=0){ other.spinT = 1.1; other.invuln = 1.4; other.sq = 0.6; other.vx*=0.35; other.vy*=0.35; }
        sticker("⚡ "+pName(car.p2?1:0)+" ZAPS "+pName(car.p2?0:1)+"!", "#7ef7ff");
        float("⚡ ZAP!", z.x, z.y-26, "#7ef7ff");
        AU.beep(1300,0.08,"sawtooth",0.2,500); AU.beep(320,0.18,"sawtooth",0.16,90);
        game.shake = Math.min(9, game.shake+4);
      }
    }
    // trap trigger: drive over the button → walls slam shut across the map
    for(const t of game.traps){
      if(t.cool<=0 && game.trapT<=0 && Math.floor(car.x/CELL)===t.c && Math.floor(car.y/CELL)===t.r && game.trapWalls.length){
        game.trapT = 2.8; t.cool = 5;
        sticker("🧱 "+pName(car.p2?1:0)+" SPRINGS THE TRAP!", "#ff8f8f");
        AU.bonk(); AU.beep(140,0.25,"square",0.18,80); game.shake = Math.min(8, game.shake+3);
      }
    }
    // 💥 knockout: shoved into a hazard pit → lose a life & respawn (0 lives = out)
    if(game.ko && car.invuln<=0 && car.airT<=0){
      const cc=Math.floor(car.x/CELL), rr=Math.floor(car.y/CELL);
      if(game.koZones.some(k=>k.c===cc && k.r===rr)){
        car.lives = (car.lives||1) - 1;
        car.invuln = 1.8; car.spinT = 0.5; car.sq = 0.5;
        for(let i=0;i<16;i++) debris(car.x+rand(-18,18), car.y+rand(-18,18));
        game.shake = Math.min(11, game.shake+6); AU.goober(); AU.beep(180,0.3,"sawtooth",0.2,60);
        if(car.lives <= 0){ koEnd(other); return; }
        car.x=car.spawn.x; car.y=car.spawn.y; car.heading=car.spawn.h; car.vx=car.vy=0;
        sticker("💥 "+pName(car.p2?1:0)+" KNOCKED OUT! — "+car.lives+" ❤ left", car.p2?"#b06ee8":"#7ef7ff");
      }
    }
  }
  // co-op sequence puzzle: hit the numbered pads IN ORDER — wrong one = back to start!
  if(game.coop && game.seqPads.length && !game.seqDone){
    const cc=Math.floor(car.x/CELL), rr=Math.floor(car.y/CELL);
    const pad = game.seqPads.find(p=>p.c===cc && p.r===rr);
    if(pad){
      const idx = pad.num-1;                        // 0-based position in the order
      if(idx === game.seqNext){                     // correct next → advance
        game.seqNext++; pad.lit = 1;
        AU.coin(); float("✓ "+pad.num, pad.x, pad.y-24, "#9ae64a");
        if(game.seqNext >= game.seqLen){ game.seqDone = true; sticker("SEQUENCE DONE! 🎉 the way is open", "#9ae64a"); AU.win(); }
        else sticker("✓ "+game.seqNext+" / "+game.seqLen, "#9ae64a");
      } else if(idx > game.seqNext){                 // pressed out of order → RESET
        game.seqNext = 0; for(const p of game.seqPads) p.lit = 0;
        sticker("❌ WRONG ORDER! back to the start", "#ff8f8f");
        AU.bonk(); AU.beep(150,0.3,"square",0.2,70); game.shake = Math.min(9, game.shake+5);
        for(const cr of game.cars){ if(cr.spawn){ cr.x=cr.spawn.x; cr.y=cr.spawn.y; cr.heading=cr.spawn.h; cr.vx=cr.vy=0; cr.invuln=1.0; cr.spinT=0.3; } }
        return;                                      // stop this frame's per-car loop after a reset
      }
    }
  }
  // finish (races only — knockout has no flag)
  if(!game.ko && dist(car.x,car.y,game.finish.x,game.finish.y) < CELL*0.75){
    if(game.coop){
      if(!car.home){
        car.home = true; car.vx*=0.15; car.vy*=0.15;
        AU.coin(); sticker(pName(car.p2?1:0)+" MADE IT! 🏁", car.p2?"#b06ee8":"#7ef7ff");
        confettiBurst(car.x, car.y, 26, car.p2?"#b06ee8":"#7ef7ff");
      }
      if(game.car.home && game.car2 && game.car2.home){ coopClear(); return; }
    } else if(game.vs){ vsEnd(car); return; }
    else if(game.key && game.doors.length && !game.hasKey){        // 🔑 locked level: the finish won't open until you grab the key
      if((game.t-(game._keyNag||-9)) > 1.6){ game._keyNag=game.t; sticker("🔒 GET THE KEY TO FINISH!", "#ffd76a"); AU.bonk(); }
    }
    else levelClear();
  }
  } // end per-car loop
  // 🎁 v2: grab the golden crate (human car only; a no-op when game.gold is null → every non-campaign mode)
  if(game.gold && !game.gold.got){
    if(Math.random()<0.15) sparkle(game.gold.x, game.gold.y);
    if(dist(game.car.x, game.car.y, game.gold.x, game.gold.y) < CELL*0.5) grabGolden(game.gold);
  }

  // goober patrol movement (shared)
  for(const gb of game.goobers){
    if(gb.dead) continue;
    if(gb.frozen>0){ gb.frozen=Math.max(0, gb.frozen-dt); gb.ph += dt*3; continue; }   // ❄️ frozen: hold still & thaw
    const [tx,ty] = gb.path[(gb.seg+1)%gb.path.length];
    const d = dist(gb.x,gb.y,tx,ty);
    if(d<6) gb.seg = (gb.seg+1)%gb.path.length;
    else { gb.x += (tx-gb.x)/d*gb.speed*dt; gb.y += (ty-gb.y)/d*gb.speed*dt; }
    gb.ph += dt*7;
  }
  const car = game.car;
  // the boss car races the solution path (with rubber-banding so it stays close)
  const rv = game.rival;
  if(rv && !rv.done && game.state==="play"){
    if(rv.delay>0) rv.delay -= dt;
    else if(rv.i < rv.wp.length-1){
      const t = rv.wp[rv.i+1];
      const tc = Math.floor(t[0]/CELL), tr = Math.floor(t[1]/CELL);
      if(rivalBlocked(tc, tr)){
        // hold at a shifting wall / crusher / closed gate and face it — same wait the player has to make
        rv.a += angDiff(rv.a, Math.atan2(t[1]-rv.y, t[0]-rv.x))*Math.min(1,dt*8);
      } else {
        const d = dist(rv.x,rv.y,t[0],t[1]) || 0.001;
        const pc = clamp(Math.floor(car.x/CELL),0,game.cols-1), pr = clamp(Math.floor(car.y/CELL),0,game.rows-1);
        const pLeft = (game.flow && game.flow[pr][pc]>=0) ? game.flow[pr][pc] : 99;
        const rLeft = rv.wp.length-1-rv.i;
        const band = clamp(1 + (rLeft-pLeft)*0.03, 0.75, 1.3);
        const spd = rv.speed*band;
        if(d < spd*dt+2){ rv.x=t[0]; rv.y=t[1]; rv.i++; }
        else { rv.x += (t[0]-rv.x)/d*spd*dt; rv.y += (t[1]-rv.y)/d*spd*dt; }
        // 🪐 wells bend the boss's arc too — bounded ≤60% of a forward step so progress always dominates
        for(const w of game.wells){
          const dx=w.x-rv.x, dy=w.y-rv.y, wd=Math.hypot(dx,dy)||1;
          if(wd > WELL_R) continue;
          const f=1-wd/WELL_R, pull=Math.min(WELL_PULL*(CONFIG.speed||1)*f*f*dt, rv.speed*dt*0.6);  // ≤60% of a forward step
          const nx=rv.x+dx/wd*pull, ny=rv.y+dy/wd*pull;
          if(!isSolid(Math.floor(nx/CELL),Math.floor(ny/CELL))){ rv.x=nx; rv.y=ny; }
        }
        rv.a += angDiff(rv.a, Math.atan2(t[1]-rv.y, t[0]-rv.x))*Math.min(1,dt*8);
        if(Math.random()<0.15) puff(rv.x-Math.cos(rv.a)*18, rv.y-Math.sin(rv.a)*18, "rgba(176,110,232,0.25)");
        const rc = crateAt(Math.floor(rv.x/CELL), Math.floor(rv.y/CELL));
        if(rc){ rc.broken=true; for(let i=0;i<10;i++) debris(rc.x+rand(-20,20), rc.y+rand(-20,20)); AU.bonk(); }
      }
    }
    if(rv.i >= rv.wp.length-1){ rv.done = true; rivalWins(); }
  }
  // helper arrow timer
  const spd = Math.hypot(car.vx,car.vy);
  game.hintT = spd<60 ? game.hintT+dt : Math.max(0, game.hintT-dt*2);
}
function rivalWins(){
  game.state = "cooked"; game.cookedT = 0;
  game.shake = 8;
  AU.goober();
}
function carBump(a, b){
  const d = dist(a.x,a.y,b.x,b.y);
  if(d>26 || d===0) return;
  const nx=(b.x-a.x)/d, ny=(b.y-a.y)/d, pen=(26-d)/2;
  a.x-=nx*pen; a.y-=ny*pen; b.x+=nx*pen; b.y+=ny*pen;
  const rvx=b.vx-a.vx, rvy=b.vy-a.vy, vn=rvx*nx+rvy*ny;
  if(vn<0){
    const j=-vn*0.9;
    a.vx-=j*nx*0.5; a.vy-=j*ny*0.5; b.vx+=j*nx*0.5; b.vy+=j*ny*0.5;
    if(-vn>200){ AU.bonk(); game.shake=Math.min(6,game.shake+2); a.sq=0.8; b.sq=0.8;
      if(Math.random()<0.5) float(pick(YELLS.bonk), (a.x+b.x)/2, (a.y+b.y)/2-24, "#ffd0d0"); }
    // BUMPER CARS (VS only): ram hard → the faster car spins the other out and swipes a coin
    if((game.vs || game.ko) && -vn>250){
      const aFast = Math.hypot(a.vx,a.vy) >= Math.hypot(b.vx,b.vy);
      const ram = aFast?a:b, hit = aFast?b:a;
      if(hit.spinT<=0 && hit.invuln<=0){
        hit.spinT = 0.55; hit.invuln = game.ko?0.35:0.9; hit.sq = 0.55;   // shorter i-frames in KO → chain shoves
        const ka = Math.atan2(hit.y-ram.y, hit.x-ram.x), kb = game.ko?560:360;   // punt harder in knockout
        hit.vx += Math.cos(ka)*kb; hit.vy += Math.sin(ka)*kb;
        if(game.vs && hit.coins>0){ hit.coins--; ram.coins++; float("SWIPED 1! 🪙", hit.x, hit.y-30, "#ffd76a"); }
        sticker("💥 "+pName(ram.p2?1:0)+(game.ko?" SLAMS ":" BULLDOZES ")+pName(ram.p2?0:1)+"!", ram.p2?"#b06ee8":"#7ef7ff");
        AU.goober(); game.shake = Math.min(10, game.shake+5);
      }
    }
  }
}
function levelClear(){
  const L = game.lv;
  const timeOk = game.playT <= parFor(L);
  const allCoins = game.car.coins >= game.coinsAll;
  const stars = 1 + (timeOk?1:0) + (allCoins?1:0);
  const bonus = 50 + stars*25 + (game.rival? 100 : 0);   // +100 for smoking the boss
  game.car.aura += bonus;
  store.aura += Math.round(game.car.aura);
  const key = game.customId ? "c:"+game.customId : (game.levelIx>=0 ? game.levelIx : null);
  if(key!==null){
    const prev = store.stars[key]||0;
    store.stars[key] = Math.max(prev, stars);
  }
  if(!game.customId && game.levelIx>=0)
    store.unlocked = Math.max(store.unlocked, Math.min(LEVELS.length, game.levelIx+2));
  let unlock;
  if(game.levelIx===LEVELS.length-1 && !store.ownedCars.includes("goat")){
    store.ownedCars.push("goat");
    unlock = "🐐 GOLDEN GOAT UNLOCKED!";
  }
  // world (series) completion — did we just beat the LAST level of a world?
  const cs = (!game.customId && game.levelIx>=0) ? seriesOf(game.levelIx) : -1;
  game._seriesEnd = cs>=0 && game.levelIx===seriesEndIx(cs);
  if(game._seriesEnd){
    store.seriesCleared = store.seriesCleared || {};
    if(!store.seriesCleared[cs]){
      store.seriesCleared[cs] = 1;
      const rc = SERIES[cs].reward;                                       // 🎁 free reward ride for beating the world
      if(rc && !store.ownedCars.includes(rc)){
        store.ownedCars.push(rc);
        const rv = VEHICLES.find(v=>v.id===rc);
        const rmsg = "🎁 "+(rv? rv.name : "NEW RIDE")+" UNLOCKED!";
        if(!unlock) unlock = rmsg; else sticker(rmsg, "#ffd76a");
      }
      const nxt = SERIES[cs+1];
      const wmsg = (nxt && !nxt.comingSoon) ? "🌟 "+nxt.name+" UNLOCKED!" : "🌟 WORLD COMPLETE!";
      if(!unlock) unlock = wmsg; else sticker(wmsg, "#ffd76a");
    }
  }
  save();
  game.clearData = { stars, t:0, time:game.playT, timeOk, allCoins, aura:Math.round(game.car.aura), shown:0,
    msg: game.rival? "SMOKED HIM! 🏆" : undefined, unlock };
  game.state = "clear";
  AU.win();
  // 🎆 PARTY FINISH cosmetic (v3): rainbow multi-burst instead of the level-hue burst (guards = data-delete safe)
  const cosW = cosOn() && COSMETICS[store.cosmetic];
  if(cosW && cosW.kind==="confetti") for(const pc of ["#ff5db1","#ffd76a","#7ef7ff","#9ae64a"]) confettiBurst(W/2, H*0.35, 40, pc);
  else confettiBurst(W/2, H*0.35, 130, L.hue);
}
function coopClear(){
  const L = game.lv;
  const timeOk = game.playT <= L.par;
  const coins = game.car.coins + (game.car2? game.car2.coins : 0);
  const allCoins = coins >= game.coinsAll;
  const stars = 1 + (timeOk?1:0) + (allCoins?1:0);
  const aura = Math.round(game.car.aura + (game.car2? game.car2.aura : 0));
  store.aura += aura;
  store.coopStars = store.coopStars || {};
  if(game.coopIx>=0){
    store.coopStars[game.coopIx] = Math.max(store.coopStars[game.coopIx]||0, stars);
    store.coopUnlocked = Math.max(store.coopUnlocked||1, Math.min(COOP_LEVELS.length, game.coopIx+2));
  }
  game._coopLast = game.coopIx >= COOP_LEVELS.length-1;
  save();
  game.clearData = { stars, t:0, time:game.playT, timeOk, allCoins, aura, shown:0, coop:true,
    coins, coinsAll:game.coinsAll, msg:"TEAMWORK! 🤝", unlock: game._coopLast? "🏁 CO-OP COMPLETE!" : undefined };
  game.state = "clear";
  AU.win();
  confettiBurst(W/2, H*0.35, 140, L.hue);
}

function drawConfettiScreen(){

  }
}

function spark(car){

function sparkle(x,y){ game.parts.push({x,y,vx:rand(-130,130),vy:rand(-170,40),t:0,life:rand(0.3,0.6),size:rand(2,5),col:pick(["#ffd76a","#fff4cc","#ffffff"]),grav:true}); }
function debris(x,y){ game.parts.push({x,y,vx:rand(-160,160),vy:rand(-160,160),t:0,life:rand(0.2,0.5),size:rand(2,4),col:"#8b93ad"}); }
function flame(car){

}
function skid(car){
  const k = game.skidCtx; if(!k) return;
  const px = Math.cos(car.heading+Math.PI/2), py = Math.sin(car.heading+Math.PI/2);
  const bx = car.x-Math.cos(car.heading)*10, by = car.y-Math.sin(car.heading)*10;
  k.fillStyle = "rgba(10,10,14,0.24)";
  for(const s of [-1,1]){ k.beginPath(); k.arc(bx+px*7*s, by+py*7*s, 2.6, 0, TAU); k.fill(); }
}
function scuff(car){
  const k = game.skidCtx; if(!k) return;
  k.fillStyle = "rgba(10,10,14,0.3)";
  for(let i=0;i<4;i++){ k.beginPath(); k.arc(car.x+rand(-9,9), car.y+rand(-9,9), rand(1.5,3), 0, TAU); k.fill(); }
}
function float(txt,x,y,col){ game.floats.push({txt,x,y,t:0,col:col||"#fff"}); }
function sticker(txt,col){ game.stickers.push({txt,col:col||"#fff",t:0}); }
function updateStickers(dt){
  if(game.stickers.length){ game.stickers[0].t+=dt; if(game.stickers[0].t>1.1) game.stickers.shift(); }
}
function updateFx(dt){
  game.parts = game.parts.filter(p=>{ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; if(p.grav)p.vy+=500*dt; return p.t<p.life; });
  game.floats = game.floats.filter(f=>{ f.t+=dt; f.y-=34*dt; return f.t<0.95; });
  updateStickers(dt);
  game.confetti = game.confetti.filter(c=>{ c.t+=dt; c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=560*dt; c.rot+=c.vr*dt; return c.y<H+40 && c.t<4; });
  game.shake = Math.max(0, game.shake - dt*22);
}
