function shopAction(a){
  if(a==="back"){ AU.ui(); sh.ptr = null; shopPending = null; game.state="series"; return; }
  if(a==="noop"){ AU.bonk(); return; }
  if(a==="tab:cars"||a==="tab:pets"){ AU.ui(); sh.tab = a.slice(4); shopSyncSel(); return; }
  if(a==="prev"||a==="next"){ AU.ui(); sh.sel = clamp(sh.sel + (a==="next"?1:-1), 0, sh.max); sh.target = sh.sel; shopPending = null; return; }
  if(a.startsWith("sel:")){ AU.ui(); sh.sel = clamp(+a.slice(4), 0, sh.max); sh.target = sh.sel; shopPending = null; return; }
  if(a==="num-"||a==="num+"){
    AU.ui();
    store.carNum = ((store.carNum==null?67:store.carNum) + (a==="num+"?1:99)) % 100;
    save(); return;
  }
  const kind = a.slice(0,1), id = a.slice(2);
  const item = kind==="v" ? VEHICLES.find(v=>v.id===id) : PETS.find(p=>p.id===id);
  if(!item) return;
  // can never buy an unearned reward/secret car — belt-and-suspenders with the "noop" button
  if(kind==="v" && (item.reward||item.secret) && !store.ownedCars.includes(id)){ AU.bonk(); return; }
  const owned = kind==="v" ? store.ownedCars.includes(id) : store.ownedPets.includes(id);
  if(owned){
    AU.key();
    if(kind==="v"){ store.car = id; sticker("LET'S RIDE!", "#9ae64a"); }
    else if(store.pet===id){ store.pet = null; sticker("BYE "+item.name+" 👋", "#8b93ad"); }
    else { store.pet = id; sticker(item.emoji+" "+item.name+" JOINS!", "#9ae64a"); }
    save(); return;
  }
  if(store.coinsBank < item.price){
    AU.bonk(); shopPending = null;
    sticker("NEED "+(item.price-store.coinsBank)+" MORE COINS!", "#ff8f8f");
    return;
  }
  if(shopPending && shopPending.act===a){
    shopPending = null;
    store.coinsBank -= item.price;
    if(kind==="v"){ store.ownedCars.push(id); store.car = id; }
    else { store.ownedPets.push(id); store.pet = id; }
    save();
    AU.win();
    confettiBurst(W/2, H*0.3, 80, "#ffd76a");
    sticker("UNLOCKED! "+(item.emoji||"")+" "+item.name, "#ffd76a");
  } else {
    AU.ui();
    shopPending = {act:a, t:2.5};
  }
}

function shopStrip(r, roster, isCars){
  const step = clamp(r.w/4.2, 92, 150);

    const o = roster[i], off = i - sh.scroll, cx = cx0 + off*step;

    const equipped = isCars ? store.car===o.id : store.pet===o.id;

    const numH = isCars ? clamp(availH*0.065, 34, 44) : 0;
    const stripH = clamp(availH*0.26, 116, 176);
    const buyY = colBot - buyH, numY = numH? buyY-G-numH : buyY;
    const stripY = (numH?numY:buyY) - G - stripH;
    stage  = {x:cx0, y:contentTop, w:CW, h:Math.max(150, stripY - G - contentTop)};
    stripR = {x:cx0, y:stripY, w:CW, h:stripH};
    numR   = {x:cx0, y:numY, w:CW, h:numH};
    buyR   = {x:cx0, y:buyY, w:CW, h:buyH};
  }

  // ---- animation easing (game.t/dt already advanced before dispatch) ----
  const tb = isCars ? carStat(sel.id) : {spd:0,acc:0,hnd:0,bst:0};
  for(const k of STAT_KEYS) sh.bars[k] += (tb[k]-sh.bars[k])*Math.min(1,dt*8);
  sh.pi += ((isCars? carPI(carStat(sel.id)) : 0) - sh.pi)*Math.min(1,dt*6);
  if(!(sh.ptr && sh.ptr.moved)) sh.scroll += (sh.target - sh.scroll)*Math.min(1,dt*12);
  sh.scroll = clamp(sh.scroll, 0, sh.max);

  // ---- draw: car first, spec card overlaid on the stage, then the carousel ----
  shopHero(stage, sel, locked, isCars);
  shopSpec(stage, sel, isCars);
  shopStrip(stripR, roster, isCars);
  const ay = stripR.y + (stripR.h-44)/2;
  drawIconBtn(stripR.x-4, ay, 44, "◀", "prev");
  drawIconBtn(stripR.x+stripR.w-40, ay, 44, "▶", "next");
  if(isCars && numR.h>0) shopNumber(numR);
  const btn = shopBtnState(sel, isCars, owned, locked);
  shopBuy(buyR, btn);

  // ---- input ----
  if(shopPending){ shopPending.t -= dt; if(shopPending.t<=0) shopPending = null; }
  for(const tp of input.taps.splice(0)){
    if(tp.screen){ shopAction(btn.act); continue; }
    let hit = false;
    // walk hudBtns back-to-front so a later-drawn control (◀/▶ arrows) wins over the
    // carousel tile hit-boxes it overlaps — topmost wins, matching what the eye sees.
    for(let bi=hudBtns.length-1; bi>=0; bi--){ const b=hudBtns[bi];
      if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ shopAction(b.act); hit=true; break; } }
    if(!hit) shopPending = null;
  }
}

function drawClear(dt){
  // frozen world behind
  drawWorld(0.0001);
  ctx.fillStyle = "rgba(8,10,16,0.68)"; ctx.fillRect(0,0,W,H);
  const cd = game.clearData; cd.t += dt;
  drawConfettiScreen();
  const panW = Math.min(430, W-40);
  const compact = H < 480;                       // phone landscape: tighten the stack
  const px = W/2;
  const py = compact ? (cd.unlock? H*0.34 : H*0.38) : H*0.46;
  const chipStep = compact? 38 : 44, chipStart = compact? 16 : 26;
  const inT = easeOut(clamp(cd.t/0.3,0,1));
  ctx.save();
  ctx.translate(px, py + (1-inT)*60);
  ctx.globalAlpha = inT;
  // GG sticker
  ctx.rotate(-0.03);
  ctx.font = "900 italic "+(compact?54:74)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const msg = cd.msg || (cd.msg = pick(YELLS.win));
  const ggy = compact? -94 : -120;
  ctx.fillStyle = "rgba(12,14,22,0.9)"; ctx.fillText(msg, 5, ggy+5);
  ctx.fillStyle = "#ffd76a"; ctx.fillText(msg, 0, ggy);
  ctx.rotate(0.03);
  // stars pop one by one
  const ssz = compact? 0.75 : 1;
  for(let i=0;i<3;i++){
    const on = i < cd.stars && cd.t > 0.5+i*0.4;
    if(on && cd.shown<=i){ cd.shown=i+1; AU.star(i); game.shake=4; }
    const pop = on? easeOut(clamp((cd.t-(0.5+i*0.4))/0.25,0,1)) : 1;
    ctx.font = Math.round((on? 62*pop : 54)*ssz)+"px sans-serif";
    ctx.globalAlpha = (on?1:0.18)*inT;
    fillTextC("⭐", (i-1)*78*ssz, compact? -30 : -38);
  }
  ctx.globalAlpha = inT;
  // stats chips
  ctx.font = "800 "+(compact?18:21)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  const chips = [
    ["● "+(cd.coop? cd.coins : game.car.coins)+"/"+game.coinsAll+" COINS", cd.allCoins?"#9ae64a":"#ffd76a"],
    ["⏱ "+cd.time.toFixed(1)+"s"+(cd.timeOk?"  ⚡FAST":""), cd.timeOk?"#9ae64a":"#f4f6ff"],
    ["✦ +"+cd.aura+" AURA", "#ffd76a"],
  ];
  if(cd.unlock) chips.push([cd.unlock, "#ffd76a"]);
  chips.forEach((ch,i)=>{
    const y = chipStart+i*chipStep;
    roundedPanel(-panW*0.32, y-16, panW*0.64, compact?32:36, 12, "rgba(20,24,36,0.92)");
    ctx.fillStyle = ch[1]; ctx.textAlign="center";
    fillTextC(ch[0], 0, y+1);
  });
  ctx.restore();
  // buttons — always below the chips, always on screen
  if(cd.t>1.2){
    const bw = 168, bh = compact? 54 : 62, gap = 18;
    const bx1 = W/2-bw-gap/2, bx2 = W/2+gap/2;
    const by = Math.min(py + chipStart + chips.length*chipStep + 12, H - bh - 12 - safeB);
    hudBtns.length = 0;
    if(game.fromBuilder){
      drawBigBtn(bx1, by, bw, bh, "🔨 GARAGE", "garage", "rgba(60,66,86,0.95)", "#f4f6ff");
      drawBigBtn(bx2, by, bw, bh, "↻ AGAIN", "retry", game.lv.hue, "#12151f");
    } else if(game.customId){
      drawBigBtn(bx1, by, bw, bh, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
      drawBigBtn(bx2, by, bw, bh, "↻ AGAIN", "retry", game.lv.hue, "#12151f");
    } else if(cd.coop){
      drawBigBtn(bx1, by, bw, bh, "🤝 CO-OP", "coopmap", "rgba(60,66,86,0.95)", "#f4f6ff");
      if(game._coopLast) drawBigBtn(bx2, by, bw, bh, "🏆 DONE!", "coopmap", "#ffd76a", "#12151f");
      else drawBigBtn(bx2, by, bw, bh, "NEXT ▶", "coopnext", game.lv.hue, "#12151f");
    } else {
      drawBigBtn(bx1, by, bw, bh, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
      if(game._seriesEnd) drawBigBtn(bx2, by, bw, bh, "🏆 WORLD", "world", "#ffd76a", "#12151f");
      else drawBigBtn(bx2, by, bw, bh, "NEXT ▶", "next", game.lv.hue, "#12151f");
    }
    const doAct = act => {
      AU.ui();
      if(act==="next") loadLevel(game.levelIx+1);
      else if(act==="coopnext") startCoop(game.coopIx+1);
      else if(act==="coopmap") game.state="cooppick";
      else if(act==="world") game.state="series";
      else if(act==="garage") game.state="build";
      else if(act==="retry") loadCustom(game.sourceCustom, game.fromBuilder? "builder":"map");
      else game.state="map";
    };
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ doAct(game.fromBuilder? "garage" : game.customId? "map" : cd.coop? (game._coopLast?"coopmap":"coopnext") : (game._seriesEnd? "world":"next")); return; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ doAct(b.act); return; }
    }
  } else input.taps.length = 0;
}
function drawBigBtn(x,y,w,h,label,act,bg,fg,fontPx){
  ctx.fillStyle = "rgba(12,14,22,0.9)";
  ctx.beginPath(); ctx.roundRect(x+4,y+4,w,h,16); ctx.fill();
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,16); ctx.fill();
  ctx.fillStyle = fg;
  ctx.font = "900 "+(fontPx||25)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textBaseline="middle";
  fillTextC(label, x+w/2, y+h/2+1);          // center-safe (emoji labels shift on iOS with textAlign=center)
  hudBtns.push({x,y,w,h,act});
}
// smooth winding "racetrack" path through the level nodes (rounded corners)
function traceTrack(pts){
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for(let i=0;i<pts.length-1;i++){
    const [x0,y0]=pts[i], [x1,y1]=pts[i+1];
    ctx.quadraticCurveTo(x0, y0, (x0+x1)/2, (y0+y1)/2);   // node = control point, midpoints on-curve
  }
  const L=pts[pts.length-1]; ctx.lineTo(L[0], L[1]);
}

function drawCooked(dt){
  drawWorld(0.0001);
  ctx.fillStyle = "rgba(8,10,16,0.72)"; ctx.fillRect(0,0,W,H);
  game.cookedT += dt;
  const inT = easeOut(clamp(game.cookedT/0.3,0,1));
  ctx.save();
  ctx.translate(W/2, H*0.34 + (1-inT)*50);
  ctx.globalAlpha = inT;
  ctx.rotate(-0.03);
  ctx.font = "italic 900 60px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = "rgba(12,14,22,0.9)"; fillTextC("HE BEAT YOU! 💀", 5, 5);
  ctx.fillStyle = "#ff8fe0"; fillTextC("HE BEAT YOU! 💀", 0, 0);
  ctx.font = "800 20px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle = "#8b93ad";
  ctx.fillText("the goober is doing donuts on the finish line", 0, 54);
  ctx.restore();
  ctx.globalAlpha = 1;
  if(game.cookedT > 0.8){
    hudBtns.length = 0;
    drawBigBtn(W/2-178, H*0.58, 170, 62, "REMATCH ▶", "retry", "#9ae64a", "#12151f");
    drawBigBtn(W/2+8,   H*0.58, 170, 62, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ AU.ui(); loadLevel(game.levelIx); return; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="retry") loadLevel(game.levelIx); else game.state="map";
        return;
      }
    }
  } else input.taps.length = 0;
}

let paused = false;
function togglePause(){ if(game.state==="play"){ paused=!paused; AU.ui(); } }
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden && game.state==="play") paused = true;
  if(!document.hidden) AU.resume();
});

/* ---------------- main loop ---------------- */
let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  tick(now);
}
function tick(now){
  const dt = Math.max(0, Math.min(0.05, (now-last)/1000)); last = now;
  game.t += dt;
  if(!CONFIG.cratesEnabled && game.state==="crates") game.state="series";   // 🎁 master off → never strand on the dead crates screen
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  // tablet held upright → ask for landscape (menus only, never mid-game)
  const portraitHint = input.hasTouch && H > W*1.15 && (game.state==="title" || game.state==="map" || game.state==="series" || game.state==="cooppick");
  if(portraitHint) input.taps.length = 0;

  if(game.state==="title"){ drawTitle(dt); }
  else if(game.state==="series"){ drawSeries(); updateStickers(dt); drawStickers(); }
  else if(game.state==="map"){ drawMap(); updateStickers(dt); drawStickers(); }
  else if(game.state==="build"){ drawBuild(dt); updateStickers(dt); drawStickers(); }
  else if(game.state==="shop"){ updateFx(dt); drawShop(dt); drawConfettiScreen(); drawStickers(); }
  else if(game.state==="crates"){ updateFx(dt); drawCrates(dt); drawConfettiScreen(); drawStickers(); }
  else if(game.state==="vspick"){ drawVsPick(); updateStickers(dt); drawStickers(); }
  else if(game.state==="cooppick"){ drawCoopMap(); updateStickers(dt); drawStickers(); }
  else if(game.state==="vsend"){ updateFx(dt); drawVsEnd(dt); }
  else if(game.state==="koend"){ updateFx(dt); drawKoEnd(dt); }
  else if(game.state==="clear"){ updateFx(dt); drawClear(dt); drawStickers(); }
  else if(game.state==="cooked"){ updateFx(dt); drawCooked(dt); }
  else if(game.state==="play"){
    hudBtns.length = 0;
    if(!paused){
      readInput();
      if(game.count>0){
        const prev = Math.ceil(game.count);
        game.count = Math.max(0, game.count-dt);
        const cur2 = Math.ceil(game.count);
        if(cur2!==prev){
          AU.beep(cur2>0? 440 : 880, 0.2, "square", 0.15);
          if(cur2===0) sticker("GO!!", "#9ae64a");
        }
      } else {
        const gdt = game.slowmo>0 ? dt*0.45 : dt;   // ⏱️ slow-mo scales gameplay time (crushers use game.gt)
        if(game.slowmo>0) game.slowmo -= dt;
        game.gt = (game.gt||0) + gdt;
        game.playT += gdt;
        updateCar(game.car, {vec:input.vec, nitro:input.nitro, main:true}, gdt);
        if(game.car2){
          updateCar(game.car2, {vec:input.vec2, nitro:false}, gdt);
          carBump(game.car, game.car2);
        }
        updateEntities(gdt);
      }
      updateFx(dt);
    }
    if(game.state==="play" || game.state==="clear"){  // levelClear may fire mid-update
      drawWorld(paused?0.0001:dt);
      if(game.state==="play"){ drawHUD(); drawConfettiScreen(); if(game.goldReveal) drawGoldReveal(dt); drawStickers(); }
    }
    if(paused && game.state==="play"){
      ctx.fillStyle = "rgba(8,10,16,0.6)"; ctx.fillRect(0,0,W,H);
      ctx.font = "900 italic 54px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.fillStyle="#f4f6ff"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("PAUSED", W/2, H*0.28);
      hudBtns.length = 0;
      // 🧭 a real pause MENU — big stacked buttons, incl. the way home (was just GO + MAP)
      const pw = Math.min(400, W*0.72), ph2 = clamp(Math.round(H*0.105), 54, 68), pgap = 14;
      let py2 = H*0.38;
      drawBigBtn(W/2-pw/2, py2, pw, ph2, "▶ KEEP RACING", "resume", "#9ae64a", "#12151f"); py2 += ph2+pgap;
      drawBigBtn(W/2-pw/2, py2, pw, ph2, game.fromBuilder? "🔨 BACK TO GARAGE" : game.coop? "🤝 CO-OP MAP" : (game.vs||game.ko)? "⚔️ ARENA PICK" : "🗺 LEVEL MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff"); py2 += ph2+pgap;
      drawBigBtn(W/2-pw/2, py2, pw, ph2, "🏠 MAIN MENU", "home", "#ffd76a", "#12151f");
    }
    // HUD button taps
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ if(paused){ paused=false; AU.ui(); } continue; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="mute") AU.toggleMute();
        if(b.act==="pause") togglePause();
        if(b.act==="resume") paused=false;
        if(b.act==="map"){ paused=false; game.state = game.fromBuilder? "build" : game.coop? "cooppick" : (game.vs||game.ko)? "vspick" : "map"; }
        if(b.act==="home"){ paused=false; game.state = "series"; }   // 🏠 straight to the main dashboard
      }
    }
  }
  // soft vignette
  if(!game._vig || game._vigW!==W || game._vigH!==H){
    game._vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.45, W/2,H/2, Math.max(W,H)*0.75);
    game._vig.addColorStop(0,"rgba(8,10,16,0)");
    game._vig.addColorStop(1,"rgba(8,10,16,0.42)");
    game._vigW=W; game._vigH=H;
  }
  ctx.fillStyle = game._vig; ctx.fillRect(0,0,W,H);
  if(portraitHint){
    ctx.fillStyle = "rgba(8,10,16,0.88)"; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(W/2, H*0.42); ctx.rotate(-Math.PI/2 + Math.sin(game.t*2.2)*0.25);
    ctx.font = "72px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    fillTextC("📱", 0, 0); ctx.restore();
    ctx.font = "900 30px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.fillStyle = "#f4f6ff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("TURN IT SIDEWAYS!", W/2, H*0.42+86);
  }
}
// a shared track arrived by link? add it to the garage
(function importFromHash(){
  const m = location.hash.match(/^#T=(.+)$/);
  if(!m) return;
  const t = decodeTrack(m[1]);
  history.replaceState(null, "", location.pathname + location.search);
  if(!t) return;
  const gs = t.grid.join("!");
  let cl = store.customLevels.find(c=>c.grid.join("!")===gs);
  if(!cl){
    if(store.customLevels.length>=10) return;
    store.nextTrackId = (store.nextTrackId||0)+1;
    cl = { id:store.nextTrackId, name:t.name, emojiIx:t.emojiIx, hueIx:t.hueIx, grid:t.grid };
    store.customLevels.push(cl); save();
  }
  game.importedTrack = cl;
  game.state = "series";
  sticker("NEW TRACK ARRIVED! 📦", "#ffd76a");
})();

requestAnimationFrame(frame);

// debug handle (safe to ignore)
window.__tm = { game, loadLevel, loadCustom, store, CONFIG, CRATES, spawnGolden, grabGolden, bl, enterBuilder, encodeTrack, decodeTrack,
  shopAction, VEHICLES, PETS, LEVELS, VS_ARENAS, startVs, customToLevel,
  SERIES, seriesUnlocked, seriesBeaten, seriesOf, save,
  COOP_LEVELS, startCoop, KO_ARENAS, startKo,
  step(sec){ paused = false; let n = last; for(let i=0;i<sec*60;i++){ n += 1000/60; tick(n); } last = performance.now(); } };
</script>
