/* ----------------------------------------------------------------
   SERIES ("worlds") — the campaign is split into worlds of levels.
   Beat every level in a world (1 star each) to unlock the next world.
   To add a world later: drop 15 more levels into LEVELS above, then add
   a { name, emoji, hue, blurb, count } entry here BEFORE the coming-soon
   card. Starts auto-compute; saved progress carries over untouched
   (worlds only group existing level indices — nothing is renumbered).
   ---------------------------------------------------------------- */
const SERIES = [
  { name:"TURBO BASICS", emoji:"🏁", hue:"#ffb742", blurb:"Learn to drift — keys, doors, crates & the first bosses.", count:15, reward:"blaze" },
  { name:"BRAIN FREEZE", emoji:"🧊", hue:"#7ec9ff", blurb:"Ice, portals, gate mazes, goober swarms & tougher bosses.", count:15, reward:"frost" },
  { name:"MAZE MAYHEM",  emoji:"🌀", hue:"#c56cff", blurb:"Shifting walls that rearrange the maze — time your run!", count:15, reward:"glitch" },
  { name:"METAL MELTDOWN", emoji:"🏭", hue:"#ff8a3c", blurb:"Conveyor belts, sliding crushers & trap doors — survive the factory!", count:15, reward:"monster" },
  { name:"SPLASH ZONE", emoji:"🌊", hue:"#2fd0e0", blurb:"Splash pads, sticky shallows & sinking foam floats — ride the currents and waterslides!", count:15, reward:"wave" },
  { name:"COSMIC RUSH", emoji:"🌌", hue:"#7b6cff", blurb:"Slingshot round planets, dive through wormholes, dodge drifting rocks — everything floats out here.", count:15, reward:"ufo" },
  { name:"HOT LAVA", emoji:"🌋", hue:"#ff4d2e", blurb:"The floor is LAVA! Outrun the molten wave, dodge geysers & don't melt!", count:15, reward:"phoenix" },
  { name:"NEW WORLD",    emoji:"🎢", hue:"#ff8fe0", blurb:"Something wild is cooking!", comingSoon:true },
];
(function computeSeriesStarts(){
  let acc = 0;
  for(const s of SERIES){ s.start = acc; if(s.comingSoon){ s.count = 0; } else { acc += s.count; } }
})();
function seriesEndIx(s){ return SERIES[s].start + SERIES[s].count - 1; }   // last global level index in a world
function seriesOf(ix){                                                     // which world owns a global level index (-1 if none)
  for(let s=0;s<SERIES.length;s++)
    if(!SERIES[s].comingSoon && ix>=SERIES[s].start && ix<=seriesEndIx(s)) return s;
  return -1;
}
function seriesBeaten(s){                                                  // every level in the world cleared (1★+)?
  if(SERIES[s].comingSoon) return false;
  for(let i=SERIES[s].start; i<=seriesEndIx(s); i++) if(!(store.stars[i]>=1)) return false;
  return true;
}
function seriesUnlocked(s){                                                // world playable? previous world fully beaten
  if(SERIES[s].comingSoon) return false;
  return s===0 || seriesBeaten(s-1);
}
function seriesBeatCount(s){                                               // levels cleared so far in the world
  let n=0; for(let i=SERIES[s].start; i<=seriesEndIx(s); i++) if(store.stars[i]>=1) n++;
  return n;
}

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
// roundRect polyfill for older iPads (iOS < 16)
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(Math.abs(r)||0, w/2, h/2);
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r);
    this.closePath();
    return this;
  };
}
let W=0, H=0, DPR=1, safeT=0, safeB=0, PADX=12;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  const cs = getComputedStyle(document.documentElement);
  safeT = parseFloat(cs.getPropertyValue("--sat"))||0;
  safeB = parseFloat(cs.getPropertyValue("--sab"))||0;
  // phone notch / Dynamic Island in landscape: inset edge-hugging UI symmetrically
  const safeL = parseFloat(cs.getPropertyValue("--sal"))||0;
  const safeR = parseFloat(cs.getPropertyValue("--sar"))||0;
  PADX = 12 + Math.max(safeL, safeR);
}
window.addEventListener("resize", resize); resize();

// 🎁 retroactively grant each world's reward car for any world ALREADY beaten (older saves recorded the clear before reward cars existed)
function grantRewardCars(){
  for(let s=0;s<SERIES.length;s++)
    if(SERIES[s].reward && seriesBeaten(s) && !store.ownedCars.includes(SERIES[s].reward)) store.ownedCars.push(SERIES[s].reward);
}

// One localStorage blob → the cloud, keyed by a memorable 4-word code. No
// accounts, no PII: the code IS the key. The server does a "most-progress-wins"
// merge, so an out-of-date device can never clobber newer progress. Fully inert
// until a Worker URL is wired in (see SYNC_URL_BUILTIN + docs/CLOUD-SYNC.md).
//
// ⚠️ syncMerge() below MUST stay in lockstep with worker/merge.js (that file is
//    authoritative). Same rules; this copy is a guard so progress earned during
//    the network round-trip can never regress.  (search tag: SYNC_MERGE)
const SYNC_URL_BUILTIN = "";   // ⬅️ DEPLOY STEP: set to "https://turbo-maze-sync.<your-subdomain>.workers.dev"
function syncUrl(){ try { return ((localStorage.getItem("tmSyncUrl")||"").trim()) || SYNC_URL_BUILTIN; } catch(e){ return SYNC_URL_BUILTIN; } }
function syncEnabled(){ return /^https?:\/\//.test(syncUrl()); }

function genCode(){ const w = SYNC_WORDS, p = []; for(let i=0;i<4;i++) p.push(w[Math.floor(Math.random()*w.length)]); return p.join("-"); }
function ensureSyncCode(){ if(!/^[a-z]+(-[a-z]+){3}$/.test(store.syncCode||"")){ store.syncCode = genCode(); saveLocal(); } return store.syncCode; }

// ---- SYNC_MERGE: client-side copy of the most-progress-wins join (guard) ----
const SYNC_MAX_SCALARS = ["unlocked","coinsBank","aura","coopUnlocked","cratesOpened","goldenFound","nextTrackId"];
const SYNC_OR_FLAGS    = ["shopGift"];
const SYNC_MAX_MAPS    = ["stars","coopStars","upg","powerups","found","seenItems","goldTaken","seriesCleared"];
const SYNC_UNION_ARR   = ["ownedCars","ownedPets","cosmetics"];
function _sNum(x){ return typeof x==="number" && isFinite(x) ? x : undefined; }
function _sMaxMap(a,b){ a=a||{}; b=b||{}; const o={}; for(const k of new Set([...Object.keys(a),...Object.keys(b)])){ const an=_sNum(a[k]),bn=_sNum(b[k]); if(an!==undefined||bn!==undefined) o[k]=Math.max(an===undefined?-Infinity:an, bn===undefined?-Infinity:bn); else o[k]=a[k]||b[k]; } return o; }
function _sUnion(a,b){ const seen=new Set(),o=[]; for(const v of [...(a||[]),...(b||[])]){ const key=(v&&typeof v==="object")?JSON.stringify(v):v; if(!seen.has(key)){ seen.add(key); o.push(v); } } return o; }
function _sGhosts(a,b){ a=a||{}; b=b||{}; const o={}; for(const k of new Set([...Object.keys(a),...Object.keys(b)])){ const av=a[k],bv=b[k]; if(!av){o[k]=bv;continue;} if(!bv){o[k]=av;continue;} const at=_sNum(av.t),bt=_sNum(bv.t); if(at===undefined){o[k]=bv;continue;} if(bt===undefined){o[k]=av;continue;} o[k]=at<=bt?av:bv; } return o; }
function _sCKey(lv){ if(!lv||typeof lv!=="object") return JSON.stringify(lv); const {id, ...rest}=lv; return JSON.stringify(rest); }
function _sLevels(a,b){ const all=[...(a||[]),...(b||[])]; let maxId=0; for(const lv of all) if(lv&&typeof lv.id==="number"&&lv.id>maxId) maxId=lv.id; const o=[],seen=new Set(),used=new Set(); for(const lv of all){ if(!lv) continue; const ck=_sCKey(lv); if(seen.has(ck)) continue; seen.add(ck); let id=(typeof lv.id==="number")?lv.id:null; if(id===null||used.has(id)) id=++maxId; used.add(id); o.push(id===lv.id?lv:Object.assign({},lv,{id})); } return o; }
function syncMerge(a,b){ a=a||{}; b=b||{}; const o={};
  for(const k of SYNC_MAX_SCALARS){ const an=_sNum(a[k]),bn=_sNum(b[k]); if(an!==undefined||bn!==undefined) o[k]=Math.max(an===undefined?-Infinity:an, bn===undefined?-Infinity:bn); }
  for(const k of SYNC_OR_FLAGS){ if(a[k]!==undefined||b[k]!==undefined) o[k]=!!(a[k]||b[k]); }
  for(const k of SYNC_MAX_MAPS){ if(a[k]!==undefined||b[k]!==undefined) o[k]=_sMaxMap(a[k],b[k]); }
  for(const k of SYNC_UNION_ARR){ if(a[k]!==undefined||b[k]!==undefined) o[k]=_sUnion(a[k],b[k]); }
  if(a.ghosts!==undefined||b.ghosts!==undefined) o.ghosts=_sGhosts(a.ghosts,b.ghosts);
  if(a.customLevels!==undefined||b.customLevels!==undefined){ o.customLevels=_sLevels(a.customLevels,b.customLevels); let hi=0; for(const lv of o.customLevels) if(lv&&typeof lv.id==="number"&&lv.id>hi) hi=lv.id; o.nextTrackId=Math.max(o.nextTrackId||0,hi); }
  return o;
}

// ---- sync engine ----
const sync = { state:"idle", msg:"", inflight:false };   // state: idle|syncing|ok|err
let _pushTimer = 0;
function schedulePush(){ if(!syncEnabled()) return; clearTimeout(_pushTimer); _pushTimer = setTimeout(()=>syncNow("push"), 3500); }
function applyRemote(remote){
  if(!remote || typeof remote!=="object") return;
  // join the LIVE store with the returned blob → never regress progress earned
  // during the round-trip; device-local fields aren't in the join so they stay.
  Object.assign(store, syncMerge(store, remote));
  grantRewardCars();
  saveLocal();
}
async function syncNow(reason){
  if(!syncEnabled()) return false;
  if(sync.inflight) return false;
  ensureSyncCode();
  sync.inflight = true; sync.state = "syncing"; sync.msg = "Syncing…";
  try {
    const res = await fetch(syncUrl(), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ code: store.syncCode, store })
    });
    const data = await res.json();
    if(data && data.ok){ applyRemote(data.store); sync.state="ok"; sync.msg="Saved to the cloud ☁️"; return true; }
    sync.state="err"; sync.msg = data && data.error ? ("Hmm: "+data.error) : "Couldn't sync";
    return false;
  } catch(e){
    sync.state="err"; sync.msg="Offline — will try again"; return false;   // never breaks the game
  } finally { sync.inflight = false; }
}
function promptEnterCode(){
  const v = window.prompt("Type your 4-word cloud code to load your stuff\n(like  tiger-comet-mango-turbo):", store.syncCode||"");
  if(v==null) return;
  const code = v.trim().toLowerCase().replace(/\s+/g,"-").replace(/[^a-z\-]/g,"");
  if(/^[a-z]+(-[a-z]+){3}$/.test(code)){ store.syncCode = code; saveLocal(); sticker("CODE SET! ☁️","#9ae6ff"); syncNow("code"); }
  else sticker("THAT CODE LOOKS OFF","#ff8f8f");
}
function copyCode(){ try { navigator.clipboard.writeText(store.syncCode||""); sticker("CODE COPIED! 📋","#9ae6ff"); } catch(e){ sticker(store.syncCode||"","#9ae6ff"); } }

/* ---------------- audio (all synth, no files) ---------------- */
// 🎵 procedural chiptune — PER-WORLD personality (index 0-6 == SERIES world). root = lead reference (Hz),
// scale = semitone steps, lead = arpeggio waveform, tempo = base BPM (146 default). Deterministic — no samples.
const MUS_WORLDS = [
  { root:220.00, scale:[0,2,4,7,9],      lead:"square",   tempo:146 },                 // 0 TURBO BASICS — A major pentatonic, bright square
  { root:164.81, scale:[0,2,3,5,7,10],   lead:"triangle", tempo:142, airy:1 },         // 1 BRAIN FREEZE — E minor, airy triangle, slower hat
  { root:146.83, scale:[0,2,3,5,7,9,10], lead:"sawtooth", tempo:146, detune:7 },        // 2 MAZE MAYHEM — D dorian, detuned saw
  { root:196.00, scale:[0,2,3,5,7,8,10], lead:"square",   tempo:148, industrial:1 },    // 3 METAL MELTDOWN — G minor, gritty square + extra offbeat kick
  { root:261.63, scale:[0,2,4,7,9],      lead:"square",   tempo:150, bouncy:1 },        // 4 SPLASH ZONE — C major pentatonic, bouncy
  { root:174.61, scale:[0,2,4,6,7,9,11], lead:"triangle", tempo:144, vibrato:1 },       // 5 COSMIC RUSH — F lydian, soft triangle w/ slow vibrato
  { root:164.81, scale:[0,1,3,5,7,8,10], lead:"sawtooth", tempo:156, driving:1 },       // 6 HOT LAVA — E phrygian, driving saw, tempo 156
];
// arpeggio contours — scale-degree indices (may exceed scale length → octave up); -1 = rest. A 4-bar block picks one deterministically.
const MUS_ARPS = [
  [0,2,4,7, 4,2,0,2],
  [0,4,7,4, 9,7,4,2],
  [0,2,0,4, 2,4,-1,7],
  [7,4,2,0, 4,2,0,-1],
  [0,3,5,7, 5,3,2,0],
];
const MUS_BASS = [0,0,7,0, 5,0,7,0];   // scale-degree pattern for the 8 eighth-notes in a bar (root-heavy, walks to the 5th)
function musSeed(a,b){ let h = ((a|0)*73856093) ^ ((b|0)*19349663); h = (h ^ (h>>>13)) >>> 0; return h; }  // deterministic — never Math.random in the scheduler
const AU = {
  ctx:null, master:null, engine:null, engineGain:null, driftGain:null, started:false, music:null,
  init(){
    if(this.started) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = store.muted ? 0 : 0.5;
      this.master.connect(this.ctx.destination);
      // engine hum
      const osc = this.ctx.createOscillator(); osc.type="sawtooth"; osc.frequency.value=60;
      const osc2 = this.ctx.createOscillator(); osc2.type="square"; osc2.frequency.value=61;
      const lp = this.ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=280;
      this.engineGain = this.ctx.createGain(); this.engineGain.gain.value=0;
      osc.connect(lp); osc2.connect(lp); lp.connect(this.engineGain); this.engineGain.connect(this.master);
      osc.start(); osc2.start(); this.engine = [osc, osc2];
      // drift hiss
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate, this.ctx.sampleRate);
      const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const noise = this.ctx.createBufferSource(); noise.buffer=buf; noise.loop=true;
      const bp = this.ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=900; bp.Q.value=0.6;
      this.driftGain = this.ctx.createGain(); this.driftGain.gain.value=0;
      noise.connect(bp); bp.connect(this.driftGain); this.driftGain.connect(this.master);
      noise.start();
      this.started = true;
      this.resume();
    }catch(e){}
  },
  resume(){ // iOS suspends audio contexts aggressively — poke it on every gesture
    if(this.ctx && this.ctx.state === "suspended") this.ctx.resume().catch(()=>{});
  },
  setEngine(speed, boosting){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const f = 55 + speed*0.16 + (boosting?40:0);
    this.engine[0].frequency.setTargetAtTime(f, t, 0.05);
    this.engine[1].frequency.setTargetAtTime(f*1.007, t, 0.05);
    this.engineGain.gain.setTargetAtTime(speed>5 ? 0.05 : 0.015, t, 0.1);
  },
  setDrift(on){ if(this.started) this.driftGain.gain.setTargetAtTime(on?0.06:0, this.ctx.currentTime, 0.05); },
  beep(freq, dur, type, vol, slideTo){
    if(!this.started || store.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type = type||"square"; o.frequency.value = freq;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
    const g = this.ctx.createGain(); g.gain.setValueAtTime(vol||0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.02);
  },
  coin(){ this.beep(880,0.09,"square",0.1); setTimeout(()=>this.beep(1318,0.12,"square",0.1), 60); },
  key(){ [660,880,1108].forEach((f,i)=> setTimeout(()=>this.beep(f,0.15,"triangle",0.14), i*90)); },
  door(){ this.beep(160,0.25,"triangle",0.2,80); },
  bonk(){ this.beep(140,0.18,"triangle",0.25,50); },
  goober(){ this.beep(300,0.3,"sawtooth",0.14,90); },
  nitro(){ this.beep(200,0.4,"sawtooth",0.1,700); },
  star(i){ this.beep(660+i*220, 0.25, "triangle", 0.16); },
  ui(){ this.beep(520,0.06,"square",0.07); },
  win(){ [523,659,784,1046,784,1046,1318,1568].forEach((f,i)=> setTimeout(()=>this.beep(f, i>5?0.4:0.14, "triangle", 0.14), i*110)); },
  toggleMute(){ store.muted=!store.muted; save(); if(this.master) this.master.gain.value = store.muted?0:0.5; },

  /* ---------- 🎵 procedural music sequencer (lookahead scheduler, no samples) ---------- */
  // called every frame from tick(); mode = {kind:"race",world,boss} | {kind:"menu"} | {kind:"off"}.
  // diffs against the running mode and only rebuilds on change → never stacks schedulers.
  musicSig(m){ return m.kind==="race" ? ("race:"+m.world+":"+(m.boss?1:0)) : m.kind==="menu" ? "menu" : "off"; },
  musicEnsure(mode){
    try{
      if(!CONFIG.music){ this.musicStop(); return; }
      if(!this.started || !this.ctx) return;          // no AudioContext yet (title / pre-gesture / unsupported) → stay quiet
      const sig = this.musicSig(mode);
      if(this.music && this.music.sig === sig) return; // unchanged → leave the running loop alone
      this.musicStop();                                // tear the old one down first (never two at once)
      if(mode.kind === "off") return;
      this.musicStart(mode, sig);
    }catch(e){ this.music = null; }
  },
  musicStart(mode, sig){
    const race = mode.kind === "race";
    const world = race ? clamp(mode.world|0, 0, MUS_WORLDS.length-1) : 0;
    const V = MUS_WORLDS[world];
    const bpm = race ? (V.tempo + (mode.boss?10:0)) : 100;
    const bus = this.ctx.createGain(); bus.gain.value = 0.16; bus.connect(this.master);
    // one reusable noise buffer for hats/snares (Math.random here is SETUP, not the scheduler)
    const nb = this.ctx.createBuffer(1, Math.max(1, Math.floor(this.ctx.sampleRate*0.12)), this.ctx.sampleRate);
    const nd = nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
    const M = this.music = {
      sig, kind:mode.kind, world, boss:!!mode.boss, V, bus, noise:nb,
      stepDur: 15/bpm,                                 // seconds per 16th step (60/bpm/4)
      step:0, bar:0, timer:null, next: this.ctx.currentTime + 0.06,
      leadRoot: race? V.root : 220.0,
      bassRoot: (race? V.root : 220.0)/2,
      menuChords: [[0,3,7],[5,8,12],[-4,0,3],[-5,-1,2]], // A-minor-ish garage progression (offsets from root)
    };
    M.timer = setInterval(()=>{ try{ this.musicTick(); }catch(e){ this.musicStop(); } }, 90);
    this.musicTick();                                  // prime immediately so the first bar lands on time
  },
  musicStop(){
    const M = this.music; if(!M) return;
    this.music = null;
    try{ if(M.timer) clearInterval(M.timer); }catch(e){}
    try{ if(M.bus){ const b = M.bus; b.gain.setTargetAtTime(0, this.ctx.currentTime, 0.05); setTimeout(()=>{ try{ b.disconnect(); }catch(e){} }, 300); } }catch(e){}
  },
  musicTick(){
    const M = this.music; if(!M || !this.ctx) return;
    const now = this.ctx.currentTime, ahead = now + 0.12;
    if(M.next < now - 0.5) M.next = now + 0.03;         // fell way behind (tab was backgrounded) → drop the backlog
    let guard = 0;
    while(M.next < ahead && guard++ < 64){
      this.musicStep(M, M.step, M.next);
      M.next += M.stepDur;
      if(++M.step >= 16){ M.step = 0; M.bar++; }
    }
  },
  musicStep(M, s, t){
    const bus = M.bus;
    if(M.kind === "menu"){                              // chill garage loop: soft triangle chords + sparse pluck
      if(s===0 || s===8){
        const ch = M.menuChords[M.bar % M.menuChords.length];
        for(const semi of ch) this.mNote(bus, 220*Math.pow(2, semi/12), t, 1.15, "triangle", 0.05);
      }
      if(s===6 || s===12){                              // sparse pluck up top
        const semi = [12,7,15,10][(M.bar+ (s>>2)) % 4];
        this.mNote(bus, 220*Math.pow(2, semi/12), t, 0.4, "triangle", 0.045);
      }
      if(s%4===0) this.mKick(bus, t, 0.28);             // gentle heartbeat
      return;
    }
    const V = M.V;
    if(s%4===0) this.mKick(bus, t, 0.9);                // KICK on 0/4/8/12
    if(V.industrial && (s===6 || s===14)) this.mKick(bus, t, 0.5);  // world 3: extra industrial offbeat thump
    if(s%4===2) this.mHat(M, t, V.airy? 0.03 : 0.055);  // HAT on the &s
    if(!V.airy && (s===1||s===5||s===9||s===13)) this.mHat(M, t, 0.028);   // busier hats (airy world 1 keeps it sparse)
    if(M.boss && (s===4 || s===12)) this.mSnare(M, t);  // BOSS snare on 4/12
    if(s%2===0){                                        // BASS + LEAD on every 8th
      const bDeg = MUS_BASS[(s>>1) % 8];
      this.mNote(bus, M.bassRoot*Math.pow(2, this.mSemi(V, bDeg)/12), t, M.stepDur*1.7, "square", 0.13);
      const lDeg = this.mLead(M, M.bar, s);
      if(lDeg >= 0){
        const semi = this.mSemi(V, lDeg) + (M.boss?12:0);
        this.mNote(bus, M.leadRoot*Math.pow(2, semi/12), t, M.stepDur*1.35, V.lead, 0.085,
          { detune:V.detune||0, vibrato:!!V.vibrato });
      }
    }
  },
  mSemi(V, deg){ const L=V.scale.length, o=Math.floor(deg/L); return V.scale[((deg%L)+L)%L] + o*12; },
  mLead(M, bar, step){                                  // 2-bar phrase; the contour swaps every 4 bars (deterministic seed)
    const V = M.V, block = Math.floor(bar/4);
    const seed = musSeed(M.world*97 + block, 0);
    const arp = MUS_ARPS[seed % MUS_ARPS.length];
    const ls = (bar%2)*8 + (step>>1);                   // 0..15 across the 2-bar phrase
    let deg = arp[ls % 8];
    if(deg < 0) return -1;
    if(ls >= 8) deg += V.scale.length;                  // 2nd bar an octave up → the phrase has an arc
    if((seed>>4) & 1) deg += V.scale.length;            // block-level octave lift for variety
    return deg;
  },
  mNote(dest, freq, t, dur, type, vol, opts){
    const o = this.ctx.createOscillator(); o.type = type; o.frequency.value = freq;
    if(opts && opts.detune && o.detune) o.detune.value = opts.detune;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0003, vol), t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(dest); o.start(t); o.stop(t+dur+0.03);
    if(opts && opts.vibrato){
      const lfo = this.ctx.createOscillator(); lfo.type="sine"; lfo.frequency.value = 5;
      const lg = this.ctx.createGain(); lg.gain.value = freq*0.012;
      lfo.connect(lg); lg.connect(o.frequency); lfo.start(t); lfo.stop(t+dur+0.03);
    }
  },
  mKick(dest, t, vol){
    const o = this.ctx.createOscillator(); o.type="sine";
    o.frequency.setValueAtTime(110, t); o.frequency.exponentialRampToValueAtTime(50, t+0.09);
    const g = this.ctx.createGain(); g.gain.setValueAtTime(vol||0.85, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
    o.connect(g); g.connect(dest); o.start(t); o.stop(t+0.14);
  },
  mHat(M, t, vol){
    const s = this.ctx.createBufferSource(); s.buffer = M.noise;
    const hp = this.ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value = 7000;
    const g = this.ctx.createGain(); g.gain.setValueAtTime(vol||0.05, t); g.gain.exponentialRampToValueAtTime(0.0005, t+0.03);
    s.connect(hp); hp.connect(g); g.connect(M.bus); s.start(t); s.stop(t+0.05);
  },
  mSnare(M, t){
    const s = this.ctx.createBufferSource(); s.buffer = M.noise;
    const bp = this.ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value = 1800; bp.Q.value = 0.8;
    const g = this.ctx.createGain(); g.gain.setValueAtTime(0.45, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.13);
    s.connect(bp); bp.connect(g); g.connect(M.bus); s.start(t); s.stop(t+0.15);
  },
};
// 🎵 which loop should be playing right now? race music only for a SOLO campaign/custom race — VS/co-op/KO/builder
// stay silent (true no-op, exactly as before); menus get the chill loop; title & result screens stay quiet.
function musicMode(){
  if(game.state === "play"){
    if(game.vs || game.coop || game.ko || game.fromBuilder) return {kind:"off"};
    const w = (game.levelIx>=0 && !game.customId) ? seriesOf(game.levelIx) : 0;
    return { kind:"race", world: w<0?0:w, boss: !!game.rival };
  }
  const MENU = { home:1, series:1, map:1, shop:1, crates:1, garage:1, vspick:1, cooppick:1 };
  return MENU[game.state] ? {kind:"menu"} : {kind:"off"};
}

/* ---------------- input: keyboard + touch ---------------- */
const input = { vec:{x:0,y:0}, vec2:{x:0,y:0}, nitro:false,
  hasTouch: ("ontouchstart" in window) || navigator.maxTouchPoints>0,
  joy:null, joy2:null, taps:[] };
const keys = {};
window.addEventListener("keydown", e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  AU.init();
  if(!keys[e.key]) {
    if(e.key==="Enter"||e.key===" ") input.taps.push({screen:true});
    if(e.key==="m"||e.key==="M") AU.toggleMute();
    if(e.key==="p"||e.key==="P") togglePause();
  }
  keys[e.key]=true;
});
window.addEventListener("keyup", e=> keys[e.key]=false);
function normVec(x,y){
  const m = Math.hypot(x,y)||1;
  return {x:x/m*Math.min(1,Math.hypot(x,y)), y:y/m*Math.min(1,Math.hypot(x,y))};
}
function keyVec(){   // merged (single player)
  let x=0,y=0;
  if(keys.ArrowLeft||keys.a||keys.A) x-=1;
  if(keys.ArrowRight||keys.d||keys.D) x+=1;
  if(keys.ArrowUp||keys.w||keys.W) y-=1;
  if(keys.ArrowDown||keys.s||keys.S) y+=1;
  return normVec(x,y);
}
function keyVecArrows(){
  let x=0,y=0;
  if(keys.ArrowLeft) x-=1; if(keys.ArrowRight) x+=1;
  if(keys.ArrowUp) y-=1;  if(keys.ArrowDown) y+=1;
  return normVec(x,y);
}
function keyVecWASD(){
  let x=0,y=0;
  if(keys.a||keys.A) x-=1; if(keys.d||keys.D) x+=1;
  if(keys.w||keys.W) y-=1; if(keys.s||keys.S) y+=1;
  return normVec(x,y);
}
function joyVec(j){
  if(!j) return {x:0,y:0};
  const dx=j.x-j.ox, dy=j.y-j.oy, m=Math.hypot(dx,dy);
  if(m<=8) return {x:0,y:0};
  const c=Math.min(1,m/48);
  return {x:dx/m*c, y:dy/m*c};
}

  if(!sh.ptr.moved && Math.hypot(dx,dy) > 10) sh.ptr.moved = true;
  if(sh.ptr.moved && Math.abs(dx) > Math.abs(dy)) sh.scroll = clamp(sh.ptr.s0 - dx/sh.strip.step, 0, sh.max);

/* ==================================================================
   🔀 MAZE VARIETY — mirror/rotate later-world & co-op mazes at load so
   the start & finish land in fresh corners (not always top-left →
   bottom-right). Deterministic per level (stable on replay). World 1 and
   co-op Season 1 stay the standard diagonal on-ramp. Toggle: CONFIG.mazeVariety.
   A mirror/rotate is an isometry — PATH LENGTH is preserved, so every
   level stays solvable and its par/star balance is unchanged.
   ================================================================== */
function varietyKey(seed){ return (seed*3) % 4; }   // 0 = none · 1 = H-flip · 2 = V-flip · 3 = 180° (deterministic spread)
function swapDirs(str, h, v){                        // flip conveyor arrows so they still push the mirrored way
  let out = "";
  for(const ch of str){
    let c = ch;
    if(h){ if(c==="<") c=">"; else if(c===">") c="<"; }
    if(v){ if(c==="^") c="v"; else if(c==="v") c="^"; }
    out += c;
  }
  return out;
}
function transformLevel(L, key){
  const h = (key===1||key===3), v = (key===2||key===3);
  const R = L.grid.length, C = L.grid[0].length;
  let grid = L.grid.map(row => swapDirs(row, h, v));
  if(h) grid = grid.map(row => [...row].reverse().join(""));
  if(v) grid = grid.reverse();
  const mapC = c => h ? C-1-c : c, mapR = r => v ? R-1-r : r;
  const out = Object.assign({}, L, {grid});
  if(L.crushers) out.crushers = L.crushers.map(k => Object.assign({}, k,     // origin + slide direction reflect
    { c:mapC(k.c), r:mapR(k.r), dx: h? -(k.dx||0) : (k.dx||0), dy: v? -(k.dy||0) : (k.dy||0) }));
  if(L.asteroids) out.asteroids = L.asteroids.map(a => Object.assign({}, a,  // ☄️ drift origin + direction reflect
    { c:mapC(a.c), r:mapR(a.r), dx: h? -(a.dx||0):(a.dx||0), dy: v? -(a.dy||0):(a.dy||0) }));
  if(L.sweep) out.sweep = Object.assign({}, L.sweep, { dir: h? -(L.sweep.dir||1) : (L.sweep.dir||1) });   // 🔥 lava-sweep direction reflects

  if(L.hazards)  out.hazards  = L.hazards.map(hz => Object.assign({}, hz,    // sliding-bar patrol waypoints reflect
    { path: hz.path.map(([c,r]) => [mapC(c), mapR(r)]) }));
  if(L.seq)      out.seq      = L.seq.map(([c,r]) => [mapC(c), mapR(r)]);    // co-op sequence-pad order reflects
  return out;
}
function varyMaze(L, meta){
  if(!CONFIG.mazeVariety || !L || !L.grid) return L;
  let key = 0;
  if(meta.ix!==undefined && seriesOf(meta.ix) >= 1)  key = varietyKey(meta.ix);              // campaign World 2+
  else if(meta.coop && (meta.coopIx||0) >= 15)       key = varietyKey(1000 + meta.coopIx);   // co-op Season 2+
  return key ? transformLevel(L, key) : L;
}
/* 🔒 gateFinish — on a key+door level, make the finish reachable ONLY through a door,
   so the key can't be skipped (some levels were authored with an open bypass around
   the lock). Verified per level: key reachable BEFORE any door, finish reachable with
   doors OPEN, finish UNREACHABLE with doors closed. If it can't seal safely it leaves
   the level as-is (the finish-needs-key check in updateEntities is the backstop). */
function gateFinish(L){
  if(!L || !L.grid) return L;
  const rows = L.grid.map(r=>r.split("")), R=rows.length, C=rows[0].length, key=(c,r)=>c+","+r;
  let K=null,S=null; const Fs=[],doors=[];
  for(let r=0;r<R;r++) for(let c=0;c<C;c++){ const ch=rows[r][c];
    if(ch==="F")Fs.push([c,r]); else if(ch==="k")K=[c,r]; else if(ch==="S")S=[c,r]; else if(ch==="D")doors.push([c,r]); }
  if(!Fs.length || !doors.length || !K || !S) return L;                 // only real key+door levels
  const Fset=new Set(Fs.map(f=>key(f[0],f[1]))), dset0=new Set(doors.map(d=>key(d[0],d[1])));
  const reach=(from,to,sim,blocked)=>{ const seen=new Set([key(from[0],from[1])]), q=[[from[0],from[1]]];
    while(q.length){ const [c,r]=q.shift(); if(c===to[0]&&r===to[1]) return true;
      for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nr<0||nc>=C||nr>=R||sim[nr][nc]==="#") continue;
        if(blocked && blocked(key(nc,nr))) continue; const k=key(nc,nr); if(!seen.has(k)){ seen.add(k); q.push([nc,nr]); } } } return false; };
  if(!reach(S,Fs[0],rows,cr=>dset0.has(cr))) return L;                  // finish already gated → leave it
  const openings=[], seen=new Set();
  for(const [fc,fr] of Fs) for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nc=fc+dc,nr=fr+dr,k=key(nc,nr);
    if(nc<0||nr<0||nc>=C||nr>=R||Fset.has(k)||seen.has(k)) continue; const ch=rows[nr][nc];
    if(ch==="."||ch==="x"){ openings.push([nc,nr]); seen.add(k); } }                    // road/crate cells bordering the finish
  const configs=[{e:null}, ...openings.map(o=>({e:o}))];                // use an existing adjacent door, or turn one opening into a door
  for(const cfg of configs){ const sim=rows.map(row=>row.slice()), dSet=new Set(dset0);
    for(const [c,r] of openings){ if(cfg.e && c===cfg.e[0] && r===cfg.e[1]){ sim[r][c]="D"; dSet.add(key(c,r)); } else sim[r][c]="#"; }
    const closed=cr=>dSet.has(cr);
    if(reach(S,K,sim,closed) && reach(S,Fs[0],sim,null) && !reach(S,Fs[0],sim,closed))
      return Object.assign({}, L, {grid: sim.map(r=>r.join(""))}); }
  return L;                                                             // no safe seal → leave as-is (backstop covers it)
}
/* ---------------- 👻 ghost time-trials (record your own best run, then race the replay) ---------------- */
// eligible = SOLO campaign level ONLY. Custom tracks (game.customId) + VS/co-op/KO are excluded → true no-op there.
function ghostEligible(){ return CONFIG.ghosts && game.levelIx>=0 && !game.customId && !game.vs && !game.coop && !game.ko; }
const GHOST_HZ = 0.125, GHOST_CAP = 1400;   // 8 Hz sampling, ≤175s of run captured
// encode: [x,y,heading]* → per-sample int16 x/y deltas (px, two's-complement) + 1 heading byte → base64. x/y round-trip EXACTLY.
function ghostEnc(rec){
  if(!rec || rec.length < 2) return "";
  const buf = new Uint8Array(rec.length*5);
  let px=0, py=0, o=0;
  for(let i=0;i<rec.length;i++){
    const x = Math.round(rec[i][0]), y = Math.round(rec[i][1]);
    const dx = clamp(x-px, -32768, 32767) & 0xffff, dy = clamp(y-py, -32768, 32767) & 0xffff;
    buf[o++] = dx & 0xff; buf[o++] = (dx>>8) & 0xff;
    buf[o++] = dy & 0xff; buf[o++] = (dy>>8) & 0xff;
    buf[o++] = Math.round(((rec[i][2]%TAU+TAU)%TAU)/TAU*256) & 0xff;
    px = x; py = y;
  }
  let s=""; for(let i=0;i<buf.length;i++) s += String.fromCharCode(buf[i]);
  return btoa(s);
}
function ghostDec(str){
  try{
    const bin = atob(str), n = Math.floor(bin.length/5);
    if(n < 2) return null;
    const pts = new Array(n); let px=0, py=0;
    for(let i=0;i<n;i++){
      const o = i*5;
      const ux = bin.charCodeAt(o) | (bin.charCodeAt(o+1)<<8);
      const uy = bin.charCodeAt(o+2) | (bin.charCodeAt(o+3)<<8);
      px += ux>=32768? ux-65536 : ux;
      py += uy>=32768? uy-65536 : uy;
      pts[i] = { x:px, y:py, h: bin.charCodeAt(o+4)/256*TAU };
    }
    return pts;
  }catch(e){ return null; }
}
// interpolated ghost position at replay time t (lerp pos, shortest-arc lerp heading)
function ghostAt(gh){
  const pts = gh.pts, last = pts.length-1;
  const f = gh.t / GHOST_HZ;
  if(f <= 0) return pts[0];
  if(f >= last) return pts[last];
  const i = f|0, u = f-i, a = pts[i], b = pts[i+1];
  return { x: lerp(a.x,b.x,u), y: lerp(a.y,b.y,u), h: a.h + angDiff(a.h,b.h)*u };
}
function startLevel(L, meta){

      if(ch==="%") game.crumbles.push({c,r,x:wx,y:wy,state:"intact",t0:0,ph:Math.random()*TAU}); // 🧱 foam float
      if(ch==="@") game.wells.push({c,r,x:wx,y:wy,ph:Math.random()*TAU});                 // 🪐 well (core solidified above)
      if(ch==="0") game.portals.push({c,r,x:wx,y:wy,cool:0,bh:true});                     // 🕳️ black-hole wormhole end
      if(ch==="V") game.voids.push({c,r,x:wx,y:wy,ph:Math.random()*TAU});                 // 🕳️ chasm
      if(ch==="U") game.rings.push({c,r,x:wx,y:wy,cool:0,ph:Math.random()*TAU});          // 🚀 launch ring
      if(ch==="L"){ game.lavas.push({c,r,x:wx,y:wy,ph:Math.random()*TAU}); game.lavaCell[r][c]=1; }  // 🌋 molten lava pool — touch it and you MELT
      if(ch==="Y") game.geysers.push({c,r,x:wx,y:wy,ph:((c*7+r*13)%10)/10, k:0});         // ⛲ geyser vent — passable road, deterministic phase, deadly mid-eruption
    }
  }
  game.portals.length = Math.min(2, game.portals.length);   // exactly one pair
  // doors + closed gates are solid until opened (handled in isSolid)
  game.coinsAll = game.coins.filter(c=>!c.nitro).length;
  // face the car toward open road
  let head = 0;
  const [sc,sr] = game.startCell;
  if(!isWallCell(sc+1,sr) || !isWallCell(sc+2,sr)) head = 0;
  else if(!isWallCell(sc,sr+1)) head = Math.PI/2;
  game.car = newCar(sx, sy, head);
  game.car.spawn = {x:sx, y:sy, h:head};       // trap-door / respawn point
  game.car2 = null;
  if(twoP){
    const p2head = !isWallCell(p2c-1,p2r) ? Math.PI : -Math.PI/2;
    game.car2 = newCar(p2x||sx, p2y||sy, p2x? p2head : head);
    game.car2.p2 = true;
    game.car2.spawn = {x:p2x||sx, y:p2y||sy, h:p2head};
  }
  // sliding crushers (hand-authored via L.crushers:[{c,r,dx,dy,range,period,phase}])
  (L.crushers||[]).forEach(cr=> game.crushers.push({
    c:cr.c, r:cr.r, dx:cr.dx||0, dy:cr.dy||0, range:cr.range||3,
    period:cr.period||2.6, phase:cr.phase||0, cc:cr.c, cr:cr.r }));
  // ☄️ soft drifting asteroids (hand-authored via L.asteroids:[{c,r,dx,dy,range,period,phase,size}])
  (L.asteroids||[]).forEach(a=> game.asteroids.push({
    c:a.c, r:a.r, dx:a.dx||0, dy:a.dy||0, range:a.range||3,
    period:(CONFIG.easyMode? (a.period||3.6)*1.25 : (a.period||3.6)),
    phase:a.phase||0, size:a.size||1, off:0,
    x:(a.c+0.5)*CELL, y:(a.r+0.5)*CELL,
    spin:Math.random()*TAU, spv:(Math.random()<0.5?-1:1)*(0.5+Math.random()*0.6) }));
  // 🔥 W7 THE LAVA SWEEP (hand-authored via L.sweep:{dir,speed,delay}) — campaign only, NEVER in a
  // two-player mode. A molten wall rolls across the map after a head start; pos is the front in CELLS.
  if(L.sweep && !twoP) game.sweep = { dir:L.sweep.dir||1, speed:L.sweep.speed||0.9, delay:L.sweep.delay||4,
    pos:(L.sweep.dir||1)>0 ? -1 : game.cols+1 };
  if(game.coop){
    game.car.home=false; if(game.car2) game.car2.home=false;
    game.car.spawn = {x:sx, y:sy, h:head};
    if(game.car2) game.car2.spawn = {x:p2x||sx, y:p2y||sy, h:game.car2.heading};
    // number the sequence pads: reading order (top→bottom, left→right) unless the level overrides
    if(L.seq){ (L.seq||[]).forEach(([sc2,sr2],ix)=>{ const pad = game.seqPads.find(p=>p.c===sc2 && p.r===sr2); if(pad) pad.num = ix+1; }); }
    else game.seqPads.forEach((p,ix)=> p.num = ix+1);
    game.seqLen = game.seqPads.length;
  }
  if(game.ko){                                   // knockout: 3 lives each, remember spawn points
    game.car.lives = 3;  game.car.spawn = {x:sx, y:sy, h:head};
    if(game.car2){ game.car2.lives = 3; game.car2.spawn = {x:p2x||sx, y:p2y||sy, h:game.car2.heading}; }
  }
  game.cars = game.car2 ? [game.car, game.car2] : [game.car];
  game.pet = { x:sx, y:sy };
  game.cam.x = sx; game.cam.y = sy;
  (L.hazards||[]).forEach(h=>{
    game.goobers.push({ path:h.path.map(p=>[(p[0]+0.5)*CELL,(p[1]+0.5)*CELL]),
      seg:0, x:(h.path[0][0]+0.5)*CELL, y:(h.path[0][1]+0.5)*CELL,
      speed:(CONFIG.easyMode? h.speed*0.7 : h.speed), ph:Math.random()*TAU });
  });
  // boss race: the goober drives his own car, start to finish
  game.rival = null;
  if(L.rival){
    const trapAvoid = new Set(game.trapDoors.map(t=>t.c+","+t.r));                          // a good driver routes around the hatches
    for(const cm of game.crumbles) trapAvoid.add(cm.c+","+cm.r);                            // 🧱 rival routes around foam floats too
    for(const l of game.lavas) trapAvoid.add(l.c+","+l.r);                                  // 🌋 rival routes around molten pools (and NEVER melts — sweep included)
    for(const p of game.portals) if(p.bh) trapAvoid.add(p.c+","+p.r);                       // 🕳️ boss routes around black holes (no pull, no warp)
    let path = bfsPathCells(game.startCell, [game.finish.c, game.finish.r], trapAvoid);
    if(path.length<=1) path = bfsPathCells(game.startCell, [game.finish.c, game.finish.r]);  // trap door unavoidable → take the normal path
    const rivalUfo = !!(L.rival && L.rival.ufo) ||
      (game.levelIx>=0 && !game.customId && seriesOf(game.levelIx)===5);                    // 🛸 W6 boss drives the saucer
    game.rival = { wp: path.map(([c,r])=>[(c+0.5)*CELL,(r+0.5)*CELL]),
      i:0, x:(game.startCell[0]+0.5)*CELL, y:(game.startCell[1]+0.5)*CELL,
      a:head, speed:(CONFIG.bossSpeed||95)*((L.rival&&L.rival.mult)||1), delay:1.5, done:false, ufo:rivalUfo };
    setTimeout(()=>{ if(game.rival && game.state==="play") sticker("BEAT HIM TO THE FLAG!", "#ff8fe0"); }, 1900);
  }
  prerenderGround(L);
  const sk = document.createElement("canvas");
  const skGs = Math.min(1, Math.sqrt(12e6/((game.cols*CELL)*(game.rows*CELL))));   // 📐 same cap as the ground
  sk.width = Math.ceil(game.cols*CELL*skGs); sk.height = Math.ceil(game.rows*CELL*skGs);
  game.skidCv = sk; game.skidCtx = sk.getContext("2d");
  game.skidCtx.setTransform(skGs, 0, 0, skGs, 0, 0);                               // skid draws stay in world coords
  updateObjective(true);
  game.raceTotal = game.flow ? Math.max(1, game.flow[game.startCell[1]][game.startCell[0]]) : 1;
  spawnGolden();                               // 🎁 v2: maybe drop one free golden crate on the racing line
  // 🚩 auto-checkpoint: on LONG campaign mazes (path > 24 cells), crossing the halfway mark
  // quietly moves your respawn point — giant mazes stay challenging, never punishing.
  game.ckptField = null; game.ckptHalf = 0;
  game.tpz = 0; game.tpcx = game.tpcy = undefined;      // 🎥 two-player camera smoothing state
  if(!(game.vs||game.ko) && game.finish){               // campaign AND co-op mazes get checkpoints
    const fd = finishDist();
    if(fd){ const d0 = fd[game.startCell[1]][game.startCell[0]];
      if(d0 > 24){ game.ckptField = fd; game.ckptHalf = d0*0.5; } }
  }
  // 👻 spawn this level's ghost (your prior best run) — SOLO campaign only; decodes cleanly or stays null
  if(ghostEligible() && store.ghosts && store.ghosts[game.levelIx]){
    game.ghostHadPrev = true;
    const rec = store.ghosts[game.levelIx];
    const pts = ghostDec(rec.d);
    if(pts && pts.length >= 2) game.ghost = { pts, t:0, dur:rec.t, done:false, fade:1 };
  }
  game.state = "play";
  armRun();                                    // 🎁 set up this run's armed power-up
  sticker(L.emoji+" "+L.name, L.hue);
  setTimeout(()=> game.state==="play" && sticker("GO GO GO!", "#ffffff"), 900);
}

function isWallCell(c,r){
  if(c<0||r<0||c>=game.cols||r>=game.rows) return true;
  return !!game.solid[r][c];
}
function isSolid(c,r){
  if(isWallCell(c,r)) return true;
  for(const d of game.doors) if(d.c===c && d.r===r && d.anim<1) return true;
  for(const g of game.gates) if(g.c===c && g.r===r && g.open<0.5) return true;
  for(const q of game.coopGates) if(q.c===c && q.r===r && q.open<0.5) return true;
  for(const m of game.shiftWalls) if(m.c===c && m.r===r && game.shiftSol[m.grp]>0.5) return true;
  for(const w of game.trapWalls) if(w.c===c && w.r===r && w.closed>0.5) return true;
  for(const cr of game.crushers) if(cr.cc===c && cr.cr===r) return true;
  for(const cr of game.crates) if(cr.c===c && cr.r===r && !cr.broken) return true;
  return false;
}
// TIMING obstacles the boss rival must wait out (shifting walls / crushers / timed gates).
// NOT key-doors (it doesn't collect keys — it barges through) and NOT crates (it smashes them).
function rivalBlocked(c,r){
  for(const m of game.shiftWalls) if(m.c===c && m.r===r && game.shiftSol[m.grp]>0.5) return true;
  for(const cr of game.crushers)  if(cr.cc===c && cr.cr===r) return true;
  for(const a of game.asteroids){ const ac=Math.round(a.c+a.dx*a.off), ar=Math.round(a.r+a.dy*a.off);   // ☄️ boss waits out a drifting rock
    if(ac===c && ar===r) return true; }
  for(const gy of game.geysers)   if(gy.c===c && gy.r===r && gy.k>0.5) return true;   // ⛲ boss waits out an erupting geyser
  for(const g of game.gates)      if(g.c===c && g.r===r && g.open<0.5) return true;
  return false;
}
function crateAt(c,r){
  for(const cr of game.crates) if(!cr.broken && cr.c===c && cr.r===r) return cr;
  return null;
}

/* BFS shortest path between two cells (walls only) — the boss's racing line */
function bfsPathCells(start, goal, avoid){
  const R = game.rows, C = game.cols;
  const prev = Array.from({length:R},()=>new Array(C).fill(null));
  prev[start[1]][start[0]] = start;
  const q = [start];
  while(q.length){
    const [c,r] = q.shift();
    if(c===goal[0] && r===goal[1]) break;
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=C||nr>=R||game.solid[nr][nc]||(game.voidCell[nr]&&game.voidCell[nr][nc])||(game.lavaCell[nr]&&game.lavaCell[nr][nc])||prev[nr][nc]||(avoid&&avoid.has(nc+","+nr))) continue;
      prev[nr][nc] = [c,r]; q.push([nc,nr]);
    }
  }
  if(!prev[goal[1]][goal[0]]) return [start];
  const path = []; let cur = goal;
  while(!(cur[0]===start[0] && cur[1]===start[1])){ path.unshift(cur); cur = prev[cur[1]][cur[0]]; }
  path.unshift(start);
  return path;
}

/* BFS flow field toward current objective (for the helper arrow) */
function updateObjective(force){
  let target;
  if(game.key && !game.key.got) target = game.key;
  else if(game.doors.length && game.doors.some(d=>d.anim<1) && game.hasKey) target = game.doors.find(d=>d.anim<1);
  else target = game.finish;
  if(!force && game.objective===target) return;
  game.objective = target;
  const tc = clamp(Math.floor(target.x/CELL),0,game.cols-1), tr = clamp(Math.floor(target.y/CELL),0,game.rows-1);
  const dst = Array.from({length:game.rows},()=>new Array(game.cols).fill(-1));
  const q=[[tc,tr]]; dst[tr][tc]=0;
  while(q.length){
    const [c,r]=q.shift();
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
      if(game.solid[nr][nc] || (game.voidCell[nr]&&game.voidCell[nr][nc]) || (game.lavaCell[nr]&&game.lavaCell[nr][nc])) continue;   // hint path ignores doors/gates, never points into the chasm or the lava
      if(dst[nr][nc]!==-1) continue;
      dst[nr][nc]=dst[r][c]+1; q.push([nc,nr]);
    }
  }
  game.flow = dst;
}

// walls-only distance-to-finish field — orients direction hints (boost/splash pads) down the racing line
// (overVoid=true lets the field cross 🕳️ V chasms — used to aim the launch-ring trajectory hint ACROSS the gap)
function finishDist(overVoid){
  if(!game.finish) return null;
  const d = Array.from({length:game.rows},()=>new Array(game.cols).fill(-1));
  const q=[[game.finish.c, game.finish.r]]; d[game.finish.r][game.finish.c]=0;
  for(let qi=0; qi<q.length; qi++){
    const [c,r]=q[qi];
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
      if(d[nr][nc]!==-1) continue;
      if(isWallCell(nc,nr) || (!overVoid && game.voidCell[nr]&&game.voidCell[nr][nc]) || (!overVoid && game.lavaCell[nr]&&game.lavaCell[nr][nc])) continue;   // doors/gates treated as passable → gradient always reaches (voids/lava never, unless overVoid)
      d[nr][nc]=d[r][c]+1; q.push([nc,nr]);
    }
  }
  return d;
}

/* ---- 🌍 per-world GROUND TEXTURE — vivid + detailed, readability FIRST. Drawn into the prerendered
   ground (once per level, so detail is free per-frame) UNDER the walls + feature overlays, so it only
   shows on the ROAD. Must stay tonal/subtle enough that road never reads as a wall or a hazard.
   Keyed by T.back; each fn draws across the whole ground in world px: function(x, w, h, T). ---- */
const WORLD_GROUND = {};
function worldGroundDetail(x, w, h, T){ const f = WORLD_GROUND[T.back]; if(f) f(x, w, h, T); }
WORLD_GROUND["city"]    = function(x,w,h,T){
    const R=(a,b)=>a+Math.random()*(b-a);
const area=w*h;

// ── 1. broad asphalt tone — uneven pour + resurfacing patches (soft, tonal, no hard edges)
let patches=Math.min(90, Math.round(area/240000));
for(let i=0;i<patches;i++){
  const px=R(0,w), py=R(0,h), pr=R(CELL*1.5, CELL*4.2);
  const g=x.createRadialGradient(px,py,0,px,py,pr);
  if(Math.random()<0.62){ g.addColorStop(0,"rgba(126,142,178,0.05)"); g.addColorStop(1,"rgba(126,142,178,0)"); }
  else { g.addColorStop(0,"rgba(8,10,17,0.06)"); g.addColorStop(1,"rgba(8,10,17,0)"); }
  x.fillStyle=g; x.fillRect(px-pr,py-pr,pr*2,pr*2);
}

// ── 2. fine aggregate — the stone grit in the tarmac: pale chips, warm chips, dark grains, a few coarse stones
let grains=Math.min(6000, Math.round(area/1200));
for(let i=0;i<grains;i++){
  const gx=R(0,w), gy=R(0,h), rr=Math.random(); let s;
  if(rr<0.50){ x.fillStyle="rgba(196,208,236,0.05)"; s=R(1,2); }
  else if(rr<0.78){ x.fillStyle="rgba(255,214,158,0.045)"; s=R(1,2); }   // warm sodium-lit grit
  else if(rr<0.94){ x.fillStyle="rgba(0,0,0,0.13)"; s=R(1,2); }
  else { x.fillStyle="rgba(210,220,244,0.06)"; s=R(2,3); }               // coarser stone chip
  x.fillRect(gx,gy,s,s);
}

// ── 3. hairline joints + surface cracks (kept thin so they read as texture, never obstacles)
let seams=Math.min(60, Math.round(area/380000));
for(let i=0;i<seams;i++){
  const horiz=Math.random()<0.5; let sx=R(0,w), sy=R(0,h);
  const len=R(CELL*1.2, CELL*3), steps=5+Math.floor(R(0,4));
  x.beginPath(); x.moveTo(sx,sy);
  for(let s=1;s<=steps;s++){
    sx+= horiz? len/steps : R(-6,6);
    sy+= horiz? R(-6,6) : len/steps;
    x.lineTo(sx,sy);
  }
  x.strokeStyle= Math.random()<0.5 ? "rgba(150,166,200,0.05)" : "rgba(0,0,0,0.10)";
  x.lineWidth=R(1,1.8); x.stroke();
}

// ── 4. tire scuffs / skid streaks along the driving line — twin parallel rubber tracks, soft + warm
let skids=Math.min(46, Math.round(area/440000));
for(let i=0;i<skids;i++){
  const ang=(Math.random()<0.5?0:Math.PI/2)+R(-0.06,0.06);
  const len=R(CELL*1.4, CELL*3.4), gap=R(7,12), wob=R(0.6,1.6);
  x.save(); x.translate(R(0,w),R(0,h)); x.rotate(ang);
  x.lineCap="round"; x.lineJoin="round";
  for(let t=-1;t<=1;t+=2){
    const off=t*gap, ph=R(0,Math.PI), steps=Math.max(6, len/14|0);
    x.beginPath();
    for(let s=0;s<=steps;s++){
      const px=(s/steps)*len, py=off+Math.sin(s/steps*Math.PI*wob+ph)*R(2,5);
      if(s===0) x.moveTo(px,py); else x.lineTo(px,py);
    }
    x.strokeStyle="rgba(12,13,20,0.10)"; x.lineWidth=R(6,9); x.stroke();     // rubber shadow
    x.strokeStyle="rgba(70,60,50,0.06)"; x.lineWidth=R(2,3.5); x.stroke();   // warm scuffed core
  }
  x.restore();
}

// ── 5. faint painted lane hints — thin solid guide lines (complement the dashed centre lines drawn later)
let hints=Math.min(40, Math.round(area/520000));
for(let i=0;i<hints;i++){
  const horiz=Math.random()<0.5;
  const cx=(Math.floor(R(0,w)/CELL)+0.5)*CELL, cy=(Math.floor(R(0,h)/CELL)+0.5)*CELL, len=CELL*R(0.8,1.9);
  x.beginPath();
  if(horiz){ x.moveTo(cx-len/2,cy); x.lineTo(cx+len/2,cy); }
  else { x.moveTo(cx,cy-len/2); x.lineTo(cx,cy+len/2); }
  x.strokeStyle="rgba(255,255,255,0.055)"; x.lineWidth=R(3,4.5); x.stroke();
  x.strokeStyle="rgba("+T.glow+",0.05)"; x.lineWidth=R(1,2); x.stroke();      // warm lamp cast on the paint
}

// ── 6. warm amber lamp sheen pooling across the tarmac (ambient, soft, low)
let pools=Math.min(34, Math.round(area/520000));
for(let i=0;i<pools;i++){
  const px=R(0,w), py=R(0,h), pr=R(CELL*1.6, CELL*3.6);
  const g=x.createRadialGradient(px,py,0,px,py,pr);
  g.addColorStop(0,"rgba("+T.glow+",0.07)"); g.addColorStop(0.5,"rgba("+T.glow+",0.03)"); g.addColorStop(1,"rgba("+T.glow+",0)");
  x.fillStyle=g; x.fillRect(px-pr,py-pr,pr*2,pr*2);
}
  };   // filled in below (per-world detail)
WORLD_GROUND["snow"]    = function(x,w,h,T){
    // ❄️ BRAIN FREEZE — frozen ice sheet: cold sheen, cracked veins, frost ferns, sparkle glints.
// Everything is LIGHTER/cooler than T.ground so the road always reads as skateable ice, never a hazard.
x.save();
x.lineCap = "round"; x.lineJoin = "round";
const A = w*h, rr = (a,b)=> a + Math.random()*(b-a);

// 1) cold light-source wash — a low glare raking across the frozen sheet from the upper-left
const lw = x.createRadialGradient(w*0.24, h*0.14, 0, w*0.24, h*0.14, Math.hypot(w,h)*0.85);
lw.addColorStop(0,   "rgba(196,226,255,0.07)");
lw.addColorStop(0.6, "rgba(150,196,240,0.03)");
lw.addColorStop(1,   "rgba(150,196,240,0)");
x.fillStyle = lw; x.fillRect(0,0,w,h);

// 2) undulating ice tone — soft pale-blue frost blooms (mostly bright, a few cooler; none dark)
const patches = Math.min(150, Math.floor(A/115000));
for(let i=0;i<patches;i++){
  const px=Math.random()*w, py=Math.random()*h, pr=rr(CELL*1.3, CELL*4.4);
  const cool = Math.random()<0.3, c = cool ? "120,170,212," : "184,218,248,";
  const g = x.createRadialGradient(px,py,0, px,py,pr);
  g.addColorStop(0, "rgba("+c+(cool?0.03:0.05)+")");
  g.addColorStop(1, "rgba("+c+"0)");
  x.fillStyle=g; x.fillRect(px-pr, py-pr, pr*2, pr*2);
}

// 3) glassy sheen streaks — long soft diagonal bands, the polished shine of ice
const streaks = Math.min(12, 6 + Math.floor(A/1100000));
for(let i=0;i<streaks;i++){
  const t=(i+rr(0.2,0.8))/streaks, g=x.createLinearGradient(0,0,w,h);
  g.addColorStop(Math.max(0,t-0.05), "rgba(206,232,255,0)");
  g.addColorStop(t,                  "rgba(206,232,255,0.05)");
  g.addColorStop(Math.min(1,t+0.05), "rgba(206,232,255,0)");
  x.fillStyle=g; x.fillRect(0,0,w,h);
}

// 4) cracked-ice veins — faint branching fractures with a hairline groove-shadow for depth
function crack(cx,cy,ang,len,gen){
  const segs=Math.max(3,Math.floor(len/28)), dl=len/segs; let px=cx,py=cy,a=ang;
  for(let i=0;i<segs;i++){
    a += rr(-0.34,0.34);
    const nx=px+Math.cos(a)*dl, ny=py+Math.sin(a)*dl;
    x.strokeStyle="rgba(11,20,30,0.10)"; x.lineWidth=1.5;                 // sub-surface groove (hairline, offset)
    x.beginPath(); x.moveTo(px,py+1); x.lineTo(nx,ny+1); x.stroke();
    x.strokeStyle="rgba(200,229,252,"+(0.15-gen*0.045)+")"; x.lineWidth=1.1;  // bright frozen vein
    x.beginPath(); x.moveTo(px,py); x.lineTo(nx,ny); x.stroke();
    px=nx; py=ny;
    if(gen<2 && Math.random()<0.17) crack(px,py, a+(Math.random()<0.5?1:-1)*rr(0.5,1.15), len*rr(0.34,0.58), gen+1);
  }
}
const cracks = Math.min(48, Math.floor(A/220000));
for(let i=0;i<cracks;i++) crack(Math.random()*w, Math.random()*h, Math.random()*TAU, rr(CELL*1.1, CELL*3.2), 0);

// 5) frost-crystal ferns — delicate feathered fractals radiating in blooms, like frost on cold glass
function fern(fx,fy,ang,len){
  const steps=Math.max(4,Math.floor(len/13)), dl=len/steps; let px=fx,py=fy,a=ang;
  for(let i=0;i<steps;i++){
    const k=1-i/steps, nx=px+Math.cos(a)*dl, ny=py+Math.sin(a)*dl;
    x.strokeStyle="rgba(219,241,255,"+(0.05+0.13*k)+")"; x.lineWidth=0.5+0.9*k;   // spine, brighter at the base
    x.beginPath(); x.moveTo(px,py); x.lineTo(nx,ny); x.stroke();
    const bl = dl*2.1*k + 3;                                                       // barbs taper toward the tip
    for(const s of [-1,1]){
      const ba=a+s*rr(0.85,1.12), ex=nx+Math.cos(ba)*bl, ey=ny+Math.sin(ba)*bl;
      x.lineWidth=0.35+0.55*k;
      x.beginPath(); x.moveTo(nx,ny); x.lineTo(ex,ey); x.stroke();
      const sa=ba+s*0.85, mx=(nx+ex)*0.5, my=(ny+ey)*0.5;                          // tiny secondary frost twig
      x.beginPath(); x.moveTo(mx,my); x.lineTo(mx+Math.cos(sa)*bl*0.42, my+Math.sin(sa)*bl*0.42); x.stroke();
    }
    px=nx; py=ny; a += rr(-0.045,0.045);
  }
}
const blooms = Math.min(34, Math.floor(A/240000));
for(let b=0;b<blooms;b++){
  const bx=Math.random()*w, by=Math.random()*h, arms=3+Math.floor(Math.random()*3), base=Math.random()*TAU, sc=rr(0.55,1.15);
  for(let a=0;a<arms;a++) fern(bx,by, base + a*(TAU/arms) + rr(-0.22,0.22), CELL*rr(0.5,1.0)*sc);
}

// 6) sparkle glints catching the light — fine crushed-ice dust, a few flaring into a bright cross
const sparks = Math.min(2600, Math.floor(A/6800));
for(let i=0;i<sparks;i++){
  const sx=Math.random()*w, sy=Math.random()*h, r=Math.random();
  if(r<0.84){
    x.fillStyle="rgba("+(r<0.4?"238,249,255":"201,232,255")+","+rr(0.07,0.24)+")";
    const s=rr(0.7,1.8); x.fillRect(sx,sy,s,s);
  } else {
    const al=rr(0.24,0.5), gl=rr(3,6);
    const hg=x.createRadialGradient(sx,sy,0, sx,sy,gl*1.7);                        // soft halo
    hg.addColorStop(0,"rgba(212,237,255,"+(al*0.55)+")"); hg.addColorStop(1,"rgba(212,237,255,0)");
    x.fillStyle=hg; x.fillRect(sx-gl*1.7, sy-gl*1.7, gl*3.4, gl*3.4);
    x.strokeStyle="rgba(230,246,255,"+al+")"; x.lineWidth=0.8;                     // 4-point flare
    x.beginPath(); x.moveTo(sx-gl,sy); x.lineTo(sx+gl,sy); x.moveTo(sx,sy-gl); x.lineTo(sx,sy+gl); x.stroke();
    x.fillStyle="rgba(244,251,255,"+Math.min(1,al+0.2)+")"; x.fillRect(sx-0.9, sy-0.9, 1.8, 1.8);  // hot core
  }
}
x.restore();
  };
WORLD_GROUND["grid"]    = function(x,w,h,T){
    // ── MAZE MAYHEM ground: neon digital void — TRON grid + circuit traces + scanline shimmer ──
  const G = T.glow;                 // "197,108,255" — reuse the world's neon as rgb for rgba()
  const cell = 110;                 // CELL — the maze unit, so the grid feels native to the level
  const half = cell / 2;

  // 1) VIOLET HAZE POOLS — soft blooms of neon fog give the flat void real depth (only lifts, never darkens)
  x.save();
  x.globalCompositeOperation = "lighter";
  const pools = Math.min(64, Math.max(12, Math.floor(w * h / 240000)));
  for (let i = 0; i < pools; i++) {
    const px = Math.random() * w, py = Math.random() * h, pr = 240 + Math.random() * 560;
    const gr = x.createRadialGradient(px, py, 0, px, py, pr);
    gr.addColorStop(0, "rgba(" + G + ",0.055)");
    gr.addColorStop(1, "rgba(" + G + ",0)");
    x.fillStyle = gr; x.fillRect(px - pr, py - pr, pr * 2, pr * 2);
  }
  x.restore();

  // 2) THE NEON GRID — faint half-cell sub-lines under brighter full-cell rails (the TRON floor)
  x.save();
  x.lineWidth = 1;
  x.strokeStyle = "rgba(" + G + ",0.045)";          // minor sub-grid (offset half a cell)
  x.beginPath();
  for (let gx = half; gx < w; gx += cell) { x.moveTo(gx + 0.5, 0); x.lineTo(gx + 0.5, h); }
  for (let gy = half; gy < h; gy += cell) { x.moveTo(0, gy + 0.5); x.lineTo(w, gy + 0.5); }
  x.stroke();
  x.strokeStyle = "rgba(" + G + ",0.11)";           // major grid rails
  x.beginPath();
  for (let gx = 0; gx <= w; gx += cell) { x.moveTo(gx + 0.5, 0); x.lineTo(gx + 0.5, h); }
  for (let gy = 0; gy <= h; gy += cell) { x.moveTo(0, gy + 0.5); x.lineTo(w, gy + 0.5); }
  x.stroke();
  x.restore();

  // 3) GLOWING NODES — a lit core on every major intersection, twinkling blooms on a sparse subset
  x.save();
  x.globalCompositeOperation = "lighter";
  for (let gy = 0; gy <= h; gy += cell) {
    for (let gx = 0; gx <= w; gx += cell) {
      const tw = ((gx * 13 + gy * 7) % 97) / 97;    // stable pseudo-random per node
      x.fillStyle = "rgba(" + G + "," + (0.13 + tw * 0.12).toFixed(3) + ")";
      x.fillRect(gx - 1, gy - 1, 2, 2);             // cheap bright via core
      if (tw > 0.72) {                              // ~28% get a soft bloom = flickering data ports
        const rr = 6 + tw * 7;
        const gr = x.createRadialGradient(gx, gy, 0, gx, gy, rr);
        gr.addColorStop(0, "rgba(" + G + "," + (0.16 + tw * 0.14).toFixed(3) + ")");
        gr.addColorStop(1, "rgba(" + G + ",0)");
        x.fillStyle = gr; x.fillRect(gx - rr, gy - rr, rr * 2, rr * 2);
      }
    }
  }
  x.restore();

  // 4) CIRCUIT TRACES — faint PCB routing that snaps to the grid and right-angles like real copper, capped by a via
  x.save();
  x.globalCompositeOperation = "lighter";
  x.lineCap = "round"; x.lineJoin = "round";
  const traces = Math.min(210, Math.max(28, Math.floor(w * h / 88000)));
  for (let i = 0; i < traces; i++) {
    let cx = Math.round(Math.random() * (w / half)) * half;
    let cy = Math.round(Math.random() * (h / half)) * half;
    const segs = 2 + Math.floor(Math.random() * 4);
    let horiz = Math.random() < 0.5;
    x.strokeStyle = "rgba(" + G + "," + (0.05 + Math.random() * 0.06).toFixed(3) + ")";
    x.lineWidth = 1.5;
    x.beginPath(); x.moveTo(cx, cy);
    for (let s = 0; s < segs; s++) {
      const len = (1 + Math.floor(Math.random() * 3)) * half * (Math.random() < 0.5 ? 1 : -1);
      if (horiz) cx += len; else cy += len;
      x.lineTo(cx, cy);
      horiz = !horiz;
    }
    x.stroke();
    x.fillStyle = "rgba(" + G + ",0.14)";           // solder pad / via at the trace end
    x.beginPath(); x.arc(cx, cy, 2.3, 0, TAU); x.fill();
  }
  x.restore();

  // 5) SCANLINE SHIMMER — a fine CRT raster, alternating a hair of neon lift and a hair of shade (3px pitch, imperceptible as hazard)
  x.save();
  for (let sy = 0; sy < h; sy += 3) {
    const s = ((sy / 3) | 0) % 7;
    x.fillStyle = s < 3 ? "rgba(" + G + ",0.020)" : "rgba(0,0,0,0.028)";
    x.fillRect(0, sy, w, 1);
  }
  x.restore();

  // 6) DATA MOTES — a dusting of glowing pixels drifting in the void, like packets in transit
  x.save();
  x.globalCompositeOperation = "lighter";
  const motes = Math.min(1900, Math.floor(w * h / 6200));
  for (let i = 0; i < motes; i++) {
    const mx = Math.random() * w, my = Math.random() * h;
    x.fillStyle = "rgba(" + G + "," + (0.05 + Math.random() * 0.22).toFixed(3) + ")";
    const sz = Math.random() < 0.14 ? 2 : 1;
    x.fillRect(mx, my, sz, sz);
  }
  x.restore();
  };
WORLD_GROUND["factory"] = function(x,w,h,T){
    // METAL MELTDOWN — riveted foundry steel floor: defined plates, rivets, tread, oil sheen, ember warmth.
    const R=Math.random, A=w*h;
    x.save();
    let n=Math.min(50, Math.round(A/230000));                             // warm furnace glow patches
    for(let i=0;i<n;i++){ const px=R()*w, py=R()*h, rad=CELL*(2+R()*4);
      const g=x.createRadialGradient(px,py,0,px,py,rad);
      g.addColorStop(0,"rgba(150,110,70,0.16)"); g.addColorStop(1,"rgba(150,110,70,0)");
      x.fillStyle=g; x.fillRect(px-rad,py-rad,rad*2,rad*2); }
    const PS=CELL*1.5;                                                     // STEEL FLOOR PLATES
    for(let py=0; py<h; py+=PS) for(let px=0; px<w; px+=PS){
      x.strokeStyle="rgba(255,206,150,0.12)"; x.lineWidth=1.5;            // lit seam (top+left)
      x.beginPath(); x.moveTo(px+1,py+PS); x.lineTo(px+1,py+1); x.lineTo(px+PS,py+1); x.stroke();
      x.strokeStyle="rgba(0,0,0,0.34)"; x.lineWidth=1.5;                  // shade seam (bottom+right)
      x.beginPath(); x.moveTo(px+PS-1,py+1); x.lineTo(px+PS-1,py+PS); x.lineTo(px+1,py+PS); x.stroke();
      for(const rc of [[px+8,py+8],[px+PS-8,py+8],[px+8,py+PS-8],[px+PS-8,py+PS-8]]){  // corner rivets
        x.fillStyle="rgba(0,0,0,0.42)"; x.beginPath(); x.arc(rc[0],rc[1],2.6,0,TAU); x.fill();
        x.fillStyle="rgba(255,224,175,0.55)"; x.beginPath(); x.arc(rc[0]-0.7,rc[1]-0.7,1.1,0,TAU); x.fill(); }
      x.strokeStyle="rgba(255,200,130,0.06)"; x.lineWidth=2; x.lineCap="round";         // tread chevrons
      for(let d=0;d<4;d++){ const dx=px+PS*0.28+d*PS*0.15, dy=py+PS*0.5;
        x.beginPath(); x.moveTo(dx-5,dy-4); x.lineTo(dx,dy); x.lineTo(dx-5,dy+4); x.stroke(); } }
    n=Math.min(46, Math.round(A/260000));                                 // oil-sheen + ember streaks
    for(let i=0;i<n;i++){ const px=R()*w, py=R()*h, len=CELL*(0.5+R());
      x.strokeStyle=R()<0.5?"rgba(255,140,50,0.07)":"rgba(120,150,180,0.05)"; x.lineWidth=rand(3,7); x.lineCap="round";
      x.beginPath(); x.moveTo(px,py); x.lineTo(px+len,py+rand(-6,6)); x.stroke(); }
    n=Math.min(3200, Math.round(A/2800));                                 // warm grit + steel flecks
    for(let i=0;i<n;i++){ const px=R()*w, py=R()*h, t=R();
      x.fillStyle = t<0.45?"rgba(255,190,120,0.11)":t<0.75?"rgba(0,0,0,0.30)":"rgba(180,190,205,0.08)"; x.fillRect(px,py,rand(0.7,1.7),rand(0.7,1.7)); }
    x.restore();
  };
WORLD_GROUND["water"]   = function(x,w,h,T){
    // SPLASH ZONE — luminous deep-aqua water. Everything is drawn additively (composite "lighter")
// so the floor only ever BRIGHTENS: no dark shape can read as a wall, pit or hazard. Layers:
// depth-shimmer pools → interlocking caustic net → sparkle glints → foam stipple → bubbles.
const R = Math.random, glow = T.glow;
const cells = (w*h)/(CELL*CELL);
x.save();
x.globalCompositeOperation = "lighter";
x.lineJoin = "round"; x.lineCap = "round";

// ── depth wash: broad soft pools of blue-green shimmer (shallow spots glow, deep stays calm) ──
const pools = Math.min(96, Math.round(cells/9)) + 6;
for(let i=0;i<pools;i++){
  const px=R()*w, py=R()*h, pr=rand(1.4,4.4)*CELL, bright=rand(0.04,0.13);
  const gShift = Math.round(rand(-16,24));          // aqua↔green hue drift = living water
  const g = x.createRadialGradient(px,py,pr*0.08, px,py,pr);
  g.addColorStop(0,    `rgba(92,${210+gShift},224,${bright})`);
  g.addColorStop(0.55, `rgba(66,190,208,${bright*0.5})`);
  g.addColorStop(1,    `rgba(${glow},0)`);
  x.fillStyle = g;
  x.beginPath(); x.arc(px,py,pr,0,TAU); x.fill();
}

// ── caustics: two crossing families of wavy bright strands; where they overlap the additive
//    blend swells into the classic sun-through-water net. Each strand = one cheap stroke. ──
function strands(vertical){
  const span  = vertical ? h : w;                   // draw along this axis
  const cross = vertical ? w : h;                   // step across this axis
  const sp = CELL*0.82, n = Math.ceil(cross/sp), step = CELL*0.6;
  for(let s=0;s<=n;s++){
    const base = s*sp + rand(-sp*0.3, sp*0.3);
    const a1=rand(6,20), a2=rand(4,12);
    const f1=rand(0.9,1.7)/CELL, f2=rand(1.8,3.4)/CELL;
    const ph1=R()*TAU, ph2=R()*TAU;
    for(let pass=0; pass<2; pass++){                 // wide soft underlay, then thin bright core
      x.beginPath();
      for(let t=0; t<=span+step; t+=step){
        const off = base + a1*Math.sin(t*f1+ph1) + a2*Math.sin(t*f2+ph2);
        const cx = vertical ? off : t, cy = vertical ? t : off;
        if(t===0) x.moveTo(cx,cy); else x.lineTo(cx,cy);
      }
      if(pass===0){ x.lineWidth=rand(5,9);   x.strokeStyle=`rgba(120,226,236,${rand(0.03,0.06)})`; }
      else        { x.lineWidth=rand(1,2.2); x.strokeStyle=`rgba(206,250,255,${rand(0.06,0.11)})`; }
      x.stroke();
    }
  }
}
strands(false); strands(true);

// ── fine sparkle: tiny light glints riding the ripple crests ──
const glints = Math.min(2600, Math.round(cells*2.4));
for(let i=0;i<glints;i++){
  const s=rand(0.6,2.2);
  x.fillStyle = R()<0.35 ? `rgba(222,252,255,${rand(0.12,0.30)})` : `rgba(${glow},${rand(0.05,0.14)})`;
  x.fillRect(R()*w, R()*h, s, s);
}

// ── foam: clustered bright stipple, like sun-lit froth gathering on the surface ──
const foamCl = Math.min(190, Math.round(cells/6));
for(let c=0;c<foamCl;c++){
  const cx=R()*w, cy=R()*h, rr=rand(CELL*0.2,CELL*0.7), cn=Math.round(rand(4,12));
  for(let k=0;k<cn;k++){
    const fa=R()*TAU, fd=Math.sqrt(R())*rr;         // sqrt = even disc fill
    x.fillStyle = `rgba(231,253,255,${rand(0.10,0.28)})`;
    x.fillRect(cx+Math.cos(fa)*fd, cy+Math.sin(fa)*fd, rand(0.8,1.8), rand(0.8,1.8));
  }
}

// ── bubbles: little rings each with a highlight glint ──
const bubbles = Math.min(520, Math.round(cells*0.8));
x.lineWidth = 1;
for(let i=0;i<bubbles;i++){
  const bx=R()*w, by=R()*h, br=rand(1.6,5.5);
  x.strokeStyle = `rgba(190,245,255,${rand(0.08,0.20)})`;
  x.beginPath(); x.arc(bx,by,br,0,TAU); x.stroke();
  x.fillStyle = `rgba(236,255,255,${rand(0.14,0.30)})`;
  const hs = Math.max(0.8, br*0.35);
  x.fillRect(bx-br*0.4, by-br*0.4, hs, hs);
}

x.restore();   // resets composite/lineWidth/alpha for the caller's lamp-pool pass
  };
WORLD_GROUND["void"]    = function(x,w,h,T){
    const A = w*h;

// ===== 1. NEBULA WISPS — soft violet/blue clouds. Fully ADDITIVE, so they only bloom
//         the floor brighter (never darken it into something that reads as a wall/pit). =====
x.save();
x.globalCompositeOperation = "lighter";
const nebN = Math.min(12, Math.max(5, Math.round(A/1.9e6)));
for(let i=0;i<nebN;i++){
  const cx=rand(0,w), cy=rand(0,h), rr=rand(CELL*3, CELL*7.5), hue=i%3;
  const col = hue===0 ? T.glow : hue===1 ? "80,120,235" : "170,95,205"; // theme violet / deep blue / magenta
  x.save();
  x.translate(cx,cy); x.rotate(rand(0,TAU));
  x.scale(rand(1.1,2.2), rand(0.35,0.7));            // stretch the bloom into a drifting wisp/streak
  const g=x.createRadialGradient(0,0,0,0,0,rr);
  g.addColorStop(0,    "rgba("+col+","+rand(0.06,0.11).toFixed(3)+")");
  g.addColorStop(0.45, "rgba("+col+",0.03)");
  g.addColorStop(1,    "rgba("+col+",0)");
  x.fillStyle=g; x.fillRect(-rr,-rr,rr*2,rr*2);
  x.restore();
}
x.restore();

// ===== 2. COSMIC DUST — fine faint grains sprinkled across the whole platform =====
x.save();
x.globalCompositeOperation = "lighter";
const dustN = Math.min(3200, Math.round(A/5800));
for(let i=0;i<dustN;i++){
  x.fillStyle="rgba(198,192,255,"+rand(0.02,0.09).toFixed(3)+")";
  x.fillRect(Math.random()*w, Math.random()*h, 1, 1);
}
// a few faint drift streaks (long-exposure motion of dust past the platform)
const strN = Math.min(6, Math.max(2, Math.round(A/4e6)));
for(let i=0;i<strN;i++){
  const sx=rand(0,w), sy=rand(0,h), len=rand(CELL*1.5, CELL*4);
  x.save(); x.translate(sx,sy); x.rotate(rand(-0.5,0.5));
  const lg=x.createLinearGradient(0,0,len,0);
  lg.addColorStop(0,"rgba(210,205,255,0)");
  lg.addColorStop(0.5,"rgba("+T.glow+",0.10)");
  lg.addColorStop(1,"rgba(210,205,255,0)");
  x.fillStyle=lg; x.fillRect(0,-0.6,len,1.2);
  x.restore();
}
x.restore();

// ===== 3. STARFIELD — varied sizes + brightness, a rare few with a soft cross-glint =====
x.save();
x.globalCompositeOperation = "lighter";
const starN = Math.min(1900, Math.round(A/9500));
for(let i=0;i<starN;i++){
  const sx=Math.random()*w, sy=Math.random()*h, t=Math.random();
  const tint = Math.random()<0.5 ? "255,252,245" : "205,220,255";   // warm-white / blue-white mix
  if(t<0.74){
    // pinprick stars — the dense background weave
    x.fillStyle="rgba("+tint+","+rand(0.18,0.55).toFixed(2)+")";
    x.fillRect(sx,sy,1,1);
  } else if(t<0.95){
    // medium stars with a small soft halo + hot core
    const r=rand(2,4.5), g=x.createRadialGradient(sx,sy,0,sx,sy,r);
    g.addColorStop(0,"rgba("+tint+",0.9)");
    g.addColorStop(0.4,"rgba("+tint+",0.35)");

WORLD_GROUND["lava"]    = function(x,w,h,T){

  n=Math.min(30, Math.round(A/350000));
  for(let i=0;i<n;i++){
