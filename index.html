// 🌌 world-aware atmospheric backdrop (screen-space, behind the maze; parallax off the camera).
// Shows at the maze edges/fit-views now; will show THROUGH the void in World 6 Space.
function drawBackdrop(dt){
  const T = worldTheme(), t = game.t||0, B = T.back;
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, T.sky[0]); sky.addColorStop(1, T.sky[1]);
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);
  const px = (game.cam?game.cam.x:0);
  ctx.save();
  if(B==="snow"){
    for(let a=0;a<2;a++){ ctx.globalAlpha=0.06; ctx.fillStyle=a?"#7effd0":"#8fbcff";
      ctx.beginPath(); ctx.moveTo(0,0);
      for(let xx=0;xx<=W;xx+=40) ctx.lineTo(xx, H*0.16+a*26 + Math.sin(xx*0.01+t*0.3+a)*16);
      ctx.lineTo(W,0); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle="#eaf6ff";
    for(let i=0;i<80;i++){ const sxp=((i*127.1 - px*0.05)%W+W)%W, syp=((i*53.7 + t*(24+(i%5)*8))%(H+30))-15;
      ctx.globalAlpha=0.35+0.45*(((i*7)%10)/10); ctx.beginPath(); ctx.arc(sxp, syp, 0.7+(i%3)*0.55, 0, TAU); ctx.fill(); }
  } else if(B==="city"){
    ctx.fillStyle="#cdd6ff";
    for(let i=0;i<60;i++){ const xx=((i*127.3 - px*0.03)%W+W)%W, yy=(i*71.9)%(H*0.6);
      ctx.globalAlpha=0.15+0.45*Math.abs(Math.sin(t*0.6+i)); ctx.fillRect(xx, yy, 1.6, 1.6); }
    const base=H*0.74, o=((-px*0.12)%140+140)%140;
    for(let b=-1;b<W/70+2;b++){ const bx=b*70-o, bh=44+((b*53)%5)*20;
      ctx.globalAlpha=1; ctx.fillStyle="#070a12"; ctx.fillRect(bx, base-bh, 58, bh+H);
      ctx.fillStyle="rgba(255,206,122,0.5)";
      for(let wy=base-bh+8; wy<base-8; wy+=15) for(let wx=bx+8; wx<bx+50; wx+=13) if((((wx|0)*7+(wy|0))%3)===0) ctx.fillRect(wx,wy,4,6); }
  } else if(B==="grid"){
    for(let i=0;i<16;i++){ const s=18+(i%4)*14, xx=((i*151.2 - px*0.05)%W+W)%W, yy=((i*97.4 + t*(6+(i%3)*4))%(H+60))-30;
      ctx.globalAlpha=(Math.sin(t*3+i*1.7)>0.6)?0.22:0.08; ctx.strokeStyle=T.accent; ctx.lineWidth=2; ctx.strokeRect(xx, yy, s, s); }
    ctx.globalAlpha=0.07; ctx.strokeStyle=T.accent; ctx.lineWidth=1;
    for(let gy=0; gy<6; gy++){ const yy=H*0.55 + gy*gy*6; ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke(); }
  } else if(B==="factory"){
    const gl=ctx.createLinearGradient(0,H,0,H*0.6); gl.addColorStop(0,"rgba(255,110,30,0.18)"); gl.addColorStop(1,"rgba(255,110,30,0)");
    ctx.globalAlpha=1; ctx.fillStyle=gl; ctx.fillRect(0,H*0.6,W,H*0.4);
    for(let i=0;i<44;i++){ const xx=((i*113.7 - px*0.04)%W+W)%W, yy=H-((i*41.3 + t*(30+(i%6)*10))%(H+20));
      ctx.globalAlpha=0.25+0.5*Math.abs(Math.sin(t*2+i)); ctx.fillStyle=(i%4)?"#ff9040":"#ffd23b";
      ctx.beginPath(); ctx.arc(xx, yy, 1+(i%3)*0.7, 0, TAU); ctx.fill(); }
  } else if(B==="water"){
    ctx.strokeStyle="#9ff0ff"; ctx.lineWidth=2;
    for(let a=0;a<4;a++){ ctx.globalAlpha=0.05+0.02*a; ctx.beginPath(); const yy=H*0.2+a*H*0.2;
      for(let xx=0;xx<=W;xx+=26){ const yv=yy + Math.sin(xx*0.02+t*0.8+a*1.3)*10 + Math.sin(xx*0.05+t)*4; xx===0?ctx.moveTo(xx,yv):ctx.lineTo(xx,yv); } ctx.stroke(); }
    for(let i=0;i<30;i++){ const xx=((i*143.3 - px*0.04)%W+W)%W, yy=H-((i*61.7 + t*(18+(i%5)*7))%(H+20));
      ctx.globalAlpha=0.12+0.18*(((i*3)%10)/10); ctx.strokeStyle="#bff4ff"; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(xx, yy, 1.5+(i%4), 0, TAU); ctx.stroke(); }
  } else if(B==="void"){
    for(let n=0;n<2;n++){                                       // two slow nebula clouds
      const nx = (n? W*0.70 : W*0.26) - px*(0.018+n*0.014), ny = n? H*0.66 : H*0.28;
      const rad = ctx.createRadialGradient(nx,ny,0, nx,ny, H*(0.55+n*0.2));
      rad.addColorStop(0, n? "rgba(96,120,255,0.10)" : "rgba(150,80,235,0.11)"); rad.addColorStop(1, "rgba(20,10,40,0)");
      ctx.globalAlpha=1; ctx.fillStyle=rad; ctx.fillRect(0,0,W,H);
    }
    const ppx=((W*0.8 - px*0.01)%(W+300)+W+300)%(W+300)-150, ppy=H*0.20;   // one distant planet
    const pg=ctx.createRadialGradient(ppx-6, ppy-6, 2, ppx, ppy, 26);
    pg.addColorStop(0,"#8f7cff"); pg.addColorStop(1,"#241a4a");
    ctx.globalAlpha=0.5; ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(ppx, ppy, 26, 0, TAU); ctx.fill();
    const LN=[70,42,22], LP=[0.02,0.05,0.10], LZ=[0.6,1.0,1.7];   // 3 star layers far→near
    for(let L2=0; L2<3; L2++) for(let i=0;i<LN[L2];i++){
      const seed=i*97.13+L2*311.7, xx=((seed - px*LP[L2])%W+W)%W, yy=(seed*1.73)%H;
      const tw=0.3+0.7*Math.abs(Math.sin(t*(0.5+L2*0.45)+i*1.3));
      ctx.globalAlpha=tw*(0.45+L2*0.2);
      ctx.fillStyle=(i%9===0)? T.accent : (i%3? "#eef2ff" : "#c9d6ff");
      ctx.beginPath(); ctx.arc(xx,yy, LZ[L2], 0, TAU); ctx.fill();
    }
    const ss=(t*(1/7))%1;                                        // ✨ shooting star ~every 7s
    if(ss<0.07){ const p=ss/0.07, hx=W*0.12+p*W*0.72, hy=H*0.16+p*H*0.30;
      ctx.globalAlpha=Math.sin(p*Math.PI)*0.85; ctx.strokeStyle="#e6ecff"; ctx.lineWidth=2; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx-30,hy-11); ctx.stroke();
    }
  } else {
    ctx.fillStyle="#aab4d8";
    for(let i=0;i<50;i++){ const xx=(i*127.3)%W, yy=(i*89.7)%(H*0.8);
      ctx.globalAlpha=0.12+0.35*Math.abs(Math.sin(t*0.7+i)); ctx.fillRect(xx, yy, 1.5, 1.5); }
  }
  ctx.globalAlpha=1; ctx.restore();
}
function drawWorld(dt){
  const car = game.car;
  drawBackdrop(dt);
  const wW = game.cols*CELL, wH = game.rows*CELL;
  const sx = (Math.random()*2-1)*game.shake, sy = (Math.random()*2-1)*game.shake;
  let cx, cy, z = 1;
  if(game.vs || game.coop || game.ko){
    const fitZ = Math.min(W/(wW+30), H/(wH+30));
    if(fitZ >= 0.5 || !game.car2){
      // classic: whole maze on screen (all original-sized arenas keep exactly this)
      z = fitZ; cx = wW/2; cy = wH/2;
    } else {
      // 🎥 big shared maps: bounding-box camera — frame BOTH cars, never zoomed out past fit-all
      const c1=game.car, c2=game.car2, pad=CELL*2.4;
      const needW = Math.abs(c1.x-c2.x)+pad*2, needH = Math.abs(c1.y-c2.y)+pad*2;
      const tgtZ = clamp(Math.min(W/needW, H/needH), fitZ, 0.8);
      game.tpz = game.tpz ? lerp(game.tpz, tgtZ, 1-Math.exp(-2.5*dt)) : tgtZ;
      z = game.tpz;
      cx = (c1.x+c2.x)/2; cy = (c1.y+c2.y)/2;
      const vw=W/z, vh=H/z;
      cx = (wW>vw)? clamp(cx, vw/2-15, wW-vw/2+15) : wW/2;
      cy = (wH>vh)? clamp(cy, vh/2-15, wH-vh/2+15) : wH/2;
      game.tpcx = game.tpcx===undefined ? cx : lerp(game.tpcx, cx, 1-Math.exp(-4*dt));
      game.tpcy = game.tpcy===undefined ? cy : lerp(game.tpcy, cy, 1-Math.exp(-4*dt));
      cx = game.tpcx; cy = game.tpcy;
    }
    ctx.save();
    ctx.translate(W/2+sx, H/2+sy);
    ctx.scale(z,z);
    ctx.translate(-cx, -cy);
  } else {
    z = clamp(CONFIG.zoom||1, 1, 2);
    const vw = W/z, vh = H/z;
    const lead = 0.22;
    game.cam.x = lerp(game.cam.x, car.x+car.vx*lead, 1-Math.exp(-5*dt));
    game.cam.y = lerp(game.cam.y, car.y+car.vy*lead, 1-Math.exp(-5*dt));
    cx = game.cam.x; cy = game.cam.y;
    if(wW>vw) cx = clamp(cx, vw/2-40, wW-vw/2+40); else cx = wW/2;
    if(wH>vh) cy = clamp(cy, vh/2-40, wH-vh/2+40); else cy = wH/2;
    ctx.save();
    ctx.translate(W/2+sx, H/2+sy);
    ctx.scale(z,z);
    ctx.translate(-Math.round(cx), -Math.round(cy));
  }
  game._cam = {cx, cy, z};
  ctx.drawImage(game.groundCv, 0, 0, wW, wH);        // 📐 stretch the (possibly reduced-res) ground to world size
  for(const v of game.voids) drawVoid(v);                // 🕳️ star-motes inside the transparent chasm (over backdrop, under entities)
  ctx.drawImage(game.skidCv, 0, 0, wW, wH);
  for(const cv2 of game.conveyors) drawConveyor(cv2);   // floor-level, under everything
  for(const t of game.trapDoors) drawTrapDoor(t);
  for(const w of game.wells) drawWell(w);                // 🪐 floor-level, so the pull ring sits UNDER the car
  for(const bp of game.bounces) drawBounce(bp);          // 🟠 splash pads
  for(const cm of game.crumbles) drawCrumble(cm);        // 🧱 foam floats
  for(const rg of game.rings) drawRing(rg);              // 🚀 launch rings

  if(!game.ko) drawFinish();
  for(const d of game.doors) drawDoor(d);
  for(const g of game.gates) drawGate(g);
  for(const q of game.coopGates) drawCoopGate(q);
  for(const p of game.plates2) drawPlate(p);
  for(const p of game.seqPads) drawSeqPad(p);
  for(const m of game.shiftWalls) drawShiftWall(m);
  for(const w of game.trapWalls) drawTrapWall(w);
  for(const k of game.koZones) drawKoHazard(k);
  for(const cr of game.crushers) drawCrusher(cr);
  for(const a of game.asteroids) drawAsteroidLane(a);    // ☄️ dashed drift-lane telegraph…
  for(const a of game.asteroids) drawAsteroid(a);        // …then the rocks on top
  for(const t of game.traps) drawTrapTrigger(t);
  for(const z of game.zaps) drawZap(z);
  for(const cr of game.crates) drawCrate(cr);
  if(game.gold) drawGold(game.gold);   // 🎁 v2 golden crate (world space, same camera as other entities)
  game.portals.forEach((p,i)=> p.bh ? drawBlackHole(p,i) : drawPortal(p,i));
  for(const cn of game.coins) if(!cn.got) drawCoin(cn);
  if(game.key && !game.key.got) drawKey(game.key);
  for(const gb of game.goobers) drawGoober(gb);
  if(!game.vs && !game.coop && !game.ko) drawHintArrow();
  if(game.rival){
    const rv = game.rival;
    ctx.save();
    ctx.translate(rv.x, rv.y);
    if(rv.ufo){                                            // 🛸 W6 boss flies the saucer (pure reskin — same pathing)
      const bob = 1 + Math.sin(game.t*4)*0.05;
      ctx.fillStyle = "#9ad8ff"; ctx.globalAlpha = 0.28 + Math.sin(game.t*3)*0.06;
      ctx.beginPath(); ctx.ellipse(0, 0, 26, 18, 0, 0, TAU); ctx.fill();   // tractor-beam underglow
      ctx.globalAlpha = 1;
      ctx.rotate(rv.a); ctx.scale(bob, bob);
      drawVehicleBody("ufo");
    } else {
      ctx.fillStyle = "#b06ee8"; ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.ellipse(0, 0, 24, 17, 0, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.rotate(rv.a);
      stdWheels();
      ctx.fillStyle = "#b06ee8"; ctx.beginPath(); ctx.roundRect(-17,-9.5,34,19,7); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.beginPath(); ctx.roundRect(-17,-9.5,34,8,7); ctx.fill();
      ctx.fillStyle = "#20283c"; ctx.fillRect(-19,-8,4,16);
      ctx.fillStyle = "#1b2233"; ctx.beginPath(); ctx.roundRect(-7,-7,14,14,4); ctx.fill();
      ctx.font = "12px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      fillTextC("👾", 0, 0);
      ctx.fillStyle = "#fff2c0"; ctx.fillRect(15,-7,3,4); ctx.fillRect(15,3,3,4);
    }
    ctx.restore();
  }
  if(store.pet && game.pet){
    const p = PETS.find(p=>p.id===store.pet);
    if(p){
      const bob = Math.abs(Math.sin(game.t*7))*4;
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.beginPath(); ctx.ellipse(game.pet.x, game.pet.y+10, 9, 3.5, 0, 0, TAU); ctx.fill();
      drawPetGuy(p, game.pet.x, game.pet.y-4-bob, 22);
    }
  }
  if(game.car2) drawCar(game.car2);
  drawCar(car);
  if(game.vs || game.coop || game.ko){
    // name tags over both cars
    ctx.font = "800 15px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    game.cars.forEach((c2,i)=>{
      const nm = pName(i);
      ctx.lineWidth = 4; ctx.strokeStyle = "rgba(10,12,20,0.85)";
      ctx.strokeText(nm, c2.x, c2.y-28);
      ctx.fillStyle = i? "#b06ee8" : vehicleById(store.car).trail();
      ctx.fillText(nm, c2.x, c2.y-28);
    });
  }
  // particles
  for(const p of game.parts){
    ctx.globalAlpha = 1-p.t/p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(p.fade?1+p.t*2:1), 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // floaters
  for(const f of game.floats){
    ctx.globalAlpha = 1-f.t;
    ctx.font = "800 20px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.textAlign="center";
    ctx.lineWidth=4; ctx.strokeStyle="rgba(10,12,20,0.85)"; ctx.fillStyle = f.col;
    fillTextC(f.txt, f.x, f.y, true);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  drawDarkness();
}

function drawPetGuy(p, x, y, s){
  ctx.font = s+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  fillTextC(p.emoji, x, y);
  if(p.hat){ ctx.font = (s*0.52)+"px sans-serif"; fillTextC(p.hat, x + s*0.14, y - s*0.44); }
  if(p.num){
    ctx.font = "900 "+Math.max(9, s*0.34)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.lineWidth = Math.max(2, s*0.06); ctx.strokeStyle = "rgba(10,14,30,0.9)"; ctx.fillStyle = "#eafcff";
    fillTextC(p.num, x, y + s*0.08, true);
  }
  if(p.fx==="diamond"){                                   // time-driven twinkles (pause-safe, no particles)
    for(let i=0;i<3;i++){
      const tw = Math.sin(game.t*3 + i*2.1), a = Math.max(0, tw);
      if(a<=0.05) continue;
      const ang = i*2.1 + 0.7, d = s*0.55;
      const sx = x + Math.cos(ang)*d, sy = y + Math.sin(ang)*d*0.7 - s*0.08;
      ctx.save(); ctx.globalAlpha = a*0.9; ctx.fillStyle = "#dff6ff";
      ctx.translate(sx, sy); ctx.rotate(tw*0.6);
      const r2 = s*0.10*(0.6+a*0.6);
      ctx.beginPath(); ctx.moveTo(0,-r2); ctx.quadraticCurveTo(r2*0.18,-r2*0.18,r2,0);
      ctx.quadraticCurveTo(r2*0.18,r2*0.18,0,r2); ctx.quadraticCurveTo(-r2*0.18,r2*0.18,-r2,0);
      ctx.quadraticCurveTo(-r2*0.18,-r2*0.18,0,-r2); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

function stdWheels(){
  for(const [wx,wy] of [[-10,-10],[-10,10],[9,-10],[9,10]]){
    // tire: rounded rect, top-left lit -> bottom-right dark
    let tg = ctx.createLinearGradient(wx-4,wy-3,wx+4,wy+3);
    tg.addColorStop(0,"#2b3042");
    tg.addColorStop(0.5,"#181c28");
    tg.addColorStop(1,"#0b0d14");
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.roundRect(wx-4,wy-3,8,6,2.2); ctx.fill();
    // faint top-left rim light on the tire edge
    ctx.strokeStyle = "rgba(255,255,255,0.14)"; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.roundRect(wx-3.7,wy-2.7,7.4,5.4,1.9); ctx.stroke();
    // metallic hub cap: radial gradient, bright silver top-left -> dark steel
    let rg = ctx.createRadialGradient(wx-1.1,wy-1.1,0.2, wx,wy,3.4);
    rg.addColorStop(0,"#f4f6fc");
    rg.addColorStop(0.45,"#c4cbda");
    rg.addColorStop(0.78,"#7a8399");
    rg.addColorStop(1,"#3a4054");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.roundRect(wx-2.8,wy-1.9,5.6,3.8,1.6); ctx.fill();
    // hub center + tiny specular
    ctx.fillStyle = "#2a2f3d";
    ctx.beginPath(); ctx.ellipse(wx,wy,1.1,0.9,0,0,TAU); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.beginPath(); ctx.ellipse(wx-0.4,wy-0.5,0.5,0.4,0,0,TAU); ctx.fill();
  }
}
function drawNumDecal(vid){
  const n = String(store.carNum==null? 67 : store.carNum);
  ctx.save();
  ctx.rotate(Math.PI/2);                 // roof number reads across the car
  if(vid!=="ufo"){
    ctx.fillStyle = "rgba(247,248,255,0.92)";
    ctx.beginPath(); ctx.arc(0, 0, 6.5, 0, TAU); ctx.fill();
  }
  ctx.fillStyle = "#12151f";
  ctx.font = "900 8px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(n, 0, 0.5);
  ctx.restore();
}
function drawVehicleBody(vid){
  if(vid==="taxi"){
    // body — top-left lit gradient over the same rounded shape
    const bg=ctx.createLinearGradient(-17,-9.5,17,9.5);
    bg.addColorStop(0,"#ffe6a0"); bg.addColorStop(0.5,"#ffc93c"); bg.addColorStop(1,"#d18f1a");
    ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-17,-9.5,34,19,6); ctx.fill();
    // contact / ground-seat darkening at the very bottom
    ctx.fillStyle="rgba(0,0,0,0.14)"; ctx.beginPath(); ctx.roundRect(-15,7.4,30,2.4,2); ctx.fill();
    // top sheen band fading down
    const sh=ctx.createLinearGradient(0,-9.5,0,-1.5);
    sh.addColorStop(0,"rgba(255,255,255,0.34)"); sh.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=sh; ctx.beginPath(); ctx.roundRect(-17,-9.5,34,8,6); ctx.fill();
    // signature checker band (unchanged)
    ctx.fillStyle="#12151f";
    for(let i=0;i<8;i++){ const x=-15+i*4; ctx.fillRect(x, i%2? -9.5:-6.7, 4, 2.8); ctx.fillRect(x, i%2? 6.7:3.9, 4, 2.8); }
    // specular shine dot near top-left
    const sp=ctx.createRadialGradient(-9,-6,0,-9,-6,6.5);
    sp.addColorStop(0,"rgba(255,255,255,0.55)"); sp.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=sp; ctx.beginPath(); ctx.ellipse(-9,-6,6.5,3,0,0,TAU); ctx.fill();
    // glossy cockpit: dark glass + diagonal reflections
    ctx.fillStyle="#141a2b"; ctx.beginPath(); ctx.roundRect(-6,-6,12,12,4); ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.roundRect(-6,-6,12,12,4); ctx.clip();
    ctx.fillStyle="rgba(150,180,225,0.5)"; ctx.beginPath(); ctx.moveTo(-6,-2); ctx.lineTo(-2,-6); ctx.lineTo(1,-6); ctx.lineTo(-6,1); ctx.closePath(); ctx.fill();
    ctx.fillStyle="rgba(150,180,225,0.26)"; ctx.beginPath(); ctx.moveTo(-6,4); ctx.lineTo(2,-6); ctx.lineTo(4,-6); ctx.lineTo(-6,6); ctx.closePath(); ctx.fill();
    ctx.restore();
    // amber roof light with a lit top edge
    const rl=ctx.createLinearGradient(0,-2.5,0,2.5); rl.addColorStop(0,"#fff0b0"); rl.addColorStop(1,"#e0a520");
    ctx.fillStyle=rl; ctx.fillRect(-1.5,-2.5,5,5);
    ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.fillRect(-1.5,-2.5,5,1);
    // rim light: bright top+left, dark bottom+right to seat it
    ctx.lineWidth=1;
    ctx.strokeStyle="rgba(255,255,255,0.45)";
    ctx.beginPath(); ctx.moveTo(-10,-9.2); ctx.lineTo(10,-9.2); ctx.moveTo(-16.7,-3); ctx.lineTo(-16.7,3); ctx.stroke();
    ctx.strokeStyle="rgba(0,0,0,0.28)";
    ctx.beginPath(); ctx.moveTo(-10,9.2); ctx.lineTo(10,9.2); ctx.moveTo(16.7,-3); ctx.lineTo(16.7,3); ctx.stroke();
  }
  else if(vid==="banana"){
    // body — lit yellow gradient over the same rounded shape
    const bg=ctx.createLinearGradient(-17,-7,17,7);
    bg.addColorStop(0,"#fff2a0"); bg.addColorStop(0.5,"#ffe135"); bg.addColorStop(1,"#d9b41c");
    ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-17,-7,34,14,7); ctx.fill();
    // rounded underside shading (belly) — replaces the flat #e8c92e band
    ctx.save(); ctx.beginPath(); ctx.roundRect(-17,-7,34,14,7); ctx.clip();
    const belly=ctx.createLinearGradient(0,0,0,7);
    belly.addColorStop(0,"rgba(150,110,30,0)"); belly.addColorStop(1,"rgba(150,110,30,0.42)");
    ctx.fillStyle=belly; ctx.fillRect(-17,0,34,7);

    sh.addColorStop(0,"rgba(255,255,255,0.4)"); sh.addColorStop(1,"rgba(255,255,255,0)");

    ctx.fillStyle="rgba(150,180,225,0.5)"; ctx.beginPath(); ctx.moveTo(-10,-1); ctx.lineTo(-6,-4.5); ctx.lineTo(-3.5,-4.5); ctx.lineTo(-10,2); ctx.closePath(); ctx.fill();
    ctx.restore();
    // exhaust knob — metallic
    const eg=ctx.createRadialGradient(4.3,-7.5,0,5,-6.8,1.9);
    eg.addColorStop(0,"#c3ccde"); eg.addColorStop(1,"#5a6274");
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(5,-6.8,1.7,0,TAU); ctx.fill();
    // faint contact darkening along body bottom
    ctx.fillStyle="rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.roundRect(-11,5.6,16,1.8,1.5); ctx.fill();
    // rim light: bright top+left, dark bottom+right
    ctx.lineWidth=1;
    ctx.strokeStyle="rgba(255,255,255,0.4)";
    ctx.beginPath(); ctx.moveTo(-10,-7.3); ctx.lineTo(4,-7.3); ctx.moveTo(-12.7,-4); ctx.lineTo(-12.7,4); ctx.stroke();
    ctx.strokeStyle="rgba(0,0,0,0.28)";
    ctx.beginPath(); ctx.moveTo(-10,7.3); ctx.lineTo(4,7.3); ctx.stroke();
  }
  else if(vid==="hotdog"){
    // bun body — warm top-left-lit gradient (replaces flat #e8b06a fill)
    const g=ctx.createLinearGradient(-14,-9,14,9);
    g.addColorStop(0,"#f3d3a2"); g.addColorStop(0.5,"#e8b06a"); g.addColorStop(1,"#b0824a");
    ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(-16,-9,32,18,9); ctx.fill();
    // top sheen band, fades down
    const sh=ctx.createLinearGradient(0,-9,0,-1);
    sh.addColorStop(0,"rgba(255,246,225,0.5)"); sh.addColorStop(1,"rgba(255,246,225,0)");
    ctx.fillStyle=sh; ctx.beginPath(); ctx.roundRect(-14,-8.5,28,8,7); ctx.fill();
    // lower bun crease shade
    ctx.fillStyle="#c9924c"; ctx.beginPath(); ctx.roundRect(-13,3.6,26,4.4,3); ctx.fill();
    // sausage — its own rounded gradient (replaces flat #c14b32)
    const s=ctx.createLinearGradient(0,-4,0,4);
    s.addColorStop(0,"#d76a4f"); s.addColorStop(0.5,"#c14b32"); s.addColorStop(1,"#8f3822");
    ctx.fillStyle=s; ctx.beginPath(); ctx.roundRect(-19,-4,38,8,4); ctx.fill();
    ctx.fillStyle="rgba(255,200,170,0.35)"; ctx.beginPath(); ctx.roundRect(-17,-3.4,34,2,2); ctx.fill();

    ctx.lineCap="round";
    ctx.strokeStyle="rgba(120,80,0,0.35)"; ctx.lineWidth=2.4; ctx.beginPath();
    for(let i=0;i<=6;i++) ctx.lineTo(-15+i*5,(i%2?-2:2)+0.9); ctx.stroke();
    ctx.strokeStyle="#ffd93b"; ctx.lineWidth=2; ctx.beginPath();
    for(let i=0;i<=6;i++) ctx.lineTo(-15+i*5, i%2?-2:2); ctx.stroke();
    ctx.strokeStyle="rgba(255,248,190,0.7)"; ctx.lineWidth=0.8; ctx.beginPath();
    for(let i=0;i<=6;i++) ctx.lineTo(-15+i*5,(i%2?-2:2)-0.7); ctx.stroke();
    ctx.lineCap="butt";
    // specular shine dot, top-left of bun
    const sp=ctx.createRadialGradient(-8,-5,0,-8,-5,7);
    sp.addColorStop(0,"rgba(255,255,255,0.55)"); sp.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=sp; ctx.beginPath(); ctx.ellipse(-8,-5,7,4,-0.3,0,TAU); ctx.fill();
    // rim light (top/left bright) + contact seat (bottom dark)
    ctx.strokeStyle="rgba(255,255,255,0.4)"; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(-15.5,-8.5,31,17,8.5); ctx.stroke();
    ctx.fillStyle="rgba(0,0,0,0.16)"; ctx.beginPath(); ctx.ellipse(0,8.4,12,2,0,0,TAU); ctx.fill();
  }
  else if(vid==="cart"){
    // metal basket body — cool top-left-lit gradient (replaces flat #b8c1d8)
    const g=ctx.createLinearGradient(-13,-9,16,9);
    g.addColorStop(0,"#e2e6f2"); g.addColorStop(0.5,"#b8c1d8"); g.addColorStop(1,"#828aa6");
    ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(-13,-9,29,18,3); ctx.fill();

    const sh=ctx.createLinearGradient(0,-9,0,-2);

    for(const y of [-4,1]){ ctx.beginPath(); ctx.moveTo(-13,y); ctx.lineTo(16,y); ctx.stroke(); }
    ctx.strokeStyle="rgba(255,255,255,0.3)"; ctx.lineWidth=0.7;
    for(let x=-9;x<=13;x+=4.5){ ctx.beginPath(); ctx.moveTo(x-0.8,-9); ctx.lineTo(x-0.8,9); ctx.stroke(); }
    for(const y of [-4,1]){ ctx.beginPath(); ctx.moveTo(-13,y-0.8); ctx.lineTo(16,y-0.8); ctx.stroke(); }
    // handle post — brushed-metal gradient (replaces flat #8b93ad)
    const p=ctx.createLinearGradient(-18,0,-14,0);
    p.addColorStop(0,"#aab2c8"); p.addColorStop(1,"#6f768e");

    const sp=ctx.createRadialGradient(-6,-5,0,-6,-5,7);

    ctx.strokeStyle="rgba(255,255,255,0.4)"; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(-12.5,-8.5,28,17,2.5); ctx.stroke();

  else if(vid==="toilet"){
    // tank/cistern — porcelain gradient (replaces flat #eef1fa)
    const tg=ctx.createLinearGradient(-18,-8,-7,8);
    tg.addColorStop(0,"#ffffff"); tg.addColorStop(0.55,"#eef1fa"); tg.addColorStop(1,"#c6cddf");
    ctx.fillStyle=tg; ctx.beginPath(); ctx.roundRect(-18,-8,11,16,3); ctx.fill();
    // tank lid highlight band (replaces flat #d5dbeb)
    const lid=ctx.createLinearGradient(0,-8,0,-4);
    lid.addColorStop(0,"rgba(255,255,255,0.85)"); lid.addColorStop(1,"rgba(213,219,235,0.2)");
    ctx.fillStyle=lid; ctx.beginPath(); ctx.roundRect(-18,-8,11,3.8,3); ctx.fill();
    // flush button, with its own tiny highlight
    ctx.fillStyle="#b7c0d8"; ctx.beginPath(); ctx.ellipse(-12.5,-6,1.7,1.1,0,0,TAU); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.beginPath(); ctx.ellipse(-13,-6.4,0.7,0.5,0,0,TAU); ctx.fill();
    // bowl — radial porcelain, lit from top-left (replaces flat #f4f6ff)
    const bg=ctx.createRadialGradient(-1,-4,1,3,0,15);
    bg.addColorStop(0,"#ffffff"); bg.addColorStop(0.6,"#f0f3fb"); bg.addColorStop(1,"#cdd4e6");

    ctx.strokeStyle="rgba(255,255,255,0.6)"; ctx.lineWidth=1; ctx.beginPath(); ctx.ellipse(3,-0.6,10,6.6,0,Math.PI,TAU); ctx.stroke();

  else if(vid==="ufo"){
    // 🛸 metallic saucer, top-left light

    const rimG = ctx.createLinearGradient(0,-9,0,13);

function drawRocketBody(bodyCol, stripeCol){
  // rear thruster block (behind body)
  let bg = ctx.createLinearGradient(-19,-8,-15,8);
  bg.addColorStop(0,"#2c3651"); bg.addColorStop(1,"#141a29");
  ctx.fillStyle = bg; ctx.fillRect(-19,-8,4,16);

  // body: base color + top-left light -> bottom-right shade, clipped to silhouette
  ctx.save();
  ctx.beginPath(); ctx.roundRect(-17,-9.5,34,19,7); ctx.clip();
  ctx.fillStyle = bodyCol; ctx.fillRect(-18,-10,36,20);
  let g = ctx.createLinearGradient(-14,-9.5,15,9.5);
  g.addColorStop(0,"rgba(255,255,255,0.30)");
  g.addColorStop(0.45,"rgba(255,255,255,0.03)");
  g.addColorStop(0.60,"rgba(0,0,0,0.05)");
  g.addColorStop(1,"rgba(0,0,0,0.36)");
  ctx.fillStyle = g; ctx.fillRect(-18,-10,36,20);
  // top sheen band fading down
  let sh = ctx.createLinearGradient(0,-9.5,0,-1);
  sh.addColorStop(0,"rgba(255,255,255,0.34)");
  sh.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = sh; ctx.fillRect(-17,-9.5,34,8.5);
  // racing stripe with gloss (kept accent)
  if(stripeCol){
    ctx.fillStyle = stripeCol; ctx.fillRect(-17,-2.4,34,4.8);
    let stg = ctx.createLinearGradient(0,-2.4,0,2.4);
    stg.addColorStop(0,"rgba(255,255,255,0.30)");
    stg.addColorStop(0.5,"rgba(255,255,255,0)");
    stg.addColorStop(1,"rgba(0,0,0,0.22)");
    ctx.fillStyle = stg; ctx.fillRect(-17,-2.4,34,4.8);
  }
  // specular shine dot (top-left)
  let sp = ctx.createRadialGradient(-9,-6,0,-9,-6,9);
  sp.addColorStop(0,"rgba(255,255,255,0.55)");
  sp.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = sp;
  ctx.beginPath(); ctx.ellipse(-9,-6,8,4.6,-0.32,0,TAU); ctx.fill();
  // ground-contact ambient occlusion sliver along bottom edge
  let ao = ctx.createLinearGradient(0,9.5,0,4.5);
  ao.addColorStop(0,"rgba(0,0,0,0.30)");
  ao.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle = ao; ctx.fillRect(-17,4.5,34,5);
  ctx.restore();

  // rim light: bright top-left -> dark bottom-right in a single gradient stroke
  let rim = ctx.createLinearGradient(-17,-9.5,17,9.5);
  rim.addColorStop(0,"rgba(255,255,255,0.5)");
  rim.addColorStop(0.5,"rgba(255,255,255,0.05)");
  rim.addColorStop(0.55,"rgba(0,0,0,0.05)");
  rim.addColorStop(1,"rgba(0,0,0,0.4)");
  ctx.strokeStyle = rim; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.roundRect(-16.4,-8.9,32.8,17.8,6.5); ctx.stroke();

  // glossy cockpit glass: deep base + diagonal reflection streak
  ctx.fillStyle = "#131a29";
  ctx.beginPath(); ctx.roundRect(-6,-6.5,12,13,4); ctx.fill();
  let cg = ctx.createLinearGradient(-6,-6.5,6,6.5);
  cg.addColorStop(0,"rgba(96,150,210,0.5)");
  cg.addColorStop(0.5,"rgba(28,44,74,0.25)");
  cg.addColorStop(1,"rgba(4,7,14,0.5)");
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.roundRect(-6,-6.5,12,13,4); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.roundRect(-6,-6.5,12,13,4); ctx.clip();
  ctx.fillStyle = "rgba(255,255,255,0.22)";
  ctx.beginPath();
  ctx.moveTo(-6,-1.5); ctx.lineTo(-1.5,-6.5); ctx.lineTo(1.5,-6.5); ctx.lineTo(-3,-1.5); ctx.closePath(); ctx.fill();
  ctx.restore();
  // bright front glass edge (kept accent)
  ctx.fillStyle = "rgba(170,222,255,0.42)";
  ctx.beginPath(); ctx.roundRect(3,-5.5,3,11,2); ctx.fill();
}
function drawVehiclePreview(vid, x, y, scale, alpha){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale); ctx.rotate(-Math.PI/2);
  ctx.globalAlpha = alpha==null? 1 : alpha;
  if(!vehicleById(vid).ownWheels) stdWheels();

  drawNumDecal(vid);

}
function drawCar(car){
  const vid = car.p2 ? "p2" : (store.car || "rocket");
  const v = car.p2 ? {trail:()=>"#b06ee8"} : vehicleById(vid);
  // motion trail
  for(let i=car.trail.length-1;i>=2;i--){
    const t = car.trail[i], a = (1-i/car.trail.length)*0.14;
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.a);
    ctx.globalAlpha = a; ctx.fillStyle = cosTrail(car, v);
    ctx.beginPath(); ctx.roundRect(-16,-9,32,18,6); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(car.x, car.y);
  // underglow — 💡 a kind:"glow" cosmetic (v3) recolours it, brighter + pulsing (pure looks, player car only)
  let glowCol = game.lv.hue, glowA = 0.3, glowR = 1;
  if(!car.p2 && cosOn() && store.cosmetic){
    const cg = COSMETICS[store.cosmetic];
    if(cg && cg.kind==="glow"){
      glowCol = cg.col==="rainbow"? "hsl("+Math.floor((game.t*120)%360)+",90%,62%)" : cg.col;
      glowA = 0.5+0.14*Math.sin(game.t*6); glowR = 1.25;
    }
  }
  ctx.fillStyle = glowCol; ctx.globalAlpha = glowA;
  ctx.beginPath(); ctx.ellipse(0, 0, 24*glowR, 17*glowR, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  const air = (car.airT>0) ? Math.sin((1-car.airT/(car.airMax||0.55))*Math.PI) : 0;   // 🟠 0→1→0 hop parabola
  if(air>0){
    ctx.save(); ctx.globalAlpha=0.28*(1-air*0.6); ctx.fillStyle="#0a0e18";
    ctx.beginPath(); ctx.ellipse(0,4,22*(1-air*0.35),13*(1-air*0.35),0,0,TAU); ctx.fill();   // ground shadow shrinks as it lifts
    ctx.restore();
    ctx.translate(0,-air*30);                    // lift screen-up (≤30px at apex)
    ctx.scale(1+air*0.22, 1+air*0.22);           // bigger = closer to camera
  }
  ctx.rotate(car.heading);
  if(vid==="ufo"){ const hov = 1+Math.sin(game.t*4)*0.04; ctx.scale(hov,hov); }
  const sq = clamp(car.sq, 0.55, 1.35);
  ctx.scale(sq, 2-sq>1.3?1.3:2-sq);
  if(car.invuln>0 && (car.invuln*10|0)%2) ctx.globalAlpha = 0.4;
  // headlight cones (the saucer gets one wide beam)
  ctx.fillStyle = "rgba(255,240,190,0.13)";
  if(v.noLights){
    ctx.fillStyle = "rgba(154,230,140,0.10)";
    ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(85,26); ctx.lineTo(85,-26); ctx.closePath(); ctx.fill();
  } else {
    for(const s of [-1,1]){
      ctx.beginPath(); ctx.moveTo(16, 5*s); ctx.lineTo(85, 22*s); ctx.lineTo(85, 2*s); ctx.closePath(); ctx.fill();
    }
  }
  if(car.p2){
    stdWheels();
    drawRocketBody("#b06ee8", "#e6d9ff");
  } else {
    if(!v.ownWheels) stdWheels();
    drawVehicleBody(vid);
    drawNumDecal(vid);
  }
  if(!v.noLights){
    ctx.fillStyle = "#fff2c0";
    ctx.fillRect(15,-7,3,4); ctx.fillRect(15,3,3,4);
    ctx.fillStyle = car.boost>0 ? "#ff8f8f" : "#c23a4a";
    ctx.fillRect(-18,-7,2.6,4); ctx.fillRect(-18,3,2.6,4);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  // 🎁 equipped cosmetic (player's car only): ✨ shine sparkle + 🐐/👑 topper (world-space, above the car)
  if(!car.p2 && cosOn() && store.cosmetic){
    const cos = COSMETICS[store.cosmetic];
    if(cos && cos.kind==="shine" && Math.random()<0.4) sparkle(car.x+rand(-14,14), car.y+rand(-12,12));
    if(cos && cos.kind==="topper"){
      ctx.font = "18px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      fillTextC(cos.emoji, car.x, car.y - 20 + Math.sin(game.t*3)*2);
    }
  }
}

function drawCoin(cn){
  const s = Math.abs(Math.sin(game.t*3+cn.ph));
  const bob = Math.sin(game.t*2.4+cn.ph)*3;
  ctx.save(); ctx.translate(cn.x, cn.y+bob);
  if(cn.nitro){
    ctx.font = "26px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.scale(0.6+s*0.4, 1);
    fillTextC("⚡", 0, 0);
  } else {
    ctx.scale(0.35+s*0.65, 1);
    ctx.fillStyle = "#e8a930"; ctx.beginPath(); ctx.arc(0,0,11,0,TAU); ctx.fill();
    ctx.fillStyle = "#ffd76a"; ctx.beginPath(); ctx.arc(0,-1.5,9.5,0,TAU); ctx.fill();
    ctx.fillStyle = "#e8a930"; ctx.font="900 11px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("A", 0, -1);
  }
  ctx.restore();
}
function drawKey(k){

function drawDoor(d){
  if(d.anim>=1) return;
  const px = d.c*CELL, py = d.r*CELL;
  const h = CELL*(1-d.anim);
  ctx.fillStyle = "#3a2f18";
  ctx.fillRect(px+4, py+CELL-h+4, CELL-8, Math.max(0,h-8));
  ctx.strokeStyle = "#ffd76a"; ctx.lineWidth = 4;
  ctx.strokeRect(px+8, py+CELL-h+8, CELL-16, Math.max(0,h-16));
  if(d.anim<0.1){
    ctx.font = "26px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    fillTextC("🔒", px+CELL/2, py+CELL/2);
  }
}
function drawGate(g){
  const px = g.c*CELL, py = g.r*CELL;
  const closed = 1-g.open;
  if(closed<0.03) { // little base markers so pads are visible when open
    ctx.fillStyle = "rgba(255,90,90,0.5)";
    ctx.fillRect(px+2, py+2, 8, 8); ctx.fillRect(px+CELL-10, py+CELL-10, 8, 8);
    return;
  }
  const h = CELL*closed;
  ctx.save();
  ctx.translate(px, py+CELL/2-h/2);
  ctx.fillStyle = "#d8dbe6";
  ctx.fillRect(0, 0, CELL, h);
  ctx.fillStyle = "#ff5a5a";
  const stripes = 5;
  for(let i=0;i<stripes;i++){
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,CELL,h); ctx.clip();
    ctx.translate(i*CELL/stripes*1.4 - 20, 0); ctx.rotate(0.5);
    ctx.fillRect(0,-30,16,h+80);
    ctx.restore();
  }
  ctx.strokeStyle = "#20242f"; ctx.lineWidth=3; ctx.strokeRect(1.5,1.5,CELL-3,h-3);
  ctx.restore();
}
function drawShiftWall(m){
  const px = m.c*CELL, py = m.r*CELL, sol = game.shiftSol[m.grp]||0;
  const col = m.grp ? "#5ad1e0" : "#c56cff";     // set B = teal, set A = purple
  if(sol < 0.5){                                  // open: dashed ghost of where it will close
    ctx.globalAlpha = 0.2 + sol*0.4;
    ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.setLineDash([9,9]);
    ctx.strokeRect(px+6, py+6, CELL-12, CELL-12); ctx.setLineDash([]);
    ctx.globalAlpha = 1; return;
  }
  const inset = (1-sol)*CELL*0.42;                // grows shut as it solidifies
  ctx.fillStyle = "#161c2b";
  ctx.fillRect(px+inset, py+inset, CELL-2*inset, CELL-2*inset);
  ctx.globalAlpha = 0.85; ctx.fillStyle = col;
  ctx.fillRect(px+inset+5, py+inset+5, CELL-2*inset-10, CELL-2*inset-10);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = col; ctx.lineWidth = 3;
  ctx.strokeRect(px+inset+1.5, py+inset+1.5, CELL-2*inset-3, CELL-2*inset-3);
}
function drawZap(z){
  if(!z.active){                                  // recharging — faint socket
    ctx.globalAlpha = 0.25; ctx.strokeStyle="#7ef7ff"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(z.x, z.y, 20, 0, TAU); ctx.stroke(); ctx.globalAlpha=1; return;
  }
  const pulse = 1 + Math.sin(z.ph)*0.12;
  ctx.save(); ctx.translate(z.x, z.y); ctx.scale(pulse, pulse);
  ctx.fillStyle = "rgba(126,247,255,0.22)"; ctx.beginPath(); ctx.arc(0,0,30,0,TAU); ctx.fill();
  ctx.fillStyle = "#0e2a30"; ctx.strokeStyle = "#7ef7ff"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0,0,22,0,TAU); ctx.fill(); ctx.stroke();
  ctx.font = "24px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  fillTextC("⚡", 0, 1);
  ctx.restore();
}

function drawCrumble(cm){                                 // 🧱 foam float: intact bob → amber crack → aqua hole

  ctx.strokeStyle="rgba(201,179,255,0.12)"; ctx.lineWidth=6; ctx.setLineDash([10,12]); ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo((a.c+0.5)*CELL, (a.r+0.5)*CELL);
  ctx.lineTo((a.c+a.dx*a.range+0.5)*CELL, (a.r+a.dy*a.range+0.5)*CELL);
  ctx.stroke(); ctx.setLineDash([]);
}
function drawAsteroid(a){                                 // ☄️ lumpy soft rock — draw radius == collision radius (30*size)
  const R = 30*a.size;
  ctx.fillStyle="rgba(8,10,16,0.4)";                                               // deck shadow
  ctx.beginPath(); ctx.ellipse(a.x+5, a.y+7, R*0.95, R*0.42, 0, 0, TAU); ctx.fill();
  if(a.size>1){                                                                    // boulder: faint ember glow
    const eg=ctx.createRadialGradient(a.x,a.y,R*0.4, a.x,a.y,R*1.35);
    eg.addColorStop(0,"rgba(255,140,60,0.14)"); eg.addColorStop(1,"rgba(255,140,60,0)");
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(a.x,a.y,R*1.35,0,TAU); ctx.fill();
  }
  ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.spin);
  ctx.beginPath();                                                                 // lumpy 9-vertex polygon, deterministic wobble
  for(let i=0;i<9;i++){
    const th=i/9*TAU, rr=R*(0.8+0.2*Math.sin(a.c*3+i*2.1));
    i? ctx.lineTo(Math.cos(th)*rr, Math.sin(th)*rr) : ctx.moveTo(Math.cos(th)*rr, Math.sin(th)*rr);
  }
  ctx.closePath();
  ctx.fillStyle="#5a5470"; ctx.fill();
  ctx.strokeStyle="#3a3440"; ctx.lineWidth=4; ctx.stroke();
  ctx.fillStyle="#544e5c";                                                         // 3 craters
  [[-R*0.34,-R*0.18,R*0.20],[R*0.26,R*0.10,R*0.15],[-R*0.05,R*0.36,R*0.12]].forEach(([kx,ky,kr])=>{
    ctx.beginPath(); ctx.arc(kx,ky,kr,0,TAU); ctx.fill(); });
  ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=2.5;                      // star-white rim-light
  ctx.beginPath(); ctx.arc(0,0,R*0.86,-2.7,-0.9); ctx.stroke();
  ctx.restore();
}
function pName(i){ return (i? (CONFIG.player2Name||"P2") : (CONFIG.playerName||"P1")).slice(0,10); }
function drawDarkness(){
  if(!game.lv || !game.lv.dark || !game._cam) return;
  const cam = game._cam;
  if(!game._darkCv || game._darkCv.width!==W || game._darkCv.height!==H){
    game._darkCv = document.createElement("canvas");
    game._darkCv.width=W; game._darkCv.height=H;
  }
  const d = game._darkCv.getContext("2d");
  d.globalCompositeOperation = "source-over";
  d.clearRect(0,0,W,H);
  d.fillStyle = "rgba(3,6,13,0.93)"; d.fillRect(0,0,W,H);
  d.globalCompositeOperation = "destination-out";
  const toS = (wx,wy)=>[(wx-cam.cx)*cam.z+W/2, (wy-cam.cy)*cam.z+H/2];
  const hole = (wx,wy,r)=>{
    const [hx,hy] = toS(wx,wy);
    const g2 = d.createRadialGradient(hx,hy,r*0.25,hx,hy,r);
    g2.addColorStop(0,"rgba(0,0,0,1)"); g2.addColorStop(1,"rgba(0,0,0,0)");
    d.fillStyle=g2; d.beginPath(); d.arc(hx,hy,r,0,TAU); d.fill();
  };
  const car = game.car;
  const zz = cam.z || 1;
  hole(car.x, car.y, 215*zz);
  const [hx,hy] = toS(car.x, car.y);
  d.save(); d.translate(hx,hy); d.rotate(car.heading);
  const cg = d.createLinearGradient(0,0,340*zz,0);
  cg.addColorStop(0,"rgba(0,0,0,0.95)"); cg.addColorStop(1,"rgba(0,0,0,0)");
  d.fillStyle = cg;
  d.beginPath(); d.moveTo(10*zz,0); d.lineTo(340*zz,125*zz); d.lineTo(340*zz,-125*zz); d.closePath(); d.fill();
  d.restore();
  for(const cn of game.coins) if(!cn.got) hole(cn.x, cn.y, 44*zz);
  hole(game.finish.x, game.finish.y, 85*zz);

}

function drawHintArrow(){
  if(game.hintT < 1.6 && game.playT > 4) return;   // show at level start + when stuck
  if(!game.flow) return;
  const car = game.car;
  const c = clamp(Math.floor(car.x/CELL),0,game.cols-1), r = clamp(Math.floor(car.y/CELL),0,game.rows-1);
  let best=null, bd=game.flow[r]?game.flow[r][c]:-1;
  if(bd<0) return;
  for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
    const nc=c+dc, nr=r+dr;
    if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
    const v = game.flow[nr][nc];
    if(v>=0 && v<bd){ bd=v; best=[dc,dr]; }
  }
  const ang = best ? Math.atan2(best[1],best[0]) : Math.atan2(game.objective.y-car.y, game.objective.x-car.x);
  const pulse = 1+Math.sin(game.t*5)*0.15;
  ctx.save();
  ctx.translate(car.x + Math.cos(ang)*62, car.y + Math.sin(ang)*62);
  ctx.rotate(ang); ctx.scale(pulse,pulse);
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#f4f6ff";
  ctx.strokeStyle = "rgba(12,14,22,0.8)"; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(12,0); ctx.lineTo(-7,-9); ctx.lineTo(-3,0); ctx.lineTo(-7,9); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

const hudBtns = [];
// ✍️ center-safe text: iOS WebKit mis-positions CENTER-aligned canvas strings that
// contain emoji (the glyph run splits between the text font and Apple Color Emoji and
// the centering math breaks → glyphs paint right of the bubble). Measure once, paint
// LEFT-anchored from the true center — left-anchored runs can't shift, only overflow.
function emojiPad(txt){ let n=0; for(const ch of String(txt)) if(ch.codePointAt(0)>0x2100) n++; return n*10; }  // iOS paints emoji wider than metric
function fillTextC(txt, x, y, stroked){
  const w = ctx.measureText(txt).width;
  const pa = ctx.textAlign; ctx.textAlign = "left";
  if(stroked) ctx.strokeText(txt, x-w/2, y);
  ctx.fillText(txt, x-w/2, y);
  ctx.textAlign = pa;
}
// 📏 navigation buttons scale with the screen (iPad ≈ 53px, phones floor at 44px — Apple's minimum touch target)
function navS(){ return clamp(Math.round(Math.min(W,H)*0.065), 44, 60); }
function drawIconBtn(x,y,s,icon,act){

}

  const pts = [];
  for(let i=0;i<n;i++){

  ctx.lineCap="round"; ctx.lineJoin="round";

  ctx.strokeStyle="rgba(139,147,173,0.42)"; ctx.lineWidth=R*0.9;   traceTrack(pts); ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,0.30)"; ctx.lineWidth=3; ctx.setLineDash([11,15]); traceTrack(pts); ctx.stroke(); ctx.setLineDash([]);

    ctx.font = "900 "+Math.round(R*0.62)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    if(unlocked){
      ctx.fillStyle = "#12151f";
      ctx.fillText(""+(i+1), x, y-R*0.18);
      ctx.font = Math.round(R*0.42)+"px sans-serif";
      fillTextC(LEVELS[gi].emoji, x, y+R*0.42);
    } else {
      ctx.font = Math.round(R*0.62)+"px sans-serif";
      fillTextC("🔒", x, y+1);
    }
    // stars under node
    ctx.font = "11px sans-serif";
    for(let sIx=0;sIx<3;sIx++){
      ctx.globalAlpha = sIx<stars? 1 : 0.22;

    ctx.globalAlpha = 1;
    if(unlocked) mapNodes.push({x,y,r:R+9,ix:gi});

  // little car parked on the current node's ring — never covers a neighbor
  const curLocal = clamp((store.unlocked-1)-base, 0, n-1);

  const carX = cx2 + R*0.85, carY = cy2 - R*0.95;

  const carScale = roomy ? 0.85 : 0.6;
  const fakeCar = { x:carX, y:carY, heading:-0.5+Math.sin(game.t*1.4)*0.06, sq:1, invuln:0, boost:0, trail:[] };
  const saveLv = game.lv; game.lv = LEVELS[curGlobal];
  ctx.save(); ctx.translate(carX, carY); ctx.scale(carScale, carScale); ctx.translate(-carX, -carY);
  drawCar(fakeCar);
  ctx.restore();
  game.lv = saveLv;
  if(roomy && store.pet){
    const p = PETS.find(p=>p.id===store.pet);
    if(p){
      drawPetGuy(p, carX+34, carY-Math.abs(Math.sin(game.t*4))*4, 18);
    }
  }
  if(roomy && CONFIG.playerName){
    roundedPanel(carX-40, carY-48, 80, 22, 6, "#f4f6ff");
    ctx.fillStyle="#12151f"; ctx.font="900 13px 'Avenir Next Condensed',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(CONFIG.playerName.toUpperCase(), carX, carY-37);
  }
  ctx.font = "600 16px 'Avenir Next',sans-serif"; ctx.fillStyle="#8b93ad"; ctx.textAlign="center";
  fillTextC(input.hasTouch? "tap a level!  ·  🗺️ = worlds" : "press ENTER for level "+(curLocal+1)+"  ·  🗺️ = worlds", W/2, H-24-safeB);
  // input
  for(const tp of input.taps.splice(0)){
    if(tp.screen){ AU.ui(); loadLevel(curGlobal); return; }
    for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
      AU.ui();
      if(b.act==="mute") AU.toggleMute();
      else if(b.act==="back") game.state="series";
      return;
    }
    for(const nd of mapNodes){
      if(dist(tp.x,tp.y,nd.x,nd.y)<nd.r){ AU.ui(); loadLevel(nd.ix); return; }
    }
  }
}

/* ---------------- LEVEL BUILDER (v2) ---------------- */
const EMOJIS = ["🦖","🌋","👻","🍕","🌈","🐙","🚀","💎","🐸","⚡"];
const HUES = ["#ffb742","#9ae64a","#ff6a5e","#b98cff","#53e0ff"];
const SIZES = [[12,8],[16,10],[20,13]];   // [cols, rows]
const TOOL_LIST = ["wall","road","~","c","n","k","D","G","*","h","<",">","^","v","O","J","&","%","S","F"];
const TOOL_ICON = { wall:"🧱", road:"🧽", "~":"🧊", n:"⚡", k:"🗝️", D:"🔒", G:"🚧", "*":"🔼", h:"👾", S:"🚗", F:"🏁",
  "<":"⬅️", ">":"➡️", "^":"⬆️", "v":"⬇️", O:"🕳️", J:"🟠", "&":"🟣", "%":"🧱" };   // < > ^ v conveyors · O trap door · J splash pad · & sticky · % foam float
const bl = { grid:null, cols:0, rows:0, tool:"wall", hueIx:0, emojiIx:0, sizeIx:1,
  editingId:null, undo:[], ptr:null, lastCell:null, trashT:0, _geo:null };

function freshGrid(cols, rows){
  const g = [];
  for(let r=0;r<rows;r++)
    g.push(Array.from({length:cols}, (_,c)=> (r===0||c===0||r===rows-1||c===cols-1) ? "#" : "."));
  g[1][1] = "S"; g[rows-2][cols-2] = "F";
  return g;
}
function enterBuilder(cl){
  if(cl){
    bl.grid = cl.grid.map(row=>row.split(""));
    bl.rows = bl.grid.length; bl.cols = bl.grid[0].length;
    bl.hueIx = cl.hueIx||0; bl.emojiIx = cl.emojiIx||0; bl.editingId = cl.id;
    bl.sizeIx = Math.max(0, SIZES.findIndex(s=>s[0]===bl.cols && s[1]===bl.rows));
  } else {
    bl.sizeIx = 1;
    const [c,r] = SIZES[1];
    bl.cols=c; bl.rows=r; bl.grid = freshGrid(c,r);
    bl.hueIx = (Math.random()*HUES.length)|0;
    bl.emojiIx = (Math.random()*EMOJIS.length)|0;
    bl.editingId = null;
  }
  bl.undo.length = 0; bl.trashT = 0; bl.tool = "wall"; bl.ptr = null; bl.lastCell = null;
  game.state = "build";
}
function pushUndo(){
  bl.undo.push(bl.grid.map(r=>r.join("")).join("\n"));
  if(bl.undo.length>40) bl.undo.shift();
}
function popUndo(){
  const s = bl.undo.pop(); if(!s) return;
  bl.grid = s.split("\n").map(r=>r.split(""));
  bl.rows = bl.grid.length; bl.cols = bl.grid[0].length;
}
function countCh(ch){ let n=0; for(const row of bl.grid) for(const c of row) if(c===ch) n++; return n; }
function clearCh(ch){ for(const row of bl.grid) for(let i=0;i<row.length;i++) if(row[i]===ch) row[i]="."; }
function paintCell(c,r){
  if(c<=0||r<=0||c>=bl.cols-1||r>=bl.rows-1) return;
  let ch;
  if(bl.tool==="wall") ch="#";
  else if(bl.tool==="road") ch=".";
  else if(bl.tool==="S"||bl.tool==="F"||bl.tool==="k"){ if(bl.grid[r][c]===bl.tool) return; clearCh(bl.tool); ch=bl.tool; }
  else if(bl.tool==="h"){
    if(bl.grid[r][c]!=="h" && countCh("h")>=3){ sticker("MAX 3 GOOBERS! 👾","#ff8f8f"); return; }
    ch="h";
  }
  else ch = bl.tool;
  if(bl.grid[r][c]===ch) return;
  bl.grid[r][c] = ch;
  AU.beep(ch==="#"?280:640, 0.04, "square", 0.05);
}
function resizeGridTo(cols, rows){
  const old = bl.grid, oc = bl.cols, or_ = bl.rows;
  bl.grid = freshGrid(cols, rows);
  clearCh("S"); clearCh("F");   // fresh puts defaults in; clear then copy
  for(let r=1;r<Math.min(rows-1, or_-1);r++)
    for(let c=1;c<Math.min(cols-1, oc-1);c++)
      bl.grid[r][c] = old[r][c];
  if(!countCh("S")){ bl.grid[1][1]="S"; }
  if(!countCh("F")){ bl.grid[rows-2][cols-2]==="S" ? bl.grid[rows-2][cols-3]="F" : bl.grid[rows-2][cols-2]="F"; }
  bl.cols = cols; bl.rows = rows;
}
/* validation + conversion work on array-of-strings grids */
function findIn(rows, ch){
  for(let r=0;r<rows.length;r++){ const c = rows[r].indexOf(ch); if(c>=0) return [c,r]; }
  return null;
}
function bfsGrid(rows, sc, sr, passable){
  const R=rows.length, C=rows[0].length;
  const d = Array.from({length:R},()=>new Array(C).fill(-1));
  const q=[[sc,sr]]; d[sr][sc]=0;
  while(q.length){
    const [c,r]=q.shift();
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=C||nr>=R||d[nr][nc]!==-1) continue;
      if(!passable(rows[nr][nc])) continue;
      d[nr][nc]=d[r][c]+1; q.push([nc,nr]);
    }
  }
  return d;
}
function validateRows(rows){
  const S=findIn(rows,"S"), F=findIn(rows,"F");
  if(!S) return {ok:false, msg:"NEEDS A START 🚗"};
  if(!F) return {ok:false, msg:"NEEDS A FINISH 🏁"};
  const hasDoor = rows.some(r=>r.includes("D")), key = findIn(rows,"k");
  if(hasDoor && !key) return {ok:false, msg:"DOOR NEEDS A KEY 🗝️"};
  const d1 = bfsGrid(rows, S[0], S[1], ch=>ch!=="#");
  if(d1[F[1]][F[0]]<0) return {ok:false, msg:"CAN'T REACH THE FLAG!"};
  if(key){
    const d2 = bfsGrid(rows, S[0], S[1], ch=>ch!=="#"&&ch!=="D");
    if(d2[key[1]][key[0]]<0) return {ok:false, msg:"KEY IS LOCKED AWAY! 🗝️"};
  }
  return {ok:true};
}
function customToLevel(cl){
  const hz = [];
  const rows = cl.grid.map((row,r)=> row.split("").map((ch,c)=>{
    if(ch==="h"){ hz.push([c,r]); return "."; } return ch;
  }).join(""));
  const S=findIn(rows,"S"), F=findIn(rows,"F");
  const d = bfsGrid(rows, S[0], S[1], ch=>ch!=="#");
  const par = Math.max(15, Math.round(d[F[1]][F[0]]*1.35+8));
  const hazards = hz.map(([c,r])=>{
    const open=(cc,rr)=> rr>=0&&rr<rows.length&&cc>=0&&cc<rows[0].length&&rows[rr][cc]!=="#"&&rows[rr][cc]!=="D";
    let l=c; while(open(l-1,r)) l--;
    let ri=c; while(open(ri+1,r)) ri++;
    let u=r; while(open(c,u-1)) u--;
    let dn=r; while(open(c,dn+1)) dn++;
    if(ri-l<1 && dn-u<1) return null;
    return { path: (ri-l >= dn-u)? [[l,r],[ri,r]] : [[c,u],[c,dn]], speed:100 };
  }).filter(Boolean);
  return { name:cl.name, emoji:EMOJIS[cl.emojiIx||0], hue:HUES[cl.hueIx||0], par, grid:rows, hazards };
}
function saveBuild(){

function encodeTrack(cl){
  // "|" separator — "~" is ice now, so it can appear inside grids
  const payload = ["1", cl.name, cl.emojiIx||0, cl.hueIx||0, cl.grid.join("!")].join("|");
  return btoa(payload).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function decodeTrack(s){
  try{
    const raw = atob(s.replace(/-/g,"+").replace(/_/g,"/"));
    let p = raw.split("|");
    if(p.length<5) p = raw.split("~");   // links shared before the ice update
    if(p[0]!=="1" || p.length<5) return null;
    const rows = p[4].split("!");
    const cols = rows[0].length;
    if(rows.length<5||rows.length>16||cols<6||cols>24) return null;
    if(!rows.every(r=>r.length===cols && /^[#.SFcnkDG*h~<>^vOJ&%]+$/.test(r))) return null;   // incl. World-5 J/&/% so water-park tracks share
    if(!validateRows(rows).ok) return null;
    return { name:String(p[1]||"TRACK").slice(0,14), emojiIx:Math.min(EMOJIS.length-1, Math.max(0,+p[2]||0)),
             hueIx:Math.min(HUES.length-1, Math.max(0,+p[3]||0)), grid:rows };
  }catch(e){ return null; }
}
function shareTrack(){
  const cl = saveBuild(); if(!cl) return;
  const url = location.origin + location.pathname + "#T=" + encodeTrack(cl);
  if(navigator.share){ navigator.share({title:cl.name+" — "+CONFIG.title, url}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>sticker("LINK COPIED! 📋","#9ae64a")).catch(()=>{}); }
}
function builderAction(a){
  AU.ui();
  if(a==="back"){ game.state="series"; return; }
  if(a==="undo"){ popUndo(); return; }
  if(a==="hue"){ bl.hueIx=(bl.hueIx+1)%HUES.length; return; }
  if(a==="emoji"){ bl.emojiIx=(bl.emojiIx+1)%EMOJIS.length; return; }
  if(a==="size"){ pushUndo(); bl.sizeIx=(bl.sizeIx+1)%SIZES.length; resizeGridTo(SIZES[bl.sizeIx][0], SIZES[bl.sizeIx][1]); return; }
  if(a==="test"){ testBuild(); return; }
  if(a==="saveB"){ saveBuild(); return; }
  if(a==="share"){ shareTrack(); return; }
  if(a==="trash"){
    if(bl.trashT>0){
      if(bl.editingId){
        store.customLevels = store.customLevels.filter(c=>c.id!==bl.editingId);
        delete store.stars["c:"+bl.editingId]; save();
      }
      const [c,r]=SIZES[bl.sizeIx];
      bl.grid = freshGrid(c,r); bl.cols=c; bl.rows=r;
      bl.editingId=null; bl.undo.length=0; bl.trashT=0;
      sticker("GONE! 💨","#ff8f8f");
    } else { bl.trashT=2; sticker("TAP 🗑 AGAIN TO DELETE","#ff8f8f"); }
    return;
  }
  if(a.startsWith("tool:")){ bl.tool=a.slice(5); return; }
  if(a.startsWith("edit:")){ const cl=store.customLevels.find(c=>c.id===+a.slice(5)); if(cl) enterBuilder(cl); return; }
}

   Buy a crate in the garage → it rolls a RARITY, then a reward from
   that tier. Rewards fall in 4 buckets:
     • UPGRADES  — permanent tiny bumps, kept best-of-each-type
     • POWER-UPS — one-use, arm ONE per race (store.armed), auto-fire
     • COSMETICS — pure looks (trail / shine / topper)
     • CURRENCY  — coin/aura filler so no pull feels empty
   All state lives in `store` (see the store literal near the top).
   Upgrades/power-ups only buff the human's CAMPAIGN car — VS/KO/co-op

// coin / aura filler so a common pull still feels like progress
const CURRENCY = {

// 🎁 reconcile a loaded save: drop references to any crate item removed from the data tables above (makes deleting an asset safe)
if(store.armed && !POWERUPS[store.armed]) store.armed = null;
if(store.cosmetic && !COSMETICS[store.cosmetic]) store.cosmetic = null;
// 📖 v3: seed the collection ledger from an existing save — already-owned items count as
// found AND seen (no undiscovered-silhouette / NEW!-badge spam on upgrade day)
(function(){ const seed = k=>{ if(!store.found[k]){ store.found[k]=1; store.seenItems[k]=1; } };
  for(const k of UPG_KEYS) if((store.upg[k]||0)>0) seed("upg:"+k);
  for(const id in store.powerups) if(POWERUPS[id]) seed("pu:"+id);
  for(const id of store.cosmetics) if(COSMETICS[id]) seed("cos:"+id);
})();

// current multiplier for an upgrade stat (1 = nothing owned yet)
// 🎁 bucket toggles (CONFIG flags) — each folds in the master. See docs/MYSTERY-CRATES.md "Reverting".
function upgOn(){ return CONFIG.cratesEnabled && CONFIG.cratesUpgrades; }
function puOn(){  return CONFIG.cratesEnabled && CONFIG.cratesPowerups; }
function cosOn(){ return CONFIG.cratesEnabled && CONFIG.cratesCosmetics; }
// 📖 v3 collection-book ledger helpers. liveKey guards stale keys of DELETED assets so a
// removed data line can never leave a phantom NEW! badge (docs §13.7 pattern).
function liveKey(k){ const i=k.indexOf(":"), b=k.slice(0,i), id=k.slice(i+1);
  return b==="upg"? !!CRATE_UPG[id] : b==="pu"? !!POWERUPS[id] : b==="cos"? !!COSMETICS[id] : !!CURRENCY[id]; }
function isNewItem(k){ return !!(store.found[k] && !store.seenItems[k]); }
function unseenCount(){ let n=0; for(const k in store.found) if(!store.seenItems[k] && liveKey(k)) n++; return n; }
function bookSeen(){ let d=false; for(const k in store.found) if(!store.seenItems[k]){ store.seenItems[k]=1; d=true; } if(d) save(); }
// current multiplier for an upgrade stat (1 = off / nothing owned / stat deleted)
function upgMul(kind){ const u = CRATE_UPG[kind]; return (upgOn() && u) ? (u.mult[Math.min(store.upg[kind]||0, u.mult.length-1)] || 1) : 1; }
// should the human's upgrades/power-ups apply to this car right now?
// campaign only — VS/KO/co-op stay fair unless CONFIG.powerUpsInVs is on.
function boosted(car){
  if(!upgOn()) return false;          // 🎁 upgrades toggle (also folds in the master cratesEnabled)
  if(car!==game.car) return false;
  if((game.vs||game.ko||game.coop) && !CONFIG.powerUpsInVs) return false;
  return true;
}
// 🚗 per-vehicle stat perks: the human's CAMPAIGN car only. Same multiplayer-fairness
// envelope as boosted(), but independent of the crate toggle — a car's identity is core
// progression, so its handling character applies even with crates switched off.
function carPerk(car){
  if(car!==game.car) return false;
  if((game.vs||game.ko||game.coop) && !CONFIG.powerUpsInVs) return false;
  return true;
}
// ⏰ STAR CLOCK (v3): par seconds for the ⏱ star, stretched by the clock upgrade.
// boosted() gates it to the human CAMPAIGN car — co-op par math (coopClear/drawCoopHUD) never moves.
function parFor(L){ return L.par * (boosted(game.car)? upgMul("clock") : 1); }
// weighted 0..4 rarity roll from a crate's odds array
function rollTier(odds){
  let tot=0; for(const o of odds) tot+=o;
  let r=Math.random()*tot;
  for(let i=0;i<odds.length;i++){ r-=odds[i]; if(r<0) return i; }
  return 0;
}
// everything that can drop at rarity tier t (0..4). upgrades appear at every tier (weighted x2).
function poolForTier(t){
  const pool = [];
  if(puOn())  for(const id in POWERUPS)  if(POWERUPS[id].rarity===t) pool.push({type:"pu",  id});
  if(cosOn()) for(const id in COSMETICS) if(COSMETICS[id].rarity===t && !store.cosmetics.includes(id)) pool.push({type:"cos", id});
  for(const id in CURRENCY)  if(CURRENCY[id].rarity===t) pool.push({type:"cur", id});
  if(upgOn()) pool.push({type:"upg"}, {type:"upg"});   // an upgrade at this tier — the core chase
  if(!pool.length) pool.push({type:"cur", coins:20*(t+1)});   // floor: a disabled/empty tier still pays coins
  return pool;
}
// hand out one drop, mutate store, and return a card description for the reveal
// v3: also marks the 📖 found ledger and tags the result with badge:"new"|"dupe"|null (+ gold:true for prestige)
function grantDrop(drop, t){
  if(drop.type==="pu"){
    const p = POWERUPS[drop.id];
    const k = "pu:"+drop.id, isNew = !store.found[k]; store.found[k] = 1;          // 📖 v3
    store.powerups[drop.id] = (store.powerups[drop.id]||0)+1;
    return { icon:p.emoji, name:p.name, sub:p.desc, badge: isNew? "new" : null };
  }
  if(drop.type==="cos"){
    const c = COSMETICS[drop.id];
    store.found["cos:"+drop.id] = 1;                                               // 📖 v3 (always new — pool excludes owned)
    store.cosmetics.push(drop.id);
    return { icon:c.emoji, name:c.name, sub:"New look!", badge:"new" };
  }
  if(drop.type==="cur"){
    const c = CURRENCY[drop.id] || drop;   // (|| drop handles the empty-pool floor coins, which have no id)
    let isNew = false;                                                             // 📖 v3: floor coins (no id) never mark/badge
    if(drop.id){ const k = "cur:"+drop.id; isNew = !store.found[k]; store.found[k] = 1; }
    if(c.coins){ store.coinsBank += c.coins; return { icon:c.emoji||"🪙", name:"+"+c.coins+" COINS", sub:c.name||"Lucky find!", badge: isNew? "new" : null }; }
    store.aura += c.aura; return { icon:c.emoji||"💫", name:"+"+c.aura+" AURA", sub:c.name||"Aura!", badge: isNew? "new" : null };
  }
  // upgrade: random stat at tier t+1; if you already own that tier or better → coins instead
  if(!UPG_KEYS.length){ const c=20*(t+1); store.coinsBank+=c; return { icon:"🪙", name:"+"+c+" COINS", sub:"Lucky find!" }; }
  const stat = UPG_KEYS[(Math.random()*UPG_KEYS.length)|0], newTier = t+1;
  if(!CRATE_UPG[stat]){ const c=20*newTier; store.coinsBank+=c; return { icon:"🪙", name:"+"+c+" COINS", sub:"Lucky find!" }; }
  if((store.upg[stat]||0) >= newTier){
    // 🥇 PRESTIGE (v3): a LEGENDARY+ roll on a maxed (SECRET) stat promotes it to GOLD (tier 6).
    // mult.length guard: trimming a mult array back to 6 entries switches prestige off safely (§13.7).
    if(t>=3 && (store.upg[stat]||0)===RARITY.length && CRATE_UPG[stat].mult.length>RARITY.length+1){
      store.upg[stat] = RARITY.length+1;
      const gp = Math.round((CRATE_UPG[stat].mult[RARITY.length+1]-1)*100);
      return { icon:"🥇", name:CRATE_UPG[stat].name+" GOLD +"+gp+"%", sub:"PRESTIGE! Beyond max!", gold:true };
    }
    const c = 20*newTier; store.coinsBank += c;
    return { icon:"🪙", name:"+"+c+" COINS", sub:"(already have "+CRATE_UPG[stat].name+")", badge:"dupe" };  // 📖 v3
  }
  const k = "upg:"+stat, isNew = !store.found[k]; store.found[k] = 1;              // 📖 v3
  store.upg[stat] = newTier;
  const pct = Math.round((CRATE_UPG[stat].mult[newTier]-1)*100);
  return { icon:CRATE_UPG[stat].emoji, name:CRATE_UPG[stat].name+" +"+pct+"%", sub:"Upgrade!", badge: isNew? "new" : null };
}
// buy + open a crate → kicks off the reveal animation
function openCrate(key){
  const c = CRATES[key];
  if(store.coinsBank < c.price){
    AU.bonk(); sticker("NEED "+(c.price-store.coinsBank)+" MORE COINS!", "#ff8f8f"); return;
  }
  store.coinsBank -= c.price; store.cratesOpened++;
  const t = rollTier(c.odds);
  const pool = poolForTier(t);
  const res = grantDrop(pool[(Math.random()*pool.length)|0], t);
  save();
  game.reveal = { res, tier:t, t:0, from:key, popped:false };
  AU.ui();
}

/* ==================================================================
   🎁 GOLDEN CRATES (v2) — free in-level crate finds
   ------------------------------------------------------------------
   ONE rare glowing golden crate can spawn per CAMPAIGN level as a
   standalone NON-SOLID drive-over pickup (game.gold — it is NEVER
   added to game.crates, so the wooden 'x' crates, isSolid, crateAt,
   the collideWalls smash branch, drawCrate and the boss rival are all
   left untouched). Drive over it -> a FREE pull through the V1 grant
   pipeline, banked instantly, with a NON-BLOCKING reveal banner (no
   modal, no pause, no tap). Toggle: CONFIG.goldenCrateChance (0 = off).
   Full write-up: docs/MYSTERY-CRATES.md
   ================================================================== */
// deterministic pseudo-random in [0,1) per level — decides WHICH levels carry a golden crate (stable per level, not farmable)
function goldenHash(ix){ return ((ix*73 + 17) % 101) / 101; }
function spawnGolden(){
  game.gold = null;
  // campaign single-player only — VS/Knockout/Co-op/builder/custom are all excluded
  if(game.levelIx<0 || game.vs || game.ko || game.coop || game.customId || game.fromBuilder) return;
  if(!CONFIG.cratesEnabled || !CRATES.golden) return;          // 🎁 master toggle, or the golden entry was removed
  if(store.goldTaken && store.goldTaken[game.levelIx]) return; // already collected on THIS level — never respawns (no re-race farming)
  if(goldenHash(game.levelIx) >= (CONFIG.goldenCrateChance||0)) return;   // deterministic: does this level carry a golden crate?
  if(!game.finish || !game.startCell || !game.flow) return;
  const F = game.finish, K = (c,r)=> c+","+r, blocked = new Set(), add = (c,r)=> blocked.add(K(c,r));
  add(game.startCell[0], game.startCell[1]); add(F.c, F.r);
  if(game.key) add(Math.floor(game.key.x/CELL), Math.floor(game.key.y/CELL));
  for(const cr of game.crates)    add(cr.c, cr.r);
  for(const cn of game.coins)     add(Math.floor(cn.x/CELL), Math.floor(cn.y/CELL));   // coins + nitro cans
  for(const p of game.pads)       add(p.c, p.r);
  for(const g of game.gates)      add(g.c, g.r);
  for(const d of game.doors)      add(d.c, d.r);
  for(const p of game.portals)    add(p.c, p.r);
  for(const cv of game.conveyors) add(cv.c, cv.r);
  for(const t of game.trapDoors)  add(t.c, t.r);
  for(const bp of game.bounces)   add(bp.c, bp.r);   // 🟠 can't stop on a trampoline to grab it
  for(const cm of game.crumbles)  add(cm.c, cm.r);   // 🧱 vanishing floor — never place gold on foam
  for(const k of game.crushers) for(let s=0;s<=k.range;s++) add(k.c+k.dx*s, k.r+k.dy*s);   // whole swept lane
  for(const gb of game.goobers) for(const [wx,wy] of gb.path){                            // patrol path + padding
    const gc=Math.floor(wx/CELL), gr=Math.floor(wy/CELL);
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) add(gc+dc, gr+dr);
  }
  const path = bfsPathCells(game.startCell, [F.c, F.r]);   // walls-only start->finish racing line (every cell reachable)
  const ok = ([c,r])=> game.flow[r] && game.flow[r][c]>=0 && !blocked.has(K(c,r));
  const band = (lo,hi)=> path.slice(Math.floor(path.length*lo), Math.ceil(path.length*hi)).filter(ok);
  let cands = band(0.30, 0.70);                    // mid-race (never the start line or the flag)
  if(!cands.length) cands = band(0.15, 0.85);      // fallback: widen the band
  if(!cands.length){                               // fallback: any reachable road cell nearest mid-race
    const mid = game.raceTotal*0.5;
    cands = game.road.filter(ok)
      .sort((a,b)=> Math.abs(game.flow[a[1]][a[0]]-mid) - Math.abs(game.flow[b[1]][b[0]]-mid))
      .slice(0, 8);
  }
  if(!cands.length) return;                        // no safe cell -> no crate (a valid outcome)
  const [c,r] = cands[(Math.random()*cands.length)|0];
  game.gold = { c, r, x:(c+0.5)*CELL, y:(r+0.5)*CELL, got:false, ph:Math.random()*TAU, bob:Math.random()*TAU };
}
// smash a golden crate -> free V1 pull, banked instantly, non-blocking celebration
function grabGolden(g){
  g.got = true;
  const t = rollTier(CRATES.golden.odds), pool = poolForTier(t);
  const res = grantDrop(pool[(Math.random()*pool.length)|0], t);
  store.goldenFound = (store.goldenFound||0) + 1;
  if(store.goldTaken) store.goldTaken[game.levelIx] = 1;        // 🎁 this level's crate is collected — gone for good here
  save();                                                        // reward banked BEFORE any FX
  game.shake = Math.min(9, game.shake+5);
  for(let i=0;i<16;i++) debris(g.x+rand(-24,24), g.y+rand(-24,24));
  for(let i=0;i<14;i++) sparkle(g.x, g.y);
  float("FREE CRATE!", g.x, g.y-24, "#ffd76a");
  float(res.icon+" "+res.name, g.x, g.y-52, RARITY[t].col);
  confettiBurst(W/2, H*0.30, t>=3?120:70, RARITY[t].col);       // needs drawConfettiScreen in the play branch
  sticker("🎁 "+RARITY[t].name+"! "+res.name, RARITY[t].col);
  game.goldReveal = { res, tier:t, t:0 };
  AU.win();
  if(t>=3) AU.beep(1200,0.3,"sawtooth",0.2,600); else AU.beep(880,0.12,"square",0.14,300);
}
// world-space render of the golden crate — pulsing glow, bob, 🎁 face, orbiting sparkles
function drawGold(g){
  if(!g || g.got) return;

/* ---- power-up run lifecycle & auto-triggers (see docs/MYSTERY-CRATES.md) ----
   One power-up is armed at a time (store.armed). rocket/double fire at the
   start of every run (party/warp too); shield/freeze/ghost/slowmo/saver/megamag fire reactively and are only
   spent when they actually trigger — so an unused one carries to the next race. */
function consumeArmed(){
  const id = store.armed; if(!id) return;
  store.powerups[id] = (store.powerups[id]||0) - 1;
  if(store.powerups[id] <= 0){ delete store.powerups[id]; store.armed = null; }
  save();
}
function puFloat(msg, x, y){ float(msg, x==null?game.car.x:x, (y==null?game.car.y:y)-46, "#7ef7ff"); }
function firePU(kind, x, y){          // a reactive power-up went off: spend it + FX
  consumeArmed(); game.car.pu = null;
  const p = POWERUPS[kind]; if(p) puFloat(p.emoji+" "+p.name+"!", x, y);
  AU.nitro(); game.shake = Math.min(8, game.shake+3);
  for(let i=0;i<10;i++) puff(x==null?game.car.x:x, y==null?game.car.y:y, "rgba(126,247,255,0.5)");
}
// eat the next hit (trap door / goober) with an armed 🛡️ shield, 👻 ghost or 🛟 saver
function blockHit(car, x, y){
  if(car!==game.car || !car.pu) return false;
  if(car.pu==="shield"){ car.invuln = Math.max(car.invuln, 1.0); firePU("shield", x, y); return true; }
  if(car.pu==="ghost"){ car.ghostT = 2.0; car.invuln = Math.max(car.invuln, 2.0); firePU("ghost", x, y); return true; }
  if(car.pu==="saver"){                          // 🛟 SPLASH SAVER (v3): auto-hop clean over the hole/goober — splash-pad contract
    const SPD = CONFIG.speed||1, sp = Math.hypot(car.vx, car.vy);
    const launch = clamp(sp + 260*SPD, 420*SPD, 600*SPD);
    car.vx = Math.cos(car.heading)*launch; car.vy = Math.sin(car.heading)*launch;
    car.airT = car.airMax = 0.55; car.invuln = Math.max(car.invuln, 1.2); car.sq = 1.35;
    firePU("saver", x, y); AU.beep(520,0.12,"sine",0.14,260);
    return true;
  }
  return false;
}
// arm the run's power-up (campaign only unless CONFIG.powerUpsInVs) — call once per run start
function armRun(){
  const c = game.car; if(!c) return;
  c.dbl=false; c.shield=false; c.ghostT=0; c.pu=null; c.luckyAcc=0; c.magT=0; game.slowmo=0;
  for(const gb of game.goobers) gb.frozen = 0;
  const allow = puOn() && ((!game.vs && !game.ko && !game.coop) || CONFIG.powerUpsInVs);   // 🎁 power-ups toggle
  const id = store.armed;
  if(!allow || !id || !POWERUPS[id] || !(store.powerups[id]>0)) return;   // !POWERUPS[id] → safe if the id was deleted
  if(id==="rocket"){ c.nitroMeter=100; c.boost=0.3; consumeArmed(); puFloat("🚀 ROCKET START!"); }
  else if(id==="double"){ c.dbl=true; consumeArmed(); puFloat("✌️ DOUBLE COINS!"); }
  else if(id==="party"){                                            // 🎊 v3: scatter 6 bonus coins around the start straight
    scatterCoins(c.x, c.y, 6); consumeArmed(); puFloat("🎊 COIN PARTY!");
    for(let i=0;i<10;i++) sparkle(c.x+rand(-20,20), c.y+rand(-20,20));
  }
  else if(id==="warp"){                                             // 🌟 v3: hop up to 3 cells along the racing line at GO
    const F = game.finish;
    const path = (F && game.startCell)? bfsPathCells(game.startCell, [F.c, F.r]) : [];
    const bad = (cc,rr)=> isSolid(cc,rr) || game.doors.some(d=>d.c===cc&&d.r===rr) || game.gates.some(g=>g.c===cc&&g.r===rr)
             || game.trapDoors.some(t=>t.c===cc&&t.r===rr) || game.crumbles.some(m=>m.c===cc&&m.r===rr)
             || game.crushers.some(k=>{ for(let s=0;s<=k.range;s++) if(k.c+k.dx*s===cc && k.r+k.dy*s===rr) return true; return false; });
    let stop = 0;
    for(let i=1; i<path.length-1 && i<=3; i++){ if(bad(path[i][0], path[i][1])) break; stop = i; }   // never skips a door/gate or lands in danger
    if(stop>0){
      for(let i=0;i<10;i++) puff(c.x, c.y, "rgba(255,215,106,0.5)");
      const [wc,wr] = path[stop];
      c.x=(wc+0.5)*CELL; c.y=(wr+0.5)*CELL; c.vx=c.vy=0; c.invuln=Math.max(c.invuln,0.8);
      if(path[stop+1]) c.heading = Math.atan2(path[stop+1][1]-wr, path[stop+1][0]-wc);   // face down the track
      c.trail.length=0; game.cam.x=c.x; game.cam.y=c.y;                                  // no ghost trail / camera lurch
      consumeArmed(); puFloat("🌟 WARP START!"); AU.nitro();
      for(let i=0;i<14;i++) sparkle(c.x+rand(-20,20), c.y+rand(-20,20));
    }                                                               // no safe hop → NOT consumed, carries to the next race (kind)
  }
  else { c.pu=id; if(id==="shield") c.shield=true; }   // shield/freeze/ghost/slowmo/saver/megamag fire during the run
}
// equipped 🎨 trail cosmetic overrides the car's motion-trail colour (flame = orange, rainbow = cycling hue)
function cosTrail(car, v){
  if(!car.p2 && cosOn() && store.cosmetic){          // 🎁 cosmetics toggle
    const c = COSMETICS[store.cosmetic];
    if(c && c.kind==="trail") return c.col==="rainbow" ? "hsl("+Math.floor((game.t*120)%360)+",90%,62%)" : c.col;
  }
  return v.trail();
}

function cratesAction(a){
  if(a==="back"){ AU.ui(); if(bk.open){ bk.open=false; bookSeen(); return; } game.reveal=null; game.state="series"; return; }
  if(a==="book"){ AU.ui(); bk.open=true; bk.t=0; return; }
  if(a==="book:close"){ AU.ui(); bk.open=false; bookSeen(); return; }
  if(a.startsWith("info:")){ AU.key();
    if(a==="info:?"){ sticker("??? OPEN CRATES TO FIND IT!", "#8b93ad"); return; }
    const key = a.slice(5);
    for(const s of bookSections()) for(const it of s.items)
      if(it.key===key){ sticker(it.info, it.gold? PRESTIGE.col : RARITY[it.rarity].col); return; }
    return;
  }
  if(a.startsWith("buy:")){ openCrate(a.slice(4)); return; }   // works for any CRATES key
  if(a.startsWith("arm:")){
    const id = a.slice(4);
    store.seenItems["pu:"+id]=1;
    store.armed = (store.armed===id)? null : id; save(); AU.key();
    sticker(store.armed && POWERUPS[id]? POWERUPS[id].emoji+" "+POWERUPS[id].name+" ARMED" : "UNARMED", "#7ef7ff");
    return;
  }
  if(a.startsWith("wear:")){
    const id = a.slice(5);
    store.seenItems["cos:"+id]=1;
    store.cosmetic = (store.cosmetic===id)? null : id; save(); AU.key();
    return;
  }
}
function drawCrates(dt){
  nightSky();
  hudBtns.length = 0;
  const top = 8+safeT;
  const SHORT = H < 520;   // 🆕 v3: short landscape phones get a compact stack
  drawIconBtn(PADX, top, 44, "↩️", "back");

  ctx.fillStyle="#e8a930"; ctx.beginPath(); ctx.arc(W-PADX-bw2+22, top+22, 9, 0, TAU); ctx.fill();

    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(nNew>9? "9+" : String(nNew), bkX+40, top+6);
  }

  const gridW = Math.min(420, W-PADX*2), x0 = Math.round((W-gridW)/2);
  const rowW = Math.min(W-PADX*2, 640), xr = Math.round((W-rowW)/2);   // 🆕 v3: chip rows outgrow the 420px card grid
  let y = top+58;
  // crates to buy — every CRATES entry WITH a price (golden/price:0 is a free in-level find, not sold here)
  const buyable = Object.keys(CRATES).filter(k=> CRATES[k].price>0);
  const cw = (gridW-14)/2;
  buyable.forEach((k,i)=> crateCard(x0 + (i%2)*(cw+14), y + ((i/2)|0)*((SHORT?92:100)+14), cw, (SHORT?92:100), k));
  y += Math.max(1, Math.ceil(buyable.length/2))*((SHORT?92:100)+14) + 2;

    const uh = SHORT?48:56, uw = Math.min(84, (rowW-(UPG_KEYS.length-1)*8)/UPG_KEYS.length);   // 🆕 v3: 9 stats, one wide row
    UPG_KEYS.forEach((k,i)=> upgChip(xr + i*(uw+8), y, uw, uh, k));
    y += uh + (SHORT?12:16);
  }
  // power-ups — tap to arm ONE
  if(puOn()){
    sectionLabel("POWER-UPS  ·  tap to arm one", xr, y); y += 20;
    const owned = Object.keys(store.powerups).filter(id=>store.powerups[id]>0 && POWERUPS[id]);
    if(!owned.length){
      ctx.font="600 14px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.fillStyle="#5a6178"; ctx.textAlign="left";
      ctx.fillText("Open crates to find power-ups!", xr, y+22);

      owned.forEach((id,i)=>{ if(xr + i*(pw+8) + pw <= xr+rowW) puChip(xr + i*(pw+8), y, pw, ph2, id); });
    }
    y += (SHORT?56:64) + (SHORT?12:16);
  }
  // cosmetics — tap to wear (filter to live ids so a deleted cosmetic can't crash)
  const looks = store.cosmetics.filter(id=> COSMETICS[id]);
  if(cosOn() && looks.length){
    sectionLabel("LOOKS  ·  tap to wear", xr, y); y += 20;
    const kh = SHORT?48:56, kw = Math.max(44, Math.min(60, (rowW-(looks.length-1)*8)/looks.length));

  }

  if(bk.open){ hudBtns.length = 0; drawBook(dt); }   // 📖 book owns the tap surface (buy/arm/wear/back unreachable)
  if(game.reveal) drawReveal(dt);

  for(const tp of input.taps.splice(0)){
    if(tp.screen) continue;
    if(game.reveal){ game.reveal = null; continue; }   // any tap dismisses the reveal
    for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){ cratesAction(b.act); break; }
  }
}

/* ---------------- 📖 v3 COLLECTION BOOK (see docs/MYSTERY-CRATES.md §14) ---------------- */
// dark silhouette of an emoji, cached per (emoji,size). No ctx.filter (Safari-unsafe);
// offscreen source-in tint works everywhere iOS runs this game.
const _silC = new Map();
function silhouette(emoji, px){
  const key = emoji+"@"+px; let c = _silC.get(key);
  if(!c){
    c = document.createElement("canvas"); c.width = c.height = Math.ceil(px*2*DPR);
    const g = c.getContext("2d"); g.scale(DPR,DPR);
    g.font = px+"px sans-serif"; g.textAlign="center"; g.textBaseline="middle";
    g.fillText(emoji, px, px);
    g.globalCompositeOperation = "source-in";
    g.fillStyle = "#20263a"; g.fillRect(0,0,px*2,px*2);
    _silC.set(key, c);
  }
  return c;
}
// book contents — built from the LIVE data tables (never the save), so deleted assets vanish
// for free (§13.7). Honors the bucket toggles like the main rows; TREASURE always shows.
// 🥇 gold-hardened (v3 R3): upgrade tier clamps to mult.length-1, rarity index clamps to RARITY range.
function bookSections(){
  const S = [];
  if(upgOn()) S.push({ label:"UPGRADES", items: UPG_KEYS.map(k=>{ const u=CRATE_UPG[k];
    const t=Math.min(store.upg[k]||0, u.mult.length-1), gold=t>RARITY.length; return {
    key:"upg:"+k, emoji:u.emoji, name:u.name, rarity:Math.min(RARITY.length-1, Math.max(0,t-1)), tier:t, gold,
    found: t>0 || !!store.found["upg:"+k],
    info: t>0 ? u.name+(gold?" 🥇GOLD":"")+" +"+Math.round((u.mult[t]-1)*100)+"%" : u.name }; }) });
  if(puOn()) S.push({ label:"POWER-UPS", items: Object.keys(POWERUPS).map(id=>{ const p=POWERUPS[id]; return {
    key:"pu:"+id, emoji:p.emoji, name:p.name, rarity:p.rarity,
    found: !!store.found["pu:"+id] || (store.powerups[id]||0)>0,
    stock: store.powerups[id]||0, info: p.emoji+" "+p.name+" — "+p.desc }; }) });
  if(cosOn()) S.push({ label:"LOOKS", items: Object.keys(COSMETICS).map(id=>{ const c=COSMETICS[id]; return {
    key:"cos:"+id, emoji:c.emoji, name:c.name, rarity:c.rarity,
    found: !!store.found["cos:"+id] || store.cosmetics.includes(id),
    worn: store.cosmetic===id, info: c.emoji+" "+c.name }; }) });
  S.push({ label:"TREASURE", items: Object.keys(CURRENCY).map(id=>{ const c=CURRENCY[id]; return {
    key:"cur:"+id, emoji:c.emoji, name:c.name, rarity:c.rarity, found: !!store.found["cur:"+id],
    info: c.emoji+" "+c.name+(c.coins? " +"+c.coins+" COINS" : " +"+c.aura+" AURA") }; }) });
  return S;
}
function drawBook(dt){

    ctx.textAlign="left"; ctx.fillText(r.name, lx+11, by+53); });
  // bucket panels: 4-across when wide (iPad), 2x2 on notch-inset phones

function bookPanel(x, y, w, h, s){
  roundedPanel(x, y, w, h, 14, "rgba(10,12,19,0.85)");
  const n = s.items.filter(i=>i.found).length, done = n>=s.items.length;
  ctx.font="800 13px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.textBaseline="middle";
  ctx.fillStyle="#8b93ad"; ctx.textAlign="left"; ctx.fillText(s.label, x+10, y+16);
  ctx.font="900 13px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.fillStyle = done? "#ffd76a" : "#9ae64a"; ctx.textAlign="right";
  ctx.fillText(n+" / "+s.items.length, x+w-10, y+16);
  if(done){  // completion shimmer — gold underline (drawn mark, no ✓ glyph: iOS-safe)
    ctx.globalAlpha = 0.55+0.45*Math.sin(game.t*3);
    ctx.fillStyle="#ffd76a"; ctx.fillRect(x+10, y+26, w-20, 2); ctx.globalAlpha=1;
  }
  // tile grid autosizes so ANY v3 item count fits with no scroll (54px down to 36px)
  const cnt=s.items.length, gy=y+32, gh=h-40;
  let sz=56, per, rowsN;
  do { sz-=2; per=Math.max(1, Math.floor((w-16)/(sz+6))); rowsN=Math.ceil(cnt/per); }
  while(rowsN*(sz+8)-2 > gh && sz>36);
  const gridW2=per*(sz+6)-6, ox=x+(w-gridW2)/2;
  s.items.forEach((it,i)=> bookTile(ox+(i%per)*(sz+6), gy+((i/per)|0)*(sz+8), sz, it));
}
function bookTile(x, y, s, it){
  const col = it.gold? PRESTIGE.col : RARITY[it.rarity].col;   // 🥇 gold tile frame (v3)
  roundedPanel(x, y, s, s, 9, it.found? (it.gold? "rgba(255,225,77,0.10)" : "rgba(22,26,40,0.95)") : "rgba(8,10,16,0.9)");
  ctx.strokeStyle = it.found? col : "rgba(90,97,120,0.35)"; ctx.lineWidth = it.found? 2 : 1.5;
  ctx.beginPath(); ctx.roundRect(x+1, y+1, s-2, s-2, 8); ctx.stroke();   // rarity-colored frame (the hunt hint)
  ctx.textAlign="center"; ctx.textBaseline="middle";
  if(it.found){
    ctx.font = Math.round(s*0.5)+"px sans-serif";
    fillTextC(it.emoji, x+s/2, y+s/2 - (it.tier!=null? 3 : 0));
    if(it.tier!=null)   // upgrade depth: 5 tier pips (all lit + gold ring at 🥇 tier 6)
      for(let i=0;i<5;i++){ ctx.fillStyle = i<it.tier? (it.gold? PRESTIGE.col : RARITY[i].col) : "rgba(90,97,120,0.4)";
        ctx.beginPath(); ctx.arc(x+s/2+(i-2)*7, y+s-8, 2.4, 0, TAU); ctx.fill(); }
    if(it.stock>0){ ctx.font="800 9px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.fillStyle="#f4f6ff"; ctx.textAlign="right"; ctx.fillText("x"+it.stock, x+s-4, y+s-7); }
    if(it.worn){ ctx.fillStyle="#ffb742"; ctx.beginPath(); ctx.arc(x+6, y+6, 3, 0, TAU); ctx.fill(); }
    if(isNewItem(it.key)){  // gold NEW! corner tag, gentle bob
      const tw=27, th=12, tx=x+s-tw+4, ty=y-4+Math.sin(game.t*6);
      ctx.fillStyle="#ffd76a"; ctx.beginPath(); ctx.roundRect(tx, ty, tw, th, 6); ctx.fill();
      ctx.fillStyle="#12151f"; ctx.font="900 8px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.textAlign="center"; ctx.fillText("NEW!", tx+tw/2, ty+th/2+0.5);
    }
  } else {
    // mystery silhouette ("I can guess it!") — but top-tier items stay a pure "?" (secrets stay secret)
    if(it.rarity < RARITY.length-1){
      const px = Math.round(s*0.42), sc = silhouette(it.emoji, px);
      ctx.drawImage(sc, x+s/2-px, y+s/2-px, px*2, px*2);
    }
    ctx.font="900 "+Math.round(s*0.34)+"px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.fillStyle=col; ctx.globalAlpha=0.5; ctx.fillText("?", x+s/2, y+s/2+1); ctx.globalAlpha=1;
  }
  hudBtns.push({x, y, w:s, h:s, act: it.found? "info:"+it.key : "info:?"});
}
