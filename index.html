/* ---------------- save data ---------------- */
let store = { unlocked:1, stars:{}, aura:0, coinsBank:0, muted:false };

/* ---------------- audio (all synth, no files) ---------------- */
const AU = {
  ctx:null, master:null, engine:null, engineGain:null, driftGain:null, started:false,
  init(){
    if(this.started) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = store.muted ? 0 : 0.5;
      this.master.connect(this.ctx.destination);
      // engine hum
      const osc = this.ctx.createOscillator(); osc.type="sawtooth"; osc.frequency.value=60;
      const osc2 = this.ctx.createOscillator(); osc2.type="square"; osc2.frequency.value=61;
      const lp = this.ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=280;
      this.engineGain = this.ctx.createGain(); this.engineGain.gain.value=0;
      osc.connect(lp); osc2.connect(lp); lp.connect(this.engineGain); this.engineGain.connect(this.master);
      osc.start(); osc2.start(); this.engine = [osc, osc2];
      // drift hiss
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate, this.ctx.sampleRate);
      const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const noise = this.ctx.createBufferSource(); noise.buffer=buf; noise.loop=true;
      const bp = this.ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=900; bp.Q.value=0.6;
      this.driftGain = this.ctx.createGain(); this.driftGain.gain.value=0;
      noise.connect(bp); bp.connect(this.driftGain); this.driftGain.connect(this.master);
      noise.start();
      this.started = true;
    }catch(e){}
  },
  setEngine(speed, boosting){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const f = 55 + speed*0.16 + (boosting?40:0);
    this.engine[0].frequency.setTargetAtTime(f, t, 0.05);
    this.engine[1].frequency.setTargetAtTime(f*1.007, t, 0.05);
    this.engineGain.gain.setTargetAtTime(speed>5 ? 0.05 : 0.015, t, 0.1);
  },
  setDrift(on){ if(this.started) this.driftGain.gain.setTargetAtTime(on?0.06:0, this.ctx.currentTime, 0.05); },
  beep(freq, dur, type, vol, slideTo){
    if(!this.started || store.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type = type||"square"; o.frequency.value = freq;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
    const g = this.ctx.createGain(); g.gain.setValueAtTime(vol||0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.02);
  },
  coin(){ this.beep(880,0.09,"square",0.1); setTimeout(()=>this.beep(1318,0.12,"square",0.1), 60); },
  key(){ [660,880,1108].forEach((f,i)=> setTimeout(()=>this.beep(f,0.15,"triangle",0.14), i*90)); },
  door(){ this.beep(160,0.25,"triangle",0.2,80); },
  bonk(){ this.beep(140,0.18,"triangle",0.25,50); },
  goober(){ this.beep(300,0.3,"sawtooth",0.14,90); },
  nitro(){ this.beep(200,0.4,"sawtooth",0.1,700); },
  star(i){ this.beep(660+i*220, 0.25, "triangle", 0.16); },
  ui(){ this.beep(520,0.06,"square",0.07); },
  win(){ [523,659,784,1046,784,1046,1318,1568].forEach((f,i)=> setTimeout(()=>this.beep(f, i>5?0.4:0.14, "triangle", 0.14), i*110)); },
  toggleMute(){ store.muted=!store.muted; save(); if(this.master) this.master.gain.value = store.muted?0:0.5; },
};

/* ---------------- input: keyboard + touch ---------------- */
const input = { vec:{x:0,y:0}, nitro:false, hasTouch:false, joy:null, taps:[] };
const keys = {};
window.addEventListener("keydown", e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  AU.init();
  if(!keys[e.key]) {
    if(e.key==="Enter"||e.key===" ") input.taps.push({screen:true});
    if(e.key==="m"||e.key==="M") AU.toggleMute();
    if(e.key==="p"||e.key==="P") togglePause();
  }
  keys[e.key]=true;
});
window.addEventListener("keyup", e=> keys[e.key]=false);
function keyVec(){
  let x=0,y=0;
  if(keys.ArrowLeft||keys.a||keys.A) x-=1;
  if(keys.ArrowRight||keys.d||keys.D) x+=1;
  if(keys.ArrowUp||keys.w||keys.W) y-=1;
  if(keys.ArrowDown||keys.s||keys.S) y+=1;
  const m = Math.hypot(x,y)||1;
  return {x:x/m*Math.min(1,Math.hypot(x,y)), y:y/m*Math.min(1,Math.hypot(x,y))};
}
// touch: left side = floating joystick, right side = nitro
let touches = {};
cv.addEventListener("touchstart", e=>{
  e.preventDefault(); AU.init(); input.hasTouch = true;
  for(const t of e.changedTouches){
    const x=t.clientX, y=t.clientY;
    input.taps.push({x, y});
    if(game.state==="play"){
      if(x < W*0.55 && !input.joy) { input.joy = {id:t.identifier, ox:x, oy:y, x, y}; }
      else { touches[t.identifier]="nitro"; input.nitro=true; }
    }
  }
},{passive:false});
cv.addEventListener("touchmove", e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(input.joy && t.identifier===input.joy.id){ input.joy.x=t.clientX; input.joy.y=t.clientY; }
  }
},{passive:false});
function endTouch(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(input.joy && t.identifier===input.joy.id) input.joy=null;
    if(touches[t.identifier]==="nitro"){ delete touches[t.identifier]; if(!Object.keys(touches).length) input.nitro=false; }
  }
}
cv.addEventListener("touchend", endTouch, {passive:false});
cv.addEventListener("touchcancel", endTouch, {passive:false});
cv.addEventListener("mousedown", e=>{ AU.init(); input.taps.push({x:e.clientX, y:e.clientY}); });
window.addEventListener("contextmenu", e=> e.preventDefault());
function readInput(){
  const k = keyVec();
  let jx=0, jy=0;
  if(input.joy){
    const dx=input.joy.x-input.joy.ox, dy=input.joy.y-input.joy.oy;
    const m=Math.hypot(dx,dy);
    if(m>8){ const c=Math.min(1,m/48); jx=dx/m*c; jy=dy/m*c; }
  }
  input.vec.x = Math.abs(jx)>Math.abs(k.x)?jx:k.x;
  input.vec.y = Math.abs(jy)>Math.abs(k.y)?jy:k.y;
  if(keys[" "]) input.nitro = true;
  else if(!Object.keys(touches).length) input.nitro = false;
}

function newCar(x,y,heading){
  return { x, y, vx:0, vy:0, heading, speed:0, nitroMeter:70,

}

/* ---------------- level loading ---------------- */
function loadLevel(ix){
  const L = LEVELS[ix];
  game.levelIx = ix; game.lv = L;
  const g = L.grid;
  game.rows = g.length; game.cols = g[0].length;
  game.solid = []; game.road = []; game.coins=[]; game.pads=[]; game.gates=[]; game.doors=[]; game.goobers=[]; game.key=null;
  game.coinsGot=0; game.hasKey=false; game.auraRun=0; game.playT=0; game.bonks=0; game.driftT=0;
  game.parts=[]; game.floats=[]; game.stickers=[]; game.confetti=[]; game.hintT=0;
  let sx=1, sy=1, fx=1, fy=1;
  for(let r=0;r<game.rows;r++){
    game.solid[r]=[];
    for(let c=0;c<game.cols;c++){
      const ch = g[r][c]||"#";
      const wall = ch==="#";
      game.solid[r][c] = wall?1:0;
      if(!wall) game.road.push([c,r]);
      const wx=(c+0.5)*CELL, wy=(r+0.5)*CELL;
      if(ch==="S"){ sx=wx; sy=wy; game.startCell=[c,r]; }
      if(ch==="F"){ fx=wx; fy=wy; game.finish={c,r,x:wx,y:wy}; }
      if(ch==="c") game.coins.push({x:wx,y:wy,got:false,ph:Math.random()*TAU});
      if(ch==="n") game.coins.push({x:wx,y:wy,got:false,ph:Math.random()*TAU,nitro:true});
      if(ch==="*") game.pads.push({c,r,x:wx,y:wy});
      if(ch==="G") game.gates.push({c,r,x:wx,y:wy,ph:(c+r)%2?0:Math.PI,open:1});
      if(ch==="D") game.doors.push({c,r,x:wx,y:wy,anim:0});
      if(ch==="k") game.key={x:wx,y:wy,got:false};
    }
  }
  // doors + closed gates are solid until opened (handled in isSolid)
  game.coinsAll = game.coins.filter(c=>!c.nitro).length;
  // face the car toward open road
  let head = 0;
  const [sc,sr] = game.startCell;
  if(!isWallCell(sc+1,sr) || !isWallCell(sc+2,sr)) head = 0;
  else if(!isWallCell(sc,sr+1)) head = Math.PI/2;
  game.car = newCar(sx, sy, head);
  game.cam.x = sx; game.cam.y = sy;
  (L.hazards||[]).forEach(h=>{
    game.goobers.push({ path:h.path.map(p=>[(p[0]+0.5)*CELL,(p[1]+0.5)*CELL]),
      seg:0, x:(h.path[0][0]+0.5)*CELL, y:(h.path[0][1]+0.5)*CELL,
      speed:(CONFIG.easyMode? h.speed*0.7 : h.speed), ph:Math.random()*TAU });
  });
  prerenderGround(L);
  const sk = document.createElement("canvas");
  sk.width = game.cols*CELL; sk.height = game.rows*CELL;
  game.skidCv = sk; game.skidCtx = sk.getContext("2d");
  updateObjective(true);
  game.state = "play";
  sticker(L.emoji+" "+L.name, L.hue);
  setTimeout(()=> game.state==="play" && sticker("GO GO GO!", "#ffffff"), 900);
}

function isWallCell(c,r){
  if(c<0||r<0||c>=game.cols||r>=game.rows) return true;
  return !!game.solid[r][c];
}
function isSolid(c,r){
  if(isWallCell(c,r)) return true;
  for(const d of game.doors) if(d.c===c && d.r===r && d.anim<1) return true;
  for(const g of game.gates) if(g.c===c && g.r===r && g.open<0.5) return true;
  return false;
}

/* BFS flow field toward current objective (for the helper arrow) */
function updateObjective(force){
  let target;
  if(game.key && !game.key.got) target = game.key;
  else if(game.doors.length && game.doors.some(d=>d.anim<1) && game.hasKey) target = game.doors.find(d=>d.anim<1);
  else target = game.finish;
  if(!force && game.objective===target) return;
  game.objective = target;
  const tc = clamp(Math.floor(target.x/CELL),0,game.cols-1), tr = clamp(Math.floor(target.y/CELL),0,game.rows-1);
  const dst = Array.from({length:game.rows},()=>new Array(game.cols).fill(-1));
  const q=[[tc,tr]]; dst[tr][tc]=0;
  while(q.length){
    const [c,r]=q.shift();
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
      if(game.solid[nr][nc]) continue;             // hint path ignores doors/gates
      if(dst[nr][nc]!==-1) continue;
      dst[nr][nc]=dst[r][c]+1; q.push([nc,nr]);
    }
  }
  game.flow = dst;
}

/* ---------------- pre-rendered ground + walls ---------------- */
function prerenderGround(L){
  const w = game.cols*CELL, h = game.rows*CELL;
  const g = document.createElement("canvas"); g.width=w; g.height=h;
  const x = g.getContext("2d");
  // asphalt (road is the LIGHT surface — walls go near-black so the maze pops)
  x.fillStyle = "#232a3d"; x.fillRect(0,0,w,h);
  for(let i=0;i<w*h/900;i++){
    x.fillStyle = Math.random()<0.5 ? "rgba(255,255,255,0.035)" : "rgba(0,0,0,0.3)";
    x.fillRect(Math.random()*w, Math.random()*h, rand(1,3), rand(1,3));
  }
  // warm lamp pools on road
  for(const [c,r] of game.road){
    if((c*7+r*13)%9===0){
      const gr = x.createRadialGradient((c+0.5)*CELL,(r+0.5)*CELL,8,(c+0.5)*CELL,(r+0.5)*CELL,CELL*0.9);
      gr.addColorStop(0,"rgba(255,180,92,0.10)"); gr.addColorStop(1,"rgba(255,180,92,0)");
      x.fillStyle = gr; x.fillRect((c-1)*CELL,(r-1)*CELL,CELL*3,CELL*3);
    }
  }
  // center dashes on straights
  x.strokeStyle = "rgba(255,255,255,0.07)"; x.lineWidth=4; x.setLineDash([16,20]);
  for(const [c,r] of game.road){
    if(!isWallCell(c+1,r) && !isWallCell(c-1,r) && isWallCell(c,r-1) && isWallCell(c,r+1)){
      x.beginPath(); x.moveTo(c*CELL,(r+0.5)*CELL); x.lineTo((c+1)*CELL,(r+0.5)*CELL); x.stroke();
    }
    if(!isWallCell(c,r+1) && !isWallCell(c,r-1) && isWallCell(c-1,r) && isWallCell(c+1,r)){
      x.beginPath(); x.moveTo((c+0.5)*CELL,r*CELL); x.lineTo((c+0.5)*CELL,(r+1)*CELL); x.stroke();
    }
  }
  x.setLineDash([]);
  // start + finish checkers
  const checker = (cc,rr,col)=>{
    for(let i=0;i<8;i++) for(let j=0;j<8;j++){
      if((i+j)%2) continue;
      x.fillStyle = col;
      x.fillRect(cc*CELL+i*CELL/8, rr*CELL+j*CELL/8, CELL/8, CELL/8);
    }
  };
  for(let r=0;r<game.rows;r++) for(let c=0;c<game.cols;c++){
    const ch = L.grid[r][c];
    if(ch==="S") checker(c,r,"rgba(255,255,255,0.06)");
    if(ch==="F") checker(c,r,"rgba(255,255,255,0.16)");
  }
  // boost pads (chevrons)
  for(const p of game.pads){
    x.save(); x.translate(p.x,p.y);
    const horiz = !isWallCell(p.c+1,p.r) || !isWallCell(p.c-1,p.r);
    if(!horiz) x.rotate(Math.PI/2);
    x.strokeStyle = L.hue; x.lineWidth = 7; x.lineCap="round"; x.globalAlpha=0.75;
    for(let i=-1;i<=1;i++){
      x.beginPath(); x.moveTo(i*22-9, -18); x.lineTo(i*22+9, 0); x.lineTo(i*22-9, 18); x.stroke();
    }
    x.restore();
  }
  // walls: dark blocks + hue edge light + night windows
  for(let r=0;r<game.rows;r++) for(let c=0;c<game.cols;c++){
    if(!game.solid[r][c]) continue;
    const px=c*CELL, py=r*CELL;
    x.fillStyle = "#0b0d15"; x.fillRect(px,py,CELL,CELL);
    x.fillStyle = "#161b2b"; x.fillRect(px,py,CELL,10);
    // neon curb light on edges facing road
    x.fillStyle = L.hue; x.globalAlpha = 0.5;
    if(!isWallCell(c,r+1)) x.fillRect(px, py+CELL-4, CELL, 4);
    if(!isWallCell(c,r-1)) x.fillRect(px, py, CELL, 4);
    if(!isWallCell(c+1,r)) x.fillRect(px+CELL-4, py, 4, CELL);
    if(!isWallCell(c-1,r)) x.fillRect(px, py, 4, CELL);
    x.globalAlpha = 1;
    // lit windows
    const seed = (c*31+r*17)%10;
    if(seed<3){
      x.fillStyle = seed===0 ? "rgba(255,190,110,0.5)" : "rgba(170,210,255,0.28)";
      const n = 2+seed;
      for(let i=0;i<n;i++) x.fillRect(px+18+((i*37+r*11)%(CELL-44)), py+22+((i*53+c*7)%(CELL-50)), 9, 12);
    }
  }
  game.groundCv = g;
}

/* ---------------- car physics ---------------- */
function updateCar(dt){
  const car = game.car;
  const iv = input.vec;
  const hasInput = Math.hypot(iv.x,iv.y) > 0.15;
  const boosting = input.nitro && car.nitroMeter>0 && hasInput;

  if(car.spinT>0){ car.spinT-=dt; car.heading += dt*12; }
  else if(hasInput){
    const want = Math.atan2(iv.y, iv.x);
    const sp = Math.hypot(car.vx, car.vy);
    const tRate = lerp(9, 3.1, clamp(sp/460,0,1));   // nimble slow, wide fast
    const d = angDiff(car.heading, want);
    car.heading += clamp(d, -tRate*dt, tRate*dt);
  }
  const maxSp = boosting? 660 : 400;
  const accel = boosting? 1300 : 750;
  if(hasInput && car.spinT<=0){
    car.vx += Math.cos(car.heading)*accel*dt * Math.hypot(iv.x,iv.y);
    car.vy += Math.sin(car.heading)*accel*dt * Math.hypot(iv.x,iv.y);
  }
  // split velocity into forward + lateral, grip eats lateral (drift = less grip)
  const fx=Math.cos(car.heading), fy=Math.sin(car.heading);
  let fwd = car.vx*fx + car.vy*fy;
  let latX = car.vx - fwd*fx, latY = car.vy - fwd*fy;
  const sp = Math.hypot(car.vx,car.vy);
  const turningHard = hasInput && Math.abs(angDiff(car.heading, Math.atan2(iv.y,iv.x))) > 0.55;
  const grip = (turningHard && sp>230) ? 2.4 : 8.5;
  const latK = Math.exp(-grip*dt);
  latX*=latK; latY*=latK;
  fwd *= hasInput ? Math.exp(-0.35*dt) : Math.exp(-2.2*dt);
  car.vx = fwd*fx + latX; car.vy = fwd*fy + latY;
  const spd2 = Math.hypot(car.vx,car.vy);
  if(spd2 > maxSp){ car.vx *= maxSp/spd2; car.vy *= maxSp/spd2; }

  // drift state
  const slip = spd2>200 ? Math.abs(angDiff(car.heading, Math.atan2(car.vy,car.vx))) : 0;
  const wasDrift = car.drifting;
  car.drifting = slip>0.32 && spd2>210;
  if(car.drifting){
    game.driftT += dt;
    if(((game.driftT*10)|0) % 4 === 0) spark(car);
    skid(car);
    if(!wasDrift && Math.random()<0.6) float(pick(YELLS.drift), car.x, car.y-34, game.lv.hue);
    game.auraRun += dt*6;
  }
  AU.setDrift(car.drifting);

  // nitro
  if(boosting){
    car.nitroMeter = Math.max(0, car.nitroMeter - dt*30);
    if(car.boost<=0){ AU.nitro(); if(Math.random()<0.5) float(pick(YELLS.nitro), car.x, car.y-40, "#7ef7ff"); }
    car.boost = 0.12;
    flame(car);
  } else {
    car.nitroMeter = Math.min(100, car.nitroMeter + dt*(CONFIG.easyMode?14:9));
    car.boost = Math.max(0, car.boost-dt);
  }
  AU.setEngine(spd2, boosting);

  // move with wall collisions (sub-stepped)
  const steps = Math.max(1, Math.ceil(spd2*dt/9));
  for(let i=0;i<steps;i++){
    car.x += car.vx*dt/steps; car.y += car.vy*dt/steps;
    collideWalls(car);
  }

  // squash spring
  car.sqv += (1-car.sq)*260*dt; car.sqv *= Math.exp(-14*dt); car.sq += car.sqv*dt;
  car.invuln = Math.max(0, car.invuln-dt);

  // trail
  car.trail.unshift({x:car.x, y:car.y, a:car.heading});
  if(car.trail.length>13) car.trail.pop();

  // exhaust puffs
  if(spd2>40 && Math.random()<0.3)
    puff(car.x-Math.cos(car.heading)*20, car.y-Math.sin(car.heading)*20, "rgba(160,170,200,0.2)");
}

function collideWalls(car){
  const R = 13;
  const c0 = Math.floor((car.x-R)/CELL), c1 = Math.floor((car.x+R)/CELL);
  const r0 = Math.floor((car.y-R)/CELL), r1 = Math.floor((car.y+R)/CELL);
  for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
    if(!isSolid(c,r)) continue;
    const bx=c*CELL, by=r*CELL;
    const px = clamp(car.x, bx, bx+CELL), py = clamp(car.y, by, by+CELL);
    const dx = car.x-px, dy = car.y-py;
    const d2 = dx*dx+dy*dy;
    if(d2 >= R*R) continue;
    let nx, ny, pen;
    if(d2>0.0001){ const d=Math.sqrt(d2); nx=dx/d; ny=dy/d; pen=R-d; }
    else { // center inside block — push along smallest axis
      const l=car.x-bx, rr=bx+CELL-car.x, t=car.y-by, b=by+CELL-car.y;
      const m=Math.min(l,rr,t,b);
      nx = m===l?-1 : m===rr?1 : 0; ny = m===t?-1 : m===b?1 : 0; pen = m+R;
    }
    car.x += nx*pen; car.y += ny*pen;
    const vn = car.vx*nx + car.vy*ny;
    if(vn<0){
      const impact = -vn;
      car.vx -= (1.35)*vn*nx; car.vy -= (1.35)*vn*ny;   // soft bounce
      if(impact>230){
        game.shake = Math.min(10, game.shake+impact/60);
        car.sq = 0.68; AU.bonk();
        for(let i=0;i<8;i++) debris(px,py);
        if(Math.random()<0.5) float(pick(YELLS.bonk), car.x, car.y-36, "#ffd0d0");
        scuff(car);
      }
    }
  }
}

/* ---------------- entities ---------------- */
function updateEntities(dt){
  const car = game.car;
  // coins (with a little magnet)
  for(const cn of game.coins){
    if(cn.got) continue;
    if(cn.cool){ cn.cool = Math.max(0, cn.cool-dt); if(cn.cool>0) continue; }
    const d = dist(car.x,car.y,cn.x,cn.y);
    if(d<95){ cn.x = lerp(cn.x, car.x, dt*6); cn.y = lerp(cn.y, car.y, dt*6); }
    if(d<34){
      cn.got = true;
      if(cn.nitro){
        car.nitroMeter = 100; AU.nitro();
        float("NITRO FULL!", cn.x, cn.y-20, "#7ef7ff");
        for(let i=0;i<10;i++) puff(cn.x,cn.y,"rgba(126,247,255,0.5)");
      } else {
        game.coinsGot++; game.auraRun += 10; store.coinsBank++;
        AU.coin();
        float(Math.random()<0.3 ? pick(YELLS.coin) : "+10", cn.x, cn.y-20, "#ffd76a");
        for(let i=0;i<8;i++) sparkle(cn.x,cn.y);
      }
    }
  }
  // key
  if(game.key && !game.key.got && dist(car.x,car.y,game.key.x,game.key.y)<40){
    game.key.got = true; game.hasKey = true; AU.key();
    sticker("🗝️ "+pick(YELLS.key), "#ffd76a");
    updateObjective(true);
  }
  // doors
  for(const d of game.doors){
    if(d.anim>=1 || !game.hasKey) continue;
    if(dist(car.x,car.y,d.x,d.y) < CELL*1.1){
      d.opening = true;
    }
    if(d.opening){ d.anim = Math.min(1, d.anim + dt*1.6);
      if(d.anim>=1){ AU.door(); sticker(pick(YELLS.door), game.lv.hue); updateObjective(true);
        for(let i=0;i<12;i++) sparkle(d.x,d.y); }
    }
  }
  // gates
  for(const g of game.gates){
    g.ph += dt;
    const cyc = (g.ph % 3.2) / 3.2;         // 3.2s cycle
    const target = cyc < 0.55 ? 1 : 0;      // open 55% of the time
    g.open = lerp(g.open, target, dt*8);
  }
  // boost pads
  for(const p of game.pads){
    if(Math.floor(car.x/CELL)===p.c && Math.floor(car.y/CELL)===p.r){
      if(!p.cool){
        p.cool = 0.9;
        const sp = Math.hypot(car.vx,car.vy)||1;
        car.vx += car.vx/sp*330; car.vy += car.vy/sp*330;
        car.nitroMeter = Math.min(100, car.nitroMeter+25);
        car.sq = 1.25; AU.nitro(); game.shake = Math.min(6, game.shake+3);
        float("BOOST!", car.x, car.y-40, game.lv.hue);
      }
    }
    if(p.cool) p.cool = Math.max(0, p.cool-dt);
  }
  // goobers
  for(const gb of game.goobers){
    const [tx,ty] = gb.path[(gb.seg+1)%gb.path.length];
    const d = dist(gb.x,gb.y,tx,ty);
    if(d<6) gb.seg = (gb.seg+1)%gb.path.length;
    else { gb.x += (tx-gb.x)/d*gb.speed*dt; gb.y += (ty-gb.y)/d*gb.speed*dt; }
    gb.ph += dt*7;
    if(car.invuln<=0 && dist(car.x,car.y,gb.x,gb.y)<38){
      car.invuln = 1.6; car.spinT = 0.55; car.sq = 0.6;
      game.bonks++; game.shake = 9; AU.goober();
      sticker("👾 "+pick(YELLS.goober), "#ff8fe0");
      // he yoinks coins — they scatter onto nearby road for re-grabbing (gentle mischief)
      const steal = Math.min(3, game.coinsGot);
      game.coinsGot -= steal; store.coinsBank = Math.max(0, store.coinsBank-steal);
      const near = game.road.filter(([c,r])=>{
        const wx=(c+0.5)*CELL, wy=(r+0.5)*CELL, dd=dist(wx,wy,car.x,car.y);
        return dd>CELL*0.9 && dd<CELL*2.8;
      });
      for(let i=0;i<steal;i++){
        const [cc,rr] = near.length? pick(near) : [Math.floor(car.x/CELL), Math.floor(car.y/CELL)];
        game.coins.push({x:(cc+0.5)*CELL+rand(-18,18), y:(rr+0.5)*CELL+rand(-18,18), got:false, ph:Math.random()*TAU, cool:1.0});
      }
      const kb = 260; const ka = Math.atan2(car.y-gb.y, car.x-gb.x);
      car.vx += Math.cos(ka)*kb; car.vy += Math.sin(ka)*kb;
    }
  }
  // finish
  if(dist(car.x,car.y,game.finish.x,game.finish.y) < CELL*0.75) levelClear();
  // helper arrow timer
  const spd = Math.hypot(car.vx,car.vy);
  game.hintT = spd<60 ? game.hintT+dt : Math.max(0, game.hintT-dt*2);
}
function levelClear(){
  const L = game.lv;
  const timeOk = game.playT <= L.par;
  const allCoins = game.coinsGot >= game.coinsAll;
  const stars = 1 + (timeOk?1:0) + (allCoins?1:0);
  const bonus = 50 + stars*25;
  game.auraRun += bonus;
  store.aura += Math.round(game.auraRun);
  const prev = store.stars[game.levelIx]||0;
  store.stars[game.levelIx] = Math.max(prev, stars);
  store.unlocked = Math.max(store.unlocked, Math.min(LEVELS.length, game.levelIx+2));
  save();
  game.clearData = { stars, t:0, time:game.playT, timeOk, allCoins, aura:Math.round(game.auraRun), shown:0 };
  game.state = "clear";
  AU.win();
  for(let i=0;i<130;i++) game.confetti.push({
    x:W/2+rand(-60,60), y:H*0.35, vx:rand(-260,260), vy:rand(-460,-90),
    rot:rand(0,TAU), vr:rand(-8,8), w:rand(6,13), h:rand(8,16),
    col:pick([L.hue,"#ffd76a","#ff8fe0","#7ef7ff","#f4f6ff"]), t:0
  });
}

/* ---------------- fx ---------------- */
function puff(x,y,col){ game.parts.push({x,y,vx:rand(-24,24),vy:rand(-24,24),t:0,life:rand(0.4,0.8),size:rand(4,10),col,fade:true}); }
function spark(car){
  const a = car.heading+Math.PI+rand(-0.6,0.6);
  game.parts.push({x:car.x+Math.cos(a)*16, y:car.y+Math.sin(a)*16, vx:Math.cos(a)*rand(60,190), vy:Math.sin(a)*rand(60,190), t:0, life:rand(0.2,0.45), size:rand(2,4), col:pick(["#ffd76a","#ffb742","#fff2c0"]) });
}
function sparkle(x,y){ game.parts.push({x,y,vx:rand(-130,130),vy:rand(-170,40),t:0,life:rand(0.3,0.6),size:rand(2,5),col:pick(["#ffd76a","#fff4cc","#ffffff"]),grav:true}); }
function debris(x,y){ game.parts.push({x,y,vx:rand(-160,160),vy:rand(-160,160),t:0,life:rand(0.2,0.5),size:rand(2,4),col:"#8b93ad"}); }
function flame(car){
  const a = car.heading+Math.PI;
  game.parts.push({x:car.x+Math.cos(a)*20+rand(-3,3), y:car.y+Math.sin(a)*20+rand(-3,3), vx:Math.cos(a)*rand(120,240), vy:Math.sin(a)*rand(120,240), t:0, life:rand(0.12,0.3), size:rand(4,9), col:pick(["#7ef7ff","#4ac6ff","#e0fbff"]) });
}
function skid(car){
  const k = game.skidCtx; if(!k) return;
  const px = Math.cos(car.heading+Math.PI/2), py = Math.sin(car.heading+Math.PI/2);
  const bx = car.x-Math.cos(car.heading)*10, by = car.y-Math.sin(car.heading)*10;
  k.fillStyle = "rgba(10,10,14,0.24)";
  for(const s of [-1,1]){ k.beginPath(); k.arc(bx+px*7*s, by+py*7*s, 2.6, 0, TAU); k.fill(); }
}
function scuff(car){
  const k = game.skidCtx; if(!k) return;
  k.fillStyle = "rgba(10,10,14,0.3)";
  for(let i=0;i<4;i++){ k.beginPath(); k.arc(car.x+rand(-9,9), car.y+rand(-9,9), rand(1.5,3), 0, TAU); k.fill(); }
}
function float(txt,x,y,col){ game.floats.push({txt,x,y,t:0,col:col||"#fff"}); }
function sticker(txt,col){ game.stickers.push({txt,col:col||"#fff",t:0}); }
function updateFx(dt){
  game.parts = game.parts.filter(p=>{ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; if(p.grav)p.vy+=500*dt; return p.t<p.life; });
  game.floats = game.floats.filter(f=>{ f.t+=dt; f.y-=34*dt; return f.t<0.95; });
  if(game.stickers.length){ game.stickers[0].t+=dt; if(game.stickers[0].t>1.1) game.stickers.shift(); }
  game.confetti = game.confetti.filter(c=>{ c.t+=dt; c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=560*dt; c.rot+=c.vr*dt; return c.y<H+40 && c.t<4; });
  game.shake = Math.max(0, game.shake - dt*22);
}

/* ---------------- drawing ---------------- */
function drawWorld(dt){
  const car = game.car;
  // camera with lookahead
  const lead = 0.22;
  game.cam.x = lerp(game.cam.x, car.x+car.vx*lead, 1-Math.exp(-5*dt));
  game.cam.y = lerp(game.cam.y, car.y+car.vy*lead, 1-Math.exp(-5*dt));
  const wW = game.cols*CELL, wH = game.rows*CELL;
  let cx = game.cam.x, cy = game.cam.y;
  if(wW>W) cx = clamp(cx, W/2-40, wW-W/2+40); else cx = wW/2;
  if(wH>H) cy = clamp(cy, H/2-40, wH-H/2+40); else cy = wH/2;
  const sx = (Math.random()*2-1)*game.shake, sy = (Math.random()*2-1)*game.shake;

  ctx.save();
  ctx.translate(Math.round(W/2-cx+sx), Math.round(H/2-cy+sy));
  ctx.drawImage(game.groundCv, 0, 0);
  ctx.drawImage(game.skidCv, 0, 0);

  drawFinish();
  for(const d of game.doors) drawDoor(d);
  for(const g of game.gates) drawGate(g);
  for(const cn of game.coins) if(!cn.got) drawCoin(cn);
  if(game.key && !game.key.got) drawKey(game.key);
  for(const gb of game.goobers) drawGoober(gb);
  drawHintArrow();
  drawCar(car);
  // particles
  for(const p of game.parts){
    ctx.globalAlpha = 1-p.t/p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(p.fade?1+p.t*2:1), 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // floaters
  for(const f of game.floats){
    ctx.globalAlpha = 1-f.t;
    ctx.font = "800 20px 'Avenir Next Condensed','Arial Narrow',sans-serif";
    ctx.textAlign="center";
    ctx.lineWidth=4; ctx.strokeStyle="rgba(10,12,20,0.85)"; ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillStyle = f.col; ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCar(car){
  // motion trail
  for(let i=car.trail.length-1;i>=2;i--){
    const t = car.trail[i], a = (1-i/car.trail.length)*0.14;
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.a);
    ctx.globalAlpha = a; ctx.fillStyle = CONFIG.carColor;
    ctx.beginPath(); ctx.roundRect(-16,-9,32,18,6); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(car.x, car.y);
  // underglow
  ctx.fillStyle = game.lv.hue; ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.ellipse(0, 0, 24, 17, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.rotate(car.heading);
  const sq = clamp(car.sq, 0.55, 1.35);
  ctx.scale(sq, 2-sq>1.3?1.3:2-sq);
  if(car.invuln>0 && (car.invuln*10|0)%2) ctx.globalAlpha = 0.4;
  // headlight cones
  ctx.fillStyle = "rgba(255,240,190,0.13)";
  for(const s of [-1,1]){
    ctx.beginPath(); ctx.moveTo(16, 5*s); ctx.lineTo(85, 22*s); ctx.lineTo(85, 2*s); ctx.closePath(); ctx.fill();
  }
  // wheels
  ctx.fillStyle = "#151824";
  for(const [wx,wy] of [[-10,-10],[-10,10],[9,-10],[9,10]]) { ctx.beginPath(); ctx.roundRect(wx-4,wy-3,8,6,2); ctx.fill(); }
  // body
  ctx.fillStyle = CONFIG.carColor;
  ctx.beginPath(); ctx.roundRect(-17,-9.5,34,19,7); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  ctx.beginPath(); ctx.roundRect(-17,-9.5,34,8,7); ctx.fill();
  // racing stripe
  ctx.fillStyle = CONFIG.stripe;
  ctx.fillRect(-17,-2.4,34,4.8);
  // cabin
  ctx.fillStyle = "#1b2233";
  ctx.beginPath(); ctx.roundRect(-6,-6.5,12,13,4); ctx.fill();
  ctx.fillStyle = "rgba(160,220,255,0.4)";
  ctx.beginPath(); ctx.roundRect(3,-5.5,3.4,11,2); ctx.fill();
  // spoiler
  ctx.fillStyle = "#20283c";
  ctx.fillRect(-19,-8,4,16);
  // lights
  ctx.fillStyle = "#fff2c0";
  ctx.fillRect(15,-7,3,4); ctx.fillRect(15,3,3,4);
  ctx.fillStyle = car.boost>0 ? "#ff8f8f" : "#c23a4a";
  ctx.fillRect(-18,-7,2.6,4); ctx.fillRect(-18,3,2.6,4);
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawCoin(cn){
  const s = Math.abs(Math.sin(game.t*3+cn.ph));
  const bob = Math.sin(game.t*2.4+cn.ph)*3;
  ctx.save(); ctx.translate(cn.x, cn.y+bob);
  if(cn.nitro){
    ctx.font = "26px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.scale(0.6+s*0.4, 1);
    ctx.fillText("⚡", 0, 0);
  } else {
    ctx.scale(0.35+s*0.65, 1);
    ctx.fillStyle = "#e8a930"; ctx.beginPath(); ctx.arc(0,0,11,0,TAU); ctx.fill();
    ctx.fillStyle = "#ffd76a"; ctx.beginPath(); ctx.arc(0,-1.5,9.5,0,TAU); ctx.fill();
    ctx.fillStyle = "#e8a930"; ctx.font="900 11px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("A", 0, -1);
  }
  ctx.restore();
}
function drawKey(k){
  const bob = Math.sin(game.t*2.6)*4;
  ctx.save(); ctx.translate(k.x, k.y+bob);
  ctx.font = "30px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.rotate(Math.sin(game.t*2)*0.2);
  ctx.fillText("🗝️", 0, 0);
  ctx.restore();
  const pr = 20+Math.sin(game.t*4)*4;
  ctx.strokeStyle = "rgba(255,215,106,0.5)"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(k.x, k.y+bob, pr, 0, TAU); ctx.stroke();
}
function drawDoor(d){
  if(d.anim>=1) return;
  const px = d.c*CELL, py = d.r*CELL;
  const h = CELL*(1-d.anim);
  ctx.fillStyle = "#3a2f18";
  ctx.fillRect(px+4, py+CELL-h+4, CELL-8, Math.max(0,h-8));
  ctx.strokeStyle = "#ffd76a"; ctx.lineWidth = 4;
  ctx.strokeRect(px+8, py+CELL-h+8, CELL-16, Math.max(0,h-16));
  if(d.anim<0.1){
    ctx.font = "26px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("🔒", px+CELL/2, py+CELL/2);
  }
}
function drawGate(g){
  const px = g.c*CELL, py = g.r*CELL;
  const closed = 1-g.open;
  if(closed<0.03) { // little base markers so pads are visible when open
    ctx.fillStyle = "rgba(255,90,90,0.5)";
    ctx.fillRect(px+2, py+2, 8, 8); ctx.fillRect(px+CELL-10, py+CELL-10, 8, 8);
    return;
  }
  const h = CELL*closed;
  ctx.save();
  ctx.translate(px, py+CELL/2-h/2);
  ctx.fillStyle = "#d8dbe6";
  ctx.fillRect(0, 0, CELL, h);
  ctx.fillStyle = "#ff5a5a";
  const stripes = 5;
  for(let i=0;i<stripes;i++){
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,CELL,h); ctx.clip();
    ctx.translate(i*CELL/stripes*1.4 - 20, 0); ctx.rotate(0.5);
    ctx.fillRect(0,-30,16,h+80);
    ctx.restore();
  }
  ctx.strokeStyle = "#20242f"; ctx.lineWidth=3; ctx.strokeRect(1.5,1.5,CELL-3,h-3);
  ctx.restore();
}
function drawGoober(gb){
  const bounce = Math.abs(Math.sin(gb.ph))*8;
  ctx.save();
  ctx.translate(gb.x, gb.y);
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath(); ctx.ellipse(0, 14, 16-bounce*0.4, 5, 0, 0, TAU); ctx.fill();
  ctx.translate(0, -bounce);
  const sq = 1+Math.sin(gb.ph)*0.12;
  ctx.scale(2-sq, sq);
  ctx.font = "34px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("👾", 0, 0);
  ctx.restore();
}
function drawFinish(){
  const f = game.finish;
  const pr = CELL*0.55 + Math.sin(game.t*3.5)*6;
  ctx.strokeStyle = game.lv.hue; ctx.globalAlpha = 0.8; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(f.x, f.y, pr, 0, TAU); ctx.stroke();
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.arc(f.x, f.y, pr*0.7, 0, TAU); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.font = "34px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("🏁", f.x, f.y-Math.abs(Math.sin(game.t*2.8))*6);
}
function drawHintArrow(){
  if(game.hintT < 1.6 && game.playT > 4) return;   // show at level start + when stuck
  if(!game.flow) return;
  const car = game.car;
  const c = clamp(Math.floor(car.x/CELL),0,game.cols-1), r = clamp(Math.floor(car.y/CELL),0,game.rows-1);
  let best=null, bd=game.flow[r]?game.flow[r][c]:-1;
  if(bd<0) return;
  for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
    const nc=c+dc, nr=r+dr;
    if(nc<0||nr<0||nc>=game.cols||nr>=game.rows) continue;
    const v = game.flow[nr][nc];
    if(v>=0 && v<bd){ bd=v; best=[dc,dr]; }
  }
  const ang = best ? Math.atan2(best[1],best[0]) : Math.atan2(game.objective.y-car.y, game.objective.x-car.x);
  const pulse = 1+Math.sin(game.t*5)*0.15;
  ctx.save();
  ctx.translate(car.x + Math.cos(ang)*62, car.y + Math.sin(ang)*62);
  ctx.rotate(ang); ctx.scale(pulse,pulse);
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#f4f6ff";
  ctx.strokeStyle = "rgba(12,14,22,0.8)"; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(12,0); ctx.lineTo(-7,-9); ctx.lineTo(-3,0); ctx.lineTo(-7,9); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

  nightSky();

  ctx.textAlign="center"; ctx.fillStyle="#ffb742";
  ctx.fillText(CONFIG.title, W/2, 52);

  }

  ctx.stroke(); ctx.setLineDash([]);

    if(unlocked && i===store.unlocked-1){
      ctx.strokeStyle = LEVELS[i].hue; ctx.lineWidth = 4+Math.sin(game.t*4)*1.5;
      ctx.beginPath(); ctx.arc(x,y,R+7,0,TAU); ctx.stroke();
    }
    ctx.font = "900 26px 'Avenir Next Condensed','Arial Narrow',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";

      ctx.fillStyle = "#12151f";

    }

    if(unlocked) mapNodes.push({x,y,r:R+10,ix:i});

  const cur = Math.min(store.unlocked-1, n-1);

  const fakeCar = { x:cx2, y:cy2-58, heading:-0.35+Math.sin(game.t*1.4)*0.06, sq:1, invuln:0, boost:0, trail:[] };
  const saveLv = game.lv; game.lv = LEVELS[cur]; drawCar(fakeCar); game.lv = saveLv;
  if(CONFIG.playerName){
    roundedPanel(cx2-44, cy2-108, 88, 24, 6, "#f4f6ff");
    ctx.fillStyle="#12151f"; ctx.font="900 14px 'Avenir Next Condensed',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(CONFIG.playerName.toUpperCase(), cx2, cy2-96);
  }

  ctx.fillText(input.hasTouch? "tap a level!" : "tap or press ENTER for level "+store.unlocked, W/2, H-30);
  // input
  for(const tp of input.taps.splice(0)){

    hudBtns.length = 0;
    drawBigBtn(bx1, by, bw, bh, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
    if(!last) drawBigBtn(bx2, by, bw, bh, "NEXT ▶", "next", game.lv.hue, "#12151f");
    else drawBigBtn(bx2, by, bw, bh, "🏆 DONE!", "map", "#ffd76a", "#12151f");
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ AU.ui(); if(!last) loadLevel(game.levelIx+1); else game.state="map"; return; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="next") loadLevel(game.levelIx+1);
        else game.state="map";
        return;
      }
    }
  } else input.taps.length = 0;
}
function drawBigBtn(x,y,w,h,label,act,bg,fg){
  ctx.fillStyle = "rgba(12,14,22,0.9)";
  ctx.beginPath(); ctx.roundRect(x+4,y+4,w,h,16); ctx.fill();
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,16); ctx.fill();
  ctx.fillStyle = fg;
  ctx.font = "900 25px 'Avenir Next Condensed','Arial Narrow',sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(label, x+w/2, y+h/2+1);
  hudBtns.push({x,y,w,h,act});
}

let paused = false;
function togglePause(){ if(game.state==="play"){ paused=!paused; AU.ui(); } }
document.addEventListener("visibilitychange", ()=>{ if(document.hidden && game.state==="play") paused = true; });

/* ---------------- main loop ---------------- */
let last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  tick(now);
}
function tick(now){
  const dt = Math.min(0.05, (now-last)/1000); last = now;
  game.t += dt;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);

  if(game.state==="title"){ drawTitle(dt); }
  else if(game.state==="map"){ drawMap(); }
  else if(game.state==="clear"){ updateFx(dt); drawClear(dt); }
  else if(game.state==="play"){
    hudBtns.length = 0;
    if(!paused){
      readInput();
      game.playT += dt;
      updateCar(dt);
      updateEntities(dt);
      updateFx(dt);
    }
    if(game.state==="play" || game.state==="clear"){  // levelClear may fire mid-update
      drawWorld(paused?0.0001:dt);
      if(game.state==="play"){ drawHUD(); drawStickers(); }
    }
    if(paused && game.state==="play"){
      ctx.fillStyle = "rgba(8,10,16,0.6)"; ctx.fillRect(0,0,W,H);
      ctx.font = "900 italic 54px 'Avenir Next Condensed','Arial Narrow',sans-serif";
      ctx.fillStyle="#f4f6ff"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("PAUSED", W/2, H*0.42);
      hudBtns.length = 0;
      drawBigBtn(W/2-170, H*0.55, 160, 58, "▶ GO", "resume", "#9ae64a", "#12151f");
      drawBigBtn(W/2+10, H*0.55, 160, 58, "🗺 MAP", "map", "rgba(60,66,86,0.95)", "#f4f6ff");
    }
    // HUD button taps
    for(const tp of input.taps.splice(0)){
      if(tp.screen){ if(paused){ paused=false; AU.ui(); } continue; }
      for(const b of hudBtns) if(tp.x>=b.x&&tp.x<=b.x+b.w&&tp.y>=b.y&&tp.y<=b.y+b.h){
        AU.ui();
        if(b.act==="mute") AU.toggleMute();
        if(b.act==="pause") togglePause();
        if(b.act==="resume") paused=false;
        if(b.act==="map"){ paused=false; game.state="map"; }
      }
    }
  }
  // soft vignette
  if(!game._vig || game._vigW!==W || game._vigH!==H){
    game._vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.45, W/2,H/2, Math.max(W,H)*0.75);
    game._vig.addColorStop(0,"rgba(8,10,16,0)");
    game._vig.addColorStop(1,"rgba(8,10,16,0.42)");
    game._vigW=W; game._vigH=H;
  }
  ctx.fillStyle = game._vig; ctx.fillRect(0,0,W,H);
}
requestAnimationFrame(frame);

// debug handle (safe to ignore)
window.__tm = { game, loadLevel, store, CONFIG,
  step(sec){ paused = false; let n = last; for(let i=0;i<sec*60;i++){ n += 1000/60; tick(n); } } };
</script>
